<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3498db;
color:white
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

.bar{
display:flex;
gap:4px;
margin-top:5px
}

.box{
width:15px;
height:15px;
border:1px solid #aaa;
background:#eee
}

.done{background:#2ecc71}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd
}

.studentHeader{
display:flex;
align-items:center;
gap:10px
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee;
cursor:pointer
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

function ClassesBar({aulas}){

return(

<div className="bar">

{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return(
<div key={i} className={"box "+(done?"done":"")}></div>
)

})}

</div>

)

}

function PresenceBar({graus}){

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div
key={i}
className="degree"
style={{background:color}}
></div>
)

})}

</div>

)

}

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("jiujitsu_students")
return saved?JSON.parse(saved):[]
})

const [search,setSearch]=React.useState("")
const [selectedStudent,setSelectedStudent]=React.useState(null)

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("jiujitsu_students",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

setStudents([...students,{

id:Date.now(),
...form,

avatar:"avatar.png",

aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

setForm({
nome:"",
idade:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()
const novas=s.aulas+1

let historico=s.historicoGraus

if(novas%15===0){

historico=[...historico,{
grau:Math.floor(novas/15),
data
}]

}

return{

...s,

aulas:novas,

historicoAulas:[
...s.historicoAulas,
{data}
],

historicoGraus:historico

}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

return{

...s,

comportamental:{
...s.comportamental,
[key]:data
},

historicoComportamental:[
...s.historicoComportamental,
{tipo:key,data}
]

}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return

setStudents(students.filter(s=>s.id!==id))

}

if(selectedStudent){

const s=selectedStudent

return(

<div className="container">

<button
onClick={()=>setSelectedStudent(null)}
>
⬅ Voltar
</button>

<div className="card">

<h2>{s.nome}</h2>

<img
src={s.avatar}
className="avatar"
style={{width:120,height:120}}
/>

<p>Idade: {s.idade}</p>
<p>Faixa: {s.faixa}</p>
<p>Aulas: {s.aulas}</p>

<h3>Aulas</h3>
<ClassesBar aulas={s.aulas}/>

<h3>Graus</h3>
<PresenceBar graus={Math.min(Math.floor(s.aulas/15),8)}/>

<h3>Histórico de graus</h3>

{s.historicoGraus.map((h,i)=>(
<div key={i}>
{h.data} - Grau {h.grau}
</div>
))}

<h3>Histórico comportamental</h3>

{s.historicoComportamental.map((h,i)=>(
<div key={i}>
{h.data} - {h.tipo}
</div>
))}

</div>

</div>

)

}

return(

<div className="container">

<h1>Academia Jiu Jitsu</h1>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button
className="green"
onClick={addStudent}
>
Adicionar
</button>

</div>

</div>

<div className="card">

<input
placeholder="Buscar aluno..."
value={search}
onChange={e=>setSearch(e.target.value)}
style={{width:"100%"}}
/>

</div>

{students
.filter(s =>
s.nome.toLowerCase().includes(search.toLowerCase())
)
.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),8)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>

<b>{s.nome}</b><br/>
{s.idade} anos

</div>

</div>

<div>Faixa: {s.faixa}</div>

<ClassesBar aulas={s.aulas}/>

<PresenceBar graus={graus}/>

<div style={{display:"flex",gap:10,marginTop:6}}>

<div
className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={()=>markBehavior(s.id,"relacionamento")}
></div>

<div
className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={()=>markBehavior(s.id,"comportamento")}
></div>

<div
className="beh"
style={{background:s.comportamental.notas?"#e74c3c":"#eee"}}
onClick={()=>markBehavior(s.id,"notas")}
></div>

<div
className="beh"
style={{background:s.comportamental.habitos?"#2ecc71":"#eee"}}
onClick={()=>markBehavior(s.id,"habitos")}
></div>

</div>

<div style={{marginTop:8}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button
onClick={()=>setSelectedStudent(s)}
>
Abrir
</button>

<button
className="red"
onClick={()=>removeStudent(s.id)}
>
Excluir
</button>

</div>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
