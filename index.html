<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System v3.2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:10px; }
    .container { max-width:850px; margin:auto; width: 100%; box-sizing: border-box; }
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
    button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
    
    .avatar-container { position: relative; width: 85px; height: 85px; flex-shrink: 0; }
    .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; cursor: pointer; }
    .age-badge { position: absolute; bottom: 5px; right: 5px; background: #075e54; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid white; }
    
    .degree-bar-container { background: #222; padding: 8px 12px; border-radius: 6px; width: fit-content; margin: 10px 0; border: 1px solid #000; }
    .degree-row { display: flex; gap: 8px; }
    .degree-slot { width: 18px; height: 35px; border: 1px solid #444; border-radius: 2px; transition: 0.3s; position: relative; }
    .degree-slot.white { background: #fff; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
    .degree-slot.red { background: #e74c3c; box-shadow: inset 0 0 5px rgba(0,0,0,0.3); border-color: #962d22; }

    .bar-bolinhas { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; margin: 10px 0; }
    .bolinha-aula { aspect-ratio: 1/1; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:11px; background:#fff; cursor: pointer; font-weight: bold; color: #777; transition: 0.2s; }
    .bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
    .beh-row { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
    .beh-btn { flex: 1; min-width: 70px; padding: 10px 2px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; }
    
    .wa-chat { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
    .wa-messages { height:150px; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .wa-msg { padding:8px 12px; border-radius:8px; font-size:13px; max-width:85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .wa-msg.sent { background:#dcf8c6; align-self:flex-end; border-top-right-radius: 0; }
    .wa-input { background: #f0f2f5; padding: 8px; display: flex; gap: 8px; flex-direction: column; }
    .wa-input-row { display: flex; gap: 8px; align-items: center; }
    .wa-input input { flex: 1; border: none; border-radius: 20px; padding: 8px 15px; outline: none; }
    .emoji-bar { display: flex; gap: 10px; padding: 0 5px; font-size: 18px; cursor: pointer; }

    /* Estilo Repositório de Documentos */
    .repo-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
    .repo-title { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
    .repo-item { position: relative; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; background: #fafafa; cursor: pointer; }
    .repo-item img { width: 100%; height: 100%; object-fit: cover; }
    .repo-add { display: flex; align-items: center; justify-content: center; background: #eee; border: 1px dashed #bbb; color: #888; font-size: 20px; }
    .repo-del { position: absolute; top: 0; right: 0; background: rgba(231,76,60,0.8); color: white; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; border-bottom-left-radius: 5px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const BEH = [{k:'REL', n:'Relacionamento', c:'#f1c40f'}, {k:'DIS', n:'Disciplina', c:'#3498db'}, {k:'ORG', n:'Organização', c:'#e74c3c'}, {k:'HAB', n:'Bons Hábitos', c:'#2ecc71'}];
const EMOJIS = ["🥋", "🔥", "💪", "👊", "⭐", "✅", "🙌", "🔝"];

function getAge(nasc) {
    if(!nasc) return 0;
    const diff = Date.now() - new Date(nasc).getTime();
    return Math.abs(new Date(diff).getUTCFullYear() - 1970);
}

function getRules(nasc, faixa) {
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 12) return { p: "Little/Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_alliance_final_v5") || "[]"));

    React.useEffect(() => { localStorage.setItem("all_alliance_final_v5", JSON.stringify(students)); }, [students]);

    const markClass = (id, n) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const rules = getRules(s.nascimento, s.faixa);
            const totalMax = (8 * rules.m) + rules.m;
            if (s.totalAulas >= totalMax && n > s.aulasNoCiclo) return s;
            if (s.aulasNoCiclo === n) {
                return { ...s, aulasNoCiclo: n - 1, totalAulas: Math.max(0, s.totalAulas - 1) };
            }
            if (n === rules.m) {
                return { ...s, aulasNoCiclo: 0, graus: (s.graus || 0) + 1, totalAulas: (s.totalAulas || 0) + 1 };
            }
            return { ...s, aulasNoCiclo: n, totalAulas: (s.totalAulas || 0) + 1 };
        }));
    };

    const handleUpload = (id, type, e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            setStudents(students.map(st => {
                if(st.id !== id) return st;
                if(type === 'avatar') return {...st, avatar: ev.target.result};
                return {...st, docs: [...(st.docs || []), ev.target.result]};
            }));
        };
        reader.readAsDataURL(file);
    };

    const addMessage = (id, text) => {
        if(!text.trim()) return;
        setStudents(students.map(st => st.id === id ? { ...st, chat: [...(st.chat || []), text] } : st));
    };

    if (!user) return (
        <div style={{textAlign:'center', padding:50}}>
            <h2>Alliance Eagle System</h2>
            <button onClick={() => setUser("professor")}>Professor</button>
            <button onClick={() => setUser("pais")} style={{marginLeft:10, background:'#3498db'}}>Pais</button>
        </div>
    );

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h3 style={{margin:0, color:'#075e54'}}>Alliance Eagle</h3>
                <button onClick={() => setUser("")} style={{background:'#e74c3c'}}>Sair</button>
            </div>

            {user === "professor" && (
                <button style={{width:'100%', marginBottom:15}} onClick={() => {
                    const n = prompt("Nome:");
                    const d = prompt("Nascimento (AAAA-MM-DD):");
                    if(n && d) setStudents([...students, { id: Date.now(), nome: n, nascimento: d, faixa: "Branca", totalAulas: 0, aulasNoCiclo: 0, graus: 0, comportamental: {}, chat: [], docs: [] }]);
                }}>+ Adicionar Novo Aluno</button>
            )}

            {students.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                const isAllBeh = BEH.every(b => s.comportamental?.[b.k]);
                
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <div className="avatar-container">
                                <img src={s.avatar || "https://ui-avatars.com/api/?background=eee&name="+s.nome} className="avatar-img" onClick={() => document.getElementById(`av-${s.id}`).click()} />
                                <input type="file" id={`av-${s.id}`} hidden onChange={e => handleUpload(s.id, 'avatar', e)} />
                                <div className="age-badge">{getAge(s.nascimento)}</div>
                            </div>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0}}>{s.nome}</h3>
                                <div style={{fontSize:12, color:'#666'}}>{s.faixa} | {rules.p}</div>
                                <div style={{fontSize:11, fontWeight:'bold', color:'#075e54'}}>Total: {s.totalAulas} / {(8 * rules.m) + rules.m} aulas</div>
                            </div>
                        </div>

                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i+1 <= s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i+1)}>{i+1}</div>
                            ))}
                        </div>

                        <div className="degree-bar-container">
                            <div style={{color:'#fff', fontSize:9, marginBottom:5, fontWeight:'bold'}}>GRAUS SOBREPOSTOS (ALLIANCE)</div>
                            <div className="degree-row">
                                {[0, 1, 2, 3].map(i => {
                                    let colorClass = "";
                                    if (s.graus > i + 4) colorClass = "red";
                                    else if (s.graus > i) colorClass = "white";
                                    return <div key={i} className={`degree-slot ${colorClass}`}></div>;
                                })}
                            </div>
                        </div>

                        <div className="beh-row">
                            {BEH.map(b => (
                                <div key={b.k} className="beh-btn" style={{ background: s.comportamental?.[b.k] ? b.c : '#eee', color: s.comportamental?.[b.k] ? '#fff' : '#888' }} onClick={() => {
                                    if(user!=="professor") return;
                                    setStudents(students.map(st=>st.id===s.id?{...st, comportamental:{...(st.comportamental||{}), [b.k]: !st.comportamental?.[b.k]}}:st));
                                }}>{b.n}</div>
                            ))}
                        </div>

                        {s.graus >= 8 && isAllBeh && user === "professor" && (
                            <button style={{width:'100%', background:'linear-gradient(to right, #FFD700, #DAA520)', color:'#000', marginBottom:15}} onClick={() => {
                                const next = BELTS[BELTS.indexOf(s.faixa)+1];
                                if(next) setStudents(students.map(st=>st.id===s.id?{...st, faixa:next, graus:0, totalAulas:0, aulasNoCiclo:0, comportamental:{}}:st));
                            }}>🎓 GRADUAR PARA {BELTS[BELTS.indexOf(s.faixa)+1]?.toUpperCase()}</button>
                        )}

                        <div className="wa-chat">
                            <div className="wa-messages">
                                {(s.chat || []).map((m, i) => <div key={i} className="wa-msg sent">{m}</div>)}
                            </div>
                            <div className="wa-input">
                                <div className="emoji-bar">
                                    {EMOJIS.map(e => <span key={e} onClick={() => addMessage(s.id, e)}>{e}</span>)}
                                </div>
                                <div className="wa-input-row">
                                    <input placeholder="Escreva para os pais..." id={`in-${s.id}`} onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value) { addMessage(s.id, e.target.value); e.target.value = ""; }
                                    }} />
                                    <i className="fas fa-paper-plane" style={{color:'#075e54', cursor:'pointer'}} onClick={() => {
                                        const el = document.getElementById(`in-${s.id}`);
                                        addMessage(s.id, el.value); el.value = "";
                                    }}></i>
                                </div>
                            </div>
                        </div>

                        <div className="repo-section">
                            <div className="repo-title"><i className="fas fa-folder-open"></i> Repositório de Documentos</div>
                            <div className="repo-grid">
                                {(s.docs || []).map((d, i) => (
                                    <div key={i} className="repo-item" onClick={() => window.open(d)}>
                                        <img src={d} />
                                        {user === "professor" && (
                                            <div className="repo-del" onClick={(e) => {
                                                e.stopPropagation();
                                                setStudents(students.map(st => st.id === s.id ? {...st, docs: st.docs.filter((_, idx) => idx !== i)} : st));
                                            }}><i className="fas fa-times"></i></div>
                                        )}
                                    </div>
                                ))}
                                {user === "professor" && (
                                    <div className="repo-item repo-add" onClick={() => document.getElementById(`doc-${s.id}`).click()}>
                                        <i className="fas fa-plus"></i>
                                        <input type="file" id={`doc-${s.id}`} hidden onChange={e => handleUpload(s.id, 'doc', e)} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
