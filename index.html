```html
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema Academia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee;
cursor:pointer
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd;
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.login{
max-width:400px;
margin:auto
}

.ready{
background:#d4edda;
padding:8px;
border-radius:6px;
margin-top:10px;
font-weight:bold
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

function categoriaPorIdade(idade){

idade=parseInt(idade)

if(idade<=4) return "BABY EAGLE"
if(idade<=8) return "LITTLE EAGLE"
if(idade<=12) return "EAGLE WARRIOR"
return "EAGLE YOUTH"

}

function ClassesBar({aulas}){

return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return(
<div key={i} className={"box "+(done?"done":"")}></div>
)

})}
</div>
)

}

function PresenceBar({graus}){

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div key={i} className="degree" style={{background:color}}></div>
)

})}

</div>

)

}

function App(){

const [user,setUser]=React.useState(null)

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_final")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

const [editing,setEditing]=React.useState(null)

function loginProfessor(){

const senha=prompt("Senha professor")

if(senha==="admin"){
setUser({tipo:"professor"})
}else{
alert("Senha incorreta")
}

}

function loginPais(){

const nome=prompt("Nome aluno")
const nascimento=prompt("Nascimento AAAA-MM-DD")

const aluno=students.find(s=>s.nome===nome && s.nascimento===nascimento)

if(aluno){
setUser({tipo:"pais",aluno})
}else{
alert("Aluno não encontrado")
}

}

React.useEffect(()=>{
localStorage.setItem("academia_final",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const idade=new Date().getFullYear()-new Date(form.nascimento).getFullYear()

setStudents([...students,{
id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade,
categoria:categoriaPorIdade(idade),
faixa:form.faixa,
avatar:"avatar.png",
aulas:0,
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
},
historicoComportamental:[]
}])

setForm({nome:"",nascimento:"",faixa:"Branca"})

}

function updateStudent(){

const idade=new Date().getFullYear()-new Date(form.nascimento).getFullYear()

setStudents(students.map(s=>{

if(s.id!==editing) return s

return{
...s,
nome:form.nome,
nascimento:form.nascimento,
faixa:form.faixa,
idade,
categoria:categoriaPorIdade(idade)
}

}))

setEditing(null)
setForm({nome:"",nascimento:"",faixa:"Branca"})

}

function startEdit(student){

setEditing(student.id)

setForm({
nome:student.nome,
nascimento:student.nascimento,
faixa:student.faixa
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

if(s.aulas>=135){
alert("Necessário exame de faixa")
return s
}

return {...s,aulas:s.aulas+1}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

return{
...s,
comportamental:{...s.comportamental,[key]:data},
historicoComportamental:[...s.historicoComportamental,{tipo:key,data}]
}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const idx=beltOrder.indexOf(s.faixa)

return{
...s,
faixa:beltOrder[idx+1]||s.faixa,
aulas:0,
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}
}

}))

}

if(!user){

return(

<div className="login">

<h2>Sistema Academia</h2>

<button onClick={loginProfessor}>
Área Professor
</button>

<button onClick={loginPais}>
Área Pais / Aluno
</button>

</div>

)

}

let lista=students

if(user.tipo==="pais"){
lista=[user.aluno]
}

return(

<div className="container">

<h1>Sistema Academia</h1>

{user.tipo==="professor" &&

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
value={form.nascimento}
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

{editing?

<button className="orange" onClick={updateStudent}>
Salvar edição
</button>

:

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

}

</div>

</div>

}

{lista.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),15)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>

<b>{s.nome}</b><br/>
{s.idade} anos<br/>
{s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>
<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>
<PresenceBar graus={graus}/>

<div style={{marginTop:10}}>

<b>Graus comportamentais</b>

<div style={{display:"flex",gap:10,marginTop:6}}>

<div
title="Relacionamento"
className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={()=>user.tipo==="professor" && markBehavior(s.id,"relacionamento")}
></div>

<div
title="Comportamento"
className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={()=>user.tipo==="professor" && markBehavior(s.id,"comportamento")}
></div>

<div
title="Notas / Escola"
className="beh"
style={{background:s.comportamental.notas?"#e74c3c":"#eee"}}
onClick={()=>user.tipo==="professor" && markBehavior(s.id,"notas")}
></div>

<div
title="Hábitos / Disciplina"
className="beh"
style={{background:s.comportamental.habitos?"#2ecc71":"#eee"}}
onClick={()=>user.tipo==="professor" && markBehavior(s.id,"habitos")}
></div>

</div>

<div style={{fontSize:12,marginTop:6}}>
🟡 Relacionamento | 🔵 Comportamento | 🔴 Notas | 🟢 Hábitos
</div>

</div>

{user.tipo==="professor" &&

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="green" onClick={()=>trocarFaixa(s.id)}>
Trocar Faixa
</button>

<button className="orange" onClick={()=>startEdit(s)}>
Editar
</button>

</div>

}

<div style={{marginTop:10,fontSize:12}}>

<b>Histórico comportamental</b>

{s.historicoComportamental.map((h,i)=>(
<div key={i}>
{h.data} - {h.tipo}
</div>
))}

</div>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
```
