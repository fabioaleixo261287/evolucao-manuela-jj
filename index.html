<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:1100px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.turmaTitle{
background:#2c3e50;
color:white;
padding:10px;
border-radius:8px;
margin-top:20px;
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd;
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center
}

.modalCard{
background:white;
padding:20px;
border-radius:10px;
width:320px
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const turmas=[
"BABY EAGLE",
"LITTLE EAGLE",
"EAGLE WARRIOR",
"EAGLE YOUTH"
]

function definirTurma(idade){

idade=parseInt(idade)

if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"

return "FORA DA TURMA"
}

function Login({onLogin}){

const [user,setUser]=React.useState("")
const [pass,setPass]=React.useState("")

function entrar(){

if(user==="admin" && pass==="admin123"){
onLogin({tipo:"professor"})
return
}

if(pass==="123"){
onLogin({tipo:"pai",aluno:user})
}

}

return(

<div className="container">

<div className="card">

<h2>Login Academia</h2>

<div className="row">

<input
placeholder="Usuário"
value={user}
onChange={e=>setUser(e.target.value)}
/>

<input
type="password"
placeholder="Senha"
value={pass}
onChange={e=>setPass(e.target.value)}
/>

<button onClick={entrar}>
Entrar
</button>

</div>

</div>

</div>

)

}

function App(){

const [login,setLogin]=React.useState(null)

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_v6")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

const [edit,setEdit]=React.useState(null)

React.useEffect(()=>{
localStorage.setItem("academia_v6",JSON.stringify(students))
},[students])

if(!login){
return <Login onLogin={setLogin}/>
}

function addStudent(){

if(!form.nome) return

setStudents([...students,{

id:Date.now(),
...form,
turma:definirTurma(form.idade),
avatar:"https://i.imgur.com/4ZQZ4Zx.png",
aulas:0,
historicoGraus:[],
historicoFaixas:[]
}])

setForm({
nome:"",
idade:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const novas = s.aulas + 1

let historico=s.historicoGraus

if(novas % 15 === 0){

historico=[
...historico,
{
grau:Math.floor(novas/15),
data:new Date().toLocaleDateString()
}
]

}

return{
...s,
aulas:novas,
historicoGraus:historico
}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
historicoFaixas:[
...s.historicoFaixas,
{
faixa:s.faixa,
data:new Date().toLocaleDateString()
}
],
aulas:0,
historicoGraus:[]
}

}))

}

function removeStudent(id){
setStudents(students.filter(s=>s.id!==id))
}

function salvarEdicao(){

setStudents(students.map(s=>{
if(s.id!==edit.id) return s
return edit
}))

setEdit(null)

}

let alunosVisiveis=students

if(login.tipo==="pai"){
alunosVisiveis=students.filter(s=>s.nome===login.aluno)
}

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

{login.tipo==="professor" &&

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

}

{turmas.map(turma=>{

const alunosDaTurma=alunosVisiveis.filter(a=>a.turma===turma)

if(alunosDaTurma.length===0) return null

return(

<div key={turma}>

<div className="turmaTitle">
{turma}
</div>

{alunosDaTurma.map(s=>(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>
<b>{s.nome}</b><br/>
{s.idade} anos
</div>

</div>

<div>Faixa: {s.faixa}</div>
<div>Aulas: {s.aulas}</div>

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

{login.tipo==="professor" &&

<>

<button
className="green"
onClick={()=>trocarFaixa(s.id)}
>
Trocar Faixa
</button>

<button
className="orange"
onClick={()=>setEdit({...s})}
>
Editar
</button>

<button
className="red"
onClick={()=>removeStudent(s.id)}
>
Excluir
</button>

</>

}

</div>

<div style={{marginTop:10,fontSize:12}}>

<b>Histórico de Graus</b>

{s.historicoGraus.map((h,i)=>(
<div key={i}>
{h.data} - Grau {h.grau}
</div>
))}

</div>

<div style={{marginTop:10,fontSize:12}}>

<b>Histórico de Faixas</b>

{s.historicoFaixas.map((h,i)=>(
<div key={i}>
{h.data} - Faixa {h.faixa}
</div>
))}

</div>

</div>

))}

</div>

)

})}

</div>

)

}

ReactDOM
.createRoot(document.getElementById("root"))
.render(<App/>)

</script>

</body>
</html>
