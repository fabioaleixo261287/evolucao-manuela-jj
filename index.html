<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.green{background:#2ecc71}
button.red{background:#e74c3c}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999
}

.done{
background:#2ecc71
}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px
}

.beh{
width:22px;
height:22px;
border-radius:50%
}

.avatar{
width:60px;
height:60px;
border-radius:50%
}

.studentHeader{
display:flex;
gap:10px;
align-items:center
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

function getAge(date){

const hoje=new Date()
const nasc=new Date(date)

let idade=hoje.getFullYear()-nasc.getFullYear()

const m=hoje.getMonth()-nasc.getMonth()

if(m<0||(m===0&&hoje.getDate()<nasc.getDate())) idade--

return idade
}

function getCategory(i){

if(i<=4) return "BABY EAGLE"
if(i<=8) return "LITTLE EAGLE"
if(i<=12) return "EAGLE WARRIOR"
if(i<=15) return "EAGLE YOUTH"

return "FORA CATEGORIA"
}

function ClassesBar({aulas}){

return(

<div className="bar">

{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return(
<div key={i} className={"box "+(done?"done":"")}></div>
)

})}

</div>

)

}

function PresenceBar({graus}){

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<graus) color="#fff"

return(
<div key={i} className="degree" style={{background:color}}></div>
)

})}

</div>

)

}

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nasc,setNasc]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){

if(senha==="admin") setUser("professor")
else alert("Senha incorreta")

}

function loginPais(){

const aluno=students.find(
s=>s.nome===nome && s.nascimento===nasc
)

if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}

}

return(

<div className="card">

<h2>Login</h2>

<button onClick={()=>setTipo("professor")}>Professor</button>
<button onClick={()=>setTipo("pais")}>Pais</button>

<br/><br/>

{tipo==="professor" &&

<div>

<input type="password"
placeholder="Senha"
value={senha}
onChange={e=>setSenha(e.target.value)}
/>

<button onClick={loginProfessor}>
Entrar
</button>

</div>

}

{tipo==="pais" &&

<div>

<input
placeholder="Nome aluno"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<input
type="date"
value={nasc}
onChange={e=>setNasc(e.target.value)}
/>

<button onClick={loginPais}>
Entrar
</button>

</div>

}

</div>

)

}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{

const saved=localStorage.getItem("jiujitsu")

return saved?JSON.parse(saved):[]

})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{

localStorage.setItem("jiujitsu",JSON.stringify(students))

},[students])

function addStudent(){

const idade=getAge(form.nascimento)

setStudents([...students,{

id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade:idade,
categoria:getCategory(idade),
faixa:form.faixa,

aulas:0,

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

if(s.aulas>=135){
alert("Aluno atingiu 135 aulas")
return s
}

return{
...s,
aulas:s.aulas+1
}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{

...s,
comportamental:{
...s.comportamental,
[key]:true
}

}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const i=beltOrder.indexOf(s.faixa)

return{

...s,
faixa:beltOrder[i+1]||s.faixa,
aulas:0

}

}))

}

if(user==="")
return <Login setUser={setUser} students={students} setFilho={setFilho}/>

let lista=students

if(user==="pais")
lista=students.filter(s=>s.nome===filho)

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu</h1>

{user==="professor" &&

<div className="card">

<input placeholder="Nome"
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input type="date"
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button className="green"
onClick={addStudent}>
Adicionar
</button>

</div>

}

{lista.map(s=>{

const graus=Math.floor(s.aulas/15)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src="avatar.png" className="avatar"/>

<div>

<b>{s.nome}</b><br/>

{s.idade} anos<br/>

{s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<ClassesBar aulas={s.aulas}/>

<PresenceBar graus={graus}/>

<div style={{display:"flex",gap:10,marginTop:10}}>

<div className="beh"
style={{
background:s.comportamental.relacionamento?"#f1c40f":"#eee",
cursor:user==="professor"?"pointer":"default"
}}
onClick={user==="professor"?()=>markBehavior(s.id,"relacionamento"):null}
></div>

<div className="beh"
style={{
background:s.comportamental.comportamento?"#3498db":"#eee",
cursor:user==="professor"?"pointer":"default"
}}
onClick={user==="professor"?()=>markBehavior(s.id,"comportamento"):null}
></div>

<div className="beh"
style={{
background:s.comportamental.notas?"#e74c3c":"#eee",
cursor:user==="professor"?"pointer":"default"
}}
onClick={user==="professor"?()=>markBehavior(s.id,"notas"):null}
></div>

<div className="beh"
style={{
background:s.comportamental.habitos?"#2ecc71":"#eee",
cursor:user==="professor"?"pointer":"default"
}}
onClick={user==="professor"?()=>markBehavior(s.id,"habitos"):null}
></div>

</div>

{user==="professor" &&

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="green"
onClick={()=>trocarFaixa(s.id)}>
Trocar Faixa
</button>

</div>

}

</div>

)

})}

<div className="card">

<img src="sistema_graduacao.jpeg" width="100%"/>

<br/><br/>

<img src="graus_coloridos.jpeg" width="100%"/>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
