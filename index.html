```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#e8f6ff,#ffffff);
margin:0;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border:2px solid #e6f2ff;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:4px
}

.box{
width:16px;
height:16px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.degree{
width:22px;
height:22px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:26px;
height:26px;
border-radius:50%;
background:#ddd;
cursor:pointer
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ddd;
object-fit:cover
}

.avatarBox{
position:relative
}

.editAvatar{
position:absolute;
bottom:-6px;
right:-6px;
font-size:10px;
padding:2px 6px;
border-radius:6px;
background:#3498db;
color:white
}

.studentHeader{
display:flex;
align-items:center;
gap:12px;
margin-bottom:6px
}

.login{
max-width:400px;
margin:auto
}

.chatBox{
max-height:200px;
overflow:auto;
margin-bottom:10px;
background:#fafafa;
padding:10px;
border-radius:10px;
}

.msg{
padding:6px 10px;
border-radius:10px;
margin-bottom:6px;
display:inline-block;
color:white
}

.prof{background:#3498db}
.pais{background:#2ecc71}

.history{
font-size:12px;
background:#fafafa;
padding:8px;
border-radius:8px;
margin-top:8px
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){
const hoje=new Date()
const nasc=new Date(date)
let idade=hoje.getFullYear()-nasc.getFullYear()
const m=hoje.getMonth()-nasc.getMonth()
if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--
return idade
}

function getCategory(idade){
if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"
return "FORA CATEGORIA"
}

function estimateDate(aulas){
let date=new Date()
let count=0
while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}
return date.toLocaleDateString()
}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("academia_alliance",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const idade=getAge(form.nascimento)

setStudents([...students,{

id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade:idade,
categoria:getCategory(idade),
faixa:form.faixa,

avatar:"emoji",

aulas:0,
bloqueado:false,

chat:[],

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],

comportamental:{
relacionamento:false,
comportamento:false,
notas:false,
habitos:false
}

}])

setForm({nome:"",nascimento:"",faixa:"Branca"})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

if(s.bloqueado){
alert("Aluno aguardando troca de faixa")
return s
}

const novas=s.aulas+1
const data=new Date().toLocaleDateString()

let bloqueio=false

if(novas>=135 &&
Object.values(s.comportamental).every(v=>v===true)){
bloqueio=true
alert("🏆 Aluno pronto para troca de faixa")
}

return{
...s,
aulas:novas,
bloqueado:bloqueio,
historicoAulas:[...s.historicoAulas,{data}]
}

}))

}

function toggleComportamento(id,tipo){

setStudents(students.map(s=>{

if(s.id!==id) return s

const novo=!s.comportamental[tipo]

return{
...s,
comportamental:{
...s.comportamental,
[tipo]:novo
},
historicoComportamental:[
...s.historicoComportamental,
{tipo:tipo,valor:novo,data:new Date().toLocaleDateString()}
]
}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

let index=beltOrder.indexOf(s.faixa)

if(index<beltOrder.length-1){
const nova=beltOrder[index+1]

return{
...s,
faixa:nova,
aulas:0,
bloqueado:false,
comportamental:{
relacionamento:false,
comportamento:false,
notas:false,
habitos:false
},
historicoFaixas:[
...s.historicoFaixas,
{faixa:nova,data:new Date().toLocaleDateString()}
]
}

}

return s

}))

}

function uploadAvatar(id,file){

const reader=new FileReader()

reader.onload=e=>{

setStudents(students.map(s=>{
if(s.id!==id) return s
return {...s,avatar:e.target.result}
}))

}

reader.readAsDataURL(file)

}

function sendMessage(id,text){

if(!text) return

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
chat:[
...s.chat,
{
user:user,
text:text,
data:new Date().toLocaleString()
}
]
}

}))

}

if(user==="")
return(
<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setUser("professor")}>
Professor
</button>

<button onClick={()=>setUser("pais")}>
Pais
</button>

</div>
)

let lista=students
if(user==="pais"){
lista=students.filter(s=>s.nome===filho)
}

return(

<div className="container">

<h1>🥋 Acompanhamento Jiu Jitsu Alliance</h1>

{user==="professor" &&

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
value={form.nascimento}
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

}

{lista.map(s=>{

const graus=Math.floor(s.aulas/15)
const faltam=Math.max(135-s.aulas,0)
const previsao=estimateDate(faltam)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<div className="avatarBox">

{s.avatar==="emoji" ?

<div className="avatar" style={{
display:"flex",
alignItems:"center",
justifyContent:"center",
fontSize:30
}}>
🙂
</div>

:

<img src={s.avatar} className="avatar"/>

}

<label className="editAvatar">

✏

<input
type="file"
accept="image/*"
style={{display:"none"}}
onChange={e=>{
const file=e.target.files[0]
if(file) uploadAvatar(s.id,file)
}}
/>

</label>

</div>

<div>

<b>{s.nome}</b><br/>
{s.idade} anos<br/>
Categoria: {s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>

<div className="bar">

{Array.from({length:15}).map((_,i)=>(
<div key={i} className={"box "+(i<(s.aulas%15)?"done":"")}></div>
))}

</div>

<div style={{marginTop:8}}>

Graus comportamentais

<div className="row">

{Object.keys(s.comportamental).map(k=>(

<div
key={k}
className="beh"
style={{
background:s.comportamental[k]?"#2ecc71":"#ddd"
}}
onClick={()=>user==="professor" && toggleComportamento(s.id,k)}
></div>

))}

</div>

</div>

{user==="professor" &&

<div className="row">

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="green" onClick={()=>trocarFaixa(s.id)}>
Trocar faixa
</button>

</div>

}

<div style={{fontSize:13}}>
Faltam {faltam} aulas
</div>

<div style={{fontSize:13}}>
Previsão troca faixa: {previsao}
</div>

<div className="history">

<b>Histórico de Presença</b><br/>
{s.historicoAulas.map((h,i)=>(
<div key={i}>{h.data}</div>
))}

</div>

<div className="history">

<b>Histórico Comportamental</b><br/>
{s.historicoComportamental.map((h,i)=>(
<div key={i}>{h.tipo} - {h.valor?"✔":"✖"} - {h.data}</div>
))}

</div>

<div className="history">

<b>Histórico Troca Faixa</b><br/>
{s.historicoFaixas.map((h,i)=>(
<div key={i}>{h.faixa} - {h.data}</div>
))}

</div>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
```
