<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Jiu Jitsu Infantil</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.studentCard{
display:grid;
grid-template-columns:90px 1fr;
gap:15px
}

.avatarBox{
position:relative;
width:70px;
height:70px
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #ddd;
object-fit:cover;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
background:white
}

.editAvatar{
position:absolute;
bottom:-6px;
left:50%;
transform:translateX(-50%);
font-size:10px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
padding:2px 6px;
cursor:pointer
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer
}

.green{background:#2ecc71;color:white}
.blue{background:#3498db;color:white}

.row{
display:flex;
gap:10px;
margin-top:10px
}

.beh{
width:20px;
height:20px;
border-radius:50%;
border:1px solid #ccc
}

.chatBox{
max-height:200px;
overflow:auto;
background:#fafafa;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin-bottom:10px
}

.msg{
padding:8px 10px;
border-radius:10px;
margin-bottom:6px;
display:inline-block;
color:white;
max-width:70%
}

.prof{background:#3498db}
.pais{background:#2ecc71}

.fileBox{
margin-top:5px;
background:white;
padding:5px;
border-radius:6px;
font-size:12px
}

.removeFile{
background:#e74c3c;
color:white;
border:none;
font-size:10px;
padding:2px 6px;
border-radius:4px;
cursor:pointer;
margin-left:5px
}

</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=["Branca","Cinza","Amarela","Laranja","Verde"]

const MAX_FILE_SIZE = 5 * 1024 * 1024

function compressImage(file,callback){

const img=new Image()
const reader=new FileReader()

reader.onload=e=>img.src=e.target.result

img.onload=()=>{

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

let width=img.width
let height=img.height

const maxWidth=900

if(width>maxWidth){
height=height*(maxWidth/width)
width=maxWidth
}

canvas.width=width
canvas.height=height

ctx.drawImage(img,0,0,width,height)

canvas.toBlob(blob=>{
callback(new File([blob],file.name,{type:"image/jpeg"}))
},"image/jpeg",0.7)

}

reader.readAsDataURL(file)

}

function Chat({student,user,setStudents,students}){

const [msg,setMsg]=React.useState("")
const [file,setFile]=React.useState(null)

function sendMessage(){

if(!msg && !file) return

const data=new Date().toLocaleString()

function saveFile(finalFile){

const reader=new FileReader()

reader.onload=e=>{

setStudents(students.map(s=>{

if(s.id!==student.id) return s

return{
...s,
chat:[
...s.chat,
{
user:user,
text:msg,
data:data,
file:e.target.result,
fileName:finalFile.name,
fileType:finalFile.type
}
]
}

}))

}

reader.readAsDataURL(finalFile)

}

if(file){

if(file.size>MAX_FILE_SIZE){
alert("Arquivo maior que 5MB")
return
}

if(file.type.startsWith("image")){
compressImage(file,saveFile)
}else{
saveFile(file)
}

}else{

setStudents(students.map(s=>{

if(s.id!==student.id) return s

return{
...s,
chat:[
...s.chat,
{user:user,text:msg,data:data}
]
}

}))

}

setMsg("")
setFile(null)

}

return(

<div>

<h3>💬 Conversa</h3>

<div className="chatBox">

{student.chat.map((c,i)=>(

<div key={i} style={{textAlign:c.user==="professor"?"left":"right"}}>

<div className={"msg "+(c.user==="professor"?"prof":"pais")}>

{c.user==="professor"?"👨‍🏫 ":"👨‍👩‍👧 "}{c.text}

{c.file && (

<div className="fileBox">

{c.fileType && c.fileType.startsWith("image") ?

<img src={c.file} style={{maxWidth:200}}/>

:

<a href={c.file} target="_blank">📄 {c.fileName}</a>

}

<div>

<a href={c.file} download={c.fileName}>📥 Download</a>

<button className="removeFile" onClick={()=>{

setStudents(students.map(st=>{

if(st.id!==student.id) return st

return{
...st,
chat:st.chat.map((m,idx)=>{

if(idx!==i) return m

return{...m,file:null,fileName:null,fileType:null}

})
}

}))

}}>🗑</button>

</div>

</div>

)}

</div>

<div style={{fontSize:10}}>{c.data}</div>

</div>

))}

</div>

<div style={{display:"flex",gap:5}}>

<input
style={{flex:1}}
value={msg}
placeholder="Mensagem..."
onChange={e=>setMsg(e.target.value)}
/>

<input type="file"
accept="image/*,application/pdf"
onChange={e=>setFile(e.target.files[0])}
/>

<button className="blue" onClick={sendMessage}>Enviar</button>

</div>

</div>

)

}

function App(){

const [user,setUser]=React.useState("professor")

const [students,setStudents]=React.useState(
JSON.parse(localStorage.getItem("students")||"[]")
)

React.useEffect(()=>{
localStorage.setItem("students",JSON.stringify(students))
},[students])

function addStudent(){

const nome=prompt("Nome do aluno")

if(!nome) return

setStudents([...students,{
id:Date.now(),
nome:nome,
faixa:"Branca",
avatar:"emoji",
aulas:0,
chat:[],
comportamental:{
relacionamento:false,
comportamento:false,
notas:false,
habitos:false
},
historicoAulas:[],
historicoFaixas:[]
}])

}

return(

<div className="container">

<div className="card">

<h2>Controle Jiu Jitsu Infantil</h2>

<button onClick={()=>setUser("professor")}>Professor</button>
<button onClick={()=>setUser("pais")}>Pais</button>

<button className="green" onClick={addStudent}>Adicionar aluno</button>

</div>

{students.map(s=>(

<div key={s.id} className="card studentCard">

<div className="avatarBox">

{s.avatar==="emoji"?

<div className="avatar">🙂</div>

:

<img src={s.avatar} className="avatar"/>

}

<input
type="file"
id={"file"+s.id}
style={{display:"none"}}
accept="image/*"
onChange={e=>{

const reader=new FileReader()

reader.onload=ev=>{

setStudents(students.map(st=>{

if(st.id!==s.id) return st

return{...st,avatar:ev.target.result}

}))

}

reader.readAsDataURL(e.target.files[0])

}}
/>

<button className="editAvatar"
onClick={()=>document.getElementById("file"+s.id).click()}>
Editar
</button>

</div>

<div>

<b>{s.nome}</b>

<div>Faixa: {s.faixa}</div>

<div>Aulas: {s.aulas}/135</div>

<div className="row">

<button className="green" onClick={()=>{

if(s.aulas>=135){
alert("Limite de aulas atingido")
return
}

setStudents(students.map(st=>{

if(st.id!==s.id) return st

return{
...st,
aulas:st.aulas+1,
historicoAulas:[
...st.historicoAulas,
{data:new Date().toLocaleDateString()}
]
}

}))

}}>Presença</button>

<button className="blue" onClick={()=>{

const idx=beltOrder.indexOf(s.faixa)

if(idx<beltOrder.length-1){

setStudents(students.map(st=>{

if(st.id!==s.id) return st

return{
...st,
faixa:beltOrder[idx+1],
aulas:0,
historicoFaixas:[
...st.historicoFaixas,
{faixa:beltOrder[idx+1],data:new Date().toLocaleDateString()}
]
}

}))

}

}}>Trocar Faixa</button>

</div>

<div style={{marginTop:10}}>

<b>Graus comportamentais</b>

<div className="row">

{Object.keys(s.comportamental).map(tipo=>(

<div key={tipo}>

<div style={{fontSize:12}}>{tipo}</div>

<div
className="beh"
style={{background:s.comportamental[tipo]?"#2ecc71":"#eee"}}
onClick={()=>{

if(user!=="professor") return

setStudents(students.map(st=>{

if(st.id!==s.id) return st

return{
...st,
comportamental:{
...st.comportamental,
[tipo]:!st.comportamental[tipo]
}
}

}))

}}
></div>

</div>

))}

</div>

</div>

<Chat
student={s}
user={user}
students={students}
setStudents={setStudents}
/>

</div>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
