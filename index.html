<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* Reset e Responsividade Base */
    body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:10px; overflow-x: hidden; }
    .container { max-width:850px; margin:auto; width: 100%; box-sizing: border-box; }
    
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; width: 100%; box-sizing: border-box; }
    
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
    
    /* Inputs adaptáveis */
    input, select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 120px; font-size: 14px; }

    button { padding:10px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; font-size: 14px; }
    button.red { background:#e74c3c; }
    
    /* Botão de Graduação */
    button.belt-upgrade { background: linear-gradient(45deg, #FFD700, #DAA520); color: #000; width: 100%; margin-top: 10px; border: 2px solid #000; animation: pulse 2s infinite; font-size: 16px; }
    @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.01);} 100% {transform: scale(1);} }

    .avatar-container { position: relative; width: 65px; height: 65px; cursor: pointer; flex-shrink: 0; }
    .avatar-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }

    /* Bolinhas de aula responsivas */
    .bar-bolinhas { display: grid; grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); gap: 8px; margin: 10px 0; }
    .bolinha-aula { aspect-ratio: 1/1; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:12px; background:#fff; color:#777; cursor: pointer; font-weight: bold; }
    .bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }

    .degree-bar { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
    .degree { min-width:22px; height:22px; border:1px solid #333; border-radius:4px; background:#ddd; flex-shrink: 0; }

    .beh-row { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
    .beh-btn { flex: 1; min-width: 70px; padding: 10px 2px; border-radius: 10px; border: 1px solid #ddd; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; }

    /* Estilo WhatsApp Mobile First */
    .chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; display: flex; flex-direction: column; }
    .chat-messages { height:250px; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
    
    .msg { padding:8px 12px; border-radius:8px; font-size:13px; max-width:85%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
    .msg.sent { background:#dcf8c6; align-self:flex-end; border-top-right-radius: 0; }
    .msg.received { background:#fff; align-self:flex-start; border-top-left-radius: 0; }

    .chat-input-area { background: #f0f2f5; padding: 8px; display: flex; align-items: center; gap: 8px; }
    .input-container { background: white; flex: 1; border-radius: 25px; display: flex; align-items: center; padding: 2px 12px; border: 1px solid #ddd; }
    .input-container input { flex: 1; border: none; outline: none; padding: 8px; font-size: 14px; min-width: 50px; background: transparent; }
    .chat-icon { color: #667781; font-size: 18px; cursor: pointer; }

    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-img { max-width: 95%; max-height: 90%; object-fit: contain; }

    @media (max-width: 480px) {
        body { padding: 5px; }
        .card { padding: 12px; border-radius: 10px; }
        h2 { font-size: 18px; }
        .avatar-container { width: 55px; height: 55px; }
        .avatar-img { width: 55px; height: 55px; }
    }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_TYPES = [
    { k: 'REL', n: 'Relacionamento', c: '#f1c40f' },
    { k: 'DIS', n: 'Disciplina', c: '#3498db' },
    { k: 'ORG', n: 'Organização', c: '#e74c3c' },
    { k: 'HAB', n: 'Bons Hábitos', c: '#2ecc71' }
];

function getAge(nasc) {
    if(!nasc) return 0;
    const diff = Date.now() - new Date(nasc).getTime();
    return Math.abs(new Date(diff).getUTCFullYear() - 1970);
}

function getRules(nasc, faixa) {
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [zoomImg, setZoomImg] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_eagle_v7_final") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("all_eagle_v7_final", JSON.stringify(students)) }, [students]);

    const handleFileUpload = (id, e, target) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = event.target.result;
            if (target === 'avatar') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: data } : s));
            } else if (target === 'chat') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user==='professor'?'Professor':'Pais', text: "", file: {name: file.name, data, type: file.type} }] } : s));
            } else if (target === 'repo') {
                const n = prompt("Nome do documento:", file.name);
                setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: n, data }] } : s));
            }
        };
        reader.readAsDataURL(file);
    };

    const markClass = (id, n) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const meta = getRules(s.nascimento, s.faixa).m;
            let novaContagem = s.aulasNoCiclo === n ? n - 1 : n;
            if (novaContagem === meta) {
                return { ...s, aulasNoCiclo: 0, grausGanhos: s.grausGanhos + 1, history: [{date: new Date().toLocaleDateString(), msg: `CONQUISTA: ${s.grausGanhos+1}º Grau`}, ...s.history] };
            }
            return { ...s, aulasNoCiclo: novaContagem };
        }));
    };

    const upgradeBelt = (id) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const idx = BELTS.indexOf(s.faixa);
            const next = BELTS[idx + 1] || s.faixa;
            return { ...s, faixa: next, grausGanhos: 0, history: [{date: new Date().toLocaleDateString(), msg: `GRADUADO: ${next}`}, ...s.history] };
        }));
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            {zoomImg && <div className="modal-overlay" onClick={() => setZoomImg(null)}><img src={zoomImg} className="modal-img" /></div>}
            
            <div className="row" style={{justifyContent:'space-between', padding:'0 5px'}}>
                <h2 style={{color:'#075e54', margin:0}}>Eagle System</h2>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button style={{width:'100%'}} onClick={() => {if(form.nome) setStudents([...students, { id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {} }]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>+ Adicionar Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do aluno..." style={{width:'100%'}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80?text=FOTO"} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleFileUpload(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0, fontSize:16}}>{s.nome}</h3>
                                <div style={{fontSize:11, color:'#666'}}>
                                    <b>Programa:</b> {rules.p} | <b>Faixa:</b> {s.faixa}
                                </div>
                            </div>
                        </div>

                        <div style={{marginTop:15, display:'flex', justifyContent:'space-between', fontSize:13}}>
                            <b>Presença no Ciclo:</b>
                            <b>{s.aulasNoCiclo} / {rules.m} Aulas</b>
                        </div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i + 1)}>{i + 1}</div>
                            ))}
                        </div>

                        <div style={{marginTop:10, fontSize:13}}><b>Graus Conquistados ({s.grausGanhos}/8):</b></div>
                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        {s.grausGanhos >= 8 && user === "professor" && (
                            <button className="belt-upgrade" onClick={() => upgradeBelt(s.id)}>🎓 TROCAR DE FAIXA</button>
                        )}

                        <div className="beh-row">
                            {BEH_TYPES.map(b => (
                                <div key={b.k} className="beh-btn" 
                                     style={{ background: s.comportamental[b.k] ? b.c : '#eee', color: s.comportamental[b.k] ? '#fff' : '#888' }}
                                     onClick={() => user === "professor" && setStudents(students.map(st => st.id === s.id ? {...st, comportamental: {...st.comportamental, [b.k]: !st.comportamental[b.k]}} : st))}>
                                    {b.k}
                                </div>
                            ))}
                        </div>

                        {/* Chat Estilo WhatsApp Mobile */}
                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === (user === 'professor' ? 'Professor' : 'Pais') ? 'sent' : 'received'}`}>
                                        <small style={{fontSize:8, fontWeight:'bold', display:'block', marginBottom:2}}>{m.sender.toUpperCase()}</small>
                                        {m.file && (
                                            m.file.type.startsWith('image/') 
                                            ? <img src={m.file.data} style={{maxWidth:'100%', borderRadius:5}} onClick={() => setZoomImg(m.file.data)} />
                                            : <a href={m.file.data} download={m.file.name} style={{fontSize:11}}>📄 Documento</a>
                                        )}
                                        {m.text}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <i className="fas fa-plus chat-icon" onClick={() => document.getElementById(`file-${s.id}`).click()}></i>
                                <input type="file" id={`file-${s.id}`} hidden onChange={e => handleFileUpload(s.id, e, 'chat')}/>
                                <div className="input-container">
                                    <i className="far fa-laugh chat-icon"></i>
                                    <input id={`msg-${s.id}`} placeholder="Mensagem" />
                                </div>
                                <button style={{background:'transparent', padding:0}} onClick={() => {
                                    const t = document.getElementById(`msg-${s.id}`).value;
                                    if(t) setStudents(students.map(st => st.id === s.id ? {...st, chat:[...st.chat, {sender:user==='professor'?'Professor':'Pais', text:t}]} : st));
                                    document.getElementById(`msg-${s.id}`).value = "";
                                }}>
                                    <i className="fas fa-paper-plane" style={{color:'#075e54', fontSize:20}}></i>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
