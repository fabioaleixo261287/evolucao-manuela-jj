<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

*{box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#7ed6df,#e056fd);
margin:0;
padding:30px;
color:#2f3542
}

.container{
max-width:1100px;
margin:auto
}

h1{
text-align:center;
color:white;
margin-bottom:25px;
font-size:32px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.25s;
border:3px solid #f1f2f6
}

.card:hover{
transform:scale(1.02)
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:10px 18px;
border:none;
border-radius:12px;
background:#22a6b3;
color:white;
cursor:pointer;
font-weight:bold;
font-size:14px;
transition:0.2s
}

button:hover{
transform:scale(1.08)
}

button.red{background:#ff4757}
button.green{background:#2ed573}

input,select{
padding:8px 10px;
border-radius:10px;
border:2px solid #dfe4ea;
background:#f9fbff
}

.bar{
display:flex;
gap:6px;
margin-top:8px
}

.box{
width:18px;
height:18px;
border-radius:4px;
border:1px solid #aaa;
background:#dfe4ea
}

.done{
background:#2ed573
}

.degree{
width:26px;
height:26px;
border-radius:6px;
border:2px solid #444;
background:#ddd
}

.beh{
width:30px;
height:30px;
border-radius:50%;
background:#eee;
border:2px solid #ddd;
transition:0.25s
}

.beh:hover{
transform:scale(1.2) rotate(10deg)
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid #f1f2f6;
box-shadow:0 5px 10px rgba(0,0,0,0.2)
}

.studentHeader{
display:flex;
align-items:center;
gap:14px;
margin-bottom:10px
}

.studentHeader b{
font-size:20px;
}

.login{
max-width:420px;
margin:auto
}

img{
border-radius:14px;
box-shadow:0 6px 14px rgba(0,0,0,0.2)
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){
const hoje=new Date()
const nasc=new Date(date)
let idade=hoje.getFullYear()-nasc.getFullYear()
const m=hoje.getMonth()-nasc.getMonth()
if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--
return idade
}

function getCategory(idade){
if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"
return "FORA CATEGORIA"
}

function estimateDate(aulas){
let date=new Date()
let count=0
while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}
return date.toLocaleDateString()
}

function ClassesBar({aulas}){
return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return(<div key={i} className={"box "+(done?"done":"")}></div>)
})}
</div>
)
}

function PresenceBar({graus}){
const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(
<div className="bar">
{Array.from({length:4}).map((_,i)=>{
let color="#ddd"
if(i<vermelhos) color="#ff4757"
else if(i<brancos) color="#fff"
return(
<div key={i} className="degree" style={{background:color}}></div>
)
})}
</div>
)
}

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){
if(senha==="admin") setUser("professor")
else alert("Senha incorreta")
}

function loginPais(){

const aluno=students.find(
s=>s.nome===nome && s.nascimento===nascimento
)

if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}

}

return(

<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setTipo("professor")}>
Professor
</button>

<button onClick={()=>setTipo("pais")}>
Pais
</button>

<br/><br/>

{tipo==="professor" &&

<div>

<input
type="password"
placeholder="Senha"
value={senha}
onChange={e=>setSenha(e.target.value)}
/>

<br/><br/>

<button onClick={loginProfessor}>
Entrar
</button>

</div>

}

{tipo==="pais" &&

<div>

<input
placeholder="Nome do aluno"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<br/><br/>

<input
type="date"
value={nascimento}
onChange={e=>setNascimento(e.target.value)}
/>

<br/><br/>

<button onClick={loginPais}>
Entrar
</button>

</div>

}

</div>

)

}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance_final")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("academia_alliance_final",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const idade=getAge(form.nascimento)

setStudents([...students,{

id:Date.now(),

nome:form.nome,
nascimento:form.nascimento,

idade:idade,
categoria:getCategory(idade),

faixa:form.faixa,

avatar:"avatar.png",

aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

setForm({
nome:"",
nascimento:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

if(s.aulas>=135){
alert("Aluno atingiu 135 aulas. Faça a troca de faixa.")
return s
}

const data=new Date().toLocaleDateString()
const novas=s.aulas+1

let historico=s.historicoGraus

if(novas%15===0){

historico=[...historico,{
grau:Math.floor(novas/15),
data
}]

}

return{
...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico
}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

return{

...s,

comportamental:{
...s.comportamental,
[key]:data
},

historicoComportamental:[
...s.historicoComportamental,
{tipo:key,data}
]

}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

const atualIndex=beltOrder.indexOf(s.faixa)

const proximaFaixa=beltOrder[atualIndex+1] || s.faixa

return{

...s,

faixa:proximaFaixa,

aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
},

historicoFaixas:[
...s.historicoFaixas,
{faixa:proximaFaixa,data}
]

}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return
setStudents(students.filter(s=>s.id!==id))

}

if(user==="")
return <Login setUser={setUser} students={students} setFilho={setFilho}/>

let lista=students

if(user==="pais"){
lista=students.filter(s=>s.nome===filho)
}

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

{user==="professor" &&

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
value={form.nascimento}
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

}

{lista.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),15)
const faltam=Math.max(135-s.aulas,0)
const previsao=estimateDate(faltam)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>
<b>{s.nome}</b><br/>
{s.idade} anos<br/>
Categoria: {s.categoria}
</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>
<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>
<PresenceBar graus={graus}/>

<div style={{display:"flex",gap:10,marginTop:8}}>

<div className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={user==="professor"?()=>markBehavior(s.id,"relacionamento"):null}
></div>

<div className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={user==="professor"?()=>markBehavior(s.id,"comportamento"):null}
></div>

<div className="beh"
style={{background:s.comportamental.notas?"#ff4757":"#eee"}}
onClick={user==="professor"?()=>markBehavior(s.id,"notas"):null}
></div>

<div className="beh"
style={{background:s.comportamental.habitos?"#2ed573":"#eee"}}
onClick={user==="professor"?()=>markBehavior(s.id,"habitos"):null}
></div>

</div>

{user==="professor" &&

<div style={{marginTop:10,display:"flex",gap:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="green" onClick={()=>trocarFaixa(s.id)}>
Trocar Faixa
</button>

<button className="red" onClick={()=>removeStudent(s.id)}>
Excluir
</button>

</div>

}

<div style={{marginTop:8,fontSize:13}}>
Faltam {faltam} aulas
</div>

<div style={{fontSize:13}}>
Previsão troca faixa: {previsao}
</div>

</div>

)

})}

<div className="card">

<img src="graus_coloridos.jpeg" width="100%"/>

<br/><br/>

<img src="sistema_graduacao.jpeg" width="100%"/>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
