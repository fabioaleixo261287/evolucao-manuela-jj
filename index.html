<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Academia Alliance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 14px;
border:none;
background:#0984e3;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:8px;
margin-right:6px;
}

.chatArea{
background:#e5ddd5;
padding:10px;
border-radius:10px;
max-height:250px;
overflow-y:auto;
margin-top:10px;
}

.bubble{
max-width:70%;
padding:8px 12px;
border-radius:10px;
margin:6px 0;
}

.professor{
background:#fff;
}

.pais{
background:#dcf8c6;
margin-left:auto;
}

.msgRow{
display:flex;
flex-direction:column;
}

img.chatimg{
width:140px;
border-radius:6px;
margin-top:5px;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

function pedirPermissao(){

if(Notification.permission!=="granted"){
Notification.requestPermission()
}

}

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("students")
return saved?JSON.parse(saved):[]
})

const [nome,setNome]=React.useState("")
const [msg,setMsg]=React.useState("")

React.useEffect(()=>{
localStorage.setItem("students",JSON.stringify(students))
},[students])

React.useEffect(()=>{
pedirPermissao()
},[])

function addStudent(){

if(!nome) return

setStudents([...students,{
id:Date.now(),
nome,
chat:[]
}])

setNome("")
}

function sendMessage(id,text){

if(!text) return

setStudents(students.map(s=>{

if(s.id!==id) return s

const nova={
autor:"professor",
mensagem:text,
data:new Date().toLocaleString()
}

if(Notification.permission==="granted"){
new Notification("Nova mensagem enviada")
}

return{
...s,
chat:[...s.chat,nova]
}

}))

setMsg("")
}

function uploadPhoto(id,e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(event){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
chat:[
...s.chat,
{
autor:"professor",
foto:event.target.result,
data:new Date().toLocaleString()
}
]
}

}))

}

reader.readAsDataURL(file)

}

function exportBackup(){

const data=JSON.stringify(students)

const blob=new Blob([data],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="backup_academia.json"
a.click()

}

return(

<div>

<h2>Sistema Academia</h2>

<div className="card">

<input
placeholder="Nome aluno"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<button onClick={addStudent}>
Adicionar
</button>

<button onClick={exportBackup} style={{marginLeft:10}}>
Backup
</button>

</div>

{students.map(s=>(

<div key={s.id} className="card">

<h3>{s.nome}</h3>

<div className="chatArea">

{s.chat.map((m,i)=>(

<div key={i} className="msgRow">

<div className={`bubble ${m.autor}`}>

{m.mensagem}

{m.foto &&
<img src={m.foto} className="chatimg"/>
}

</div>

</div>

))}

</div>

<input
placeholder="Mensagem"
value={msg}
onChange={e=>setMsg(e.target.value)}
/>

<button onClick={()=>sendMessage(s.id,msg)}>
Enviar
</button>

<input
type="file"
accept="image/*"
onChange={(e)=>uploadPhoto(s.id,e)}
style={{marginLeft:10}}
/>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
