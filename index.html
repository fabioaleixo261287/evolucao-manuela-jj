<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu KIDS Mooca - Jiu Jitsu KIDS Mooca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#f0f2f5; margin:0; padding:10px; }
    .container { max-width:850px; margin:auto; width: 100%; box-sizing: border-box; }
    .header-main { text-align: center; color: #075e54; margin-bottom: 20px; }
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
    
    .form-cadastro { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #075e54; }
    .form-cadastro input, .form-cadastro select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 5px; flex: 1; min-width: 140px; }
    
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items: center; }
    button { padding:10px 16px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
    button.red { background: #e74c3c; }
    button.green { background: #2ecc71; }

    .studentHeader { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
    .avatar-container { position: relative; width: 80px; height: 80px; }
    .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; cursor: pointer; }
    .age-badge { position: absolute; bottom: 0; right: 0; background: #075e54; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid white; }

    /* Graus Estilo Faixa Preta Central */
    .degree-bar { background: #222; padding: 10px; border-radius: 8px; display: inline-flex; gap: 6px; margin: 10px 0; border: 1px solid #000; }
    .degree-slot { width: 14px; height: 35px; border-radius: 2px; border: 1px solid #444; transition: 0.3s; }
    .degree-slot.white { background: #fff; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
    .degree-slot.red { background: #e74c3c; box-shadow: inset 0 0 5px rgba(0,0,0,0.3); }

    .info-previsao { background: #e8f4fd; padding: 12px; border-radius: 10px; font-size: 13px; color: #2c3e50; margin-top: 10px; border-left: 5px solid #3498db; }

    /* Cores Comportamentais da Imagem */
    .beh-row { display: flex; gap: 10px; margin: 10px 0; }
    .beh-dot { width: 25px; height: 25px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }

    /* Chat Estilo WhatsApp */
    .wa-chat { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .wa-messages { height: 150px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .wa-msg { background: #fff; padding: 8px 12px; border-radius: 8px; font-size: 13px; align-self: flex-start; max-width: 85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
    .wa-msg.me { background: #dcf8c6; align-self: flex-end; }
    .wa-input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
    .wa-input-area input { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; font-size: 14px; }

    /* Repositório de Documentos */
    .repo-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    .repo-title { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 8px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
    .repo-item { aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 5px; }
    .repo-item i { font-size: 24px; color: #e74c3c; }
    .repo-item span { font-size: 10px; margin-top: 5px; color: #333; overflow: hidden; text-overflow: ellipsis; width: 100%; white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const beltOrder = [
    "Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", 
    "Amarela/Branca", "Amarela", "Amarela/Preta", 
    "Laranja/Branca", "Laranja", "Laranja/Preta", 
    "Verde/Branca", "Verde", "Verde/Preta"
];

// Regras de aulas por grau baseadas na imagem
const getRules = (category, belt) => {
    const isYellowOrOrange = belt.includes("Amarela") || belt.includes("Laranja");
    const isGreen = belt.includes("Verde");

    if (category === "BABY EAGLE") return 12; // Branca/Cinza 12 aulas
    if (category === "LITTLE EAGLE") return isYellowOrOrange ? 20 : 15; // 15 ou 20
    if (category === "EAGLE WARRIOR") return isYellowOrOrange ? 20 : 15; // 15 ou 20
    if (category === "EAGLE YOUTH") {
        if (isGreen) return 25; // Verde 25 aulas
        return isYellowOrOrange ? 22 : 20; // 20 ou 22
    }
    return 15;
};

function getAge(date) {
    const hoje = new Date();
    const nasc = new Date(date);
    let idade = hoje.getFullYear() - nasc.getFullYear();
    if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
    return idade;
}

function getCategory(idade) {
    if (idade >= 4 && idade <= 4) return "BABY EAGLE"; // 4 anos
    if (idade >= 5 && idade <= 8) return "LITTLE EAGLE"; // 5 a 8 anos
    if (idade >= 9 && idade <= 12) return "EAGLE WARRIOR"; // 9 a 12 anos
    if (idade >= 13 && idade <= 15) return "EAGLE YOUTH"; // 13 a 15 anos
    return "INFANTIL";
}

function App() {
    const [user, setUser] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_v5_data") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_v5_data", JSON.stringify(students)); }, [students]);

    const addStudent = () => {
        if (!form.nome || !form.nascimento) return alert("Dados incompletos");
        setStudents([...students, {
            id: Date.now(), ...form, aulas: 0, chat: [], docs: [],
            comportamental: { 0: false, 1: false, 2: false, 3: false }
        }]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    const handleFile = (id, type, e) => {
        try {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                setStudents(students.map(s => {
                    if (s.id !== id) return s;
                    if (type === 'avatar') return { ...s, avatar: ev.target.result };
                    return { ...s, docs: [...(s.docs || []), { name: file.name, url: ev.target.result }] };
                }));
            };
            reader.readAsDataURL(file);
        } catch (err) {
            console.error("Erro ao carregar arquivo", err);
        }
    };

    if (!user) return (
        <div style={{ textAlign: 'center', padding: 50 }}>
            <h2>Alliance Jiu Jitsu KIDS Mooca</h2>
            <button onClick={() => setUser("professor")}>Professor</button>
            <button onClick={() => setUser("pais")} style={{ marginLeft: 10, background: '#3498db' }}>Pais</button>
        </div>
    );

    return (
        <div className="container">
            <header className="header-main">
                <h2>Alliance Jiu Jitsu KIDS Mooca</h2>
                <button className="red" onClick={() => setUser("")} style={{float:'right'}}>Sair</button>
            </header>

            {user === "professor" && (
                <div className="form-cadastro">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <button onClick={addStudent}>Cadastrar</button>
                    </div>
                </div>
            )}

            {students.map(s => {
                const idade = getAge(s.nascimento);
                const categoria = getCategory(idade);
                const aulasPorGrau = getRules(categoria, s.faixa);
                const totalGraus = Math.floor(s.aulas / aulasPorGrau);
                const aulasNoCiclo = s.aulas % aulasPorGrau;
                const faltam = Math.max((aulasPorGrau * 8) - s.aulas, 0);

                return (
                    <div key={s.id} className="card">
                        <div className="studentHeader">
                            <div className="avatar-container">
                                <img src={s.avatar || "https://ui-avatars.com/api/?background=eee&name="+s.nome} className="avatar-img" onClick={() => document.getElementById(`av-${s.id}`).click()} />
                                <input type="file" id={`av-${s.id}`} hidden onChange={e => handleFile(s.id, 'avatar', e)} />
                                <div className="age-badge">{idade}</div>
                            </div>
                            <div>
                                <b style={{ fontSize: 18 }}>{s.nome}</b><br />
                                <span style={{ color: '#666' }}>{s.faixa} | {categoria}</span>
                            </div>
                        </div>

                        <div style={{ fontSize: 12, fontWeight: 'bold' }}>PROGRESSO DO GRAU: {aulasNoCiclo} / {aulasPorGrau}</div>
                        <div className="bar-aulas">
                            {Array.from({ length: aulasPorGrau }).map((_, i) => (
                                <div key={i} className={`box-aula ${i < aulasNoCiclo ? 'done' : ''}`}></div>
                            ))}
                        </div>

                        <div className="degree-bar">
                            {[0, 1, 2, 3, 4, 5, 6, 7].map(i => {
                                let cls = "";
                                if (totalGraus > i) cls = i < 4 ? "white" : "red";
                                return <div key={i} className={`degree-slot ${cls}`}></div>;
                            })}
                        </div>

                        <div className="beh-row">
                            {['#f1c40f', '#3498db', '#e74c3c', '#2ecc71'].map((c, i) => (
                                <div key={i} title={["Relacionamento", "Comportamento", "Escola", "Hábitos"][i]} className="beh-dot" 
                                     style={{ background: s.comportamental[i] ? c : '#eee' }} 
                                     onClick={() => { if(user === "professor") {
                                         const nc = { ...s.comportamental, [i]: !s.comportamental[i] };
                                         setStudents(students.map(st => st.id === s.id ? { ...st, comportamental: nc } : st));
                                     }}}></div>
                            ))}
                        </div>

                        <div className="info-previsao">
                            <i className="fas fa-calendar-check"></i> <b>Frequência baseada em 4 treinos por semana.</b><br/>
                            Mínimo de 6 meses para trocar de faixa.
                        </div>

                        {user === "professor" && (
                            <div className="row" style={{marginTop: 10}}>
                                <button onClick={() => setStudents(students.map(st => st.id === s.id ? {...st, aulas: st.aulas + 1} : st))}>+ Presença</button>
                                <button className="red" onClick={() => setStudents(students.filter(st => st.id !== s.id))}>Excluir</button>
                            </div>
                        )}

                        {/* Chat WhatsApp */}
                        <div className="wa-chat">
                            <div className="wa-messages">
                                {(s.chat || []).map((m, i) => (
                                    <div key={i} className={`wa-msg ${m.from === 'Prof' ? 'me' : ''}`}>
                                        <strong>{m.from}:</strong> {m.txt}
                                    </div>
                                ))}
                            </div>
                            <div className="wa-input-area">
                                <i className="fas fa-plus" style={{color:'#919191'}}></i>
                                <input placeholder="Digite uma mensagem" onKeyDown={e => {
                                    if(e.key === 'Enter' && e.target.value){
                                        const newMsg = { from: user === 'professor' ? 'Prof' : 'Pais', txt: e.target.value };
                                        setStudents(students.map(st => st.id === s.id ? {...st, chat: [...(st.chat || []), newMsg]} : st));
                                        e.target.value = "";
                                    }
                                }} />
                                <i className="fas fa-microphone" style={{color:'#919191'}}></i>
                            </div>
                        </div>

                        {/* Repositório de Documentos Importantes */}
                        <div className="repo-section">
                            <div className="repo-title"><i className="fas fa-folder-open"></i> Documentos Importantes (Acesso Pais)</div>
                            <div className="repo-grid">
                                {(s.docs || []).map((d, i) => (
                                    <div key={i} className="repo-item" onClick={() => window.open(d.url)}>
                                        <i className="fas fa-file-pdf"></i>
                                        <span>{d.name}</span>
                                    </div>
                                ))}
                                {user === "professor" && (
                                    <div className="repo-item" style={{borderStyle:'dashed'}} onClick={() => document.getElementById(`doc-${s.id}`).click()}>
                                        <i className="fas fa-upload" style={{color:'#ccc'}}></i>
                                        <input type="file" id={`doc-${s.id}`} hidden onChange={e => handleFile(s.id, 'doc', e)} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
