<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu KIDS Mooca - Jiu Jitsu KIDS Mooca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#f0f2f5; margin:0; padding:10px; }
    .container { max-width:850px; margin:auto; width: 100%; box-sizing: border-box; }
    .header-main { text-align: center; color: #075e54; margin-bottom: 20px; }
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    
    /* Formulário de Cadastro Direto */
    .form-direto { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #075e54; }
    .form-direto input, .form-direto select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 5px; flex: 1; min-width: 150px; outline: none; }
    
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items: center; }
    button { padding:12px 20px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
    button.red { background: #e74c3c; }
    button.blue { background: #3498db; }

    /* Faixa de Graduação Estilo Imagem */
    .belt-display { 
        background: #111; height: 60px; border-radius: 4px; display: flex; 
        align-items: center; justify-content: space-between; padding: 0 15px; 
        margin: 15px 0; border: 2px solid #000;
    }
    .presence-side { display: flex; gap: 4px; }
    .degree-presence { width: 12px; height: 40px; border-radius: 1px; }
    .degree-presence.white { background: #fff; }
    .degree-presence.red { background: #e74c3c; }
    .degree-presence.empty { border: 1px solid #333; }

    .behavior-side { display: flex; gap: 10px; align-items: center; }
    .behavior-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .degree-behavior { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #333; }
    .behavior-label { color: #888; font-size: 7px; text-transform: uppercase; font-weight: bold; }

    /* Histórico */
    .hist-box { margin-top: 10px; background: #fafafa; border-radius: 8px; padding: 8px; border: 1px solid #eee; font-size: 11px; }
    .hist-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 3px 0; color: #555; }

    /* WhatsApp Style */
    .wa-chat { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .wa-messages { height: 140px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .wa-msg { background: #fff; padding: 7px 12px; border-radius: 8px; font-size: 13px; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); max-width: 80%; }
    .wa-msg.me { background: #dcf8c6; align-self: flex-end; }
    
    .wa-input-bar { background: #f0f0f0; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
    .wa-input-container { flex: 1; background: #fff; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; }
    .wa-input-container input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }
    .wa-input-container i { color: #8696a0; font-size: 18px; margin-right: 10px; cursor: pointer; }
    .wa-mic { background: #075e54; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

    .repo-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
    .repo-item { aspect-ratio: 1/1; border-radius: 8px; border: 1px solid #ddd; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const beltOrder = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const behaviorTags = ["Relacionamento", "Comportamento", "Escola", "Hábitos"];
const behaviorColors = ['#f1c40f', '#3498db', '#e74c3c', '#2ecc71'];

// Regras baseadas na imagem do sistema de graduação
function getRules(category, belt) {
    const isYellowOrange = belt.includes("Amarela") || belt.includes("Laranja");
    if (category === "BABY EAGLE") return 12;
    if (category === "LITTLE EAGLE" || category === "EAGLE WARRIOR") return isYellowOrange ? 20 : 15;
    if (category === "EAGLE YOUTH") return belt.includes("Verde") ? 25 : (isYellowOrange ? 22 : 20);
    return 15;
}

function getAge(date) {
    const hoje = new Date();
    const nasc = new Date(date);
    let idade = hoje.getFullYear() - nasc.getFullYear();
    if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
    return idade;
}

function getCategory(idade) {
    if (idade === 4) return "BABY EAGLE";
    if (idade >= 5 && idade <= 8) return "LITTLE EAGLE";
    if (idade >= 9 && idade <= 12) return "EAGLE WARRIOR";
    if (idade >= 13 && idade <= 15) return "EAGLE YOUTH";
    return "INFANTIL";
}

function App() {
    const [user, setUser] = React.useState(""); // "professor" ou "pais"
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_final_v1") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_final_v1", JSON.stringify(students)); }, [students]);

    const addLog = (id, text) => {
        const time = new Date().toLocaleString('pt-BR');
        setStudents(prev => prev.map(s => s.id === id ? { ...s, logs: [{ time, text }, ...(s.logs || [])] } : s));
    };

    const handleAdd = () => {
        if(!form.nome || !form.nascimento) return alert("Preencha nome e nascimento");
        const newStudent = { id: Date.now(), ...form, aulas: 0, chat: [], docs: [], logs: [], comportamental: [false, false, false, false] };
        setStudents([...students, newStudent]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    // TELA DE LOGIN INICIAL
    if (!user) return (
        <div style={{ textAlign: 'center', padding: "100px 20px" }}>
            <h1 style={{color: '#075e54'}}>Alliance Jiu Jitsu KIDS Mooca</h1>
            <p>Selecione seu perfil de acesso:</p>
            <div className="row" style={{justifyContent: 'center', marginTop: 20}}>
                <button onClick={() => setUser("professor")}>Acesso Professor</button>
                <button className="blue" onClick={() => setUser("pais")}>Acesso Pais</button>
            </div>
        </div>
    );

    return (
        <div className="container">
            <header className="header-main">
                <h2>Alliance Jiu Jitsu KIDS Mooca</h2>
                <button className="red" onClick={() => setUser("")}>Sair do Sistema</button>
            </header>

            {user === "professor" && (
                <div className="form-direto">
                    <strong>Cadastrar Aluno:</strong>
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                        <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <button onClick={handleAdd}>Confirmar</button>
                    </div>
                </div>
            )}

            {students.map(s => {
                const idade = getAge(s.nascimento);
                const categoria = getCategory(idade);
                const aulasPorGrau = getRules(categoria, s.faixa);
                const totalGraus = Math.floor(s.aulas / aulasPorGrau);
                const aulasNoCiclo = s.aulas % aulasPorGrau;

                return (
                    <div key={s.id} className="card">
                        <div className="row" style={{justifyContent: 'space-between'}}>
                            <strong style={{fontSize: 18}}>{s.nome}</strong>
                            <small>{s.faixa} | {categoria}</small>
                        </div>

                        {/* Faixa com Graus de Presença e Comportamento */}
                        <div className="belt-display">
                            <div className="presence-side">
                                {[0,1,2,3,4,5,6,7].map(i => {
                                    let cls = "empty";
                                    if (totalGraus > i) cls = i < 4 ? "white" : "red";
                                    return <div key={i} className={`degree-presence ${cls}`}></div>;
                                })}
                            </div>
                            <div className="behavior-side">
                                {behaviorColors.map((color, i) => (
                                    <div key={i} className="behavior-item">
                                        <div className="degree-behavior" 
                                             style={{ background: s.comportamental[i] ? color : 'transparent' }}
                                             onClick={() => { if(user === "professor") {
                                                 const nb = [...s.comportamental]; nb[i] = !nb[i];
                                                 setStudents(students.map(st => st.id === s.id ? {...st, comportamental: nb} : st));
                                                 addLog(s.id, `Grau ${behaviorTags[i]} alterado`);
                                             }}}></div>
                                        <span className="behavior-label">{behaviorTags[i].substring(0,3)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {user === "professor" && (
                            <div className="row" style={{marginBottom: 10}}>
                                <button onClick={() => {
                                    setStudents(students.map(st => st.id === s.id ? {...st, aulas: st.aulas + 1} : st));
                                    addLog(s.id, "Presença marcada");
                                }}>+ Presença</button>
                                <button className="red" onClick={() => setStudents(students.filter(st => st.id !== s.id))}>Excluir</button>
                            </div>
                        )}

                        <div className="hist-box">
                            <strong>Histórico:</strong>
                            {(s.logs || []).slice(0, 5).map((l, i) => (
                                <div key={i} className="hist-item"><span>{l.text}</span><span>{l.time}</span></div>
                            ))}
                        </div>

                        {/* WhatsApp Chat Style */}
                        <div className="wa-chat">
                            <div className="wa-messages">
                                {s.chat.map((m, i) => <div key={i} className={`wa-msg ${m.from === 'Prof' ? 'me' : ''}`}>{m.txt}</div>)}
                            </div>
                            <div className="wa-input-bar">
                                <div className="wa-input-container">
                                    <i className="fas fa-plus"></i>
                                    <i className="far fa-face-smile"></i>
                                    <input placeholder="Digite uma mensagem" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value){
                                            const msg = { from: user === 'professor' ? 'Prof' : 'Pais', txt: e.target.value };
                                            setStudents(students.map(st => st.id === s.id ? {...st, chat: [...st.chat, msg]} : st));
                                            e.target.value = "";
                                        }
                                    }} />
                                </div>
                                <div className="wa-mic"><i className="fas fa-microphone"></i></div>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
