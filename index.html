<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu-Jitsu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

/* RESPONSIVO */

@media (max-width:700px){

.row{
flex-direction:column
}

button{
width:100%
}

}

/* PROGRESSO */

.progress{
height:12px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:6px
}

.progressFill{
height:100%;
background:#2ecc71;
transition:0.4s
}

/* FAIXA */

.beltRow{
display:flex;
align-items:center;
gap:6px;
margin-top:10px
}

.beltSide{
display:flex;
background:black;
padding:2px;
gap:2px
}

.beltWrap{
display:flex;
align-items:center
}

.beltColor{
width:140px;
height:16px;
border-top:2px solid #333;
border-bottom:2px solid #333
}

.beltTip{
width:24px;
height:20px;
background:black
}

.degreeWhite{
width:8px;
height:14px;
background:white
}

.degreeRed{
width:8px;
height:14px;
background:#e74c3c
}

.degreeYellow{width:8px;height:14px;background:#f1c40f}
.degreeBlue{width:8px;height:14px;background:#3498db}
.degreeGreen{width:8px;height:14px;background:#2ecc71}

.degreeEmpty{
width:8px;
height:14px;
background:transparent
}

.beh{
width:22px;
height:22px;
border-radius:50%;
background:#eee;
cursor:pointer
}

</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=["Branca","Cinza","Amarela","Laranja","Verde"]

/* FAIXA */

function Belt({faixa,aulas,comportamental}){

const beltColors={
Branca:"#f5f5f5",
Cinza:"#9ca3af",
Amarela:"#facc15",
Laranja:"#fb923c",
Verde:"#16a34a"
}

const totalGraus=Math.floor(aulas/15)

const brancos=Math.min(totalGraus,4)
const vermelhos=Math.max(totalGraus-4,0)

return(

<div className="beltRow">

<div className="beltSide">

{comportamental.relacionamento
? <div className="degreeYellow"/>
: <div className="degreeEmpty"/>}

{comportamental.comportamento
? <div className="degreeBlue"/>
: <div className="degreeEmpty"/>}

{comportamental.notas
? <div className="degreeRed"/>
: <div className="degreeEmpty"/>}

{comportamental.habitos
? <div className="degreeGreen"/>
: <div className="degreeEmpty"/>}

</div>

<div className="beltWrap">

<div
className="beltColor"
style={{background:beltColors[faixa]||"#ddd"}}
/>

<div className="beltTip"/>

</div>

<div className="beltSide">

{Array.from({length:4}).map((_,i)=>{

if(i<vermelhos) return <div key={i} className="degreeRed"/>

if(i<brancos) return <div key={i} className="degreeWhite"/>

return <div key={i} className="degreeEmpty"/>

})}

</div>

</div>

)

}

/* PROGRESSO */

function ProgressAulas({aulas}){

const p=Math.min((aulas/120)*100,100)

return(

<div>

<div className="progress">
<div className="progressFill" style={{width:p+"%"}}/>
</div>

<div style={{fontSize:12,marginTop:4}}>
{aulas} / 120 aulas
</div>

</div>

)

}

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("jj_students")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("jj_students",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

setStudents([
...students,
{
id:Date.now(),
...form,
aulas:0,
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}
}
])

setForm({nome:"",idade:"",faixa:"Branca"})
}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
aulas:s.aulas+1
}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
comportamental:{
...s.comportamental,
[key]:!s.comportamental[key]
}
}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return

setStudents(students.filter(s=>s.id!==id))

}

return(

<div className="container">

<h2>Acompanhamento Jiu-Jitsu</h2>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

{students.map(s=>(

<div key={s.id} className="card">

<b>{s.nome}</b> — {s.idade} anos

<div>Faixa: {s.faixa}</div>

<Belt
faixa={s.faixa}
aulas={s.aulas}
comportamental={s.comportamental}
/>

<div style={{marginTop:8}}>Progresso aulas</div>

<ProgressAulas aulas={s.aulas}/>

<div style={{display:"flex",gap:10,marginTop:10}}>

<div
className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={()=>markBehavior(s.id,"relacionamento")}
/>

<div
className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={()=>markBehavior(s.id,"comportamento")}
/>

<div
className="beh"
style={{background:s.comportamental.notas?"#e74c3c":"#eee"}}
onClick={()=>markBehavior(s.id,"notas")}
/>

<div
className="beh"
style={{background:s.comportamental.habitos?"#2ecc71":"#eee"}}
onClick={()=>markBehavior(s.id,"habitos")}
/>

</div>

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Adicionar presença
</button>

<button
className="red"
onClick={()=>removeStudent(s.id)}
style={{marginLeft:8}}
>
Excluir
</button>

</div>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
