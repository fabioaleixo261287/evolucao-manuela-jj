<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:36px; height:36px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:13px; background:#fff; color:#777; cursor: pointer; font-weight: bold; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:26px; height:26px; border:1px solid #333; border-radius:4px; background:#ddd; }
.beh-row { display: flex; gap: 10px; margin: 15px 0; }
.beh-btn { flex:1; padding:10px 5px; border-radius:10px; border:1px solid #ddd; font-size:11px; font-weight:bold; cursor:pointer; text-align:center; transition: 0.3s; }
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:220px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; font-size:14px; max-width:80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.chat-img-preview { max-width: 100px; border-radius: 8px; cursor: zoom-in; margin-top: 5px; display: block; }
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
.history-section { margin-top: 15px; background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
.history-list { font-size: 11px; color: #555; max-height: 100px; overflow-y: auto; }
.repo-box { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; }
.doc-card { display: flex; justify-content: space-between; background: #f8f9fa; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; border: 1px solid #eee; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_TYPES = [
    { k: 'REL', n: 'Relacionamento', c: '#f1c40f' },
    { k: 'DIS', n: 'Disciplina', c: '#3498db' },
    { k: 'ORG', n: 'Organização', c: '#e74c3c' },
    { k: 'HAB', n: 'Bons Hábitos', c: '#2ecc71' }
];

function getAge(nasc) {
    if(!nasc) return 0;
    const diff = Date.now() - new Date(nasc).getTime();
    return Math.abs(new Date(diff).getUTCFullYear() - 1970);
}

function getRules(nasc, faixa) {
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [zoomImg, setZoomImg] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_eagle_v7_final") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("all_eagle_v7_final", JSON.stringify(students)) }, [students]);

    const addHistory = (studentId, msg) => {
        setStudents(prev => prev.map(s => s.id === studentId ? { ...s, history: [{ date: new Date().toLocaleDateString(), msg }, ...s.history] } : s));
    };

    const handleFileUpload = (id, e, target) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = event.target.result;
            if (target === 'avatar') {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 200;
                    const scale = MAX_W / img.width;
                    canvas.width = MAX_W; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: canvas.toDataURL('image/jpeg', 0.7) } : s));
                };
                img.src = data;
            } else if (target === 'chat') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user==='professor'?'Professor':'Pais', text: "", file: {name: file.name, data, type: file.type} }] } : s));
            } else if (target === 'repo') {
                const n = prompt("Nome do documento:", file.name);
                setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: n, data }] } : s));
                addHistory(id, `Documento adicionado: ${n}`);
            }
        };
        reader.readAsDataURL(file);
    };

    const markClass = (id, n) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const meta = getRules(s.nascimento, s.faixa).m;
            let novaContagem = s.aulasNoCiclo === n ? n - 1 : n;
            if (novaContagem === meta) {
                alert("Grau Conquistado! O contador será zerado.");
                return { ...s, aulasNoCiclo: 0, grausGanhos: s.grausGanhos + 1, history: [{date: new Date().toLocaleDateString(), msg: `CONQUISTA: ${s.grausGanhos+1}º Grau na faixa ${s.faixa}`}, ...s.history] };
            }
            return { ...s, aulasNoCiclo: novaContagem };
        }));
    };

    const toggleBeh = (id, b) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const status = !s.comportamental[b.k];
            const msg = `${status ? 'Ganhou' : 'Removeu'} Grau Comportamental: ${b.n}`;
            return { ...s, comportamental: { ...s.comportamental, [b.k]: status }, history: [{date: new Date().toLocaleDateString(), msg}, ...s.history] };
        }));
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            {zoomImg && <div className="modal-overlay" onClick={() => setZoomImg(null)}><img src={zoomImg} className="modal-img" /></div>}
            
            <div className="row" style={{justifyContent:'space-between'}}>
                <h2 style={{color:'#075e54', margin:0}}>Alliance Infantil</h2>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => {if(form.nome) setStudents([...students, { id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {} }]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do aluno..." style={{width:'100%', padding:10}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80?text=FOTO"} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleFileUpload(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0}}>{s.nome}</h3>
                                <div style={{fontSize:12, color:'#666'}}>
                                    <b>Idade:</b> {getAge(s.nascimento)} anos | <b>Programa:</b> {rules.p}<br/>
                                    <b>Faixa:</b> {s.faixa}
                                </div>
                            </div>
                        </div>

                        <div style={{marginTop:15}}><b>Presença Ciclo (Meta: {rules.m}):</b></div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i + 1)}>{i + 1}</div>
                            ))}
                        </div>

                        <div style={{marginTop:10}}><b>Graus de Faixa Conquistados ({s.grausGanhos}):</b></div>
                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div style={{marginTop:10}}><b>Graus Comportamentais:</b></div>
                        <div className="beh-row">
                            {BEH_TYPES.map(b => (
                                <div key={b.k} className="beh-btn" 
                                     style={{ background: s.comportamental[b.k] ? b.c : '#eee', color: s.comportamental[b.k] ? '#fff' : '#888' }}
                                     onClick={() => toggleBeh(s.id, b)}>
                                    {b.k}
                                </div>
                            ))}
                        </div>

                        <div className="history-section">
                            <strong>📜 Histórico Completo</strong>
                            <div className="history-list">
                                {s.history.length === 0 && <div>Nenhum registro ainda.</div>}
                                {s.history.map((h, i) => <div key={i}>• [{h.date}] {h.msg}</div>)}
                            </div>
                        </div>

                        <div className="repo-box">
                            <strong>📂 Repositório de Documentos</strong>
                            {user === "professor" && <label style={{marginLeft:10, color:'#25d366', cursor:'pointer', fontSize:11}}> [+ NOVO] <input type="file" hidden onChange={e => handleFileUpload(s.id, e, 'repo')} /></label>}
                            <div style={{marginTop:5}}>
                                {s.docs.map((d, i) => (
                                    <div key={i} className="doc-card"><span>{d.name}</span><a href={d.data} download={d.name} style={{color:'#3498db', fontWeight:'bold'}}>BAIXAR</a></div>
                                ))}
                            </div>
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === (user === 'professor' ? 'Professor' : 'Pais') ? 'sent' : 'received'}`}>
                                        <small style={{fontSize:9, fontWeight:'bold', display:'block'}}>{m.sender.toUpperCase()}</small>
                                        {m.file && (
                                            m.file.type.startsWith('image/') 
                                            ? <div><img src={m.file.data} className="chat-img-preview" onClick={() => setZoomImg(m.file.data)} /><a href={m.file.data} download={m.file.name} style={{fontSize:10}}>Download</a></div>
                                            : <a href={m.file.data} download={m.file.name}>📄 {m.file.name}</a>
                                        )}
                                        {m.text}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer'}}>📎<input type="file" hidden onChange={e => handleFileUpload(s.id, e, 'chat')}/></label>
                                <textarea id={`msg-${s.id}`} placeholder="Mensagem..." style={{flex:1, height:40}} />
                                <button onClick={() => {
                                    const t = document.getElementById(`msg-${s.id}`).value;
                                    if(t) setStudents(students.map(st => st.id === s.id ? {...st, chat:[...st.chat, {sender:user==='professor'?'Professor':'Pais', text:t}]} : st));
                                    document.getElementById(`msg-${s.id}`).value = "";
                                }}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
