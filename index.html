<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
    .container { max-width:800px; margin:auto; }
    .card { background:white; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    
    /* Graus: 1-4 Branco, 5-8 Vermelho */
    .degree-bar { display: flex; gap: 5px; margin: 10px 0; }
    .degree { width:25px; height:25px; border:2px solid #333; border-radius:4px; }
    .degree.white { background: #fff; }
    .degree.red { background: #e74c3c; }
    .degree.empty { background: #eee; border-color: #ccc; }

    /* Bolinhas de Aula com Data */
    .bar-bolinhas { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
    .bolinha-aula { width:38px; height:38px; border-radius:50%; border:1px solid #ddd; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; background:#fff; cursor: pointer; font-weight: bold; }
    .bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
    .bolinha-aula span { font-size: 7px; margin-top: 2px; }

    /* Comportamental */
    .beh-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
    .beh-item { padding: 8px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #ddd; font-size: 10px; font-weight: bold; transition: 0.3s; }
    .beh-item.active { color: white; border-color: transparent; }

    /* Chat Integrado (Sem Pop-up) */
    .chat-section { background: #efe7dd; border-radius: 12px; margin-top: 20px; border: 1px solid #ddd; overflow: hidden; }
    .chat-messages { height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .msg { padding: 8px 12px; border-radius: 8px; font-size: 13px; max-width: 80%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .msg.Professor { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
    .msg.Pais { align-self: flex-start; background: #fff; border-top-left-radius: 0; }
    .chat-input { padding: 10px; background: #f0f2f5; display: flex; gap: 10px; align-items: center; }
    .chat-input input { flex: 1; border: none; padding: 10px; border-radius: 20px; outline: none; }

    button { padding:10px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight:bold; }
    .belt-upgrade { background: linear-gradient(45deg, #FFD700, #DAA520); color: black; width: 100%; border: 2px solid black; }
    .locked { background: #95a5a6; cursor: not-allowed; opacity: 0.6; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const BEH = [
    { k: 'REL', n: 'Relacionamento', c: '#f1c40f' },
    { k: 'COM', n: 'Comportamento', c: '#3498db' },
    { k: 'ESC', n: 'Escola', c: '#e74c3c' },
    { k: 'HAB', n: 'Hábitos', c: '#2ecc71' }
];

function App() {
    const [view, setView] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("eagle_v3") || "[]"));

    React.useEffect(() => { localStorage.setItem("eagle_v3", JSON.stringify(students)) }, [students]);

    const markAttendance = (id, n) => {
        if (view !== "professor") return;
        const today = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            if (n !== s.aulas.length + 1) return s;
            const limit = s.faixa.includes("Branca") ? 12 : 15;
            if (n === limit) return { ...s, aulas: [], graus: s.graus + 1 };
            return { ...s, aulas: [...s.aulas, today] };
        }));
    };

    if (!view) return (
        <div style={{textAlign:'center', marginTop:100}}>
            <button onClick={() => setView("professor")} style={{marginRight:10}}>Professor</button>
            <button onClick={() => setView("pais")}>Pais</button>
        </div>
    );

    const lista = view === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <h2>Alliance Eagle</h2>
                <button onClick={() => {setView(""); setFilho("")}} style={{background:'#e74c3c'}}>Sair</button>
            </div>

            {view === "professor" && (
                <button style={{width:'100%', marginBottom:20}} onClick={() => {
                    const n = prompt("Nome:");
                    if(n) setStudents([...students, { id: Date.now(), nome: n, faixa: "Branca", aulas: [], graus: 0, chat: [], beh: {} }]);
                }}>+ Novo Aluno</button>
            )}

            {view === "pais" && !filho && (
                <input placeholder="Nome do Aluno..." style={{width:'100%', padding:15, borderRadius:10, border:'1px solid #ccc'}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} />
            )}

            {lista.map(s => {
                const limit = s.faixa.includes("Branca") ? 12 : 15;
                const behCount = Object.values(s.beh).filter(v => v).length;
                const canPromote = s.graus >= 8 && behCount >= 4;

                return (
                    <div key={s.id} className="card">
                        <h3>{s.nome} <small style={{fontSize:12, color:'#666'}}>({s.faixa})</small></h3>

                        <strong>Graus de Faixa:</strong>
                        <div className="degree-bar">
                            {[...Array(8)].map((_, i) => (
                                <div key={i} className={`degree ${i < s.graus ? (i < 4 ? 'white' : 'red') : 'empty'}`}></div>
                            ))}
                        </div>

                        <strong>Aulas Ciclo:</strong>
                        <div className="bar-bolinhas">
                            {[...Array(limit)].map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulas.length ? 'done' : ''}`} onClick={() => markAttendance(s.id, i+1)}>
                                    {i+1}
                                    {s.aulas[i] && <span>{s.aulas[i]}</span>}
                                </div>
                            ))}
                        </div>

                        <strong>Graus Comportamentais:</strong>
                        <div className="beh-grid">
                            {BEH.map(b => (
                                <div key={b.k} className={`beh-item ${s.beh[b.k] ? 'active' : ''}`} 
                                     style={{background: s.beh[b.k] ? b.c : '#eee'}}
                                     onClick={() => view === "professor" && setStudents(students.map(st => st.id === s.id ? {...st, beh: {...st.beh, [b.k]: !st.beh[b.k]}} : st))}>
                                    {b.n}
                                </div>
                            ))}
                        </div>

                        {s.graus >= 8 && (
                            <button className={canPromote ? "belt-upgrade" : "locked"} onClick={() => {
                                if(!canPromote) return alert("Faltam os 4 graus comportamentais!");
                                const idx = BELTS.indexOf(s.faixa);
                                setStudents(students.map(st => st.id === s.id ? {...st, faixa: BELTS[idx+1], graus:0, beh:{}} : st));
                            }}>
                                {canPromote ? "🎓 TROCAR DE FAIXA AGORA" : "🔒 BLOQUEADO: COMPLETE O COMPORTAMENTAL"}
                            </button>
                        )}

                        <div className="chat-section">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.user}`}>
                                        <small style={{display:'block', fontSize:9, fontWeight:'bold'}}>{m.user.toUpperCase()}</small>
                                        {m.text}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input">
                                <input id={`in-${s.id}`} placeholder="Fale conosco..." onKeyDown={e => {
                                    if(e.key === 'Enter' && e.target.value) {
                                        setStudents(students.map(st => st.id === s.id ? {...st, chat: [...st.chat, {user: view === 'professor' ? 'Professor' : 'Pais', text: e.target.value}]} : st));
                                        e.target.value = "";
                                    }
                                }} />
                                <button onClick={() => {
                                    const input = document.getElementById(`in-${s.id}`);
                                    if(input.value) {
                                        setStudents(students.map(st => st.id === s.id ? {...st, chat: [...st.chat, {user: view === 'professor' ? 'Professor' : 'Pais', text: input.value}]} : st));
                                        input.value = "";
                                    }
                                }}><i className="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
