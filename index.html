<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
button.orange { background:#f39c12; }
button.small-edit { background: none; color: #777; padding: 2px; font-size: 16px; margin-left: 5px; border-radius: 4px; border: 1px solid #ddd; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

/* Avatar Otimizado */
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }
.avatar-hint { position: absolute; bottom: 0; right: 0; background: #075e54; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

/* Bolinhas de Aula */
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:36px; height:36px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:13px; background:#fff; color:#777; cursor: pointer; font-weight: bold; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }

/* Graus */
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:26px; height:26px; border:1px solid #333; border-radius:4px; background:#ddd; }

/* Chat */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:220px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; font-size:14px; max-width:80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.chat-input-area { display:flex; gap:8px; padding:12px; background:#f0f0f0; border-top: 1px solid #ddd; align-items: center; }
.chat-input-area textarea { flex:1; border:none; padding:10px; border-radius:8px; height: 40px; resize: none; }

.history-list { font-size: 11px; color: #666; max-height: 80px; overflow-y: auto; background: #fafafa; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
.repo-box { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; border: 1px solid #ddd; }
.doc-card { display: flex; justify-content: space-between; background: white; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; border: 1px solid #eee; align-items: center; }

/* Pre-visualização Chat */
.chat-preview-img { max-width: 150px; border-radius: 5px; display: block; margin-top: 5px; }
.chat-file-link { display: inline-block; background: #eee; padding: 5px; border-radius: 5px; text-decoration: none; color: #333; font-size: 11px; margin-top: 5px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

function getAge(nasc) {
    if(!nasc) return 0;
    const today = new Date();
    const birthDate = new Date(nasc);
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
    return age;
}

function getRules(nasc, faixa) {
    if(!nasc) return { p: "Eagle", m: 15 };
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [editingId, setEditingId] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_v6_prod") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_v6_prod", JSON.stringify(students)) }, [students]);

    const handleImageUpload = (id, e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 200;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: compressedData } : s));
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    const handleChatFile = (id, e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const fileData = {
                name: file.name,
                type: file.type,
                content: event.target.result
            };
            setStudents(prev => prev.map(s => s.id === id ? { 
                ...s, 
                chat: [...s.chat, { sender: user === 'professor' ? 'Professor' : 'Pais', text: "", file: fileData }] 
            } : s));
        };
        reader.readAsDataURL(file);
    };

    const handleRepoUpload = (id, e) => {
        if (user !== "professor") return;
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const newDoc = { name: file.name, content: event.target.result, date: new Date().toLocaleDateString() };
            setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, newDoc] } : s));
        };
        reader.readAsDataURL(file);
    };

    const sendMessage = (id) => {
        const input = document.getElementById(`msg-${id}`);
        const txt = input.value.trim();
        if(!txt) return;
        setStudents(prev => prev.map(st => st.id === id ? {...st, chat: [...st.chat, {sender: user==='professor'?'Professor':'Pais', text: txt}]} : st));
        input.value = "";
    };

    const markClass = (id, n) => {
        if (user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const meta = getRules(s.nascimento, s.faixa).m;
            let novaContagem = s.aulasNoCiclo === n ? n - 1 : n;
            if (novaContagem === meta) {
                alert("Grau Conquistado!");
                return { ...s, aulasNoCiclo: 0, grausGanhos: s.grausGanhos + 1, history: [{date: new Date().toLocaleDateString(), msg: `${s.grausGanhos+1}º Grau conquistado`}, ...s.history] };
            }
            return { ...s, aulasNoCiclo: novaContagem };
        }));
    };

    const addStudent = () => {
        if (!form.nome || !form.nascimento) return;
        setStudents([...students, { id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {} }]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Acesso Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h2 style={{color:'#075e54', margin:0}}>Alliance Infantil</h2>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={addStudent}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do aluno..." style={{width:'100%', padding:10}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row" style={{alignItems:'flex-start'}}>
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80?text=FOTO"} className="avatar-img" />
                                <div className="avatar-hint">✎</div>
                                <input type="file" hidden accept="image/*" onChange={e => handleImageUpload(s.id, e)} />
                            </label>
                            <div style={{flex:1}}>
                                <div style={{display:'flex', alignItems:'center'}}>
                                    <h3 style={{margin:0}}>{s.nome} ({getAge(s.nascimento)} anos)</h3>
                                    {user === "professor" && <button className="small-edit" onClick={() => setEditingId(editingId === s.id ? null : s.id)}>⚙️</button>}
                                </div>
                                <small style={{color:'#666'}}>{rules.p} | Faixa {s.faixa}</small>
                            </div>
                        </div>

                        {editingId === s.id && (
                            <div style={{background:'#f9f9f9', padding:10, borderRadius:8, margin:'10px 0'}}>
                                <input id={`en-${s.id}`} defaultValue={s.nome} placeholder="Nome" />
                                <input id={`ef-${s.id}`} defaultValue={s.faixa} placeholder="Faixa" />
                                <button onClick={() => {
                                    const n = document.getElementById(`en-${s.id}`).value;
                                    const f = document.getElementById(`ef-${s.id}`).value;
                                    setStudents(students.map(x => x.id === s.id ? {...x, nome: n, faixa: f} : x));
                                    setEditingId(null);
                                }}>Salvar</button>
                                <button className="red" onClick={() => setStudents(students.filter(x => x.id !== s.id))}>Excluir Aluno</button>
                            </div>
                        )}

                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i + 1)}>{i + 1}</div>
                            ))}
                        </div>

                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="row">
                            {['REL', 'DIS', 'ORG', 'HAB'].map(k => (
                                <button key={k} onClick={() => {
                                    if(user !== "professor") return;
                                    const novo = !s.comportamental[k];
                                    setStudents(students.map(st => st.id === s.id ? {...st, comportamental: {...st.comportamental, [k]: novo}, history: [{date: new Date().toLocaleDateString(), msg: `Sigla ${k} ${novo?'Ativada':'Removida'}`}, ...st.history]} : st));
                                }} style={{background: s.comportamental[k] ? '#2ecc71' : '#eee', color: s.comportamental[k] ? '#fff' : '#888', borderRadius:'10px', fontSize:'11px'}}>
                                    {k}
                                </button>
                            ))}
                        </div>

                        {/* Repositório de Documentos */}
                        <div className="repo-box">
                            <strong>📂 Documentos do Aluno</strong>
                            {user === "professor" && (
                                <div style={{marginTop: 5}}>
                                    <input type="file" id={`repo-${s.id}`} hidden onChange={(e) => handleRepoUpload(s.id, e)} />
                                    <button onClick={() => document.getElementById(`repo-${s.id}`).click()} style={{fontSize: 10, background: '#3498db'}}>+ Adicionar Doc</button>
                                </div>
                            )}
                            <div style={{marginTop: 8}}>
                                {s.docs && s.docs.map((doc, idx) => (
                                    <div key={idx} className="doc-card">
                                        <span>{doc.name} <small>({doc.date})</small></span>
                                        <a href={doc.content} download={doc.name} style={{color: '#075e54', fontWeight: 'bold', textDecoration: 'none'}}>Download</a>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="history-list" style={{marginTop:10}}>
                            <strong>Histórico:</strong>
                            {s.history.slice(0, 5).map((h, i) => <div key={i}>• {h.date}: {h.msg}</div>)}
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === (user === 'professor' ? 'Professor' : 'Pais') ? 'sent' : 'received'}`}>
                                        <small style={{fontSize:9, fontWeight:'bold'}}>{m.sender.toUpperCase()}</small>
                                        {m.text && <div>{m.text}</div>}
                                        {m.file && (
                                            <div>
                                                {m.file.type.includes('image') ? (
                                                    <img src={m.file.content} className="chat-preview-img" alt="Anexo" />
                                                ) : (
                                                    <div style={{fontSize: 20}}>📄</div>
                                                )}
                                                <a href={m.file.content} download={m.file.name} className="chat-file-link">
                                                    Download {m.file.name}
                                                </a>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <input type="file" id={`chat-file-${s.id}`} hidden onChange={(e) => handleChatFile(s.id, e)} />
                                <button onClick={() => document.getElementById(`chat-file-${s.id}`).click()} style={{background: 'none', color: '#075e54', fontSize: 20, padding: 0}}>📎</button>
                                <textarea 
                                    id={`msg-${s.id}`} 
                                    placeholder="Mensagem..." 
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            sendMessage(s.id);
                                        }
                                    }}
                                />
                                <button onClick={() => sendMessage(s.id)}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
