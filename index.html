    <style>
        :root { 
            --alliance-red: #3498db;
            --grade-red: #cf2e2e;
            --alliance-green: #2ecc71; 
            --bg: #07101a; 
            --whatsapp-green: #075e54; 
            --dark: #000000; 
            --light-green: #054d44; 
            --card-bg: #111923;
            --text-color: #e0e0e0;
            --border-color: rgba(93,154,220,0.28);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, button, div, section, header, main, article, aside, h1, h2, h3, p, span, small, strong, label {
            caret-color: transparent;
        }
        input, textarea {
            caret-color: var(--alliance-red);
            user-select: text;
        }
        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system; 
            background:
                radial-gradient(circle at 50% -90px, rgba(52,152,219,0.22), transparent 280px),
                linear-gradient(180deg, #08111d 0%, #07101a 42%, #05070a 100%);
            color: var(--text-color); 
            margin:0; 
            padding: 14px; 
            padding-bottom: 120px; 
        }
        body.auth-mode, body.parent-mode { padding: 0; overflow: hidden; }

        .auth-container, .selection-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 50% 0%, rgba(52,152,219,0.45) 0, rgba(52,152,219,0.16) 18%, transparent 42%),
                radial-gradient(circle at 50% 34%, rgba(255,255,255,0.08), transparent 30%),
                linear-gradient(180deg, #07101c 0%, #07101a 34%, #05070a 100%);
            padding: 22px 12px;
        }
        body.auth-mode .auth-container, body.auth-mode .selection-screen { height: 100dvh; min-height: 100dvh; overflow: hidden; }
        .auth-shell { width: min(430px, 100%); display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .selection-screen .auth-shell { width: min(500px, 100%); display: flex; flex-direction: column; align-items: stretch; gap: 18px; }
        .brand-card { width: 100%; background: transparent; border: 0; border-radius: 0; padding: 0 12px 2px; text-align: center; box-shadow: none; backdrop-filter: none; overflow: visible; }
        .auth-hero-frame { width: 230px; height: 188px; overflow: visible; background: transparent; border: 0; border-radius: 0; margin: 0 auto 8px; display: flex; align-items: flex-end; justify-content: center; box-shadow: none; }
        .auth-hero-image { width: 122%; height: 118%; object-fit: contain; object-position: center bottom; filter: drop-shadow(0 20px 25px rgba(0,0,0,0.74)); opacity: 1; display: block; mix-blend-mode: normal; transform: translateY(18px); }
        .auth-hero-copy { padding: 0; background: transparent; }
        .auth-logo { width: 142px; height: 112px; object-fit: cover; object-position: 72% 34%; border-radius: 20px; border: 1px solid #2f2f2f; box-shadow: 0 14px 35px rgba(0,0,0,0.35); margin: 0 auto 22px; display: block; user-select: none; pointer-events: none; }
        .auth-kicker { color: var(--alliance-red); font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .auth-title { margin: 0; color: #fff; font-size: clamp(38px, 10vw, 56px); line-height: 0.95; letter-spacing: 0; position: relative; z-index: 1; text-shadow: 0 12px 30px rgba(0,0,0,0.62); }
        .auth-subtitle { margin: 14px 0 0; color: #b8c0cd; font-size: 15px; font-weight: 600; text-transform: none; line-height: 1.35; }
        .auth-feature-row { display: none; }
        .auth-feature-row span { border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 12px 10px; color: #fff; font-size: 11px; font-weight: 900; text-transform: uppercase; background: rgba(0,0,0,0.18); }
        .role-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 14px; background: transparent; border: 0; border-radius: 0; padding: 0; box-shadow: none; }
        .role-heading { display: none; }
        .role-heading strong { display: block; color: #fff; font-size: 21px; line-height: 1.1; }
        .role-heading small { display: block; margin-top: 6px; color: #9b9b9b; font-size: 11px; font-weight: 800; text-transform: uppercase; line-height: 1.45; }
        .btn-select { width: 100%; padding: 22px; border-radius: 22px; border: 1px solid rgba(93,154,220,0.46); background: linear-gradient(135deg, rgba(24,34,47,0.9), rgba(12,17,25,0.92)); color: white; font-size: 15px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 20px; box-shadow: 0 16px 42px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.05); transition: 0.2s; text-align: left; min-height: 112px; }
        .btn-select:hover { transform: translateY(-1px); border-color: rgba(52,152,219,0.95); background: linear-gradient(135deg, rgba(30,43,61,0.95), rgba(14,22,34,0.95)); }
        .btn-select i { width: 72px; height: 72px; border-radius: 20px; display: grid; place-items: center; background: transparent; color: var(--alliance-red); font-size: 48px; flex: 0 0 auto; text-shadow: 0 12px 28px rgba(52,152,219,0.42); }
        .btn-select strong { display: block; color: #fff; font-size: 25px; line-height: 1.05; text-shadow: 0 8px 22px rgba(0,0,0,0.55); }
        .btn-select small { display: block; margin-top: 8px; color: #b5bdc9; font-size: 15px; font-weight: 500; text-transform: none; }
        .login-box { background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); padding: 26px; border-radius: 24px; width: 100%; text-align: center; box-shadow: 0 18px 45px rgba(0,0,0,0.45); border: 1px solid var(--border-color); cursor: default; transform: translateZ(0); }
        .login-box .auth-hero-frame { width: 210px; height: 150px; border-radius: 0; border: 0; margin-bottom: -2px; }
        .login-box input { display: block; position: relative; z-index: 1; cursor: text; transform: translateZ(0); }
        .login-heading { margin: 0 0 18px; color: #fff; font-size: 18px; position: relative; z-index: 1; }
        .back-link { font-size: 11px; margin-top: 18px; cursor: pointer; color: #777; font-weight: 800; text-transform: uppercase; }

        .header-main { text-align: center; margin: 18px 0 18px; position: relative; display: flex; justify-content: center; align-items: center; }
        .header-main h2 { color: white; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid var(--alliance-red); display: inline-block; padding: 0 8px 9px; letter-spacing: 1px; margin: 0; text-shadow: 0 10px 30px rgba(0,0,0,0.45); }
        
        /* Botão de backup */
        .btn-settings-hidden { 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #444; /* Cor suave para não destacar tanto, mas visível */
            font-size: 18px; 
            cursor: pointer; 
            padding: 10px;
            transition: 0.3s;
        }
        .btn-settings-hidden:hover { color: var(--alliance-red); }

        .search-container { max-width: 1060px; margin: 0 auto 18px; background: rgba(24,24,24,0.86); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; padding: 14px; box-shadow: 0 18px 42px rgba(0,0,0,0.32); }
        .search-field { position: relative; }
        .search-input { width: 100%; padding: 18px 20px 18px 54px; border-radius: 18px; border: 1px solid #383838; background: #101010; color: white; font-size: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); outline: none; margin: 0; }
        .search-input:focus { background: #151515; border-color: var(--alliance-red); box-shadow: 0 0 0 4px rgba(52,152,219,0.15); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #777; font-size: 17px; z-index: 1; }
        
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 2px 0; max-width: 1060px; margin: 0 auto; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 18px; border-radius: 999px; border: 1px solid #343434; background: #151515; font-size: 12px; font-weight: 900; white-space: nowrap; cursor: pointer; color: #8d8d8d; transition: 0.2s; }
        .filter-btn.active { background: var(--alliance-red); color: white; border-color: var(--alliance-red); box-shadow: 0 8px 22px rgba(52, 152, 219, 0.32); }
        .view-tabs { max-width: 850px; margin: 0 auto 18px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .view-tab { border: 1px solid var(--border-color); background: #171717; color: #888; border-radius: 18px; padding: 14px 12px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .view-tab.active { background: #242424; color: #fff; border-color: var(--alliance-red); box-shadow: 0 8px 20px rgba(52, 152, 219, 0.18); }

        .container { max-width: 1060px; margin: auto; }
        .wide-container { max-width: 1100px; }
        .card { background: var(--card-bg); padding: 22px; border-radius: 24px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--border-color); position: relative; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .student-top { display: flex; gap: 18px; align-items: center; margin-bottom: 20px; }
        .avatar-container { position: relative; width: 85px; height: 85px; flex-shrink: 0; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); object-fit: cover; background: #222; }
        .edit-badge { position:absolute; bottom:2px; right:2px; background:#3498db; color:white; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px solid #1e1e1e; font-size: 11px; z-index: 2; }
        
        .cat-badge { background: #333; color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 6px; display: inline-block; border: 1px solid #444; }
        .section-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #777; margin-bottom: 10px; display: block; border-left: 3px solid var(--alliance-red); padding-left: 10px; letter-spacing: 0.5px; }
        .student-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin: -6px 0 16px; }
        .student-info-chip { background: #171717; border: 1px solid #303030; border-radius: 12px; padding: 9px 11px; color: #aaa; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .student-info-chip strong { display: block; color: #fff; font-size: 12px; margin-bottom: 3px; text-transform: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status-badge { background: #27372f; color: #9ff0bd; border-color: #355f46; }
        .status-badge.inativo, .status-badge.pausado { background: #35221f; color: #ffad9f; border-color: #68413b; }
        .student-chat-shortcut { border: 1px solid #343434; background: #151515; color: #ddd; border-radius: 14px; padding: 10px 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; margin-right: 6px; transition: 0.2s; }
        .student-chat-shortcut:hover { border-color: var(--alliance-red); color: #fff; background: #202020; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(180px, 1fr)); gap: 14px; align-items: end; }
        .form-grid > div { min-width: 0; }
        .form-grid input, .form-grid select { margin: 0; }
        textarea { width: 100%; min-height: 86px; resize: vertical; padding: 14px; margin: 10px 0; border: 1px solid #333; background: #1a1a1a; color: white; border-radius: 14px; font-size: 15px; outline: none; font-family: inherit; }
        textarea:focus { border-color: var(--alliance-red); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.18); }
        .check-row { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid #333; border-radius: 14px; color: #ddd; font-size: 12px; font-weight: 800; background: #1a1a1a; margin: 10px 0; }
        .check-row input { width: auto; margin: 0; }

        .bar { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 10px; margin: 10px 0 25px 0; }
        .box-class { height:42px; border:1px solid var(--border-color); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; background:#252525; color:#444; cursor: pointer; transition: 0.2s; }
        .box-class.done { background: var(--alliance-green); color:white; border-color: var(--alliance-green); box-shadow: 0 4px 12px rgba(46,204,113,0.3); }
        .box-class.locked { background: #151515; color: #222; cursor: not-allowed; border-style: dashed; }
        
        .degree-row { display: flex; gap: 10px; margin: 10px 0 20px; padding: 12px; background: #151515; border: 1px solid var(--border-color); border-radius: 15px; width: 100%; }
        .degree-box { height:38px; border-radius: 8px; border: 1px solid #333; flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #252525; transition: 0.3s; }

        .bg-white { background: #ffffff !important; border: 2px solid #999 !important; } 
        .bg-red { background: var(--grade-red) !important; border-color: var(--grade-red) !important; }
        .bg-yellow { background: #f1c40f !important; border-color: #f1c40f !important; }
        .bg-blue { background: #3498db !important; border-color: #3498db !important; }
        .bg-green { background: #2ecc71 !important; border-color: #2ecc71 !important; }

        .hist-details { margin-top: 15px; border: 1px solid var(--border-color); border-radius: 15px; background: #181818; overflow: hidden; }
        .hist-summary { cursor: pointer; font-size: 12px; font-weight: bold; color: #3498db; padding: 12px; display: flex; justify-content: space-between; align-items: center; list-style: none; }
        .hist-content { padding: 12px; font-size: 11px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--border-color); color: #777; line-height: 1.6; }
        .belt-history-list { display: grid; gap: 10px; }
        .belt-history-card { padding: 12px; background: #161616; border: 1px solid #2d2d2d; border-radius: 14px; }
        .belt-history-card.current { border-color: rgba(52,152,219,0.55); background: linear-gradient(135deg, rgba(52,152,219,0.12), rgba(20,20,20,0.95)); }
        .belt-history-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
        .belt-history-head strong { color: #fff; font-size: 14px; }
        .belt-history-head small { color: #9a9a9a; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .belt-history-status { flex-shrink: 0; padding: 4px 8px; border-radius: 999px; background: #242424; color: #aaa; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .belt-history-card.current .belt-history-status { background: var(--alliance-red); color: #fff; }
        .belt-history-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 8px; }
        .belt-history-meta span { padding: 8px; border-radius: 10px; background: #202020; color: #aaa; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .belt-history-meta b { display: block; color: #fff; font-size: 13px; margin-bottom: 2px; text-transform: none; }
        .belt-history-empty { padding: 12px; border: 1px dashed #333; border-radius: 12px; color: #888; font-size: 11px; line-height: 1.5; }
        
        .chat-container { border-radius: 18px; overflow: hidden; margin-top: 20px; border: 1px solid var(--border-color); background: #181818; }
        .chat-header { background: #222; color: white; padding: 15px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .chat-msgs { height: 300px; overflow-y: auto; padding: 15px; background: #0b0b0b; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-wrapper.self { align-self: flex-end; }
        .msg-wrapper.other { align-self: flex-start; }
        
        .msg-author { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; color: #555; padding: 0 5px; }
        .msg-wrapper.self .msg-author { text-align: right; color: var(--alliance-green); }

        .msg-bubble { padding: 12px; border-radius: 15px; font-size: 13px; position: relative; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-wrapper.self .msg-bubble { background: var(--light-green); border-bottom-right-radius: 2px; color: #fff; }
        .msg-wrapper.other .msg-bubble { background: #2a2a2a; border-bottom-left-radius: 2px; color: #fff; }
        .msg-meta { font-size: 8px; text-align: right; margin-top: 5px; opacity: 0.5; font-weight: bold; }

        .chat-img-preview { width: 100%; max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .parent-card { max-width: 1060px; margin: 0 auto; height: calc(100dvh - 116px); overflow: hidden; display: flex; flex-direction: column; padding: 18px; }
        .parent-card .student-top { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #303030; flex-shrink: 0; }
        .parent-card .graduation-panel { flex-shrink: 0; margin: 8px 0 12px; }
        .parent-nav-inline { margin-left: auto; display: flex; align-items: center; gap: 10px; background: rgba(18,18,18,0.82); border: 1px solid #343434; border-radius: 22px; padding: 8px 12px; box-shadow: 0 10px 28px rgba(0,0,0,0.26); }
        .parent-nav-inline .action-item { min-width: 54px; font-size: 20px; }
        .parent-nav-inline .action-item span { font-size: 8px; }
        .parent-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 420px); gap: 18px; align-items: stretch; min-height: 0; flex: 1; }
        .parent-side { min-height: 0; overflow-y: auto; padding-right: 2px; }
        .parent-panel { background: #151515; border: 1px solid #303030; border-radius: 18px; overflow: hidden; }
        .parent-panel-title { padding: 14px 16px; color: #fff; font-size: 12px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid #303030; }
        .parent-alert { background: rgba(37,211,102,0.12); color: #b8ffd5; border-bottom: 1px solid rgba(37,211,102,0.25); padding: 10px 14px; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .parent-alert button { width: auto; margin: 0; padding: 7px 10px; border-radius: 999px; background: var(--whatsapp-green); color: #fff; border: 0; font-size: 10px; font-weight: 900; cursor: pointer; }
        .parent-detail { background: #151515; border: 1px solid #303030; border-radius: 18px; overflow: hidden; margin-bottom: 12px; }
        .parent-detail summary { cursor: pointer; padding: 14px 16px; color: #ddd; font-size: 12px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; list-style: none; }
        .parent-detail summary::-webkit-details-marker { display: none; }
        .parent-detail-body { padding: 0 16px 16px; }
        .parent-chat { height: 100%; display: flex; flex-direction: column; min-height: 0; }
        .parent-chat .chat-msgs { height: auto; flex: 1; min-height: 0; border-bottom: 1px solid #303030; }
        .parent-composer { display: flex; padding: 14px; background: #1a1a1a; gap: 10px; align-items: center; }
        .parent-composer input { flex: 1; border: none; background: #000; color: white; padding: 13px 18px; border-radius: 25px; font-size: 14px; margin: 0; outline: none; }
        .conversation-page { max-width: 1100px; margin: 0 auto 110px; }
        .conversation-title { display: grid; grid-template-columns: minmax(280px, 340px) 1fr; gap: 14px; align-items: end; margin: 8px 0 18px; }
        .conversation-actions { display: flex; justify-content: flex-end; align-items: center; }
        .conversation-title h3 { margin: 0; color: #fff; font-size: 22px; text-transform: uppercase; letter-spacing: 0; }
        .conversation-title span { color: #888; font-size: 12px; font-weight: 800; text-transform: uppercase; }

    const parseRemoteJson = (value, fallback) => {
        if (Array.isArray(value)) return value;
        if (!value) return fallback;
        try {

        } catch (e) {
            return fallback;
        }
    };

    const withTimeout = (promise, timeoutMs = 12000, label = "Tempo limite excedido") => {
        let timer;
        const timeout = new Promise((_, reject) => {
            timer = setTimeout(() => reject(new Error(label)), timeoutMs);
        });
        return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    };

    const appwriteFetch = async (config, path, options = {}, timeoutMs = 12000) => {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        const response = await fetch(`${config.endpoint}${path}`, {
            ...options,
            signal: controller.signal,
            headers: {
                "Content-Type": "application/json",
                "X-Appwrite-Project": config.projectId,
                "X-Appwrite-Response-Format": "1.9.5",
                ...(options.headers || {})
            }
        }).finally(() => clearTimeout(timer));
        if (!response.ok) {
            const detail = await response.json().catch(() => ({}));
            const err = new Error(detail.message || `Appwrite HTTP ${response.status}`);
            err.status = response.status;
            err.detail = detail;
            throw err;
        }
        return response.status === 204 ? null : response.json();
    };

    const getAppwriteState = (config) => {
        return appwriteFetch(config, `/tablesdb/${config.databaseId}/tables/${config.tableId}/rows/${config.rowId}`);
    };

        if (err?.name === "AbortError" || String(err?.message || "").toLowerCase().includes("tempo limite")) {
            return "Appwrite demorou para responder. Usando dados locais.";
        }
        const message = err?.detail?.message || err?.message || "erro desconhecido";

        return `Erro Appwrite${code}: ${message}`;
    };

            })

    const FILE_LIMITS = {
        avatar: 350 * 1024,

        repoImage: 900 * 1024,
        genericFile: 1200 * 1024
    };

    const getBase64Bytes = (dataUrl = "") => {
        const base64 = String(dataUrl).split(",")[1] || "";
        return Math.ceil((base64.length * 3) / 4);
    };

    const formatBytes = (bytes) => {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    };

    const getDataSignature = (students, repo) => {
        try {
            return JSON.stringify({
                students: students || [],
                repo: repo || []
            });
        } catch (e) {
            return `${Date.now()}`;
        }
    };

    const dataUrlToFile = (dataUrl, fileName) => {
        const [meta, base64] = String(dataUrl).split(",");
        const mime = meta.match(/data:(.*?);base64/)?.[1] || "application/octet-stream";
        const binary = atob(base64 || "");
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new File([bytes], fileName, { type: mime });
    };

    const buildStorageFileName = (file, type) => {
        const safeName = (file?.name || "arquivo").normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9._-]/g, "_");
        const prefix = type === "avatar" ? "avatar" : type === "chat" ? "chat" : "repo";
        return `${prefix}_${Date.now()}_${safeName}`;
    };

    const compressImage = (base64Str, maxWidth = 900, quality = 0.58) => {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = base64Str;
            img.onerror = () => resolve(base64Str);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
        });
    };

    function parseLocalDate(value) {
        if (!value) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
            const [year, month, day] = value.split("-").map(Number);
            return new Date(year, month - 1, day);
        }
        const parsed = new Date(value);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function getTodayISO() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
    }

    function formatDateBR(value) {
        const date = parseLocalDate(value);
        return date ? date.toLocaleDateString('pt-BR') : "";
    }

    function calculateAge(birthday) {
        const b = parseLocalDate(birthday);
        if(!b) return 0;
        const t = new Date();
        let age = t.getFullYear() - b.getFullYear();
        if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) age--;
        return age;
    }

    function getAutoCategory(nascimento, categoriaOverride = "Auto") {
        if (categoriaOverride && categoriaOverride !== "Auto") return categoriaOverride;
        const idade = calculateAge(nascimento);
        if (idade < 3 || idade > 15) return "Fora da regra";
        if (idade >= 3 && idade <= 6) return "Baby Eagle";
        if (idade >= 7 && idade <= 10) return "Little Eagle";
        if (idade >= 11 && idade <= 12) return "Eagle Warrior";
        if (idade >= 13 && idade <= 15) return "Eagle Youth";
        return "Fora da regra";
    }

    function getBeltFamily(faixa = "") {
        const f = faixa.toLowerCase();
        if (f.includes("branca") || f.includes("cinza")) return "brancaCinza";
        if (f.includes("amarela") || f.includes("laranja")) return "amarelaLaranja";
        if (f.includes("verde")) return "verde";
        return "desconhecida";
    }

    function getRuleInfo(nascimento, faixa, categoriaOverride = "Auto") {
        const idade = calculateAge(nascimento);
        const categoria = getAutoCategory(nascimento, categoriaOverride);
        const familia = getBeltFamily(faixa);
        const foraDaIdade = categoria === "Fora da regra";

        if (foraDaIdade) {
            return {
                categoria,
                aulasPorGrau: 0,
                elegivel: false,
                aviso: idade < 3 ? "Idade mínima: 3 anos" : "Programa Kids até 15 anos"
            };
        }

        if (categoria === "Baby Eagle") {
            if (familia === "brancaCinza") return { categoria, aulasPorGrau: 12, elegivel: true, aviso: "" };
            return { categoria, aulasPorGrau: 0, elegivel: false, aviso: "Baby Eagle usa Branca/Cinza" };
        }

        if (categoria === "Little Eagle" || categoria === "Eagle Warrior") {
            if (familia === "brancaCinza") return { categoria, aulasPorGrau: 15, elegivel: true, aviso: "" };
            if (familia === "amarelaLaranja") return { categoria, aulasPorGrau: 20, elegivel: true, aviso: "" };
            return { categoria, aulasPorGrau: 0, elegivel: false, aviso: "Verde é regra do Eagle Youth" };
        }

        if (categoria === "Eagle Youth") {
            if (familia === "brancaCinza") return { categoria, aulasPorGrau: 20, elegivel: true, aviso: "" };
            if (familia === "amarelaLaranja") return { categoria, aulasPorGrau: 22, elegivel: true, aviso: "" };
            if (familia === "verde") return { categoria, aulasPorGrau: 25, elegivel: true, aviso: "" };
        }

        return { categoria: "Fora da regra", aulasPorGrau: 0, elegivel: false, aviso: "Faixa fora da regra" };
    }

    function getRules(nascimento, faixa, categoriaOverride = "Auto") {
        return getRuleInfo(nascimento, faixa, categoriaOverride).aulasPorGrau;
    }

    function getPrevisaoGraduacao(aulasAtuais, nascimento, faixa, categoriaOverride = "Auto") {
        const ruleInfo = getRuleInfo(nascimento, faixa, categoriaOverride);
        const rules = ruleInfo.aulasPorGrau;
        if (!ruleInfo.elegivel || rules <= 0) return ruleInfo.aviso;
        const aulasSeguras = Math.max(0, Number(aulasAtuais) || 0);
        const totalAulasNecessarias = rules * 9;
        const aulasFaltantes = Math.max(0, totalAulasNecessarias - aulasSeguras);
        
        if (aulasFaltantes <= 0) return "Pronto para exame!";
        
        const dataPrevisa = new Date();
        let aulasContadas = 0;
        while (aulasContadas < aulasFaltantes) {
            dataPrevisa.setDate(dataPrevisa.getDate() + 1);
            if (classDays.includes(dataPrevisa.getDay())) aulasContadas++;
        }
        
        return dataPrevisa.toLocaleDateString('pt-BR');
    }

    function getGraduationProgress(aulasAtuais, nascimento, faixa, comp = {}, categoriaOverride = "Auto") {
        const ruleInfo = getRuleInfo(nascimento, faixa, categoriaOverride);
        const rules = ruleInfo.aulasPorGrau;
        if (!ruleInfo.elegivel || rules <= 0) {
            return {
                total: 0,
                feitas: 0,
                faltantes: 0,
                percentual: 0,
                elegivel: false,
                aviso: ruleInfo.aviso,
                aulasPorGrau: 0,
                previsao: ruleInfo.aviso
            };
        }
        const aulasSeguras = Math.max(0, Number(aulasAtuais) || 0);
        const total = rules * 9;
        const feitas = Math.min(aulasSeguras, total);
        const faltantes = Math.max(0, total - feitas);
        const aulasPercentual = total ? (feitas / total) * 100 : 0;
        const meritos = ["Rel", "Comp", "Notas", "Hab"];
        const meritosFeitos = meritos.filter(k => comp?.[k]).length;
        const percentual = Math.min(100, Math.round((aulasPercentual * 0.75) + ((meritosFeitos / meritos.length) * 25)));
        return {
            total,
            feitas,
            faltantes,
            percentual,
            elegivel: ruleInfo.elegivel,
            aviso: ruleInfo.aviso,
            aulasPorGrau: rules,
            previsao: getPrevisaoGraduacao(aulasSeguras, nascimento, faixa, categoriaOverride)
        };
    }

    function getPresenceDegreeStates(aulas = 0, rules = 1, savedStates = null) {
        if (Array.isArray(savedStates) && savedStates.length === 4) {
            return savedStates.map(state => Math.max(0, Math.min(2, Number(state) || 0)));
        }
        const graus = rules > 0 ? Math.floor(aulas / rules) : 0;
        return Array.from({length: 4}).map((_, i) => {
            if (graus > i + 4) return 2; // Vermelho sobreposto.
            if (graus > i) return 1; // Branco convencional.
            return 0;
        });
    }

    function getBehaviorDoneCount(comp = {}) {
        return ["Rel", "Comp", "Notas", "Hab"].filter(key => comp?.[key]).length;
    }

    function buildBeltCycleRecord(student, nextBelt, changeType = "Graduacao") {
        const rules = getRules(student.nascimento, student.faixa, student.categoriaOverride);
        const progress = getGraduationProgress(student.aulas, student.nascimento, student.faixa, student.comp, student.categoriaOverride);
        const states = rules > 0 ? getPresenceDegreeStates(student.aulas, rules, student.presenceDegrees) : [0, 0, 0, 0];
        const todayIso = getTodayISO();
        return {
            id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
            faixa: student.faixa,
            proximaFaixa: nextBelt,
            turma: getAutoCategory(student.nascimento, student.categoriaOverride),
            dataInicio: student.cicloFaixaInicio || student.matricula || "",
            dataConclusao: todayIso,
            aulasFeitas: Math.max(0, Number(student.aulas) || 0),
            aulasNecessarias: progress.total || (rules > 0 ? rules * 9 : 0),
            percentualFinal: progress.percentual || 0,
            grausBrancos: states.filter(state => state === 1).length,
            grausVermelhos: states.filter(state => state === 2).length,
            comportamentais: getBehaviorDoneCount(student.comp),
            tipo: changeType
        };
    }

    function getBeltHistory(student, progress) {
        const closedCycles = Array.isArray(student.beltHistory) ? student.beltHistory : [];
        const currentRules = getRules(student.nascimento, student.faixa, student.categoriaOverride);
        const currentStates = currentRules > 0 ? getPresenceDegreeStates(student.aulas, currentRules, student.presenceDegrees) : [0, 0, 0, 0];
        return [
            ...closedCycles,
            {
                id: "current",
                faixa: student.faixa,
                proximaFaixa: beltOrder[beltOrder.indexOf(student.faixa) + 1] || student.faixa,
                turma: getAutoCategory(student.nascimento, student.categoriaOverride),
                dataInicio: student.cicloFaixaInicio || student.matricula || "",
                dataConclusao: "",
                aulasFeitas: progress.feitas || 0,
                aulasNecessarias: progress.total || 0,
                percentualFinal: progress.percentual || 0,
                grausBrancos: currentStates.filter(state => state === 1).length,
                grausVermelhos: currentStates.filter(state => state === 2).length,
                comportamentais: getBehaviorDoneCount(student.comp),
                tipo: "Em andamento",
                current: true
            }
        ];
    }

    function getClassesFromDegreeStates(states, rules) {
        return states.reduce((total, state) => total + state, 0) * rules;
    }

    function getCurrentCycleClasses(aulas = 0, rules = 1) {
        const safeRules = Math.max(1, Number(rules) || 1);
        const safeAulas = Math.max(0, Number(aulas) || 0);
        const total = safeRules * 9;
        if (safeAulas >= total) return safeRules;
        return safeAulas % safeRules;
    }

    const statusOptions = ["Ativo", "Experimental", "Pausado", "Transferido", "Inativo"];
    const createEmptyStudentForm = () => ({
        nome: "",

        const [searchTerm, setSearchTerm] = React.useState("");

        const [summaryDetail, setSummaryDetail] = React.useState(null);

        const [dashboardFilters, setDashboardFilters] = React.useState({ group: "Todos", faixa: "Todas", status: "Todos", period: "30" });
        const revealDashboardDetail = (detailKey) => {
            setDashboardDetail(detailKey);
            setTimeout(() => {
                document.getElementById("dashboard-detail-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 120);
        };
        const [selectedChatId, setSelectedChatId] = React.useState(null);
        const [conversationSearch, setConversationSearch] = React.useState("");
        const [form, setForm] = React.useState(createEmptyStudentForm);
        const [chatInputs, setChatInputs] = React.useState({});
        const [openChats, setOpenChats] = React.useState({});
        const [degreeDirections, setDegreeDirections] = React.useState({});
        const [modalOpen, setModalOpen] = React.useState(null);
        const [viewImage, setViewImage] = React.useState(null);
        const [editingStudent, setEditingStudent] = React.useState(null);
        const [storageWarning, setStorageWarning] = React.useState("");
        const [isHydrated, setIsHydrated] = React.useState(false);
        const [dbStatus, setDbStatus] = React.useState(appwriteServices ? "Conectando ao Appwrite..." : (supabaseClient ? "Conectando ao Supabase..." : "Banco não configurado"));
        const applyingRemoteRef = React.useRef(false);
        const pendingLocalSaveRef = React.useRef(false);
        const lastLocalChangeRef = React.useRef(0);
        const lastSavedAtRef = React.useRef("");
        const lastLocalSignatureRef = React.useRef("");
        const lastRemoteSignatureRef = React.useRef("");
        const [theme] = React.useState("dark");

        React.useEffect(() => {
            setExpandedSearchStudentId(null);
        }, [searchTerm, filterGroup]);

        React.useEffect(() => {
            document.body.classList.toggle("auth-mode", !mode);
            document.body.classList.toggle("parent-mode", mode === "Pais");
            return () => {
                document.body.classList.remove("auth-mode");
                document.body.classList.remove("parent-mode");

        React.useEffect(() => {

            return () => {
                document.body.classList.remove("theme-light");
                document.body.classList.remove("theme-dark");
            };
        }, [theme]);

        React.useEffect(() => {
            const loadRemoteData = async () => {
                if (appwriteServices) {
                    try {
                        const localStudents = JSON.parse(localStorage.getItem(LOCAL_STUDENTS_KEY) || "[]");
                        const localRepo = JSON.parse(localStorage.getItem(LOCAL_REPO_KEY) || "[]");
                        const localSignature = getDataSignature(localStudents, localRepo);
                        lastLocalSignatureRef.current = localSignature;
                        let data = null;

                        try {
                            data = await getAppwriteState(appwriteServices.config);
                        } catch (err) {
                            if (err.status !== 404) throw err;
                        }

                        if (data) {
                            const remoteStudents = parseRemoteJson(data.students, []);
                            const remoteRepo = parseRemoteJson(data.repo, []);
                            const remoteIsEmpty = remoteStudents.length === 0 && remoteRepo.length === 0;
                            const localHasData = localStudents.length > 0 || localRepo.length > 0;

                            if (remoteIsEmpty && localHasData) {
                                const updatedAt = new Date().toISOString();
                                await saveAppwriteState(appwriteServices.config, localStudents, localRepo, updatedAt);
                                lastSavedAtRef.current = updatedAt;
                                lastRemoteSignatureRef.current = localSignature;
                                applyingRemoteRef.current = true;
                                setStudents(localStudents);
                                setRepo(localRepo);
                                setDbStatus("Base local enviada ao Appwrite");
                            } else {
                                lastSavedAtRef.current = data.updated_at || data.$updatedAt || "";
                                lastRemoteSignatureRef.current = getDataSignature(remoteStudents, remoteRepo);
                                lastLocalSignatureRef.current = lastRemoteSignatureRef.current;
                                applyingRemoteRef.current = true;
                                setStudents(remoteStudents);
                                setRepo(remoteRepo);
                                setDbStatus("Sincronizado com Appwrite");
                            }
                        } else {
                            const updatedAt = new Date().toISOString();
                            await saveAppwriteState(appwriteServices.config, localStudents, localRepo, updatedAt);
                            lastSavedAtRef.current = updatedAt;
                            lastRemoteSignatureRef.current = localSignature;
                            setDbStatus("Dados locais enviados ao Appwrite");
                        }
                    } catch (err) {
                        console.error(err);
                        setDbStatus(getAppwriteErrorMessage(err));
                    } finally {
                        setIsHydrated(true);
                    }
                    return;
                }

                if (!supabaseClient) {
                    setIsHydrated(true);
                    return;
                }

                try {
                    const localStudents = JSON.parse(localStorage.getItem(LOCAL_STUDENTS_KEY) || "[]");
                    const localRepo = JSON.parse(localStorage.getItem(LOCAL_REPO_KEY) || "[]");
                    const localSignature = getDataSignature(localStudents, localRepo);
                    lastLocalSignatureRef.current = localSignature;
                    const { data, error } = await withTimeout(

                return;

            const reader = new FileReader();
            document.getElementById('compress-loader').style.display = 'block';

                try {
                    let finalData = e.target.result;
                    if (isImage) {
                        const imageOptions = type === "avatar"
                            ? { maxWidth: 420, quality: 0.5, limit: FILE_LIMITS.avatar }
                            : type === "repo"
                                ? { maxWidth: 1000, quality: 0.58, limit: FILE_LIMITS.repoImage }
                                : { maxWidth: 820, quality: 0.55, limit: FILE_LIMITS.chatImage };
                        finalData = await compressImage(finalData, imageOptions.maxWidth, imageOptions.quality);
                        if (getBase64Bytes(finalData) > imageOptions.limit) {
                            finalData = await compressImage(finalData, Math.round(imageOptions.maxWidth * 0.75), 0.45);
                        }
                        if (getBase64Bytes(finalData) > imageOptions.limit) {
                            alert(`Imagem muito grande mesmo apos otimizar. Limite: ${formatBytes(imageOptions.limit)}.`);
                            return;
                        }
                    } else if (getBase64Bytes(finalData) > genericLimit) {
                        alert(`Arquivo muito grande. Limite: ${formatBytes(genericLimit)}.`);
                        return;
                    }

                    let uploadedFile = null;

                        const uploadFile = isImage
                            ? dataUrlToFile(finalData, buildStorageFileName(file, type))
                            : new File([file], buildStorageFileName(file, type), { type: file.type || "application/octet-stream" });

                                <div className="bar">
                                    {Array.from({length:rules}).map((_, i) => (
                                        <div key={i} className={`box-class ${i < currentCycleClasses ? 'done' : ''} ${s.aulas >= rules * 9 && i >= currentCycleClasses ? 'locked' : ''}`} onClick={(e) => togglePresenca(s.id, i, e.detail)}>{i+1}</div>
                                    ))}
                                </div>
                            )}

                            <span className="section-label">Graus de Presença</span>
                            <div className="degree-row">
                                {Array.from({length:4}).map((_, i) => {
                                    let c = "";
                                    if (presenceDegreeStates[i] === 2) c = "bg-red";
                                    else if (presenceDegreeStates[i] === 1) c = "bg-white";
                                    return <div key={i} className={`degree-box ${c}`} onClick={() => toggleGrauPresenca(s.id, i)}></div>;
                                })}
                            </div>

                            <span className="section-label">Graus Comportamentais</span>
                            <div className="degree-row" style={{ alignItems: 'flex-end', padding: '15px 12px' }}>
                                {[
                                    {k:'Rel', i:'fa-users', c:'bg-yellow', l:'Relac.'}, 
                                    {k:'Comp', i:'fa-brain', c:'bg-blue', l:'Comp.'}, 
                                    {k:'Notas', i:'fa-graduation-cap', c:'bg-red', l:'Notas'}, 
                                    {k:'Hab', i:'fa-apple-alt', c:'bg-green', l:'Hab.'}
                                ].map(m => (
                                    <div key={m.k} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '800', color: '#888', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{m.l}</span>
                                        <div 
                                            className={`degree-box ${s.comp?.[m.k] ? m.c : ''}`} 
                                            onClick={() => toggleMerito(s.id, m.k, m.l)}
                                            style={{ width: '100%', margin: 0, height: '42px' }}
                                        >
                                            <i className={`fas ${m.i}`} style={{ color: s.comp?.[m.k] ? '#000' : '#444', fontSize: '15px' }}></i>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {mode === "Professor" && pronto && (
                                <button className="btn-full btn-graduar" onClick={() => graduarAlunoComHistorico(s.id)}><i className="fas fa-medal"></i> GRADUAR PARA {beltOrder[beltOrder.indexOf(s.faixa)+1]}</button>
                            )}

                            <details className="hist-details">
                                <summary className="hist-summary"><span><i className="fas fa-medal"></i> Histórico de faixas</span><i className="fas fa-chevron-down"></i></summary>
                                <div className="hist-content" style={{maxHeight:'360px'}}>{renderBeltHistory(s, progresso)}</div>
                            </details>

                            <details className="hist-details">
                                <summary className="hist-summary"><span><i className="fas fa-history"></i> Histórico</span><i className="fas fa-chevron-down"></i></summary>
                                <div className="hist-content">{s.historico?.slice().reverse().map((h, i) => <div key={i} style={{padding:'6px 0', borderBottom:'1px solid #222'}}>{h}</div>)}</div>
                            </details>

                            {mode !== "Professor" && <div className="chat-container" id={`chat-${s.id}`}>
                                <div className="chat-header" onClick={() => { setOpenChats({...openChats, [s.id]: !openChats[s.id]}); if(!openChats[s.id]) setStudents(prev => prev.map(x => x.id === s.id ? {...x, chat: (x.chat||[]).map(m => !(m.readBy || []).includes(mode) ? {...m, readBy: [...(m.readBy || []), mode]} : m)} : x)); }}>
                                    <span style={{fontSize:'12px'}}><i className="fab fa-whatsapp" style={{color: 'var(--whatsapp-green)'}}></i> CONVERSA {unread > 0 && <span style={{background: 'var(--alliance-red)', padding:'2px 6px', borderRadius:'10px', fontSize:'9px', marginLeft:'5px'}}>{unread}</span>}</span>
                                    <i className={`fas fa-chevron-${openChats[s.id] ? 'up' : 'down'}`} style={{fontSize:'10px'}}></i>
                                </div>
                                {openChats[s.id] && (
                                    <>
                                        <div className="chat-msgs">
                                            {s.chat?.map(m => (
                                                <div key={m.id} className={`msg-wrapper ${m.sender === mode ? 'self' : 'other'}`}>
                                                    <span className="msg-author">{m.author}</span>
                                                    <div className="msg-bubble">
                                                        {m.isImage && (m.fileUrl || m.fileData) && <img src={m.fileUrl || m.fileData} className="chat-img-preview" onClick={() => setViewImage(m)} />}
                                                        {!m.isImage && (m.fileUrl || m.fileData) && <a href={m.fileUrl || m.fileData} download={m.fileName} style={{color:'#3498db', textDecoration:'none'}}><i className="fas fa-file-download"></i> {m.fileName}</a>}
                                                        {m.text && <div>{m.text}</div>}
                                                        <div className="msg-meta">{getMessageMeta(m)}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div style={{display:'flex', padding:'12px', background:'#1a1a1a', gap:'10px', alignItems:'center'}}>
                                            <label style={{cursor:'pointer'}}><i className="fas fa-camera" style={{color:'#555'}}></i><input type="file" style={{display:'none'}} accept="image/*" onChange={e => handleFile(e.target.files[0], 'chat', s.id)}/></label>
                                            <input style={{flex:1, border:'none', background:'#000', color:'white', padding:'12px 18px', borderRadius:'25px', fontSize:'14px', margin:0}} placeholder="Mensagem..." value={chatInputs[s.id] || ""} onChange={e => setChatInputs({...chatInputs, [s.id]: e.target.value})} onKeyDown={e => e.key === 'Enter' && sendMessage(s.id)}/>
                                            <i className="fas fa-paper-plane" style={{color: 'var(--alliance-green)', cursor:'pointer'}} onClick={() => sendMessage(s.id)}></i>
                                        </div>
                                    </>
                                )}
                            </div>}
                            </>
                            )}
                        </div>
                    );
                    })}
                    </div>
                )}

                {mode !== "Pais" && mode === "Professor" && professorView === "alunos" && !expandedSearchStudentId && <div className="action-bar">
                    {mode === "Professor" ? (
                        <>
                            <div className="action-item" onClick={() => { setProfessorView("alunos"); setModalOpen('add'); }}><i className="fas fa-user-plus"></i><span>ALUNO</span></div>
                            <div className="action-item" onClick={() => setModalOpen('repo')}><i className="fas fa-folder-open"></i><span>ARQUIVOS</span></div>
                            <div className="action-item" onClick={() => setProfessorView("painel")}><i className="fas fa-chart-pie"></i><span>PAINEL</span></div>
                            <div className="action-item" onClick={() => setProfessorView("conversas")}>
                                {totalUnreadProfessor > 0 && <b className="nav-badge">{totalUnreadProfessor > 99 ? "99+" : totalUnreadProfessor}</b>}
                                <i className="fab fa-whatsapp"></i><span>CONVERSAS</span>
                            </div>
                            <div className="action-item" onClick={() => window.open('https://alliancemooca.com.br/blog/', '_blank')}><i className="fas fa-globe"></i><span>SITE</span></div>
                            <div className="action-item" onClick={() => { setMode(null); setSubMode(null); setAuth({user:'', pass:''}); setSearchTerm(""); }}><i className="fas fa-sign-out-alt"></i><span>SAIR</span></div>
                        </>
                    ) : (
                        <>
                            <div className="action-item" onClick={() => window.open('https://alliancemooca.com.br/blog/', '_blank')}><i className="fas fa-globe"></i><span>SITE</span></div>
                            <div className="action-item" onClick={() => setModalOpen('repo')}><i className="fas fa-folder-open"></i><span>ARQUIVOS</span></div>
                            <div className="action-item" onClick={() => { setMode(null); setSubMode(null); setAuth({user:'', pass:''}); setSearchTerm(""); }}><i className="fas fa-sign-out-alt"></i><span>SAIR</span></div>
                        </>
                    )}
                </div>}

                {/* MODAL BACKUP */}
                {modalOpen === 'backup' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Gestão de Dados</h3>
                            <div className="data-status-card">
                                <span><i className={`fas ${(appwriteServices || supabaseClient) && !dbStatus.includes("Erro") ? "fa-database" : "fa-exclamation-triangle"}`}></i> Banco</span>
                                <strong>{dbStatus}{!isHydrated ? "..." : ""}</strong>
                            </div>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={downloadBackup}>
                                <i className="fas fa-download"></i> GERAR BACKUP (.JSON)
                            </button>
                            <label className="btn-full" style={{background: 'var(--alliance-red)', color:'white', display:'block', textAlign:'center', cursor:'pointer', marginTop:'15px'}}>
                                <i className="fas fa-upload"></i> IMPORTAR BACKUP
                                <input type="file" style={{display:'none'}} accept=".json" onChange={importBackup} />
                            </label>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                        </div>
                    </div>
                )}

                {/* MODAL ADICIONAR ALUNO */}
                {modalOpen === 'add' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Novo Aluno</h3>
                            <input placeholder="Nome Completo" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                            <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                            <select value={form.sexo} onChange={e => setForm({...form, sexo: e.target.value})}>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                            </select>
                            <div className="form-grid">
                                <div>
                                    <label className="field-label">Status</label>
                                    <select value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                        {statusOptions.map(status => <option key={status} value={status}>{status}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="field-label">Matrícula</label>
                                    <input type="date" value={form.matricula} onChange={e => setForm({...form, matricula: e.target.value})} />
                                </div>
                                <input placeholder="Responsável" value={form.responsavel} onChange={e => setForm({...form, responsavel: e.target.value})} />
                                <input placeholder="WhatsApp do responsável" value={form.telefone} onChange={e => setForm({...form, telefone: e.target.value})} />
                                <input placeholder="E-mail do responsável" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                            </div>
                            <textarea placeholder="Observação interna / necessidade especial" value={form.necessidades} onChange={e => setForm({...form, necessidades: e.target.value})}></textarea>
                            <textarea placeholder="Observações internas do professor" value={form.observacoesInternas} onChange={e => setForm({...form, observacoesInternas: e.target.value})}></textarea>
                            <label className="check-row">
                                <input type="checkbox" checked={form.autorizacaoImagem} onChange={e => setForm({...form, autorizacaoImagem: e.target.checked})} />
                                Autorização de uso de imagem
                            </label>
                            <label className="field-label">Turma</label>
                            <select value={form.categoriaOverride} onChange={e => setForm({...form, categoriaOverride: e.target.value})}>
                                {categoryOptions.map(c => <option key={c} value={c}>{c === "Auto" ? `Automática: ${form.nascimento ? getAutoCategory(form.nascimento) : "pela idade"}` : c}</option>)}
                            </select>
                            <label className="field-label">Faixa</label>
                            <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                                {beltOrder.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={() => {
                                if(!form.nome || !form.nascimento) return alert("Preencha tudo!");
                                const nome = form.nome.trim();
                                const exists = students.some(s => s.nome.toLowerCase().trim() === nome.toLowerCase() && s.nascimento === form.nascimento);
                                if (exists) return alert("Este aluno já está cadastrado.");
                                const categoriaTexto = form.categoriaOverride === "Auto" ? getAutoCategory(form.nascimento) : `${form.categoriaOverride} (manual)`;
                                setStudents([...students, { ...form, nome, id: Date.now(), aulas: 0, cicloFaixaInicio: form.matricula || getTodayISO(), beltHistory: [], historico: [`Matrícula realizada em ${new Date().toLocaleDateString('pt-BR')}`, `Turma inicial: ${categoriaTexto}`] }]);
                                setModalOpen(null);
                                setForm(createEmptyStudentForm());
                            }}>SALVAR</button>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>CANCELAR</button>
                        </div>
                    </div>
                )}

                {/* MODAL REPOSITÓRIO */}
                {modalOpen === 'repo' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Arquivos e Materiais</h3>
                            {mode === "Professor" && (
                                <div style={{marginBottom:'20px'}}>
                                    <label className="btn-full" style={{background: 'var(--alliance-red)', color:'white', display:'block', textAlign:'center', cursor:'pointer'}}>
                                        <i className="fas fa-upload"></i> UPLOAD ARQUIVO
                                        <input type="file" style={{display:'none'}} onChange={e => handleFile(e.target.files[0], 'repo')} />
                                    </label>
                                </div>
                            )}
                            <div style={{marginTop:'15px'}}>
                                {repo.length === 0 && <p style={{textAlign:'center', color:'#555'}}>Nenhum arquivo disponível.</p>}
                                {repo.map(r => (
                                    <div key={r.id} className="repo-item">
                                        <div style={{flex:1, overflow:'hidden', marginRight:'10px'}}>
                                            <div style={{fontSize:'13px', fontWeight:'bold', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{r.name}</div>
                                            <div style={{fontSize:'10px', color:'#555'}}>{r.date}</div>
                                        </div>
                                        <div style={{display:'flex', gap:'15px'}}>
                                            <a href={r.fileUrl || r.data} download={r.name} style={{color:'#3498db'}}><i className="fas fa-download"></i></a>
                                            {mode === "Professor" && <i className="fas fa-trash" style={{color:'var(--alliance-red)', cursor:'pointer'}} onClick={() => confirm("Excluir arquivo?") && setRepo(repo.filter(x => x.id !== r.id))}></i>}
                                        </div>
                                    </div>
                                ))}
                                <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* MODAL EDITAR ALUNO */}
                {modalOpen === 'edit' && editingStudent && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Editar Aluno</h3>
                            <input placeholder="Nome" value={editingStudent.nome} onChange={e => setEditingStudent({...editingStudent, nome: e.target.value})} />
                            <input type="date" value={editingStudent.nascimento} onChange={e => setEditingStudent({...editingStudent, nascimento: e.target.value})} />
                            <select value={editingStudent.sexo || "M"} onChange={e => setEditingStudent({...editingStudent, sexo: e.target.value})}>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                            </select>
                            <div className="form-grid">
                                <div>
                                    <label className="field-label">Status</label>
                                    <select value={editingStudent.status || "Ativo"} onChange={e => setEditingStudent({...editingStudent, status: e.target.value})}>
                                        {statusOptions.map(status => <option key={status} value={status}>{status}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="field-label">Matrícula</label>
                                    <input type="date" value={editingStudent.matricula || ""} onChange={e => setEditingStudent({...editingStudent, matricula: e.target.value})} />
                                </div>
                                <input placeholder="Última presença" type="date" value={editingStudent.ultimaPresenca || ""} onChange={e => setEditingStudent({...editingStudent, ultimaPresenca: e.target.value})} />
                                <input placeholder="Responsável" value={editingStudent.responsavel || ""} onChange={e => setEditingStudent({...editingStudent, responsavel: e.target.value})} />
                                <input placeholder="WhatsApp do responsável" value={editingStudent.telefone || ""} onChange={e => setEditingStudent({...editingStudent, telefone: e.target.value})} />
                                <input placeholder="E-mail do responsável" value={editingStudent.email || ""} onChange={e => setEditingStudent({...editingStudent, email: e.target.value})} />
                            </div>
                            <textarea placeholder="Observação interna / necessidade especial" value={editingStudent.necessidades || ""} onChange={e => setEditingStudent({...editingStudent, necessidades: e.target.value})}></textarea>
                            <textarea placeholder="Observações internas do professor" value={editingStudent.observacoesInternas || ""} onChange={e => setEditingStudent({...editingStudent, observacoesInternas: e.target.value})}></textarea>
                            <label className="check-row">
                                <input type="checkbox" checked={!!editingStudent.autorizacaoImagem} onChange={e => setEditingStudent({...editingStudent, autorizacaoImagem: e.target.checked})} />
                                Autorização de uso de imagem
                            </label>
                            <label className="field-label">Turma</label>
                            <select value={editingStudent.categoriaOverride || "Auto"} onChange={e => setEditingStudent({...editingStudent, categoriaOverride: e.target.value})}>
                                {categoryOptions.map(c => <option key={c} value={c}>{c === "Auto" ? `Automática: ${getAutoCategory(editingStudent.nascimento)}` : c}</option>)}
                            </select>
                            <label className="field-label">Faixa</label>
                            <select value={editingStudent.faixa} onChange={e => setEditingStudent({...editingStudent, faixa: e.target.value})}>
                                {beltOrder.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={() => {
                                if(!editingStudent.nome.trim() || !editingStudent.nascimento) return alert("Preencha tudo!");
                                const alunoOriginal = students.find(s => s.id === editingStudent.id);
                                const hoje = new Date().toLocaleDateString('pt-BR');
                                const logs = [];
                                let alunoAtualizado = { ...editingStudent, nome: editingStudent.nome.trim() };

                                if (alunoOriginal && alunoOriginal.faixa !== alunoAtualizado.faixa) {
                                    logs.push(`🎓 FAIXA ALTERADA MANUALMENTE: ${alunoOriginal.faixa} → ${alunoAtualizado.faixa} | ${hoje}`);
                                    const { presenceDegrees, ...semGrausPresenca } = alunoAtualizado;
                                    alunoAtualizado = { ...semGrausPresenca, aulas: 0, comp: {}, cicloFaixaInicio: getTodayISO(), beltHistory: [...(alunoOriginal.beltHistory || []), buildBeltCycleRecord(alunoOriginal, alunoAtualizado.faixa, "Alteracao manual")] };
                                }

                                const categoriaAnterior = alunoOriginal?.categoriaOverride || "Auto";
                                const categoriaNova = alunoAtualizado.categoriaOverride || "Auto";
                                if (alunoOriginal && categoriaAnterior !== categoriaNova) {
                                    logs.push(`🏷️ TURMA ALTERADA: ${categoriaAnterior === "Auto" ? "Automática" : categoriaAnterior} → ${categoriaNova === "Auto" ? "Automática" : categoriaNova} | ${hoje}`);
                                }

                                const statusAnterior = alunoOriginal?.status || "Ativo";
                                const statusNovo = alunoAtualizado.status || "Ativo";
                                if (alunoOriginal && statusAnterior !== statusNovo) {
                                    logs.push(`📌 STATUS ALTERADO: ${statusAnterior} → ${statusNovo} | ${hoje}`);
                                }

                                if (logs.length) alunoAtualizado = { ...alunoAtualizado, historico: [...(alunoOriginal?.historico || []), ...logs] };
                                setStudents(students.map(s => s.id === editingStudent.id ? alunoAtualizado : s));
                                setModalOpen(null);
                            }}>ATUALIZAR</button>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                        </div>
                    </div>
                )}

                {viewImage && (
                    <div className="modal-overlay" onClick={() => setViewImage(null)}>
                        <img src={viewImage.fileUrl || viewImage.fileData} style={{maxWidth:'100%', maxHeight:'90vh', borderRadius:'10px'}} />
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
