<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Jiu Jitsu Kids</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:8px;
}

button{
padding:8px 12px;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.aluno{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca",
"Cinza/Branca",
"Cinza",
"Cinza/Preta",
"Amarela/Branca",
"Amarela",
"Amarela/Preta",
"Laranja/Branca",
"Laranja",
"Laranja/Preta",
"Verde/Branca",
"Verde",
"Verde/Preta"
]

function Login({onLogin}){

const[user,setUser]=React.useState("")
const[pass,setPass]=React.useState("")

function entrar(){

if(user==="professor" && pass==="123"){
onLogin("professor")
return
}

if(pass==="123"){
onLogin("pais")
}

}

return(

<div className="container">

<div className="card">

<h2>Login</h2>

<div className="row">

<input
placeholder="Usuário"
value={user}
onChange={e=>setUser(e.target.value)}
/>

<input
type="password"
placeholder="Senha"
value={pass}
onChange={e=>setPass(e.target.value)}
/>

<button onClick={entrar}>
Entrar
</button>

</div>

</div>

</div>

)

}

function App(){

const[login,setLogin]=React.useState(null)

const[students,setStudents]=React.useState([])

const[nome,setNome]=React.useState("")
const[turma,setTurma]=React.useState("Kids 1")

const[editId,setEditId]=React.useState(null)

if(!login){
return <Login onLogin={setLogin}/>
}

function salvar(){

if(editId){

setStudents(students.map(s=>{

if(s.id===editId){
return{...s,nome,turma}
}

return s

}))

setEditId(null)

}else{

const novo={
id:Date.now(),
nome,
turma,
faixa:"Branca",
aulas:0,
historicoFaixas:[],
historicoGraus:[]
}

setStudents([...students,novo])

}

setNome("")
setTurma("Kids 1")

}

function editarAluno(s){

setNome(s.nome)
setTurma(s.turma)
setEditId(s.id)

}

function presenca(id){

setStudents(students.map(s=>{

if(s.id===id){

return{
...s,
aulas:s.aulas+1
}

}

return s

}))

}

function darGrau(id){

setStudents(students.map(s=>{

if(s.id===id){

return{
...s,
historicoGraus:[
...s.historicoGraus,
{data:new Date().toLocaleDateString()}
]
}

}

return s

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const index=beltOrder.indexOf(s.faixa)

const proxima=
index<beltOrder.length-1
?beltOrder[index+1]
:s.faixa

return{

...s,

historicoFaixas:[
...s.historicoFaixas,
{
faixa:s.faixa,
data:new Date().toLocaleDateString()
}
],

faixa:proxima,
aulas:0,
historicoGraus:[]

}

}))

}

const turmas=[...new Set(students.map(s=>s.turma))]

return(

<div style={{display:"flex",gap:"20px"}}>

<div className="container">

<div className="card">

<h2>Cadastro de Aluno</h2>

<div className="row">

<input
placeholder="Nome"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<select
value={turma}
onChange={e=>setTurma(e.target.value)}
>

<option>Kids 1</option>
<option>Kids 2</option>
<option>Kids 3</option>

</select>

<button onClick={salvar}>
Salvar
</button>

</div>

</div>

{turmas.map(t=>(
<div className="card" key={t}>

<h3>{t}</h3>

{students
.filter(s=>s.turma===t)
.map(s=>(

<div className="aluno" key={s.id}>

<div>

<strong>{s.nome}</strong>

<br/>

Faixa: {s.faixa}

<br/>

Aulas: {s.aulas}

</div>

<div className="row">

<button onClick={()=>presenca(s.id)}>
Presença
</button>

<button onClick={()=>darGrau(s.id)}>
Grau
</button>

<button onClick={()=>trocarFaixa(s.id)}>
Trocar Faixa
</button>

<button onClick={()=>editarAluno(s)}>
Editar
</button>

</div>

</div>

))

}

</div>
))}

</div>

{login==="pais" &&

<div style={{width:"420px"}}>

<div className="card">

<h3>Sistema de Graduação</h3>

<img
src="sistema_graduacao.jpeg"
style={{width:"100%"}}
/>

</div>

</div>

}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
