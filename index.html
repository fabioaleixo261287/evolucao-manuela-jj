<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Sistema Estável</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 10px; }
    .container { max-width: 800px; margin: auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; }
    
    /* Cabeçalho */
    .student-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #075e54; }

    /* Barras Dinâmicas */
    .bar { display: flex; gap: 3px; margin: 5px 0; flex-wrap: wrap; }
    .box { width: 14px; height: 14px; border: 1px solid #999; background: #eee; border-radius: 2px; }
    .box.done { background: #2ecc71; }
    .degree { width: 22px; height: 22px; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

    /* Chat WhatsApp */
    .chat-container { border-radius: 10px; margin-top: 15px; background: #e5ddd5; border: 1px solid #ccc; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #075e54; color: white; padding: 8px 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .chat-msgs { height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .balao { padding: 6px 10px; border-radius: 8px; font-size: 13px; max-width: 80%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .balao.Professor { align-self: flex-end; background: #dcf8c6; }
    .balao.Pais { align-self: flex-start; background: #fff; }
    .chat-input-area { background: #f0f2f5; padding: 8px; display: flex; align-items: center; gap: 8px; }
    .chat-input-area input { flex: 1; border: none; padding: 8px 12px; border-radius: 20px; outline: none; }
    .preview-img { max-width: 100%; border-radius: 5px; margin-top: 5px; cursor: pointer; }

    /* Estilo Botões */
    button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-blue { background: #3498db; color: white; }
    .btn-red { background: #e74c3c; color: white; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// Configurações de Regra de Negócio
const TRAINING_DAYS = [1, 3, 5, 6]; 
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

function getClassesPerDegree(age, belt) {
    if (age >= 3 && age <= 4) return 12;
    if (age >= 13 && age <= 15) {
        if (belt.includes("Verde")) return 25;
        if (belt.includes("Amarela") || belt.includes("Laranja")) return 22;
        return 20;
    }
    if (belt.includes("Amarela") || belt.includes("Laranja")) return 20;
    return 15;
}

function App() {
    const [user, setUser] = useState("");
    const [search, setSearch] = useState("");
    const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem("alliance_data_v3") || "[]"));

    useEffect(() => { localStorage.setItem("alliance_data_v3", JSON.stringify(students)) }, [students]);

    // Lógica Segura para Anexos (Anti-Tela Branca)
    const handleSend = (studentId, text, fileData = null) => {
        if (!text && !fileData) return;
        
        setStudents(prev => prev.map(s => {
            if (s.id !== studentId) return s;
            const newMessage = {
                id: Date.now(),
                sender: user,
                text: text || "Anexo enviado",
                file: fileData?.url || null,
                fileName: fileData?.name || null,
                time: new Date().toLocaleTimeString()
            };
            return { ...s, chat: [...(s.chat || []), newMessage] };
        }));
    };

    const processFile = (studentId, file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            handleSend(studentId, "", { url: e.target.result, name: file.name });
        };
        reader.onerror = () => alert("Erro ao ler arquivo.");
        reader.readAsDataURL(file); // Converte para string segura
    };

    if (!user) return (
        <div style={{textAlign:'center', marginTop:100}}>
            <button className="btn-green" onClick={() => setUser("Professor")}>PROFESSOR</button>
            <button className="btn-blue" style={{marginLeft:10}} onClick={() => {const n=prompt("Nome do Aluno:"); if(n){setSearch(n); setUser("Pais")}}}>PAIS</button>
        </div>
    );

    const list = user === "Professor" ? students : students.filter(s => s.nome.toLowerCase() === search.toLowerCase());

    return (
        <div className="container">
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
                <b>Alliance Jiu Jitsu</b>
                <button onClick={() => setUser("")}>Sair</button>
            </div>

            {user === "Professor" && (
                <button className="btn-green" onClick={() => {
                    const n = prompt("Nome:");
                    const d = prompt("Nascimento (AAAA-MM-DD):");
                    if(n && d) setStudents([...students, {id:Date.now(), nome:n, nascimento:d, idade: 7, faixa:"Branca", aulas:0, chat:[], hGraus:[], hComp:[], hFaixas:[]}]);
                }}>+ Novo Aluno</button>
            )}

            {list.map(s => {
                const limit = getClassesPerDegree(s.idade, s.faixa);
                const totalGraus = Math.floor(s.aulas / limit);
                const brancos = Math.min(totalGraus, 4);
                const vermelhos = Math.max(totalGraus - 4, 0);

                return (
                    <div key={s.id} className="card">
                        <div className="student-header">
                            <img src="https://via.placeholder.com/60" className="avatar" />
                            <div>
                                <b>{s.nome}</b><br/>
                                <small>{s.faixa} | {limit} aulas/grau</small>
                            </div>
                        </div>

                        <div className="bar">
                            {[...Array(limit)].map((_, i) => <div key={i} className={`box ${i < (s.aulas % limit) ? 'done' : ''}`}></div>)}
                        </div>

                        <div className="bar">
                            {[...Array(4)].map((_, i) => (
                                <div key={i} className="degree" style={{background: i < vermelhos ? '#e74c3c' : (i < brancos ? '#fff' : '#ddd')}}>
                                    {i+1}
                                </div>
                            ))}
                        </div>

                        {user === "Professor" && (
                            <div style={{marginTop:10, display:'flex', gap:5}}>
                                <button className="btn-blue" onClick={() => setStudents(students.map(st => st.id===s.id ? {...st, aulas: st.aulas+1} : st))}>+ Presença</button>
                            </div>
                        )}

                        <div className="chat-container">
                            <div className="chat-header"><i className="fab fa-whatsapp"></i> Chat Alliance</div>
                            <div className="chat-msgs">
                                {s.chat?.map(m => (
                                    <div key={m.id} className={`balao ${m.sender}`}>
                                        {m.file && (
                                            <a href={m.file} download={m.fileName}>
                                                {m.file.startsWith("data:image") ? <img src={m.file} className="preview-img" /> : <div>📄 {m.fileName}</div>}
                                            </a>
                                        )}
                                        <div>{m.text}</div>
                                        <small style={{fontSize:9, opacity:0.5}}>{m.time}</small>
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer'}}><i className="fas fa-paperclip"></i>
                                    <input type="file" style={{display:'none'}} onChange={e => processFile(s.id, e.target.files[0])} />
                                </label>
                                <input id={`in-${s.id}`} placeholder="Mensagem..." onKeyDown={e => {if(e.key==='Enter'){ handleSend(s.id, e.target.value); e.target.value="" }}} />
                                <button onClick={() => {const i=document.getElementById(`in-${s.id}`); handleSend(s.id, i.value); i.value=""}}><i className="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
