<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema Jiu Jitsu Infantil</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:20px
}

.layout{
display:flex;
gap:20px
}

.container{
flex:1
}

.sidebar{
width:320px
}

.card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.studentHeader{
display:flex;
align-items:center;
gap:10px
}

.avatar{
width:60px;
height:60px;
border-radius:50%
}

.bar{
display:flex;
gap:4px;
margin-top:4px
}

.box{
width:18px;
height:18px;
border:1px solid #999;
background:#eee
}

.done{
background:#4CAF50
}

.degree{
width:28px;
height:28px;
border-radius:6px;
border:1px solid #777;
background:#ddd
}

.btn{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white
}

.blue{background:#3498db}
.orange{background:#f39c12}
.red{background:#e74c3c}

.sidebar img{
width:100%;
margin-bottom:10px;
border-radius:8px
}

.history{
font-size:13px;
margin-top:10px
}

.turmaTitulo{
margin-top:30px;
border-bottom:2px solid #ddd;
padding-bottom:5px
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca",
"Cinza/Branca",
"Cinza",
"Cinza/Preta",
"Amarela/Branca",
"Amarela",
"Amarela/Preta",
"Laranja/Branca",
"Laranja",
"Laranja/Preta",
"Verde/Branca",
"Verde",
"Verde/Preta"
]

const turmas=[
"BABY EAGLE",
"LITTLE EAGLE",
"EAGLE WARRIOR",
"EAGLE YOUTH"
]

function calcularIdade(dataNascimento){

const hoje=new Date()
const nasc=new Date(dataNascimento)

let idade=hoje.getFullYear()-nasc.getFullYear()

const m=hoje.getMonth()-nasc.getMonth()

if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())){
idade--
}

return idade

}

function definirTurma(idade){

if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"

return "FORA DA CATEGORIA"

}

function ClassesBar({aulas}){

return(

<div className="bar">

{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return <div key={i} className={"box "+(done?"done":"")}></div>

})}

</div>

)

}

function PresenceBar({graus}){

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<graus) color="#fff"

return(

<div
key={i}
className="degree"
style={{background:color}}
></div>

)

})}

</div>

)

}

function App(){

const [students,setStudents]=React.useState(()=>{

const saved=localStorage.getItem("jiujitsu_sistema")

return saved?JSON.parse(saved):[]

})

const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")

React.useEffect(()=>{

localStorage.setItem(
"jiujitsu_sistema",
JSON.stringify(students)
)

},[students])

function addStudent(){

if(!nome || !nascimento) return

const idade=calcularIdade(nascimento)

const turma=definirTurma(idade)

setStudents([

...students,

{
id:Date.now(),
nome,
nascimento,
idade,
turma,
faixa:"Branca",
aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}

])

setNome("")
setNascimento("")

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

const novas=s.aulas+1

let historicoGraus=s.historicoGraus

if(novas%15===0){

historicoGraus=[
...historicoGraus,
{grau:Math.floor(novas/15),data}
]

}

return{

...s,

aulas:novas,

historicoAulas:[
...s.historicoAulas,
{data}
],

historicoGraus

}

}))

}

function changeBelt(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const index=beltOrder.indexOf(s.faixa)

if(index===beltOrder.length-1) return s

const novaFaixa=beltOrder[index+1]

const data=new Date().toLocaleDateString()

return{

...s,

faixa:novaFaixa,

historicoFaixas:[
...s.historicoFaixas,
{
de:s.faixa,
para:novaFaixa,
data
}
],

aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}

}))

}

return(

<div className="layout">

<div className="container">

<div className="card">

<h3>Novo aluno</h3>

<input
placeholder="Nome"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<input
type="date"
value={nascimento}
onChange={e=>setNascimento(e.target.value)}
/>

<button className="btn blue" onClick={addStudent}>
Adicionar
</button>

</div>

{turmas.map(turma=>{

const alunosTurma=students.filter(s=>s.turma===turma)

if(alunosTurma.length===0) return null

return(

<div key={turma}>

<h2 className="turmaTitulo">
{turma}
</h2>

{alunosTurma.map(s=>{

const graus=Math.floor(s.aulas/15)

const faltam=135-s.aulas

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src="avatar.png" className="avatar"/>

<div>

<h3>{s.nome}</h3>

{s.idade} anos

</div>

</div>

<p>Faixa: {s.faixa}</p>

<p>Aulas</p>

<ClassesBar aulas={s.aulas}/>

<p>Graus presença</p>

<PresenceBar graus={graus}/>

<br/>

<button
className="btn blue"
onClick={()=>addAttendance(s.id)}
>
Presença
</button>

<button
className="btn orange"
onClick={()=>changeBelt(s.id)}
>
Troca de Faixa
</button>

<p>

Faltam {faltam} aulas para exame

</p>

</div>

)

})}

</div>

)

})}

</div>

<div className="sidebar">

<img src="graus_coloridos.jpeg"/>

<img src="sistema_graduacao.jpeg"/>

</div>

</div>

)

}

ReactDOM
.createRoot(document.getElementById("root"))
.render(<App/>)

</script>

</body>
</html>
