<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }

button { padding:10px 18px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
button.orange { background:#f39c12; }

/* Bolinhas de Aula Numeradas */
.bar-bolinhas { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
.bolinha-aula { 
    width:40px; height:40px; border-radius:50%; border:2px solid #ddd; 
    display:flex; align-items:center; justify-content:center; 
    font-size:14px; background:#fff; color:#777; cursor: pointer; font-weight: bold;
}
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }

/* Graus de Presença */
.degree-bar { display: flex; gap: 5px; margin-bottom: 10px; }
.degree { width:28px; height:28px; border:1px solid #333; border-radius:4px; background:#ddd; }

/* Comportamentais */
.beh-row { display: flex; gap: 15px; margin: 15px 0; }
.beh-circle { width:45px; height:45px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; cursor:pointer; border:1px solid #ccc; font-size:11px; text-align:center; line-height:1; }

/* Chat WhatsApp Style */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 20px; overflow: hidden; }
.chat-messages { height:300px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; }
.msg { padding:12px 16px; border-radius:10px; font-size:14px; max-width:85%; position:relative; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.msg-sender { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; color: #075e54; }

.chat-input-area { display:flex; gap:10px; padding:15px; background:#f0f0f0; border-top: 1px solid #ddd; align-items: center; }
.chat-input-area textarea { flex:1; border:none; padding:12px; border-radius:10px; outline: none; font-size: 15px; height: 50px; resize: none; font-family: inherit; }

/* Histórico */
.history-box { font-size: 12px; color: #555; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; max-height: 120px; overflow-y: auto; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const INFANTIL_BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

// Função para definir regras por idade e faixa (Infantil)
function getInfantilRules(nascimento, faixa) {
    const hoje = new Date();
    const nasc = new Date(nascimento);
    let idade = hoje.getFullYear() - nasc.getFullYear();
    if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;

    const isWhiteGray = faixa.includes("Branca") || faixa.includes("Cinza");
    const isYellowOrange = faixa.includes("Amarela") || faixa.includes("Laranja");
    const isGreen = faixa.includes("Verde");

    if (idade >= 4 && idade <= 5) return { programa: "Baby Eagle", meta: 12 };
    if (idade >= 6 && idade <= 8) return { programa: "Little Eagle", meta: isWhiteGray ? 15 : 20 };
    if (idade >= 9 && idade <= 12) return { programa: "Eagle Warrior", meta: isWhiteGray ? 15 : 20 };
    if (idade >= 13 && idade <= 15) {
        if (isWhiteGray) return { programa: "Eagle Youth", meta: 20 };
        if (isYellowOrange) return { programa: "Eagle Youth", meta: 22 };
        if (isGreen) return { programa: "Eagle Youth", meta: 25 };
    }
    return { programa: "N/A", meta: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_infantil_db_v1") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_infantil_db_v1", JSON.stringify(students)) }, [students]);

    const addStudent = () => {
        if (!form.nome || !form.nascimento) return;
        setStudents([...students, {
            id: Date.now(), ...form, avatar: "https://via.placeholder.com/75",
            aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], comportamental: {}
        }]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    const markClass = (id, aulaNum) => {
        if (user !== "professor") return;
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const rules = getInfantilRules(s.nascimento, s.faixa);
            
            // Toggle aula
            let novaContagem = (s.aulasNoCiclo === aulaNum) ? aulaNum - 1 : aulaNum;
            let hist = [...s.history];
            
            if (novaContagem > s.aulasNoCiclo) {
                hist.unshift({ date: new Date().toLocaleDateString(), msg: `Presença: Aula ${novaContagem}` });
            }

            // Ganhou Grau?
            if (novaContagem === rules.meta) {
                alert(`Parabéns! Ciclo de ${rules.meta} aulas concluído. 1 Grau adicionado!`);
                hist.unshift({ date: new Date().toLocaleDateString(), msg: `CONQUISTA: Grau nº ${s.grausGanhos + 1}` });
                return { ...s, aulasNoCiclo: 0, grausGanhos: s.grausGanhos + 1, history: hist };
            }

            return { ...s, aulasNoCiclo: novaContagem, history: hist };
        }));
    };

    const changeBelt = (id) => {
        if (!confirm("Deseja realizar a troca de faixa deste aluno?")) return;
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const idx = INFANTIL_BELTS.indexOf(s.faixa);
            const proxima = INFANTIL_BELTS[idx + 1] || s.faixa;
            const hist = [...s.history];
            hist.unshift({ date: new Date().toLocaleDateString(), msg: `GRADUAÇÃO: Troca para faixa ${proxima}` });
            return { ...s, faixa: proxima, grausGanhos: 0, aulasNoCiclo: 0, history: hist };
        }));
    };

    const sendMsg = (id, text, file = null) => {
        if (!text.trim() && !file) return;
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const msg = { 
                id: Date.now(), 
                sender: user === "professor" ? "Professor" : "Pais", 
                text, file, 
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
            };
            return { ...s, chat: [...(s.chat || []), msg] };
        }));
    };

    const handleFile = (id, e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => sendMsg(id, "", { name: file.name, data: ev.target.result, type: file.type });
        reader.readAsDataURL(file);
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db', width:'100%'}}>Acesso Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h1 style={{color:'#075e54'}}>Alliance Infantil</h1>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {INFANTIL_BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button className="green" onClick={addStudent}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome completo do aluno..." style={{width:'100%'}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getInfantilRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <img src={s.avatar} className="avatar" style={{width:75, height:75, borderRadius:'50%'}} />
                            <div>
                                <h2 style={{margin:0}}>{s.nome}</h2>
                                <span style={{color:'#666'}}>{rules.programa} | Faixa {s.faixa}</span>
                            </div>
                        </div>

                        <div style={{marginTop:15}}><b>Aulas para o Próximo Grau (Meta: {rules.meta} aulas):</b></div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.meta }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i + 1)}>{i + 1}</div>
                            ))}
                        </div>

                        <div style={{marginTop:15}}><b>Graus de Presença ({s.grausGanhos}):</b></div>
                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div style={{marginTop:15}}><b>Graus Comportamentais:</b></div>
                        <div className="beh-row">
                            {['REL', 'COM', 'NOT', 'HAB'].map(k => (
                                <div key={k} className="beh-circle" 
                                     style={{ background: s.comportamental[k] ? '#2ecc71' : '#eee', color: s.comportamental[k] ? '#fff' : '#888' }}
                                     onClick={() => user === "professor" && setStudents(students.map(st => st.id === s.id ? {...st, comportamental: {...st.comportamental, [k]: !st.comportamental[k]}} : st))}>
                                     {k}
                                </div>
                            ))}
                        </div>

                        {user === "professor" && (
                            <button className="orange" style={{marginTop:10}} onClick={() => changeBelt(s.id)}>Trocar de Faixa</button>
                        )}

                        <div className="history-box">
                            <strong>Histórico:</strong>
                            {s.history.map((h, i) => <div key={i}>[{h.date}] {h.msg}</div>)}
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {(s.chat || []).map(m => (
                                    <div key={m.id} className={`msg ${m.sender === (user === "professor" ? "Professor" : "Pais") ? 'sent' : 'received'}`}>
                                        <span className="msg-sender">{m.sender}</span>
                                        {m.file && (m.file.type.startsWith('image/') ? <img src={m.file.data} style={{maxWidth:'100%', borderRadius:8}} /> : <a href={m.file.data} download={m.file.name}>📄 {m.file.name}</a>)}
                                        {m.text && <div>{m.text}</div>}
                                        <small style={{fontSize:9, opacity:0.6}}>{m.time}</small>
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer', fontSize:20}}>📎<input type="file" hidden onChange={e => handleFile(s.id, e)}/></label>
                                <textarea id={`in-${s.id}`} placeholder="Digite uma mensagem..." onKeyDown={e => {if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(s.id, e.target.value); e.target.value = ""; }}}></textarea>
                                <button onClick={() => {const i = document.getElementById(`in-${s.id}`); sendMsg(s.id, i.value); i.value = ""; }}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
