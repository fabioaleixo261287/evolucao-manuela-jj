```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Evolução Jiu Jitsu </title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#eef1f5;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

input,select{
padding:7px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:7px 12px;
border:none;
border-radius:8px;
background:#3498db;
color:white;
cursor:pointer;
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

.studentHeader{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.avatar{
width:44px;
height:44px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#3498db,#6dd5fa);
font-size:18px;
}

.beltContainer{
display:flex;
align-items:center;
gap:10px;
margin-top:6px;
}

.belt{
width:160px;
height:16px;
border-radius:6px;
border:1px solid #333;
position:relative;
overflow:hidden;
}

.belt::after{
content:"";
position:absolute;
inset:0;
background-image:repeating-linear-gradient(
45deg,
rgba(255,255,255,0.15) 0px,
rgba(255,255,255,0.15) 2px,
transparent 2px,
transparent 6px
);
opacity:.4;
}

.beltTip{
display:flex;
background:black;
padding:3px;
gap:2px;
border-radius:3px;
}

.beltDegree{
width:9px;
height:14px;
background:white;
transform:scale(0);
animation:pop .35s ease forwards;
}

@keyframes pop{
to{transform:scale(1)}
}

.beltEmpty{
width:9px;
height:14px;
}

.progressBar{
height:6px;
background:#e5e7eb;
border-radius:6px;
margin-top:6px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#2ecc71;
}

.beh{
width:22px;
height:22px;
border-radius:50%;
background:#eee;
cursor:pointer;
transition:.2s;
}

.beh:hover{
transform:scale(1.1);
}

.behRow{
display:flex;
gap:6px;
margin-top:10px;
}

.ready{
background:#d4edda;
padding:8px;
border-radius:6px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza","Amarela","Laranja","Verde"
]

const beltColors={
"Branca":"#f5f5f5",
"Cinza":"#9ca3af",
"Amarela":"#facc15",
"Laranja":"#fb923c",
"Verde":"#16a34a"
}

const trainingDays=[1,3,5]

function estimateDate(aulas){
let date=new Date()
let count=0

while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}

return date.toLocaleDateString()
}

function Avatar({nome}){

const initial=nome.charAt(0).toUpperCase()

return(
<div className="avatar">
{initial}
</div>
)

}

function Belt({faixa,graus,aulas}){

const progresso=(aulas%15)/15*100

return(

<div>

<div className="beltContainer">

<div
className="belt"
style={{background:beltColors[faixa]}}
></div>

<div className="beltTip">

{Array.from({length:4}).map((_,i)=>{

if(i<graus){
return <div key={i} className="beltDegree"></div>
}

return <div key={i} className="beltEmpty"></div>

})}

</div>

</div>

<div className="progressBar">
<div
className="progressFill"
style={{width:progresso+"%"}}
></div>
</div>

</div>

)

}

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("jj_students")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("jj_students",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome)return

setStudents([...students,{
id:Date.now(),
...form,
aulas:0,
historico:[],
comportamental:{
relacionamento:false,
comportamento:false,
notas:false,
habitos:false
}
}])

setForm({nome:"",idade:"",faixa:"Branca"})
}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const novas=s.aulas+1

return{
...s,
aulas:novas,
historico:[...s.historico,new Date().toLocaleDateString()]
}

}))

}

function toggleBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
comportamental:{
...s.comportamental,
[key]:!s.comportamental[key]
}
}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return

setStudents(students.filter(s=>s.id!==id))

}

return(

<div className="container">

<h1>🥋 Evolução Jiu Jitsu</h1>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button
className="green"
onClick={addStudent}
>
Adicionar
</button>

</div>

</div>

{students.map(s=>{

const graus=Math.floor(s.aulas/15)
const faltam=Math.max(15-(s.aulas%15),0)

return(

<div
key={s.id}
className="card"
>

<div className="studentHeader">

<Avatar nome={s.nome}/>

<div>
<b>{s.nome}</b><br/>
<span style={{fontSize:13,color:"#666"}}>
{s.idade} anos
</span>
</div>

</div>

<Belt
faixa={s.faixa}
graus={graus}
aulas={s.aulas}
/>

<div style={{marginTop:6,fontSize:13}}>
Faltam {faltam} aulas para próximo grau
</div>

<div className="behRow">

<div
className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={()=>toggleBehavior(s.id,"relacionamento")}
></div>

<div
className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={()=>toggleBehavior(s.id,"comportamento")}
></div>

<div
className="beh"
style={{background:s.comportamental.notas?"#e74c3c":"#eee"}}
onClick={()=>toggleBehavior(s.id,"notas")}
></div>

<div
className="beh"
style={{background:s.comportamental.habitos?"#2ecc71":"#eee"}}
onClick={()=>toggleBehavior(s.id,"habitos")}
></div>

</div>

<div style={{marginTop:10}}>

<button
onClick={()=>addAttendance(s.id)}
>
Registrar presença
</button>

<button
className="red"
onClick={()=>removeStudent(s.id)}
style={{marginLeft:6}}
>
Excluir
</button>

</div>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
```
