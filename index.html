```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.layout{
display:flex;
gap:20px
}

.container{
flex:1
}

.sidebar{
width:400px
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden
}

.progressFill{
height:100%;
background:#27ae60
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.turmaTitle{
margin-top:20px;
font-size:20px
}

.login{
max-width:300px;
margin:auto;
margin-top:120px
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}

return date.toLocaleDateString()

}

function Login({onLogin}){

const[user,setUser]=React.useState("")
const[pass,setPass]=React.useState("")

function entrar(){

if(user==="professor" && pass==="123"){
onLogin("professor")
return
}

if(pass==="123"){
onLogin("pais")
}

}

return(

<div className="login card">

<h2>Login</h2>

<div className="row">

<input placeholder="Usuário" value={user} onChange={e=>setUser(e.target.value)}/>

<input type="password" placeholder="Senha" value={pass} onChange={e=>setPass(e.target.value)}/>

<button onClick={entrar}>Entrar</button>

</div>

</div>

)

}

function App(){

const[login,setLogin]=React.useState(null)

const[students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_preview_v3")
return saved?JSON.parse(saved):[]
})

const[editId,setEditId]=React.useState(null)

const[form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca",
turma:"Baby"
})

React.useEffect(()=>{
localStorage.setItem("academia_preview_v3",JSON.stringify(students))
},[students])

if(!login){
return <Login onLogin={setLogin}/>
}

function addStudent(){

if(!form.nome) return

setStudents([...students,{

id:Date.now(),
...form,
avatar:"avatar.png",

aulas:0,
historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixa:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

setForm({
nome:"",
idade:"",
faixa:"Branca",
turma:"Baby"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()
const novas=s.aulas+1

let historico=s.historicoGraus

if(novas%15===0){
historico=[...historico,{grau:Math.floor(novas/15),data}]
}

return{
...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico
}

}))

}

function editStudent(s){

setEditId(s.id)

setForm({
nome:s.nome,
idade:s.idade,
faixa:s.faixa,
turma:s.turma
})

}

function saveEdit(){

setStudents(students.map(s=>{
if(s.id!==editId) return s
return{...s,...form}
}))

setEditId(null)

setForm({
nome:"",
idade:"",
faixa:"Branca",
turma:"Baby"
})

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return
setStudents(students.filter(s=>s.id!==id))

}

function progress(aulas){
return Math.min((aulas/128)*100,100)
}

const turmas=[...new Set(students.map(s=>s.turma))]

return(

<div className="layout">

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

<div className="card">

<div className="row">

<input placeholder="Nome" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>

<input placeholder="Idade" value={form.idade} onChange={e=>setForm({...form,idade:e.target.value})}/>

<select value={form.faixa} onChange={e=>setForm({...form,faixa:e.target.value})}>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<select value={form.turma} onChange={e=>setForm({...form,turma:e.target.value})}>
<option>Baby</option>
<option>Kids</option>
<option>Infantil</option>
</select>

{editId ?

<button className="orange" onClick={saveEdit}>
Salvar
</button>

:

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

}

</div>

</div>

{turmas.map(turma=>(

<div key={turma}>

<div className="turmaTitle">
🥋 Turma {turma}
</div>

{students.filter(s=>s.turma===turma).map(s=>{

const faltam=Math.max(128-s.aulas,0)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>
<b>{s.nome}</b><br/>
{s.idade} anos
</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:8}}>Progresso da faixa</div>

<div className="progress">
<div className="progressFill" style={{width:progress(s.aulas)+"%"}}></div>
</div>

<div style={{marginTop:8}}>
Faltam {faltam} aulas
</div>

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="orange" onClick={()=>editStudent(s)}>
Editar
</button>

<button className="red" onClick={()=>removeStudent(s.id)}>
Excluir
</button>

</div>

</div>

)

})}

</div>

))}

</div>

<div className="sidebar">

<div className="card">

<h3>Graus Coloridos</h3>

<img src="graus_coloridos.jpeg" style={{width:"100%"}}/>

</div>

<div className="card">

<h3>Sistema de Graduação</h3>

<img src="sistema_graduacao.jpeg" style={{width:"100%"}}/>

</div>

</div>

</div>

)

}

ReactDOM
.createRoot(document.getElementById("root"))
.render(<App/>)

</script>

</body>
</html>
