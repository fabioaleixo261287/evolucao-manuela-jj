<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Sistema Eagle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#e5ddd5; margin:0; padding:20px }
.container{ max-width:900px; margin:auto }
.card{ background:white; padding:18px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1) }
.row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }

button{ padding:8px 14px; border:none; border-radius:6px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button:disabled{ background:#ccc; cursor:not-allowed }
button.red{background:#e74c3c}
button.green{background:#25d366}

/* Bolinhas de Aula Numeradas Clicáveis */
.bar-bolinhas{ display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 }
.bolinha-aula{ 
    width:32px; height:32px; border-radius:50%; border:1px solid #ccc; 
    display:flex; align-items:center; justify-content:center; 
    font-size:12px; background:#fff; color:#666; cursor: pointer; 
    transition: 0.2s; font-weight: bold;
}
.bolinha-aula.done{ background:#25d366; color:white; border-color:#128c7e }

.degree{ width:22px; height:22px; border:1px solid #555; border-radius:3px; background:#ddd; margin-right:3px; }
.beh{ width:28px; height:28px; border-radius:50%; background:#eee; border:1px solid #ccc; cursor:pointer; display:flex; align-items:center; justify-content:center; }

.avatar-container { position: relative; width: 70px; height: 70px; margin-right: 15px; }
.avatar{ width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid #075e54; cursor: pointer; }

/* CHAT ESTILO WHATSAPP */
.chat-wrapper { background: #efe7dd url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); border-radius: 10px; overflow: hidden; border: 1px solid #ccc; }
.chat-messages{ height:300px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg{ padding:8px 12px; border-radius:8px; font-size:14px; max-width:85%; position:relative; box-shadow:0 1px 1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
.msg.sent{ background:#dcf8c6; align-self:flex-end; border-top-right-radius:0; }
.msg.received{ background:#fff; align-self:flex-start; border-top-left-radius:0; }
.msg-time { font-size: 10px; color: #888; align-self: flex-end; margin-top: 4px; }
.msg-del { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 15px; height: 15px; display: none; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
.msg:hover .msg-del { display: flex; }

.preview-img { max-width: 200px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
.chat-input-area{ display:flex; gap:8px; padding:10px; background:#f0f0f0; align-items: center; }
.chat-input-area input[type=text]{ flex:1; border:none; padding:12px; border-radius:25px; outline: none; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder = ["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"];

function getAge(date){
  const hoje=new Date(); const nasc=new Date(date);
  let idade=hoje.getFullYear()-nasc.getFullYear();
  if(hoje.getMonth()<nasc.getMonth() || (hoje.getMonth()===nasc.getMonth() && hoje.getDate()<nasc.getDate())) idade--;
  return idade;
}

function App(){
  const [user, setUser] = React.useState("");
  const [filho, setFilho] = React.useState("");
  const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_pro_v5") || "[]"));
  const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

  React.useEffect(() => { localStorage.setItem("alliance_pro_v5", JSON.stringify(students)) }, [students]);

  const addStudent = () => {
    if (!form.nome) return;
    setStudents([...students, {
      id: Date.now(), ...form, avatar: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
      aulas: 0, chat: [], historicoGraus: [], historicoComportamental: [],
      comportamental: { relacionamento: null, comportamento: null, notas: null, habitos: null }
    }]);
    setForm({ nome: "", nascimento: "", faixa: "Branca" });
  };

  // Toggle de aula (Marcar/Desmarcar)
  const toggleClass = (studentId, index) => {
    if (user !== "professor") return;
    setStudents(students.map(s => {
      if (s.id !== studentId) return s;
      const cicloAtual = Math.floor(s.aulas / 15) * 15;
      const aulaClicada = index + 1;
      const novasAulas = cicloAtual + aulaClicada;
      
      // Se clicar na aula que ele já tem, ele "volta" uma
      const resultado = (s.aulas === novasAulas) ? novasAulas - 1 : novasAulas;
      return { ...s, aulas: Math.max(0, Math.min(135, resultado)) };
    }));
  };

  const sendChat = (studentId, text, file = null) => {
    if (!text.trim() && !file) return;
    const newMessage = {
      id: Date.now(),
      sender: user,
      text: text,
      file: file,
      time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };
    setStudents(students.map(s => s.id === studentId ? { ...s, chat: [...(s.chat || []), newMessage] } : s));
  };

  const deleteMsg = (studentId, msgId) => {
    setStudents(students.map(s => s.id === studentId ? { ...s, chat: s.chat.filter(m => m.id !== msgId) } : s));
  };

  const handleFileUpload = (studentId, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      sendChat(studentId, "", { name: file.name, type: file.type, data: event.target.result });
    };
    reader.readAsDataURL(file);
  };

  if (!user) return (
    <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
      <h2 style={{color: '#075e54'}}>Alliance Login</h2>
      <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
      <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db', width:'100%'}}>Acesso Pais</button>
    </div>
  );

  const lista = user === "pais" ? students.filter(s => s.nome === filho) : students;

  return (
    <div className="container">
      <div className="row" style={{justifyContent:'space-between'}}>
        <h1>Alliance Eagle</h1>
        <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
      </div>

      {user === "professor" && (
        <div className="card">
          <div className="row">
            <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
            <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
            <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
              {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
            <button className="green" onClick={addStudent}>+ Aluno</button>
          </div>
        </div>
      )}

      {user === "pais" && !filho && (
        <div className="card">
          <input placeholder="Nome exato do aluno" style={{width:'100%'}} onKeyDown={e => e.key === 'Enter' && setFilho(e.target.value)} />
        </div>
      )}

      {lista.map(s => {
        const aulasNoCiclo = s.aulas % 15 === 0 && s.aulas > 0 ? 15 : s.aulas % 15;
        return (
          <div key={s.id} className="card">
            <div className="row">
              <div className="avatar-container">
                <img src={s.avatar} className="avatar" onClick={() => {if(user==="professor"){const u=prompt("URL da foto:"); if(u) setStudents(students.map(st=>st.id===s.id?{...st, avatar:u}:st))}}} />
              </div>
              <div>
                <h3 style={{margin:0}}>{s.nome}</h3>
                <span>{s.faixa} | {s.aulas} aulas totais</span>
              </div>
            </div>

            <div style={{marginTop:10}}><b>Progresso para o Grau (1-15):</b></div>
            <div className="bar-bolinhas">
              {Array.from({ length: 15 }).map((_, i) => (
                <div key={i} 
                     className={`bolinha-aula ${i < aulasNoCiclo ? 'done' : ''}`}
                     onClick={() => toggleClass(s.id, i)}>
                  {i + 1}
                </div>
              ))}
            </div>

            <div style={{marginTop:15}}><b>Graus Conquistados:</b></div>
            <div className="row">
              {Array.from({ length: 8 }).map((_, i) => (
                <div key={i} className="degree" style={{ background: i < Math.floor(s.aulas / 15) ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
              ))}
            </div>

            {/* CHAT INTEGRADO */}
            <div style={{marginTop:20}}><b>Chat com {user === 'professor' ? 'Pais' : 'Professor'}</b></div>
            <div className="chat-wrapper">
              <div className="chat-messages" id={`chat-${s.id}`}>
                {(s.chat || []).map(m => (
                  <div key={m.id} className={`msg ${m.sender === user ? 'sent' : 'received'}`}>
                    <div className="msg-del" onClick={() => deleteMsg(s.id, m.id)}>x</div>
                    {m.file && (
                      m.file.type.startsWith('image/') ? 
                      <img src={m.file.data} className="preview-img" onClick={() => window.open(m.file.data)} /> :
                      <a href={m.file.data} download={m.file.name} style={{fontSize:12}}>📄 {m.file.name}</a>
                    )}
                    {m.text && <span>{m.text}</span>}
                    <span className="msg-time">{m.time}</span>
                  </div>
                ))}
              </div>
              <div className="chat-input-area">
                <label style={{cursor:'pointer', fontSize:20}}>📎
                  <input type="file" style={{display:'none'}} onChange={(e) => handleFileUpload(s.id, e)} />
                </label>
                <input 
                  type="text" 
                  placeholder="Mensagem..." 
                  onKeyDown={e => {
                    if(e.key === 'Enter'){
                      sendChat(s.id, e.target.value);
                      e.target.value = "";
                    }
                  }} 
                />
                <button onClick={(e) => {
                  const input = e.target.previousSibling;
                  sendChat(s.id, input.value);
                  input.value = "";
                }}>➤</button>
              </div>
            </div>

            {user === "professor" && (
              <div style={{marginTop:15}}>
                <button className="red" onClick={() => confirm("Remover?") && setStudents(students.filter(x=>x.id!==s.id))}>Excluir Aluno</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
