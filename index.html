<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu Mooca - Alliance Jiu Jitsu Mooca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
    .container { max-width: 900px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
    
    /* Cabeçalho do Aluno */
    .student-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .avatar-wrapper { position: relative; width: 80px; height: 80px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }
    .edit-avatar { position: absolute; bottom: 0; right: 0; background: #3498db; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid white; }

    /* Barras */
    .bar { display: flex; gap: 4px; margin: 8px 0; flex-wrap: wrap; }
    .box { width: 16px; height: 16px; border: 1px solid #999; background: #eee; border-radius: 2px; }
    .box.done { background: #2ecc71; border-color: #27ae60; }
    .degree { width: 24px; height: 24px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }

    /* Comportamental */
    .beh-row { display: flex; gap: 15px; margin: 15px 0; }
    .beh-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
    .beh-dot.active { border-color: #333; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

    /* Chat WhatsApp */
    .chat-container { border-radius: 12px; margin-top: 20px; background: #e5ddd5; border: 1px solid #ccc; overflow: hidden; display: flex; flex-direction: column; }
    .chat-header { background: #075e54; color: white; padding: 10px 15px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .chat-msgs { height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .balao { padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; word-wrap: break-word; }
    .balao.professor { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
    .balao.pais { align-self: flex-start; background: #fff; border-top-left-radius: 0; }
    .chat-input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
    .chat-input-area input { flex: 1; border: none; padding: 10px 15px; border-radius: 25px; outline: none; }
    .preview-img { max-width: 200px; border-radius: 8px; margin: 5px 0; display: block; border: 1px solid #ddd; }

    /* Históricos */
    .history-section { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; font-size: 12px; color: #444; border: 1px dashed #ccc; }
    .history-section h4 { margin: 0 0 8px 0; color: #075e54; text-transform: uppercase; font-size: 11px; border-bottom: 1px solid #ddd; }
    
    /* Estilo para minimizar */
    summary { cursor: pointer; color: #075e54; font-weight: bold; padding: 5px 0; outline: none; }

    /* Botões */
    button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
    .btn-blue { background: #3498db; }
    .btn-green { background: #2ecc71; }
    .btn-red { background: #e74c3c; }
    button:hover { opacity: 0.9; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const TRAINING_DAYS = [1, 3, 5, 6]; 

// Regras de idade e ciclos de aulas
function getClassesPerDegree(age, belt) {
    if (age >= 3 && age <= 4) return 12; 
    if (age >= 13 && age <= 15) {
        if (belt.includes("Verde")) return 25;
        if (belt.includes("Amarela") || belt.includes("Laranja")) return 22;
        return 20;
    }
    if (belt.includes("Amarela") || belt.includes("Laranja")) return 20;
    return 15;
}

// Definição de Turma conforme idade
function getTurma(age) {
    if (age >= 3 && age <= 6) return "Kids";
    if (age >= 7 && age <= 12) return "Infantojuvenil";
    if (age >= 13 && age <= 15) return "Juvenil";
    return "Geral";
}

function getAge(date) {
    const today = new Date();
    const birth = new Date(date);
    let age = today.getFullYear() - birth.getFullYear();
    if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
    return age;
}

function estimateDate(neededClasses) {
    let date = new Date();
    let count = 0;
    while (count < neededClasses) {
        date.setDate(date.getDate() + 1);
        if (TRAINING_DAYS.includes(date.getDay())) count++;
    }
    return date.toLocaleDateString('pt-BR');
}

function App() {
    const [user, setUser] = useState("");
    const [searchChild, setSearchChild] = useState("");
    const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem("alliance_pro_v5") || "[]"));

    useEffect(() => { localStorage.setItem("alliance_pro_v5", JSON.stringify(students)) }, [students]);

    // Funções de Ação
    const addAttendance = (id) => {
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const limit = getClassesPerDegree(s.idade, s.faixa);
            const newAulas = s.aulas + 1;
            let hGraus = s.hGraus || [];
            if (newAulas % limit === 0) {
                hGraus = [...hGraus, { data: new Date().toLocaleDateString('pt-BR'), grau: Math.floor(newAulas / limit) }];
            }
            return { ...s, aulas: newAulas, hGraus };
        }));
    };

    const toggleComp = (id, key, label) => {
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const status = s.comp[key] ? null : new Date().toLocaleDateString('pt-BR');
            return { 
                ...s, 
                comp: { ...s.comp, [key]: status },
                hComp: status ? [...(s.hComp || []), { data: status, tipo: label }] : s.hComp
            };
        }));
    };

    const sendChat = (id, text, fileData = null) => {
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const newMsg = { id: Date.now(), sender: user, text, file: fileData?.url, fileName: fileData?.name, time: new Date().toLocaleTimeString() };
            return { ...s, chat: [...(s.chat || []), newMsg] };
        }));
    };

    const handleUpload = (id, file, type) => {
        const reader = new FileReader();
        reader.onload = e => {
            if (type === 'avatar') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: e.target.result } : s));
            } else {
                sendChat(id, "", { url: e.target.result, name: file.name });
            }
        };
        reader.readAsDataURL(file);
    };

    if (!user) return (
        <div style={{ textAlign: 'center', marginTop: '100px' }}>
            <h2 style={{ color: '#075e54' }}>Alliance Jiu Jitsu</h2>
            <button className="btn-blue" onClick={() => setUser("professor")}>Acesso Professor</button>
            <button className="btn-green" style={{ marginLeft: '10px' }} onClick={() => { const n = prompt("Nome do Aluno:"); if(n){setSearchChild(n); setUser("pais")}}}>Acesso Pais</button>
        </div>
    );

    const list = user === "professor" ? students : students.filter(s => s.nome.toLowerCase() === searchChild.toLowerCase());

    return (
        <div className="container">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                <h2 style={{ margin: 0 }}>Eagle System</h2>
                <button className="btn-red" onClick={() => setUser("")}>Sair</button>
            </div>

            {user === "professor" && (
                <button className="btn-green" style={{ marginBottom: '20px' }} onClick={() => {
                    const nome = prompt("Nome do Aluno:");
                    if (!nome) return;
                    const nasc = prompt("Data de Nascimento (formato AAAA-MM-DD):", "2015-01-01");
                    if (nome && nasc) {
                        const idadeCalc = getAge(nasc);
                        setStudents([...students, { 
                            id: Date.now(), 
                            nome, 
                            nascimento: nasc, 
                            idade: idadeCalc, 
                            turma: getTurma(idadeCalc),
                            faixa: "Branca", 
                            aulas: 0, 
                            comp: {}, 
                            chat: [], 
                            hGraus: [], 
                            hComp: [], 
                            hFaixas: [] 
                        }]);
                    }
                }}>+ Cadastrar Aluno</button>
            )}

            {list.map(s => {
                const limit = getClassesPerDegree(s.idade, s.faixa);
                const totalGraus = Math.floor(s.aulas / limit);
                const faltam = Math.max((limit * 8) - s.aulas, 0);
                const brancos = Math.min(totalGraus, 4);
                const vermelhos = Math.max(totalGraus - 4, 0);

                return (
                    <div key={s.id} className="card">
                        <div className="student-header">
                            <div className="avatar-wrapper">
                                <img src={s.avatar || "https://via.placeholder.com/80"} className="avatar" />
                                <label className="edit-avatar">
                                    <i className="fas fa-pencil-alt"></i>
                                    <input type="file" style={{ display: 'none' }} onChange={e => handleUpload(s.id, e.target.files[0], 'avatar')} />
                                </label>
                            </div>
                            <div>
                                <h3 style={{ margin: 0 }}>{s.nome}</h3>
                                <small>
                                    <strong>Idade:</strong> {s.idade} anos | 
                                    <strong> Turma:</strong> {getTurma(s.idade)} | 
                                    <strong> Faixa:</strong> {s.faixa}
                                </small>
                            </div>
                        </div>

                        <div><b>Aulas ({limit} por grau):</b></div>
                        <div className="bar">
                            {[...Array(limit)].map((_, i) => <div key={i} className={`box ${i < (s.aulas % limit) ? 'done' : ''}`}></div>)}
                        </div>

                        <div style={{ marginTop: 10 }}><b>Graus Conquistados:</b></div>
                        <div className="bar">
                            {[...Array(4)].map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < vermelhos ? '#e74c3c' : (i < brancos ? '#fff' : '#ddd') }}>
                                    {i < vermelhos ? i+5 : i+1}
                                </div>
                            ))}
                        </div>

                        <div className="beh-row">
                            <div className={`beh-dot ${s.comp.rel ? 'active' : ''}`} style={{ background: '#f1c40f' }} onClick={() => user === "professor" && toggleComp(s.id, 'rel', 'Relacionamento')}></div>
                            <div className={`beh-dot ${s.comp.com ? 'active' : ''}`} style={{ background: '#3498db' }} onClick={() => user === "professor" && toggleComp(s.id, 'com', 'Comportamento')}></div>
                            <div className={`beh-dot ${s.comp.not ? 'active' : ''}`} style={{ background: '#e74c3c' }} onClick={() => user === "professor" && toggleComp(s.id, 'not', 'Notas Escolares')}></div>
                            <div className={`beh-dot ${s.comp.hab ? 'active' : ''}`} style={{ background: '#2ecc71' }} onClick={() => user === "professor" && toggleComp(s.id, 'hab', 'Bons Hábitos')}></div>
                        </div>

                        {user === "professor" && (
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button className="btn-blue" onClick={() => addAttendance(s.id)}>Presença</button>
                                <button className="btn-red" onClick={() => { if(confirm("Excluir aluno?")) setStudents(students.filter(x => x.id !== s.id)) }}>Excluir</button>
                            </div>
                        )}

                        <div style={{ marginTop: 15, fontSize: 13 }}>
                            Faltam <b>{faltam}</b> aulas para a graduação de 8 graus. <br/>
                            Previsão: <b>{estimateDate(faltam)}</b>
                        </div>

                        {/* Histórico: Minimizado para Professor, Aberto para Pais */}
                        {user === "professor" ? (
                            <details className="history-section">
                                <summary>Ver Histórico do Aluno</summary>
                                <h4>Histórico de Graus</h4>
                                {s.hGraus?.length > 0 ? s.hGraus.map((h, i) => <div key={i}>{h.data} - Grau {h.grau}</div>) : "Sem registros."}
                                <h4 style={{ marginTop: 10 }}>Histórico Comportamental</h4>
                                {s.hComp?.length > 0 ? s.hComp.map((h, i) => <div key={i}>{h.data} - {h.tipo}</div>) : "Sem registros."}
                            </details>
                        ) : (
                            <div className="history-section">
                                <h4>Histórico de Graus</h4>
                                {s.hGraus?.map((h, i) => <div key={i}>{h.data} - Grau {h.grau}</div>)}
                                <h4 style={{ marginTop: 10 }}>Histórico Comportamental</h4>
                                {s.hComp?.map((h, i) => <div key={i}>{h.data} - {h.tipo}</div>)}
                            </div>
                        )}

                        <div className="chat-container">
                            <div className="chat-header"><i className="fab fa-whatsapp"></i> Chat com Professor</div>
                            <div className="chat-msgs" id={`chat-${s.id}`}>
                                {s.chat?.map(m => (
                                    <div key={m.id} className={`balao ${m.sender}`}>
                                        {m.file && (
                                            <a href={m.file} download={m.fileName}>
                                                {m.file.startsWith("data:image") ? <img src={m.file} className="preview-img" /> : <div>📄 {m.fileName}</div>}
                                            </a>
                                        )}
                                        {m.text}
                                        <div style={{ fontSize: '9px', opacity: 0.5, textAlign: 'right' }}>{m.time}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{ cursor: 'pointer' }}><i className="fas fa-paperclip"></i>
                                    <input type="file" style={{ display: 'none' }} onChange={e => handleUpload(s.id, e.target.files[0], 'chat')} />
                                </label>
                                <input id={`in-${s.id}`} placeholder="Mensagem..." onKeyDown={e => { if(e.key === 'Enter'){ sendChat(s.id, e.target.value); e.target.value = ""; } }} />
                                <button style={{ background: 'none', color: '#075e54', fontSize: '18px' }} onClick={() => {
                                    const inp = document.getElementById(`in-${s.id}`);
                                    sendChat(s.id, inp.value);
                                    inp.value = "";
                                }}><i className="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
