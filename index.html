<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family:Arial; background:#f4f6f8; margin:0; padding:20px }
.container{ max-width:1000px; margin:auto }
.card{ background:white; padding:16px; border-radius:10px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1) }
.row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px }
button{ padding:6px 12px; border:none; border-radius:6px; background:#3498db; color:white; cursor:pointer }
button.red{background:#e74c3c}
button.green{background:#2ecc71}
input,select{ padding:6px; border-radius:6px; border:1px solid #ccc }
.bar{ display:flex; gap:3px }
.box{ width:14px; height:14px; border:1px solid #999; background:#eee }
.done{ background:#2ecc71 }
.degree{ width:20px; height:20px; border:1px solid #555; border-radius:3px; background:#ddd }
.beh{ width:22px; height:22px; border-radius:22px; background:#eee }
.avatar{ width:60px; height:60px; border-radius:50%; object-fit:cover; border:3px solid #ddd; }
.editAvatar{ position:absolute; bottom:0; right:0; font-size:10px; background:#3498db; color:white; border-radius:6px; padding:2px 4px; cursor:pointer; }
.studentHeader{ display:flex; align-items:center; gap:10px; margin-bottom:6px; position:relative; }
.login{ max-width:400px; margin:auto }

/* Chat Estilo WhatsApp Atualizado */
.chatBox{ border:1px solid #eee; border-radius:10px; padding:10px; background:#e5ddd5; margin-top:15px; }
.messages{ max-height:200px; overflow-y:auto; margin-bottom:10px; display:flex; flex-direction:column; gap:5px; padding:5px; }
.message{ padding:8px 12px; border-radius:8px; font-size:14px; max-width:80%; position:relative; box-shadow:0 1px 1px rgba(0,0,0,0.1); }
.message.sent{ background:#dcf8c6; align-self:flex-end; border-bottom-right-radius:2px; }
.message.received{ background:#fff; align-self:flex-start; border-bottom-left-radius:2px; }
.message small{ display:block; font-size:10px; color: #777; margin-bottom:2px; }
.chatInput{ display:flex; gap:5px; }
.chatInput input{ flex:1; border:none; padding:10px; border-radius:20px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"]
const trainingDays=[1,3,5,6]

function getAge(date){
  const hoje=new Date(); const nasc=new Date(date);
  let idade=hoje.getFullYear()-nasc.getFullYear();
  const m=hoje.getMonth()-nasc.getMonth();
  if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--;
  return idade;
}

function getCategory(idade){
  if(idade>=3 && idade<=4) return "BABY EAGLE"; if(idade>=5 && idade<=8) return "LITTLE EAGLE";
  if(idade>=9 && idade<=12) return "EAGLE WARRIOR"; if(idade>=13 && idade<=15) return "EAGLE YOUTH";
  return "FORA CATEGORIA";
}

function estimateDate(aulas){
  let date=new Date(); let count=0;
  while(count<aulas){ date.setDate(date.getDate()+1); if(trainingDays.includes(date.getDay())) count++; }
  return date.toLocaleDateString();
}

function ClassesBar({aulas}){
  return(<div className="bar">{Array.from({length:15}).map((_,i)=>(<div key={i} className={"box "+(i<(aulas%15)?"done":"")}></div>))}</div>)
}

function PresenceBar({graus}){
  return(<div className="bar">{Array.from({length:4}).map((_,i)=>{
    let color="#ddd"; if(i<Math.max(graus-4,0)) color="#e74c3c"; else if(i<Math.min(graus,4)) color="#fff";
    return(<div key={i} className="degree" style={{background:color}}></div>)
  })}</div>)
}

// Componente de Chat Reutilizável
function Chat({ chatData, onSend, userType }) {
  const [text, setText] = React.useState("");
  const endRef = React.useRef(null);
  React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }) }, [chatData]);

  return (
    <div className="chatBox">
      <div className="messages">
        {chatData.map((m, i) => (
          <div key={i} className={`message ${m.sender === userType ? 'sent' : 'received'}`}>
            <small>{m.sender === 'professor' ? 'Professor' : 'Responsável'}</small>
            {m.text}
          </div>
        ))}
        <div ref={endRef} />
      </div>
      <div className="chatInput">
        <input value={text} onChange={e => setText(e.target.value)} placeholder="Conversar..." onKeyDown={e => {if(e.key==='Enter'){onSend(text); setText("")}}} />
        <button className="green" onClick={() => {onSend(text); setText("")}}>➤</button>
      </div>
    </div>
  );
}

function Login({setUser,students,setFilho}){
  const [tipo,setTipo]=React.useState(""); const [nome,setNome]=React.useState("");
  const [nasc,setNasc]=React.useState(""); const [senha,setSenha]=React.useState("");
  return(
    <div className="login card">
      <h2>Login Alliance</h2>
      <button className="green" onClick={()=>setTipo("professor")}>Professor</button> <button onClick={()=>setTipo("pais")}>Pais</button>
      {tipo==="professor" && <div><br/><input type="password" placeholder="Senha" value={senha} onChange={e=>setSenha(e.target.value)}/><br/><br/><button onClick={()=>senha==="admin"?setUser("professor"):alert("Erro")}>Entrar</button></div>}
      {tipo==="pais" && <div><br/><input placeholder="Nome do aluno" value={nome} onChange={e=>setNome(e.target.value)}/><br/><br/><input type="date" value={nasc} onChange={e=>setNasc(e.target.value)}/><br/><br/><button onClick={()=>{const a=students.find(s=>s.nome===nome && s.nascimento===nasc); if(a){setFilho(nome); setUser("pais")}else alert("Não encontrado")}}>Entrar</button></div>}
    </div>
  )
}

function App(){
  const [user,setUser]=React.useState(""); const [filho,setFilho]=React.useState("");
  const [students,setStudents]=React.useState(()=>JSON.parse(localStorage.getItem("academia_alliance_v2")||"[]"));
  const [form,setForm]=React.useState({nome:"",nascimento:"",faixa:"Branca"});

  React.useEffect(()=>{localStorage.setItem("academia_alliance_v2",JSON.stringify(students))},[students]);

  function addStudent(){
    if(!form.nome) return; const idade=getAge(form.nascimento);
    setStudents([...students,{ id:Date.now(), nome:form.nome, nascimento:form.nascimento, idade, categoria:getCategory(idade), faixa:form.faixa, avatar:"avatar.png", aulas:0, historicoAulas:[], historicoGraus:[], historicoComportamental:[], historicoFaixas:[], chat:[], comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null} }]);
    setForm({nome:"",nascimento:"",faixa:"Branca"});
  }

  function addAttendance(id){
    setStudents(students.map(s=>{
      if(s.id!==id || s.aulas>=135) return s;
      const novas=s.aulas+1; const data=new Date().toLocaleDateString();
      let hG=s.historicoGraus; if(novas%15===0) hG=[...hG,{grau:Math.floor(novas/15),data}];
      return {...s, aulas:novas, historicoAulas:[...s.historicoAulas,{data}], historicoGraus:hG};
    }));
  }

  function markBehavior(id,key){
    setStudents(students.map(s=>{
      if(s.id!==id) return s; const data=new Date().toLocaleDateString();
      return {...s, comportamental:{...s.comportamental,[key]:data}, historicoComportamental:[...s.historicoComportamental,{tipo:key,data}]};
    }));
  }

  function sendMsg(id, text){
    if(!text.trim()) return;
    setStudents(students.map(s => s.id === id ? {...s, chat: [...(s.chat||[]), {sender: user, text, date: new Date().toLocaleString()}]} : s));
  }

  if(user==="") return <Login setUser={setUser} students={students} setFilho={setFilho}/>;
  const lista = user==="pais" ? students.filter(s=>s.nome===filho) : students;

  return(
    <div className="container">
      <h1>Acompanhamento Jiu Jitsu Alliance</h1>
      {user==="professor" && <div className="card"><div className="row">
        <input placeholder="Nome" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>
        <input type="date" value={form.nascimento} onChange={e=>setForm({...form,nascimento:e.target.value})}/>
        <select value={form.faixa} onChange={e=>setForm({...form,faixa:e.target.value})}>{beltOrder.map(b=><option key={b}>{b}</option>)}</select>
        <button className="green" onClick={addStudent}>Adicionar</button>
      </div></div>}

      {lista.map(s=>(
        <div key={s.id} className="card">
          <div className="studentHeader">
            <img src={s.avatar} className="avatar"/>
            <div><b>{s.nome}</b><br/>{s.idade} anos | {s.categoria}</div>
          </div>
          <div>Faixa: {s.faixa} | Aulas: {s.aulas}</div>
          <ClassesBar aulas={s.aulas}/><br/>
          <PresenceBar graus={Math.floor(s.aulas/15)}/>
          
          <div style={{display:"flex",gap:10,marginTop:10}}>
            {['relacionamento','comportamento','notas','habitos'].map(k=>(
              <div key={k} className="beh" style={{background:s.comportamental[k]?"#2ecc71":"#eee"}} onClick={()=>user==="professor"&&markBehavior(s.id,k)}></div>
            ))}
          </div>

          {user==="professor" && <div style={{marginTop:10,display:"flex",gap:5}}>
            <button onClick={()=>addAttendance(s.id)}>Presença</button>
            <button className="red" onClick={()=>setStudents(students.filter(x=>x.id!==s.id))}>Excluir</button>
          </div>}

          <div style={{marginTop:10, fontSize:'12px', color:'#666'}}>Previsão Troca: {estimateDate(135-s.aulas)}</div>
          
          <hr/>
          <h4>Chat com {user==="professor"?"Pais":"Professor"}</h4>
          <Chat chatData={s.chat || []} userType={user} onSend={(t)=>sendMsg(s.id, t)} />
        </div>
      ))}

      <div className="card">
        <img src="graus_coloridos.jpeg" width="100%" style={{marginBottom:10}}/>
        <img src="sistema_graduacao.jpeg" width="100%"/>
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
