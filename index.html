<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:36px; height:36px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:13px; background:#fff; color:#777; cursor: pointer; font-weight: bold; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:26px; height:26px; border:1px solid #333; border-radius:4px; background:#ddd; }
.beh-row { display: flex; gap: 10px; margin: 15px 0; }
.beh-btn { flex:1; padding:10px 5px; border-radius:10px; border:1px solid #ddd; font-size:11px; font-weight:bold; cursor:pointer; text-align:center; transition: 0.3s; }

/* --- NOVO LAYOUT DE CHAT ESTILO WHATSAPP --- */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; display: flex; flex-direction: column; }
.chat-messages { height:300px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
.msg { padding:8px 12px; border-radius:8px; font-size:14px; max-width:85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; line-height: 1.4; }
.msg.sent { background:#dcf8c6; align-self:flex-end; border-top-right-radius: 0; }
.msg.received { background:#fff; align-self:flex-start; border-top-left-radius: 0; }
.msg-time { font-size: 10px; color: #999; text-align: right; margin-top: 4px; display: block; }

.chat-input-bar { display: flex; align-items: center; gap: 8px; padding: 10px; background: #f0f0f0; }
.input-container { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 5px 12px; position: relative; }
.chat-input { flex: 1; border: none; padding: 8px; outline: none; font-size: 15px; background: transparent; }
.chat-icon { color: #54656f; font-size: 20px; cursor: pointer; padding: 0 5px; }
.send-btn-circle { background: #00a884; color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

.emoji-picker { position: absolute; bottom: 60px; left: 10px; background: white; border: 1px solid #ccc; border-radius: 10px; display: grid; grid-template-columns: repeat(6, 1fr); padding: 10px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.emoji-picker span { cursor: pointer; font-size: 20px; padding: 5px; }

/* Repositório e Histórico */
.repo-box { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; }
.doc-card { display: flex; justify-content: space-between; background: #f8f9fa; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; border: 1px solid #eee; align-items: center; }
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const BEH_TYPES = [
    { k: 'REL', n: 'Relacionamento', c: '#f1c40f' },
    { k: 'DIS', n: 'Disciplina', c: '#3498db' },
    { k: 'ORG', n: 'Organização', c: '#e74c3c' },
    { k: 'HAB', n: 'Bons Hábitos', c: '#2ecc71' }
];

function getAge(nasc) {
    if(!nasc) return 0;
    const diff = Date.now() - new Date(nasc).getTime();
    return Math.abs(new Date(diff).getUTCFullYear() - 1970);
}

function getRules(nasc, faixa) {
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [zoomImg, setZoomImg] = React.useState(null);
    const [showEmoji, setShowEmoji] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_eagle_v7_final") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("all_eagle_v7_final", JSON.stringify(students)) }, [students]);

    const handleFileUpload = (id, e, target) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = event.target.result;
            if (target === 'avatar') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: data } : s));
            } else if (target === 'chat') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user==='professor'?'Professor':'Pais', text: "", time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), file: {name: file.name, data, type: file.type} }] } : s));
            } else if (target === 'repo') {
                const n = prompt("Nome do documento:", file.name);
                setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: n, data }] } : s));
            }
        };
        reader.readAsDataURL(file);
    };

    const sendMessage = (id) => {
        const input = document.getElementById(`msg-${id}`);
        if (!input.value.trim()) return;
        const newChat = { 
            sender: user === 'professor' ? 'Professor' : 'Pais', 
            text: input.value,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        };
        setStudents(students.map(s => s.id === id ? {...s, chat: [...s.chat, newChat]} : s));
        input.value = "";
        setShowEmoji(null);
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2>Alliance Eagle System</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            {zoomImg && <div className="modal-overlay" onClick={() => setZoomImg(null)}><img src={zoomImg} className="modal-img" /></div>}
            
            <div className="row" style={{justifyContent:'space-between'}}>
                <h2 style={{color:'#075e54', margin:0}}>Alliance Infantil</h2>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => {if(form.nome) setStudents([...students, { id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {} }]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>+ Aluno</button>
                    </div>
                </div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80"} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleFileUpload(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0}}>{s.nome}</h3>
                                <div style={{fontSize:12, color:'#666'}}>
                                    <b>Idade:</b> {getAge(s.nascimento)} anos | <b>Programa:</b> {rules.p}<br/>
                                    <b>Faixa:</b> {s.faixa}
                                </div>
                            </div>
                        </div>

                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => user === 'professor' && setStudents(students.map(x => x.id === s.id ? {...x, aulasNoCiclo: i+1} : x))}>{i + 1}</div>
                            ))}
                        </div>

                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="beh-row">
                            {BEH_TYPES.map(b => (
                                <div key={b.k} className="beh-btn" style={{ background: s.comportamental?.[b.k] ? b.c : '#eee', color: s.comportamental?.[b.k] ? '#fff' : '#888' }} onClick={() => user==='professor' && setStudents(students.map(x => x.id===s.id ? {...x, comportamental:{...x.comportamental, [b.k]:!x.comportamental?.[b.k]}} : x))}>{b.k}</div>
                            ))}
                        </div>

                        <div className="repo-box">
                            <strong>📂 Repositório</strong> {user === "professor" && <label style={{cursor:'pointer', fontSize:11, color:'green'}}> [+ NOVO] <input type="file" hidden onChange={e => handleFileUpload(s.id, e, 'repo')} /></label>}
                            {s.docs.map((d, i) => <div key={i} className="doc-card"><span>{d.name}</span><a href={d.data} download>BAIXAR</a></div>)}
                        </div>

                        {/* --- COMPONENTE DE CHAT ESTILO WHATSAPP --- */}
                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === (user === 'professor' ? 'Professor' : 'Pais') ? 'sent' : 'received'}`}>
                                        {m.file && (m.file.type.startsWith('image') ? <img src={m.file.data} style={{maxWidth:'100%', borderRadius:5}} onClick={() => setZoomImg(m.file.data)}/> : <a href={m.file.data} download>{m.file.name}</a>)}
                                        {m.text}
                                        <span className="msg-time">{m.time}</span>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="chat-input-bar">
                                <div className="input-container">
                                    <span className="chat-icon" onClick={() => setShowEmoji(showEmoji === s.id ? null : s.id)}>😊</span>
                                    {showEmoji === s.id && (
                                        <div className="emoji-picker">
                                            {['🥋','OSS','🔥','👏','💪','🏆','👊','🙌'].map(e => <span key={e} onClick={() => {document.getElementById(`msg-${s.id}`).value += e; setShowEmoji(null);}}>{e}</span>)}
                                        </div>
                                    )}
                                    <input id={`msg-${s.id}`} className="chat-input" placeholder="Digite uma mensagem" onKeyDown={e => e.key === 'Enter' && sendMessage(s.id)} />
                                    <label className="chat-icon">📎<input type="file" hidden onChange={e => handleFileUpload(s.id, e, 'chat')} /></label>
                                </div>
                                <button className="send-btn-circle" onClick={() => sendMessage(s.id)}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
