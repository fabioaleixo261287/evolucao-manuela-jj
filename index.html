<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance - Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px }
.container{ max-width:1000px; margin:auto }
.card{ background:white; padding:18px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1) }
.row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }

button{ padding:8px 14px; border:none; border-radius:6px; background:#3498db; color:white; cursor:pointer; font-weight: bold; }
button:disabled{ background:#ccc; cursor:not-allowed }
button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input, select{ padding:8px; border-radius:6px; border:1px solid #ccc }

/* Bolinhas de Aula Numeradas */
.bar-bolinhas{ display:flex; gap:5px; flex-wrap:wrap; margin:10px 0 }
.bolinha-aula{ width:28px; height:28px; border-radius:50%; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; font-size:11px; background:#eee; color:#666 }
.bolinha-aula.done{ background:#2ecc71; color:white; border-color:#27ae60 }

.bar{ display:flex; gap:4px }
.degree{ width:22px; height:22px; border:1px solid #555; border-radius:3px; background:#ddd }
.beh{ width:26px; height:26px; border-radius:50%; background:#eee; border:1px solid #ccc; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white }

/* Foto Editável */
.avatar-container { position: relative; width: 70px; height: 70px; }
.avatar{ width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid #3498db; cursor: pointer; }
.edit-hint { position: absolute; bottom: 0; right: 0; background: #3498db; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

/* Histórico */
.hist-box { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; max-height: 100px; overflow-y: auto; border-left: 3px solid #3498db; }

/* Chat */
.chatBox{ border-radius:10px; background:#e5ddd5; margin-top:15px; border: 1px solid #ddd; overflow: hidden; }
.messages{ max-height:200px; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.message{ padding:8px 12px; border-radius:8px; font-size:13px; max-width:80%; position:relative; box-shadow:0 1px 1px rgba(0,0,0,0.1); }
.message.sent{ background:#dcf8c6; align-self:flex-end; }
.message.received{ background:#fff; align-self:flex-start; }
.message small { display: block; font-size: 9px; color: #888; text-align: right; margin-top: 4px; }
.chatInput{ display:flex; gap:5px; padding:10px; background:#f0f0f0; align-items: center; }
.chatInput input{ flex:1; border:none; padding:10px; border-radius:20px; outline: none; }

.repo-link { display: flex; align-items: center; gap: 8px; padding: 10px; background: #ebf5fb; border-radius: 8px; color: #2980b9; text-decoration: none; font-weight: bold; margin-top: 10px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const BELT_ORDER = ["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"];
const BEHAVIOR_TYPES = [
    { key: 'relacionamento', color: '#f1c40f', label: 'Amarelo' },
    { key: 'comportamento', color: '#3498db', label: 'Azul' },
    { key: 'notas', color: '#e74c3c', label: 'Vermelho' },
    { key: 'habitos', color: '#2ecc71', label: 'Verde' }
];

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_v_final_v2") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_v_final_v2", JSON.stringify(students)) }, [students]);

    const addStudent = () => {
        if (!form.nome) return;
        const newStudent = {
            id: Date.now(), ...form, avatar: "https://via.placeholder.com/70",
            aulas: 0, historicoAulas: [], historicoGraus: [], historicoComportamental: [],
            chat: [], comportamental: { relacionamento: null, comportamento: null, notas: null, habitos: null }
        };
        setStudents([...students, newStudent]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    const handleAttendance = (id) => {
        setStudents(students.map(s => {
            if (s.id !== id || s.aulas >= 135) return s;
            const novasAulas = s.aulas + 1;
            const data = new Date().toLocaleString('pt-BR');
            let hGraus = s.historicoGraus || [];
            if (novasAulas % 15 === 0) hGraus.push({ grau: novasAulas / 15, data });
            return { ...s, aulas: novasAulas, historicoAulas: [...s.historicoAulas, { data }], historicoGraus: hGraus };
        }));
    };

    const handleBeltChange = (id) => {
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const currentIdx = BELT_ORDER.indexOf(s.faixa);
            const proxima = BELT_ORDER[currentIdx + 1] || s.faixa;
            return { ...s, faixa: proxima, aulas: 0, historicoAulas: [], historicoGraus: [] };
        }));
    };

    const toggleBehavior = (id, key) => {
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const isSet = s.comportamental[key];
            const data = new Date().toLocaleString('pt-BR');
            return {
                ...s,
                comportamental: { ...s.comportamental, [key]: isSet ? null : data },
                historicoComportamental: isSet 
                    ? s.historicoComportamental.filter(h => h.tipo !== key || h.data !== isSet)
                    : [...(s.historicoComportamental || []), { tipo: key, data }]
            };
        }));
    };

    const sendMsg = (id, text, isFile = false) => {
        if (!text.trim()) return;
        const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        setStudents(students.map(s => s.id === id ? {
            ...s, chat: [...(s.chat || []), { sender: user, text, time, isFile }]
        } : s));
    };

    const updatePhoto = (id) => {
        const url = prompt("Cole a URL da nova imagem:");
        if (url) setStudents(students.map(s => s.id === id ? { ...s, avatar: url } : s));
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 400, margin: '100px auto', textAlign: 'center' }}>
            <h2>Alliance Jiu Jitsu</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%'}}>Acesso Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase().includes(filho.toLowerCase()) && filho !== "") : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h1>{user === "professor" ? "Gestão Alliance" : "Área do Aluno"}</h1>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <h3>Novo Aluno</h3>
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELT_ORDER.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <button className="green" onClick={addStudent}>Cadastrar</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do Aluno..." style={{width:'100%', boxSizing:'border-box'}} onChange={e => setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const aulasNoGrau = (s.aulas % 15 === 0 && s.aulas > 0) ? 15 : s.aulas % 15;
                return (
                    <div key={s.id} className="card">
                        <div className="studentHeader">
                            <div className="avatar-container" onClick={() => updatePhoto(s.id)}>
                                <img src={s.avatar} className="avatar" title="Clique para editar foto" />
                                <div className="edit-hint">✎</div>
                            </div>
                            <div>
                                <b>{s.nome}</b><br />
                                <small>{s.faixa} | {s.aulas} aulas</small>
                            </div>
                        </div>

                        <div style={{marginTop:10}}>Aulas (Ciclo de 15):</div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: 15 }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < aulasNoGrau ? 'done' : ''}`}>{i + 1}</div>
                            ))}
                        </div>

                        <div style={{marginTop:10}}>Graus de Presença (Físicos):</div>
                        <div className="bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < Math.floor(s.aulas / 15) ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div style={{ marginTop: 15 }}>Grau Comportamental (Clique p/ Alternar):</div>
                        <div className="row" style={{ marginTop: 5 }}>
                            {BEHAVIOR_TYPES.map(bt => (
                                <div key={bt.key} className="beh" 
                                     style={{ background: s.comportamental[bt.key] ? bt.color : '#eee' }}
                                     onClick={() => user === "professor" && toggleBehavior(s.id, bt.key)}>
                                     {bt.label[0]}
                                </div>
                            ))}
                        </div>

                        {user === "professor" && (
                            <div className="row" style={{ marginTop: 15 }}>
                                <button className="green" onClick={() => handleAttendance(s.id)} disabled={s.aulas >= 135}>+ Presença</button>
                                <button className="orange" onClick={() => handleBeltChange(s.id)}>⬆ Troca de Faixa</button>
                                <button className="red" onClick={() => setStudents(students.filter(x => x.id !== s.id))}>Excluir</button>
                            </div>
                        )}

                        <div className="hist-box">
                            <b>Histórico de Aulas:</b> {s.historicoAulas.slice(-3).map(h => h.data).join(', ') || 'Nenhuma'}<br/>
                            <b>Graus Conquistados:</b> {s.historicoGraus.map(g => `${g.grau}º em ${g.data}`).join(' | ') || 'Nenhum'}<br/>
                            <b>Comportamental:</b> {s.historicoComportamental.map(h => `${h.tipo} (${h.data})`).join(' | ') || 'Nenhum'}
                        </div>

                        <a href="#" className="repo-link" onClick={() => alert('Download do Repositório de Documentos Alliance...')}>
                            📂 Repositório de Documentos (Regulamento/PDF)
                        </a>

                        <div className="chatBox">
                            <div className="messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`message ${m.sender === user ? 'sent' : 'received'}`}>
                                        <small style={{textAlign:'left', fontWeight:'bold'}}>{m.sender.toUpperCase()}</small>
                                        {m.text}
                                        <small>{m.time}</small>
                                    </div>
                                ))}
                            </div>
                            <div className="chatInput">
                                <label style={{cursor:'pointer', fontSize:'18px'}}>📎
                                    <input type="file" style={{display:'none'}} onChange={e => sendMsg(s.id, `📎 Arquivo: ${e.target.files[0].name}`, true)} />
                                </label>
                                <input placeholder="Escreva aqui..." onKeyDown={e => { if(e.key==='Enter') { sendMsg(s.id, e.target.value); e.target.value="" } }} />
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
