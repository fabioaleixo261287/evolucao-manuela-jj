<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd;
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.login{
max-width:400px;
margin:auto
}

/* CHAT */

.chatBox{
border:1px solid #ddd;
border-radius:10px;
background:#ece5dd;
padding:10px;
margin-top:12px
}

.chatMessages{
max-height:220px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:8px
}

.msg{
display:flex;
flex-direction:column;
max-width:70%;
padding:8px;
border-radius:8px;
font-size:13px
}

.msg.professor{
background:#dcf8c6;
align-self:flex-end
}

.msg.pais{
background:white;
align-self:flex-start
}

.msgHeader{
font-size:11px;
color:#555
}

.msgTime{
font-size:10px;
color:#777;
text-align:right
}

.msgImage{
max-width:160px;
border-radius:6px;
margin-top:4px
}

.chatInput{
display:flex;
gap:6px
}

.clipBtn{
font-size:18px;
background:none;
color:#555
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){

const hoje=new Date()
const nasc=new Date(date)

let idade=hoje.getFullYear()-nasc.getFullYear()

const m=hoje.getMonth()-nasc.getMonth()

if(m<0 || (m===0 && hoje.getDate()<nasc.getDate()))
idade--

return idade

}

function getCategory(idade){

if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"

return "FORA CATEGORIA"

}

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}

return date.toLocaleDateString()

}

function ClassesBar({aulas}){

return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return(
<div key={i} className={"box "+(done?"done":"")}></div>
)

})}
</div>
)

}

function PresenceBar({graus}){

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div key={i} className="degree" style={{background:color}}></div>
)

})}

</div>

)

}

/* CHAT */

function Chat({student,user,setStudents}){

const [msg,setMsg]=React.useState("")
const fileRef=React.useRef()

function sendMessage(text,file){

const now=new Date()

const nova={
autor:user,
nome:user==="professor"?"Professor":"Responsável",
texto:text,
arquivo:file?URL.createObjectURL(file):null,
tipo:file?file.type:null,
hora:now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
}

setStudents(prev=>prev.map(s=>{
if(s.id!==student.id) return s
return {...s,chat:[...(s.chat||[]),nova]}
}))

}

function send(){
if(!msg) return
sendMessage(msg,null)
setMsg("")
}

function attach(){
fileRef.current.click()
}

function handleFile(e){
const file=e.target.files[0]
if(!file) return
sendMessage("",file)
}

return(

<div className="chatBox">

<div className="chatMessages">

{(student.chat||[]).map((m,i)=>(

<div key={i} className={"msg "+m.autor}>

<div className="msgHeader">{m.nome}</div>

{m.texto && <div>{m.texto}</div>}

{m.arquivo && m.tipo && m.tipo.startsWith("image") &&
<img src={m.arquivo} className="msgImage"/>
}

<div className="msgTime">{m.hora}</div>

</div>

))}

</div>

<div className="chatInput">

<button className="clipBtn" onClick={attach}>📎</button>

<input type="file" ref={fileRef} style={{display:"none"}} onChange={handleFile}/>

<input
type="text"
placeholder="Mensagem..."
value={msg}
onChange={e=>setMsg(e.target.value)}
/>

<button onClick={send}>Enviar</button>

</div>

</div>

)

}

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){

if(senha==="admin") setUser("professor")
else alert("Senha incorreta")

}

function loginPais(){

const aluno=students.find(
s=>s.nome===nome && s.nascimento===nascimento
)

if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}

}

return(

<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setTipo("professor")}>
Professor
</button>

<button onClick={()=>setTipo("pais")}>
Pais
</button>

<br/><br/>

{tipo==="professor" &&

<div>

<input
type="password"
placeholder="Senha"
value={senha}
onChange={e=>setSenha(e.target.value)}
/>

<br/><br/>

<button onClick={loginProfessor}>
Entrar
</button>

</div>

}

{tipo==="pais" &&

<div>

<input
placeholder="Nome do aluno"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<br/><br/>

<input
type="date"
value={nascimento}
onChange={e=>setNascimento(e.target.value)}
/>

<br/><br/>

<button onClick={loginPais}>
Entrar
</button>

</div>

}

</div>

)

}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance_final")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("academia_alliance_final",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const idade=getAge(form.nascimento)

setStudents([...students,{
id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade:idade,
categoria:getCategory(idade),
faixa:form.faixa,
avatar:"avatar.png",
aulas:0,
chat:[],
historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}
}])

setForm({nome:"",nascimento:"",faixa:"Branca"})

}

/* TODO resto das funções originais permanece igual */

if(user==="")
return <Login setUser={setUser} students={students} setFilho={setFilho}/>

let lista=students

if(user==="pais"){
lista=students.filter(s=>s.nome===filho)
}

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

{lista.map(s=>(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>

<b>{s.nome}</b><br/>
{s.idade} anos<br/>
Categoria: {s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<ClassesBar aulas={s.aulas}/>

<Chat student={s} user={user} setStudents={setStudents}/>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
