<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#e5ddd5; margin:0; padding:15px; }
    .container { max-width:850px; margin:auto; }
    .card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
    button { padding:10px 16px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; transition: 0.2s; }
    button:hover { opacity: 0.9; }
    button.red { background:#e74c3c; }
    button.blue { background:#3498db; }

    /* Avatar Otimizado */
    .avatar-container { position: relative; width: 65px; height: 65px; cursor: pointer; flex-shrink: 0; }
    .avatar-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #075e54; background: #eee; }

    /* Sistema de Aulas e Graus */
    .bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
    .bolinha-aula { width:30px; height:30px; border-radius:50%; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; font-size:11px; background:#fff; cursor: pointer; }
    .bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; font-weight: bold; }
    .degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
    .degree { width:22px; height:22px; border:1px solid #333; border-radius:3px; background:#ddd; cursor: pointer; }

    /* Comportamentais (Graus Coloridos) */
    .beh-row { display: flex; gap: 8px; margin: 15px 0; }
    .beh-btn { flex: 1; padding: 10px 2px; border-radius: 6px; font-size: 9px; font-weight: bold; border: none; cursor: pointer; color: white; opacity: 0.3; text-align: center; text-transform: uppercase; }
    .beh-btn.active { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

    /* Chat Estilo WhatsApp Oficial */
    .chat-wrapper { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); border-radius: 12px; border: 1px solid #ccc; margin-top: 15px; overflow: hidden; display: flex; flex-direction: column; }
    .chat-messages { height:250px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
    .msg { padding:6px 10px 4px 10px; border-radius:8px; font-size:13px; max-width:85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; line-height: 1.4; }
    .msg.sent { background:#dcf8c6; align-self:flex-end; border-top-right-radius: 0; }
    .msg.received { background:#fff; align-self:flex-start; border-top-left-radius: 0; }
    .msg-header { font-size: 10px; font-weight: bold; color: #075e54; margin-bottom: 2px; text-transform: uppercase; }
    .msg-footer { font-size: 9px; color: #999; text-align: right; margin-top: 2px; }
    
    .chat-input-bar { display:flex; gap:10px; padding:10px; background:#f0f0f0; align-items: center; border-top: 1px solid #ddd; }
    .input-group { background: white; border-radius: 25px; flex: 1; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #eee; }
    .input-group textarea { flex:1; border:none; padding:8px; height: 20px; resize: none; outline: none; font-family: inherit; }
    .icon-btn { cursor: pointer; color: #777; font-size: 20px; padding: 0 5px; }

    .history-box { font-size: 11px; color: #555; background: #fffbe6; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #f1c40f; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_DATA = {
    REL: { n: "Relacionamento", c: "#f1c40f", desc: "• Respeitar a todos\n• Tratar como gostaria de ser tratado\n• Ser gentil e paciente\n• Receptivo com novos alunos\n• Não fazer bullying" },
    DIS: { n: "Disciplina", c: "#3498db", desc: "• Faz o que é pedido\n• Presta atenção na aula\n• Boa frequência\n• Não sai do tatame sem avisar\n• Ajuda os colegas no treino" },
    ORG: { n: "Organização", c: "#e74c3c", desc: "• Seguir orientações do professor\n• Boas notas escolares\n• Pontualidade\n• Cuidar do uniforme e saber amarrar a faixa" },
    HAB: { n: "Comprometimento", c: "#2ecc71", desc: "• Boa alimentação\n• Higiene pessoal\n• Atividade física\n• Pensamentos positivos" }
};

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem("alliance_eagle_v2")) || []; } 
        catch { return []; }
    });
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => {
        localStorage.setItem("alliance_eagle_v2", JSON.stringify(students));
    }, [students]);

    const compressImage = (file, size, callback) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = size / img.width;
                canvas.width = size;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    const handlePromo = (id) => {
        setStudents(prev => prev.map(s => {
            if(s.id !== id) return s;
            const currentIdx = BELTS.indexOf(s.faixa);
            const nextBelt = currentIdx < BELTS.length - 1 ? BELTS[currentIdx + 1] : s.faixa;
            if(!window.confirm(`Promover ${s.nome} para ${nextBelt}?`)) return s;
            return { ...s, faixa: nextBelt, aulasNoCiclo: 0, grausGanhos: 0, history: [{date: new Date().toLocaleDateString(), msg: `Graduado: ${nextBelt}`}, ...s.history]};
        }));
    };

    const sendMessage = (id, text, fileData = null) => {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const senderLabel = user === 'professor' ? 'Professor' : `Família (${filho})`;
        setStudents(prev => prev.map(s => s.id === id ? {
            ...s, chat: [...s.chat, { sender: senderLabel, text, time, file: fileData, type: user }]
        } : s));
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Acesso Pais</button>
        </div>
    );

    const filtered = user === 'pais' ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h3 style={{margin:0, color:'#075e54'}}>Alliance Eagle</h3>
                <button onClick={() => {setUser(""); setFilho("");}} className="red">Sair</button>
            </div>

            {user === 'professor' && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                        <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => {if(form.nome) setStudents([...students, {id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, chat: [], docs: [], comportamental: {}, history: []}]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>Adicionar</button>
                    </div>
                </div>
            )}

            {user === 'pais' && !filho && (
                <div className="card"><input placeholder="Digite o nome do aluno..." onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} style={{width:'100%', padding:10, borderRadius:8}} /></div>
            )}

            {filtered.map(s => (
                <div key={s.id} className="card">
                    <div className="row">
                        <label className="avatar-container">
                            <img src={s.avatar || "https://via.placeholder.com/65"} className="avatar-img" />
                            <input type="file" hidden accept="image/*" onChange={e => compressImage(e.target.files[0], 80, (data) => setStudents(prev => prev.map(x => x.id===s.id ? {...x, avatar:data} : x)))} />
                        </label>
                        <div style={{flex:1}}>
                            <h3 style={{margin:0}}>{s.nome}</h3>
                            <small><b>Faixa Atual:</b> {s.faixa}</small>
                        </div>
                        {user === 'professor' && <button className="blue" onClick={() => handlePromo(s.id)}>Trocar Faixa</button>}
                    </div>

                    <div className="bar-bolinhas">
                        {Array.from({ length: 15 }).map((_, i) => (
                            <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => user==='professor' && setStudents(students.map(x => x.id===s.id ? {...x, aulasNoCiclo: s.aulasNoCiclo===i+1 ? i : i+1} : x))}>{i+1}</div>
                        ))}
                    </div>

                    <div className="degree-bar">
                        {Array.from({ length: 8 }).map((_, i) => (
                            <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }} onClick={() => user==='professor' && setStudents(students.map(x => x.id===s.id ? {...x, grausGanhos: i+1} : x))}></div>
                        ))}
                    </div>

                    <div className="beh-row">
                        {Object.keys(BEH_DATA).map(k => (
                            <div key={k} className={`beh-btn ${s.comportamental[k] ? 'active' : ''}`} style={{background: BEH_DATA[k].c}} 
                                 onClick={() => {
                                     if(user==='professor') setStudents(students.map(x => x.id===s.id ? {...x, comportamental: {...x.comportamental, [k]: !x.comportamental[k]}} : x));
                                     alert(`${BEH_DATA[k].n}\n\n${BEH_DATA[k].desc}`);
                                 }}>{k}</div>
                        ))}
                    </div>

                    <div className="chat-wrapper">
                        <div className="chat-messages" id={`chat-${s.id}`}>
                            {s.chat.map((m, i) => (
                                <div key={i} className={`msg ${m.type === user ? 'sent' : 'received'}`}>
                                    <div className="msg-header">{m.sender}</div>
                                    {m.text && <div>{m.text}</div>}
                                    {m.file && <img src={m.file} style={{maxWidth:'100%', borderRadius:8, marginTop:5}} />}
                                    <div className="msg-footer">{m.time}</div>
                                </div>
                            ))}
                        </div>
                        <div className="chat-input-bar">
                            <label className="icon-btn">📎<input type="file" hidden accept="image/*" onChange={e => compressImage(e.target.files[0], 300, (data) => sendMessage(s.id, "", data))} /></label>
                            <div className="input-group">
                                <textarea id={`in-${s.id}`} placeholder="Digite uma mensagem" onKeyDown={e => e.key==='Enter' && !e.shiftKey && (e.preventDefault(), sendMessage(s.id, e.target.value), e.target.value="")} />
                                <span className="icon-btn">😊</span>
                            </div>
                            <button onClick={() => {const el = document.getElementById(`in-${s.id}`); sendMessage(s.id, el.value); el.value="";}}>➤</button>
                        </div>
                    </div>
                </div>
            ))}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
