<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- React -->
https://unpkg.com/react@18/umd/react.development.js</script>
https://unpkg.com/react-dom@18/umd/react-dom.development.js
<script src=".com/@babel/standalone/babel.min.js

<!-- Modern UI Styles -->
<style>
:root {
  --primary: #1976d2;
  --primary-dark: #0f5ba8;
  --success: #2ecc71;
  --danger: #e74c3c;
  --warning: #f1c40f;
  --bg: #eef2f5;
  --card-bg: #ffffff;
  --radius: 14px;
  --shadow: 0 6px 16px rgba(0,0,0,0.08);
}

/* Geral */
body{
  font-family: "Inter", Arial, sans-serif;
  background: var(--bg);
  margin:0;
  padding:20px;
  color:#333;
}

.container{
  max-width:1100px;
  margin:auto;
}

/* Títulos */
h1{
  font-size:26px;
  font-weight:700;
  margin-bottom:20px;
  text-align:center;
  color:var(--primary-dark);
}

/* Cards */
.card{
  background:var(--card-bg);
  padding:20px;
  border-radius:var(--radius);
  margin-bottom:18px;
  box-shadow:var(--shadow);
  transition:0.2s;
}
.card:hover{
  transform:translateY(-2px);
}

/* Layout */
.row{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

/* Inputs */
input, select {
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d9d9d9;
  font-size:15px;
  min-width:140px;
  background:#fafafa;
  transition:0.2s;
}
input:focus, select:focus{
  border-color:var(--primary);
  outline:none;
  background:#fff;
  box-shadow:0 0 0 3px rgba(25,118,210,0.15);
}

/* Botões */
button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background:var(--primary);
  transition:0.2s;
}
button:hover{
  background:var(--primary-dark);
  transform:translateY(-1px);
}
button.green{ background:var(--success); }
button.green:hover{ background:#25b863; }
button.red{ background:var(--danger); }
button.red:hover{ background:#c0392b; }

/* Barras */
.bar{
  display:flex;
  gap:5px;
}
.box{
  width:16px;
  height:16px;
  border-radius:5px;
  border:1px solid #bbb;
  background:#e1e1e1;
  transition:0.2s;
}
.done{
  background:var(--success);
}

.degree{
  width:22px;
  height:22px;
  border-radius:6px;
  border:1px solid #999;
  background:#ddd;
  transition:0.2s;
}

/* Comportamental */
.beh{
  width:26px;
  height:26px;
  border-radius:50%;
  background:#eee;
  cursor:pointer;
  transition:0.2s;
  border:2px solid #ccc;
}
.beh:hover{
  transform:scale(1.12);
}

/* Pronto para exame */
.ready{
  background:#d5f5df;
  padding:10px;
  border-radius:10px;
  margin-top:12px;
  border-left:5px solid var(--success);
  font-weight:700;
  color:#1e7f43;
}

/* Nome do aluno */
.card b{
  font-size:18px;
  color:#111;
}

/* Texto */
.card > div{
  margin-bottom:6px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* --------- Configurações --------- */
const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
];

const trainingDays=[1,3,5,6];

/* --------- Funções utilitárias --------- */
function estimateDate(aulas){
  let date=new Date()
  let count=0
  while(count<aulas){
    date.setDate(date.getDate()+1)
    if(trainingDays.includes(date.getDay())) count++
  }
  return date.toLocaleDateString()
}

function ClassesBar({aulas}){
  return(
    <div className="bar">
      {Array.from({length:15}).map((_,i)=>{
        const done=i<(aulas%15)
        return <div key={i} className={"box "+(done?"done":"")}></div>
      })}
    </div>
  )
}

function PresenceBar({graus}){
  return(
    <div className="bar">
      {Array.from({length:8}).map((_,i)=>{
        let color="#ddd"
        if(i<graus) color=i<4?"#fff":"#e74c3c"
        return <div key={i} className="degree" style={{background:color}}></div>
      })}
    </div>
  )
}

/* --------- App Principal --------- */
function App(){

const [students,setStudents]=React.useState(()=>{
  const saved=localStorage.getItem("academia_preview_v2")
  return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
  nome:"",
  idade:"",
  faixa:"Branca",
  turma:"Baby"
})

React.useEffect(()=>{
  localStorage.setItem("academia_preview_v2",JSON.stringify(students))
},[students])

function addStudent(){
  if(!form.nome)return
  setStudents([...students,{
    id:Date.now(),
    ...form,
    aulas:0,
    historicoAulas:[],
    historicoGraus:[],
    historicoComportamental:[],
    comportamental:{
      relacionamento:null,
      comportamento:null,
      notas:null,
      habitos:null
    }
  }])
  setForm({nome:"",idade:"",faixa:"Branca",turma:"Baby"})
}

function addAttendance(id){
  setStudents(students.map(s=>{
    if(s.id!==id) return s
    const data=new Date().toLocaleDateString()
    const novas=s.aulas+1
    let historico=s.historicoGraus

    if(novas%15===0){
      historico=[...historico,{grau:Math.floor(novas/15),data}]
    }

    return{
      ...s,
      aulas:novas,
      historicoAulas:[...s.historicoAulas,{data}],
      historicoGraus:historico
    }
  }))
}

function markBehavior(id,key){
  setStudents(students.map(s=>{
    if(s.id!==id) return s
    const data=new Date().toLocaleDateString()
    return{
      ...s,
      comportamental:{...s.comportamental,[key]:data},
      historicoComportamental:[...s.historicoComportamental,{tipo:key,data}]
    }
  }))
}

function removeStudent(id){
  if(!confirm("Excluir aluno?"))return
  setStudents(students.filter(s=>s.id!==id))
}

const alunosProntos=students.filter(s=>{
  const graus=Math.min(Math.floor(s.aulas/15),8)
  const comportamentoCompleto=Object.values(s.comportamental).every(v=>v)
  const extras=Math.max(s.aulas-120,0)
  return graus===8 && comportamentoCompleto && extras>=8
})

return(
<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

<div className="card">
<b>Alunos prontos para exame</b>
{alunosProntos.map(a=>(
  <div key={a.id}>{a.nome}</div>
))}
</div>

<div className="card">
<div className="row">

<input placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}/>

<input placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}/>

<select value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}>
  {beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>
</div>

{students.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),8)
const comportamentoCompleto=Object.values(s.comportamental).every(v=>v)
const extras=Math.max(s.aulas-120,0)
const pronto=graus===8 && comportamentoCompleto && extras>=8

const faltam=Math.max(128-s.aulas,0)
const previsao=estimateDate(faltam)

return(
<div key={s.id} className="card">

<b>{s.nome}</b> — {s.idade} anos

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>
<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>
<PresenceBar graus={graus}/>

<div style={{display:"flex",gap:10,marginTop:8}}>

<div className="beh"
style={{background:s.comportamental.relacionamento?"#f1c40f":"#eee"}}
onClick={()=>markBehavior(s.id,"relacionamento")}></div>

<div className="beh"
style={{background:s.comportamental.comportamento?"#3498db":"#eee"}}
onClick={()=>markBehavior(s.id,"comportamento")}></div>

<div className="beh"
style={{background:s.comportamental.notas?"#e74c3c":"#eee"}}
onClick={()=>markBehavior(s.id,"notas")}></div>

<div className="beh"
style={{background:s.comportamental.habitos?"#2ecc71":"#eee"}}
onClick={()=>markBehavior(s.id,"habitos")}></div>

</div>

<div style={{marginTop:10}}>
<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="red"
onClick={()=>removeStudent(s.id)}>
Excluir
</button>
</div>

<div style={{marginTop:8,fontSize:13}}>
Faltam {faltam} aulas para exame
</div>

<div style={{fontSize:13}}>
Previsão troca faixa: {previsao}
</div>

{pronto &&
<div className="ready">
🥋 PRONTO PARA EXAME DE TROCA DE FAIXA
</div>
}

<div style={{marginTop:10,fontSize:12}}>
<b>Histórico graus presença</b>
{s.historicoGraus.map((h,i)=>(
  <div key={i}>{h.data} - Grau {h.grau}</div>
))}
</div>

<div style={{marginTop:10,fontSize:12}}>
<b>Histórico comportamental</b>
{s.historicoComportamental.map((h,i)=>(
  <div key={i}>{h.data} - {h.tipo}</div>
))}
</div>

</div>
)
})}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
