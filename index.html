<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Evolução Jiu Jitsu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-slate-100">

<div id="root"></div>

<script type="text/babel">

const belts=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){

date.setDate(date.getDate()+1)

if(trainingDays.includes(date.getDay()))
count++

}

return date.toLocaleDateString()

}

/* ------------------- FAIXA VISUAL ------------------- */

function Belt({faixa,graus}){

const colors={
"Branca":"#f5f5f5",
"Cinza/Branca":"linear-gradient(90deg,#9ca3af 50%,white 50%)",
"Cinza":"#9ca3af",
"Cinza/Preta":"linear-gradient(90deg,#9ca3af 50%,black 50%)",

"Amarela/Branca":"linear-gradient(90deg,#facc15 50%,white 50%)",
"Amarela":"#facc15",
"Amarela/Preta":"linear-gradient(90deg,#facc15 50%,black 50%)",

"Laranja/Branca":"linear-gradient(90deg,#fb923c 50%,white 50%)",
"Laranja":"#fb923c",
"Laranja/Preta":"linear-gradient(90deg,#fb923c 50%,black 50%)",

"Verde/Branca":"linear-gradient(90deg,#16a34a 50%,white 50%)",
"Verde":"#16a34a",
"Verde/Preta":"linear-gradient(90deg,#16a34a 50%,black 50%)"
}

return(

<div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"4px"}}>

<div
style={{
width:120,
height:14,
background:colors[faixa],
borderRadius:4,
border:"1px solid #333"
}}
></div>

<div
style={{
display:"flex",
background:"black",
padding:"2px",
gap:"2px"
}}
>

{Array.from({length:4}).map((_,i)=>{

const done=i<graus

return(
<div
key={i}
style={{
width:8,
height:14,
background:done?"white":"transparent"
}}
></div>
)

})}

</div>

</div>

)

}

/* ------------------- APP ------------------- */

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("jj_students")
return saved?JSON.parse(saved):[]
})

const [search,setSearch]=React.useState("")

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

React.useEffect(()=>{

localStorage.setItem("jj_students",JSON.stringify(students))

},[students])

function addStudent(){

if(!form.nome) return

setStudents([
...students,
{
id:Date.now(),
...form,
aulas:0
}
])

setForm({
nome:"",
idade:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
aulas:s.aulas+1
}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return

setStudents(students.filter(s=>s.id!==id))

}

const alunosFiltrados=students.filter(s=>
s.nome.toLowerCase().includes(search.toLowerCase())
)

return(

<div className="max-w-6xl mx-auto p-6">

<h1 className="text-3xl font-bold mb-6">
🥋 Controle Evolução Jiu Jitsu
</h1>

<div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

<div className="bg-white p-4 rounded-xl shadow">
<div className="text-sm text-gray-500">Alunos</div>
<div className="text-2xl font-bold">
{students.length}
</div>
</div>

<div className="bg-white p-4 rounded-xl shadow">
<div className="text-sm text-gray-500">Aulas totais</div>
<div className="text-2xl font-bold">
{students.reduce((a,b)=>a+b.aulas,0)}
</div>
</div>

</div>

<div className="bg-white p-4 rounded-xl shadow mb-6">

<div className="flex gap-2 flex-wrap">

<input
className="border p-2 rounded"
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
className="border p-2 rounded"
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
className="border p-2 rounded"
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{belts.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button
onClick={addStudent}
className="bg-green-500 text-white px-4 rounded"
>
Adicionar
</button>

</div>

</div>

<input
className="border p-2 rounded mb-6 w-full"
placeholder="Buscar aluno"
value={search}
onChange={e=>setSearch(e.target.value)}
/>

<div className="grid gap-4">

{alunosFiltrados.map(s=>{

const faltam=Math.max(128-s.aulas,0)

const previsao=estimateDate(faltam)

const graus=Math.min(Math.floor(s.aulas/15),4)

return(

<div key={s.id}
className="bg-white p-5 rounded-xl shadow flex justify-between items-center">

<div>

<div className="font-semibold text-lg">
{s.nome}
</div>

<div className="text-sm text-gray-500">
{s.idade} anos
</div>

<Belt faixa={s.faixa} graus={graus}/>

<div className="text-sm mt-2">
Aulas: {s.aulas}
</div>

<div className="text-sm text-gray-500">
Previsão faixa: {previsao}
</div>

</div>

<div className="flex gap-2">

<button
onClick={()=>addAttendance(s.id)}
className="bg-blue-500 text-white px-3 py-1 rounded"
>
Presença
</button>

<button
onClick={()=>removeStudent(s.id)}
className="bg-red-500 text-white px-3 py-1 rounded"
>
Excluir
</button>

</div>

</div>

)

})}

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
