<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{max-width:1000px;margin:auto}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

/* ========================= */
/* FAIXA REALISTA */
/* ========================= */

.beltContainer{
display:flex;
align-items:center;
margin-top:8px;
margin-bottom:10px
}

.belt{
height:18px;
width:180px;
border-top:3px solid #333;
border-bottom:3px solid #333;
position:relative
}

.beltTip{
width:26px;
height:24px;
background:black;
margin-left:4px
}

.beltStripe{
position:absolute;
right:6px;
top:2px;
display:flex;
gap:2px
}

.stripe{
width:6px;
height:14px;
border:1px solid #000
}

.stripe.white{background:white}
.stripe.red{background:#e74c3c}

/* ========================= */
/* BARRA AULAS ANIMADA */
/* ========================= */

.progressContainer{
width:100%;
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:6px
}

.progressFill{
height:100%;
background:#2ecc71;
transition:width .6s ease
}

/* caixas antigas mantidas */

.bar{display:flex;gap:3px}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{background:#2ecc71}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee;
cursor:pointer
}

.ready{
background:#d4edda;
padding:8px;
border-radius:6px;
margin-top:10px;
font-weight:bold
}

</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}

return date.toLocaleDateString()

}

/* ========================= */
/* BARRA DE AULAS ANIMADA */
/* ========================= */

function ClassesBar({aulas}){

const progresso=(aulas%15)/15*100

return(
<div>

<div className="progressContainer">
<div
className="progressFill"
style={{width:progresso+"%"}}
></div>
</div>

<div className="bar">

{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return <div key={i} className={"box "+(done?"done":"")}></div>
})}

</div>

</div>
)

}

/* ========================= */
/* FAIXA REALISTA */
/* ========================= */

function Belt({faixa,graus}){

const colors={
"Branca":"#ffffff",
"Cinza":"#9ca3af",
"Amarela":"#facc15",
"Laranja":"#fb923c",
"Verde":"#22c55e"
}

const corFaixa=Object.keys(colors).find(c=>faixa.includes(c))

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(

<div className="beltContainer">

<div
className="belt"
style={{background:colors[corFaixa] || "#fff"}}
>

<div className="beltStripe">

{Array.from({length:4}).map((_,i)=>{

let type=""

if(i<vermelhos) type="red"
else if(i<brancos) type="white"

return <div key={i} className={"stripe "+type}></div>

})}

</div>

</div>

<div className="beltTip"></div>

</div>

)

}

/* ========================= */
/* GRAUS PRESENÇA */
/* ========================= */

function PresenceBar({graus}){

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(
<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div
key={i}
className="degree"
style={{background:color}}
></div>
)

})}

</div>
)

}

/* ========================= */
/* APP */
/* ========================= */

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_preview_v2")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca",
turma:"Baby"
})

React.useEffect(()=>{
localStorage.setItem("academia_preview_v2",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome)return

setStudents([...students,{
id:Date.now(),
...form,
aulas:0,
historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}
}])

setForm({nome:"",idade:"",faixa:"Branca",turma:"Baby"})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()
const novas=s.aulas+1
let historico=s.historicoGraus

if(novas%15===0){
historico=[...historico,{grau:Math.floor(novas/15),data}]
}

return{
...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico
}

}))

}

function markBehavior(id,key){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()

return{
...s,
comportamental:{...s.comportamental,[key]:data},
historicoComportamental:[...s.historicoComportamental,{tipo:key,data}]
}

}))

}

function removeStudent(id){
if(!confirm("Excluir aluno?"))return
setStudents(students.filter(s=>s.id!==id))
}

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=>
<option key={b}>{b}</option>
)}

</select>

<button
className="green"
onClick={addStudent}
>
Adicionar aluno
</button>

</div>

</div>

{students.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),8)

return(

<div key={s.id} className="card">

<b>{s.nome}</b> — {s.idade} anos

<div>Faixa: {s.faixa}</div>

<Belt faixa={s.faixa} graus={graus}/>

<div>Aulas</div>
<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>
<PresenceBar graus={graus}/>

<button
style={{marginTop:10}}
onClick={()=>addAttendance(s.id)}
>
Registrar presença
</button>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
