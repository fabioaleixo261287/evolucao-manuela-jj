<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }

button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; font-size: 13px; }
button.red { background:#e74c3c; }
button.orange { background:#f39c12; }
button.small-edit { background: none; color: #777; padding: 2px; font-size: 16px; margin-left: 5px; border-radius: 4px; border: 1px solid #ddd; width: 26px; height: 26px; }
button.small-edit:hover { background: #eee; }

/* Avatar */
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; }

/* Aulas */
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { 
    width:36px; height:36px; border-radius:50%; border:1px solid #ddd; 
    display:flex; align-items:center; justify-content:center; 
    font-size:13px; background:#fff; color:#777; cursor: pointer; font-weight: bold;
}
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }

/* Graus */
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:26px; height:26px; border:1px solid #333; border-radius:4px; background:#ddd; }

/* Comportamentais */
.beh-row { display: flex; gap: 12px; margin: 15px 0; }
.beh-circle { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; cursor:pointer; border:1px solid #ccc; font-size:11px; }

/* Chat */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:220px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; font-size:14px; max-width:80%; }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.chat-input-area { display:flex; gap:8px; padding:12px; background:#f0f0f0; border-top: 1px solid #ddd; }
.chat-input-area textarea { flex:1; border:none; padding:10px; border-radius:8px; height: 40px; resize: none; font-size: 14px; }

/* Edit Form inside card */
.edit-form { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #ddd; }
.history-list { font-size: 11px; color: #666; max-height: 80px; overflow-y: auto; background: #fafafa; padding: 8px; border-radius: 6px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
const BEH_DATA = [
    { k: 'REL', c: '#f1c40f', n: 'Relacionamento' },
    { k: 'DIS', c: '#3498db', n: 'Disciplina' },
    { k: 'ORG', c: '#e74c3c', n: 'Organização' },
    { k: 'HAB', c: '#2ecc71', n: 'Bons Hábitos' }
];

function getRules(nasc, faixa) {
    const idade = nasc ? new Date().getFullYear() - new Date(nasc).getFullYear() : 0;
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [editingId, setEditingId] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_inf_v4") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("all_inf_v4", JSON.stringify(students)) }, [students]);

    const addStudent = () => {
        if (!form.nome || !form.nascimento) return;
        setStudents([...students, {
            id: Date.now(), ...form, avatar: "https://via.placeholder.com/80",
            aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {}
        }]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    const updateStudent = (id, fields) => {
        setStudents(students.map(s => s.id === id ? { ...s, ...fields, history: [{date: new Date().toLocaleDateString(), msg: "Dados editados pelo professor"}, ...s.history] } : s));
        setEditingId(null);
    };

    const markClass = (id, n) => {
        if (user !== "professor") return;
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const meta = getRules(s.nascimento, s.faixa).m;
            let novaContagem = s.aulasNoCiclo === n ? n - 1 : n;
            let hist = [...s.history];
            if (novaContagem === meta) {
                alert("Grau Conquistado!");
                hist.unshift({ date: new Date().toLocaleDateString(), msg: `GRAU: ${s.grausGanhos + 1}º conquistado` });
                return { ...s, aulasNoCiclo: 0, grausGanhos: s.grausGanhos + 1, history: hist };
            }
            return { ...s, aulasNoCiclo: novaContagem };
        }));
    };

    const toggleBeh = (id, b) => {
        if (user !== "professor") return;
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const ativo = s.comportamental[b.k];
            const hist = [{date: new Date().toLocaleDateString(), msg: `${ativo ? 'Removido' : 'Concedido'}: ${b.n}`}, ...s.history];
            return { ...s, comportamental: { ...s.comportamental, [b.k]: !ativo }, history: hist };
        }));
    };

    const handleFile = (id, e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = ev.target.result;
            setStudents(students.map(s => {
                if (s.id !== id) return s;
                if (type === 'avatar') return { ...s, avatar: data };
                if (type === 'repo') {
                    const n = prompt("Nome do documento:", file.name);
                    return { ...s, docs: [...s.docs, { name: n, data }], history: [{date: new Date().toLocaleDateString(), msg: `Documento: ${n}`}, ...s.history] };
                }
                if (type === 'chat') {
                    const msg = { id: Date.now(), sender: user === "professor" ? "Professor" : "Pais", text: "", file: {name: file.name, data, type: file.type}, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                    return { ...s, chat: [...s.chat, msg] };
                }
                return s;
            }));
        };
        reader.readAsDataURL(file);
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h1 style={{color:'#075e54'}}>Alliance Infantil</h1>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button className="green" onClick={addStudent}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome completo do aluno..." style={{width:'100%'}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row" style={{alignItems:'flex-start'}}>
                            <label className="avatar-container">
                                <img src={s.avatar} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleFile(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <div style={{display:'flex', alignItems:'center'}}>
                                    <h2 style={{margin:0}}>{s.nome}</h2>
                                    {user === "professor" && <button className="small-edit" onClick={() => setEditingId(editingId === s.id ? null : s.id)}>⚙️</button>}
                                </div>
                                <span style={{color:'#666'}}>{rules.p} | Faixa {s.faixa}</span>
                            </div>
                        </div>

                        {editingId === s.id && (
                            <div className="edit-form">
                                <strong>Editar Informações:</strong>
                                <div className="row" style={{marginTop:10}}>
                                    <input placeholder="Nome" defaultValue={s.nome} id={`edit-nome-${s.id}`} />
                                    <input type="date" defaultValue={s.nascimento} id={`edit-nasc-${s.id}`} />
                                    <select defaultValue={s.faixa} id={`edit-faixa-${s.id}`}>
                                        {BELTS.map(b => <option key={b}>{b}</option>)}
                                    </select>
                                    <button onClick={() => updateStudent(s.id, {
                                        nome: document.getElementById(`edit-nome-${s.id}`).value,
                                        nascimento: document.getElementById(`edit-nasc-${s.id}`).value,
                                        faixa: document.getElementById(`edit-faixa-${s.id}`).value
                                    })}>Salvar</button>
                                    <button className="red" onClick={() => {if(confirm("Excluir aluno?")) setStudents(students.filter(x=>x.id!==s.id))}}>Excluir</button>
                                </div>
                            </div>
                        )}

                        <div style={{marginTop:15}}><b>Presença Ciclo (Meta: {rules.m}):</b></div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i + 1)}>{i + 1}</div>
                            ))}
                        </div>

                        <div style={{marginTop:10}}><b>Graus Conquistados:</b></div>
                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="beh-row">
                            {BEH_DATA.map(b => (
                                <div key={b.k} className="beh-circle" 
                                     style={{ background: s.comportamental[b.k] ? b.c : '#eee', color: s.comportamental[b.k] ? '#fff' : '#888' }}
                                     onClick={() => toggleBeh(s.id, b)}>
                                     {b.k}
                                </div>
                            ))}
                        </div>

                        <div className="history-box">
                            <strong>📜 Histórico:</strong>
                            <div className="history-list">
                                {s.history.map((h, i) => <div key={i}>• [{h.date}] {h.msg}</div>)}
                            </div>
                        </div>

                        <div className="repo-box">
                            <strong>📂 Documentos</strong>
                            {user === "professor" && (
                                <label style={{marginLeft:10, color:'#25d366', cursor:'pointer', fontSize:11}}> [+ NOVO] <input type="file" hidden onChange={e => handleFile(s.id, e, 'repo')} /></label>
                            )}
                            <div style={{marginTop:5}}>
                                {s.docs.map((d, i) => (
                                    <div key={i} className="doc-card"><span>{d.name}</span><a href={d.data} download={d.name} style={{color:'#3498db', fontWeight:'bold'}}>BAIXAR</a></div>
                                ))}
                            </div>
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {(s.chat || []).map(m => (
                                    <div key={m.id} className={`msg ${m.sender === (user === "professor" ? "Professor" : "Pais") ? 'sent' : 'received'}`}>
                                        <small style={{fontWeight:'bold', display:'block', fontSize:9}}>{m.sender.toUpperCase()}</small>
                                        {m.file && (m.file.type.startsWith('image/') ? <img src={m.file.data} style={{maxWidth:'100%', borderRadius:8}} /> : <a href={m.file.data} download={m.file.name}>📄 {m.file.name}</a>)}
                                        {m.text && <div>{m.text}</div>}
                                        <div style={{fontSize:9, textAlign:'right', opacity:0.6}}>{m.time}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer', fontSize:18}}>📎<input type="file" hidden onChange={e => handleFile(s.id, e, 'chat')}/></label>
                                <textarea id={`in-${s.id}`} placeholder="Mensagem..." onKeyDown={e => {if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); updateStudent(s.id, { chat: [...s.chat, {id: Date.now(), sender: user === "professor" ? "Professor" : "Pais", text: e.target.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] }); e.target.value = ""; }}}></textarea>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
