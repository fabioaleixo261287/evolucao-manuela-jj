<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
button.blue { background:#3498db; }

/* Avatar Otimizado */
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }

/* Bolinhas e Graus */
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:34px; height:34px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:12px; background:#fff; cursor: pointer; font-weight: bold; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:24px; height:24px; border:1px solid #333; border-radius:4px; background:#ddd; cursor: pointer; }

/* Comportamentais Estilizados */
.beh-row { display: flex; gap: 8px; margin: 15px 0; }
.beh-btn { flex: 1; padding: 10px 5px; border-radius: 8px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; color: white; opacity: 0.3; text-align: center; }
.beh-btn.active { opacity: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

/* Chat e Repositório */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:200px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; font-size:13px; max-width:85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.msg img { max-width: 150px; border-radius: 8px; cursor: pointer; display: block; margin-top: 5px; }

.chat-input-area { display:flex; gap:8px; padding:10px; background:#f0f0f0; align-items: center; }
.chat-input-area textarea { flex:1; border:1px solid #ccc; padding:8px; border-radius:8px; height: 35px; resize: none; font-family: inherit; }

.repo-box { margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 10px; border: 1px dashed #ccc; }
.doc-item { display: flex; justify-content: space-between; background: white; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 12px; border: 1px solid #eee; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_DATA = {
    REL: { n: "RELACIONAMENTO", c: "#f1c40f", desc: "• Respeitar a todos\n• Tratar como gostaria de ser tratado\n• Ser gentil ao pedir\n• Paciência com colegas\n• Não fazer bullying" },
    DIS: { n: "COMPORTAMENTO E DISCIPLINA", c: "#3498db", desc: "• Faz o que é pedido\n• Presta atenção\n• Não sai do tatame sem avisar\n• Ajuda os colegas" },
    ORG: { n: "ORGANIZAÇÃO E PONTUALIDADE", c: "#e74c3c", desc: "• Boas notas escolares\n• Pontualidade\n• Cuidar do uniforme\n• Saber amarrar a faixa" },
    HAB: { n: "COMPROMETIMENTO", c: "#2ecc71", desc: "• Boa alimentação\n• Higiene pessoal\n• Atividade física\n• Pensamentos positivos" }
};

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_eagle_final_v1") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_eagle_final_v1", JSON.stringify(students)) }, [students]);

    // SOLUÇÃO PARA O ERRO DE TELA BRANCA: Compressão agressiva de imagem
    const processImage = (file, maxWidth, callback) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ratio = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * ratio;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.6)); // Reduz qualidade para 60%
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    const handleUpload = (id, e, target) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (target === 'avatar') {
            processImage(file, 100, (data) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: data } : s));
            });
        } else if (target === 'chat') {
            const isImg = file.type.startsWith('image/');
            if (isImg) {
                processImage(file, 400, (data) => {
                    setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user, text: "", file: { name: file.name, data, isImg: true } }] } : s));
                });
            } else {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user, text: "", file: { name: file.name, data: ev.target.result, isImg: false } }] } : s));
                };
                reader.readAsDataURL(file);
            }
        } else if (target === 'repo') {
            const reader = new FileReader();
            reader.onload = (ev) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: file.name, data: ev.target.result }] } : s));
            };
            reader.readAsDataURL(file);
        }
    };

    const sendMessage = (id) => {
        const input = document.getElementById(`msg-${id}`);
        if (!input.value.trim()) return;
        setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user, text: input.value }] } : s));
        input.value = "";
    };

    const getAge = (n) => n ? new Date().getFullYear() - new Date(n).getFullYear() : 0;

    const getRules = (nasc, faixa) => {
        const idade = getAge(nasc);
        const isW = faixa.includes("Branca") || faixa.includes("Cinza");
        if (idade <= 5) return { p: "Baby Eagle", m: 12 };
        if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
        return { p: "Infantil", m: 15 };
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle System</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h3 style={{margin:0, color:'#075e54'}}>Eagle System</h3>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                        <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => {if(form.nome) setStudents([...students, {id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, chat: [], docs: [], comportamental: {}}]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do aluno..." style={{width:'100%', padding:12}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80"} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleUpload(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0}}>{s.nome} ({getAge(s.nascimento)} anos)</h3>
                                <small>{rules.p} | {s.faixa}</small>
                            </div>
                            {user === "professor" && <button className="blue" onClick={() => {const f = prompt("Nova Faixa:", s.faixa); if(f) setStudents(students.map(x => x.id === s.id ? {...x, faixa: f, aulasNoCiclo: 0, grausGanhos: 0} : x))}}>Trocar Faixa</button>}
                        </div>

                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => user === 'professor' && setStudents(students.map(x => x.id === s.id ? {...x, aulasNoCiclo: s.aulasNoCiclo === i+1 ? i : i+1} : x))}>{i + 1}</div>
                            ))}
                        </div>

                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" onClick={() => user === 'professor' && setStudents(students.map(x => x.id === s.id ? {...x, grausGanhos: i+1} : x))} style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="beh-row">
                            {Object.keys(BEH_DATA).map(k => (
                                <div key={k} className={`beh-btn ${s.comportamental[k] ? 'active' : ''}`} style={{background: BEH_DATA[k].c}} 
                                     onClick={() => {
                                         if(user === 'professor') setStudents(students.map(x => x.id === s.id ? {...x, comportamental: {...x.comportamental, [k]: !x.comportamental[k]}} : x));
                                         alert(BEH_DATA[k].n + "\n\n" + BEH_DATA[k].desc);
                                     }}>{k}</div>
                            ))}
                        </div>

                        <div className="repo-box">
                            <strong>📂 Repositório de Documentos</strong>
                            {user === 'professor' && <input type="file" onChange={e => handleUpload(s.id, e, 'repo')} style={{fontSize:10, marginLeft:10}} />}
                            <div style={{marginTop:10}}>
                                {s.docs?.map((d, i) => (
                                    <div key={i} className="doc-item">
                                        <span>{d.name}</span>
                                        <a href={d.data} download={d.name} style={{color:'#075e54', textDecoration:'none', fontWeight:'bold'}}>Download</a>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === user ? 'sent' : 'received'}`}>
                                        <small style={{display:'block', fontSize:9, fontWeight:'bold', marginBottom:3}}>{m.sender.toUpperCase()}</small>
                                        {m.text && <div>{m.text}</div>}
                                        {m.file && (
                                            <div>
                                                {m.file.isImg ? <img src={m.file.data} onClick={() => window.open(m.file.data)} /> : <div style={{padding:5, background:'#eee', borderRadius:5, margin:'5px 0'}}>📄 {m.file.name}</div>}
                                                <a href={m.file.data} download={m.file.name} style={{fontSize:10, color:'#075e54'}}>Baixar Arquivo</a>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer', fontSize:20}}>📎<input type="file" hidden onChange={e => handleUpload(s.id, e, 'chat')} /></label>
                                <textarea id={`msg-${s.id}`} placeholder="Mensagem..." onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), sendMessage(s.id))} />
                                <button onClick={() => sendMessage(s.id)}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
