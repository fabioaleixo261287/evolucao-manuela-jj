<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu KIDS Mooca - Jiu Jitsu KIDS Mooca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#f0f2f5; margin:0; padding:10px; }
    .container { max-width:850px; margin:auto; width: 100%; box-sizing: border-box; }
    .header-main { text-align: center; color: #075e54; margin-bottom: 20px; }
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items: center; }
    button { padding:10px 16px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
    button.red { background: #e74c3c; }

    /* Estilo da Faixa de Graduação */
    .belt-display { 
        background: #222; 
        height: 50px; 
        border-radius: 4px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 0 15px; 
        margin: 15px 0;
        border: 2px solid #000;
        position: relative;
    }
    
    /* Lado Esquerdo: Presença (Brancos e Vermelhos sobrepostos) */
    .presence-side { display: flex; gap: 4px; }
    .degree-presence { width: 12px; height: 35px; border-radius: 1px; }
    .degree-presence.white { background: #fff; box-shadow: 0 0 3px rgba(255,255,255,0.5); }
    .degree-presence.red { background: #e74c3c; box-shadow: 0 0 3px rgba(231,76,60,0.5); }
    .degree-presence.empty { border: 1px solid #444; }

    /* Lado Direito: Comportamento (Quadrados Coloridos) */
    .behavior-side { display: flex; gap: 6px; }
    .degree-behavior { width: 20px; height: 20px; border-radius: 3px; cursor: pointer; border: 1px solid #444; }

    .bar-aulas { display: flex; gap: 3px; margin: 10px 0; flex-wrap: wrap; }
    .box-aula { width: 14px; height: 14px; border: 1px solid #ddd; background: #eee; border-radius: 2px; }
    .box-aula.done { background: #2ecc71; border-color: #27ae60; }

    /* WhatsApp Style Fix */
    .wa-chat { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .wa-messages { height: 150px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .wa-msg { background: #fff; padding: 8px 12px; border-radius: 8px; font-size: 13px; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .wa-msg.me { background: #dcf8c6; align-self: flex-end; }
    
    .wa-input-bar { background: #f0f0f0; padding: 8px 12px; display: flex; align-items: center; gap: 12px; }
    .wa-input-container { flex: 1; background: #fff; border-radius: 25px; display: flex; align-items: center; padding: 0 12px; }
    .wa-input-container input { flex: 1; border: none; padding: 10px; outline: none; font-size: 15px; }
    .wa-input-container i { color: #8696a0; font-size: 20px; cursor: pointer; }
    .wa-mic { background: #075e54; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

    .repo-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
    .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
    .repo-item { aspect-ratio: 1/1; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; text-align: center; padding: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const beltOrder = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const getRules = (category, belt) => {
    const isYellowOrange = belt.includes("Amarela") || belt.includes("Laranja");
    if (category === "BABY EAGLE") return 12;
    if (category === "LITTLE EAGLE" || category === "EAGLE WARRIOR") return isYellowOrange ? 20 : 15;
    if (category === "EAGLE YOUTH") {
        if (belt.includes("Verde")) return 25;
        return isYellowOrange ? 22 : 20;
    }
    return 15;
};

function getAge(date) {
    const hoje = new Date();
    const nasc = new Date(date);
    let idade = hoje.getFullYear() - nasc.getFullYear();
    if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
    return idade;
}

function getCategory(idade) {
    if (idade === 4) return "BABY EAGLE";
    if (idade >= 5 && idade <= 8) return "LITTLE EAGLE";
    if (idade >= 9 && idade <= 12) return "EAGLE WARRIOR";
    if (idade >= 13 && idade <= 15) return "EAGLE YOUTH";
    return "INFANTIL";
}

function App() {
    const [user, setUser] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_mooca_v5") || "[]"));

    React.useEffect(() => { localStorage.setItem("alliance_mooca_v5", JSON.stringify(students)); }, [students]);

    const addStudent = (form) => {
        setStudents([...students, { id: Date.now(), ...form, aulas: 0, chat: [], docs: [], comportamental: [false, false, false, false] }]);
    };

    const handleFile = (id, e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            setStudents(students.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: file.name, url: ev.target.result }] } : s));
        };
        reader.readAsDataURL(file);
    };

    if (!user) return (
        <div style={{ textAlign: 'center', padding: 50 }}>
            <h2>Alliance Jiu Jitsu KIDS Mooca</h2>
            <button onClick={() => setUser("professor")}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{ marginLeft: 10, background: '#3498db' }}>Acesso Pais</button>
        </div>
    );

    return (
        <div className="container">
            <header className="header-main">
                <h2>Alliance Jiu Jitsu KIDS Mooca</h2>
                <button className="red" onClick={() => setUser("")}>Sair</button>
            </header>

            {students.map(s => {
                const idade = getAge(s.nascimento);
                const categoria = getCategory(idade);
                const aulasPorGrau = getRules(categoria, s.faixa);
                const totalGraus = Math.floor(s.aulas / aulasPorGrau);
                const aulasNoCiclo = s.aulas % aulasPorGrau;

                return (
                    <div key={s.id} className="card">
                        <div className="row" style={{justifyContent: 'space-between'}}>
                            <b>{s.nome}</b>
                            <span style={{fontSize: 12}}>{s.faixa} | {categoria}</span>
                        </div>

                        <div className="bar-aulas">
                            {Array.from({ length: aulasPorGrau }).map((_, i) => (
                                <div key={i} className={`box-aula ${i < aulasNoCiclo ? 'done' : ''}`}></div>
                            ))}
                        </div>

                        {/* FAIXA DE GRADUAÇÃO ESTILO IMAGEM */}
                        <div className="belt-display">
                            {/* Esquerda: Graus de Presença (4 brancos + 4 vermelhos sobrepostos) */}
                            <div className="presence-side">
                                {[0,1,2,3,4,5,6,7].map(i => {
                                    let cls = "empty";
                                    if (totalGraus > i) cls = i < 4 ? "white" : "red";
                                    return <div key={i} className={`degree-presence ${cls}`}></div>;
                                })}
                            </div>
                            
                            {/* Direita: Graus de Comportamento */}
                            <div className="behavior-side">
                                {['#f1c40f', '#3498db', '#e74c3c', '#2ecc71'].map((color, i) => (
                                    <div key={i} className="degree-behavior" 
                                         style={{ background: s.comportamental[i] ? color : 'transparent' }}
                                         onClick={() => { if(user === "professor") {
                                             const newBeh = [...s.comportamental];
                                             newBeh[i] = !newBeh[i];
                                             setStudents(students.map(st => st.id === s.id ? {...st, comportamental: newBeh} : st));
                                         }}}></div>
                                ))}
                            </div>
                        </div>

                        {user === "professor" && (
                            <div className="row" style={{marginBottom: 10}}>
                                <button onClick={() => setStudents(students.map(st => st.id === s.id ? {...st, aulas: st.aulas + 1} : st))}>+ Aula</button>
                                <button className="red" onClick={() => setStudents(students.filter(st => st.id !== s.id))}>Excluir</button>
                            </div>
                        )}

                        {/* WhatsApp Chat Style */}
                        <div className="wa-chat">
                            <div className="wa-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`wa-msg ${m.from === 'Prof' ? 'me' : ''}`}>{m.txt}</div>
                                ))}
                            </div>
                            <div className="wa-input-bar">
                                <div className="wa-input-container">
                                    <i className="fas fa-plus"></i>
                                    <i className="far fa-face-smile" style={{marginLeft: 10}}></i>
                                    <input placeholder="Digite uma mensagem" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value){
                                            const m = { from: user === 'professor' ? 'Prof' : 'Pais', txt: e.target.value };
                                            setStudents(students.map(st => st.id === s.id ? {...st, chat: [...st.chat, m]} : st));
                                            e.target.value = "";
                                        }
                                    }} />
                                </div>
                                <div className="wa-mic"><i className="fas fa-microphone"></i></div>
                            </div>
                        </div>

                        {/* Documentos Importantes */}
                        <div className="repo-section">
                            <div style={{fontSize: 12, marginBottom: 5}}><b>DOCUMENTOS IMPORTANTES:</b></div>
                            <div className="repo-grid">
                                {s.docs.map((d, i) => (
                                    <div key={i} className="repo-item" onClick={() => window.open(d.url)}>
                                        <i className="fas fa-file-pdf" style={{fontSize: 20, color: '#e74c3c'}}></i>
                                        <span style={{marginTop: 4}}>{d.name}</span>
                                    </div>
                                ))}
                                {user === "professor" && (
                                    <div className="repo-item" onClick={() => document.getElementById(`f-${s.id}`).click()}>
                                        <i className="fas fa-upload"></i>
                                        <input type="file" id={`f-${s.id}`} hidden onChange={e => handleFile(s.id, e)} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            })}

            {user === "professor" && (
                <button style={{width: '100%', marginTop: 20}} onClick={() => {
                    const nome = prompt("Nome do Aluno:");
                    const nasc = prompt("Data Nascimento (AAAA-MM-DD):");
                    if(nome && nasc) addStudent({nome, nascimento: nasc, faixa: "Branca"});
                }}>+ Novo Aluno</button>
            )}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
