<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
button.blue { background:#3498db; }

/* Avatar */
.avatar-container { position: relative; width: 70px; height: 70px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #075e54; background: #eee; }

/* Presença e Graus */
.bar-bolinhas { display:flex; gap:5px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:32px; height:32px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:11px; background:#fff; cursor: pointer; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:22px; height:22px; border:1px solid #333; border-radius:4px; background:#ddd; cursor: pointer; }

/* Comportamentais - Cores das Imagens */
.beh-row { display: flex; gap: 5px; margin: 15px 0; }
.beh-btn { flex: 1; padding: 8px 2px; border-radius: 6px; font-size: 9px; font-weight: bold; border: none; cursor: pointer; color: white; opacity: 0.3; text-align: center; }
.beh-btn.active { opacity: 1; transform: scale(1.05); }

/* Chat e Repo */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:180px; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.msg { padding:8px; border-radius:8px; font-size:12px; max-width:80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.msg-info { font-size: 9px; color: #666; font-weight: bold; margin-bottom: 2px; display: flex; justify-content: space-between; gap: 10px; }

.chat-input-area { display:flex; gap:5px; padding:10px; background:#f0f0f0; align-items: center; }
.chat-input-area textarea { flex:1; border:1px solid #ccc; padding:8px; border-radius:8px; height: 32px; resize: none; }

.history-box { font-size: 10px; color: #666; background: #f9f9f9; padding: 8px; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }
.repo-box { margin-top: 10px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
.doc-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; padding: 4px; border-bottom: 1px solid #eee; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_DATA = {
    REL: { n: "RELACIONAMENTO", c: "#f1c40f", desc: "Respeito, gentileza e paciência." },
    DIS: { n: "DISCIPLINA", c: "#3498db", desc: "Atenção, frequência e comportamento." },
    ORG: { n: "ORGANIZAÇÃO", c: "#e74c3c", desc: "Notas, pontualidade e uniforme." },
    HAB: { n: "BONS HÁBITOS", c: "#2ecc71", desc: "Saúde, higiene e compromisso." }
};

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => {
        try {
            return JSON.parse(localStorage.getItem("alliance_pro_v1")) || [];
        } catch (e) {
            localStorage.clear();
            return [];
        }
    });
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => {
        try {
            localStorage.setItem("alliance_pro_v1", JSON.stringify(students));
        } catch (e) {
            alert("Memória cheia! Remova fotos ou mensagens antigas.");
        }
    }, [students]);

    const miniUpload = (id, file, target) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const size = target === 'avatar' ? 60 : 300;
                const scale = size / img.width;
                canvas.width = size;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressed = canvas.toDataURL('image/jpeg', 0.5);
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                setStudents(prev => prev.map(s => {
                    if(s.id !== id) return s;
                    if(target === 'avatar') return {...s, avatar: compressed};
                    const msg = { sender: user, text: "", time, file: { name: file.name, data: compressed, isImg: true } };
                    return {...s, chat: [...s.chat, msg], history: [{date: new Date().toLocaleDateString(), msg: "Foto enviada no chat"}, ...s.history]};
                }));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };

    const handlePromo = (id) => {
        setStudents(prev => prev.map(s => {
            if(s.id !== id) return s;
            const idx = BELTS.indexOf(s.faixa);
            const nextBelt = idx < BELTS.length - 1 ? BELTS[idx + 1] : s.faixa;
            const confirm = window.confirm(`Promover ${s.nome} para a faixa ${nextBelt}? Isso limpará as aulas e graus atuais.`);
            if(!confirm) return s;
            return {
                ...s, 
                faixa: nextBelt, 
                aulasNoCiclo: 0, 
                grausGanhos: 0, 
                history: [{date: new Date().toLocaleDateString(), msg: `PROMOVIDO para ${nextBelt}`}, ...s.history]
            };
        }));
    };

    const sendMsg = (id, text) => {
        if(!text.trim()) return;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        setStudents(prev => prev.map(s => s.id === id ? {
            ...s, 
            chat: [...s.chat, { sender: user, text, time }],
            history: [{date: new Date().toLocaleDateString(), msg: "Nova mensagem no chat"}, ...s.history]
        } : s));
    };

    const markClass = (id, n) => {
        if(user !== "professor") return;
        setStudents(prev => prev.map(s => {
            if(s.id !== id) return s;
            const nova = s.aulasNoCiclo === n ? n - 1 : n;
            return {...s, aulasNoCiclo: nova, history: [{date: new Date().toLocaleDateString(), msg: `Presença: ${nova} aulas`}, ...s.history]};
        }));
    };

    const getAge = (n) => n ? new Date().getFullYear() - new Date(n).getFullYear() : 0;

    if (!user) return (
        <div className="card" style={{ maxWidth: 320, margin: '80px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Eagle</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Acesso Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Acesso Pais</button>
        </div>
    );

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <strong>Eagle System</strong>
                <button onClick={() => {setUser(""); setFilho("");}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                        <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => { if(form.nome) setStudents([...students, {id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, chat: [], docs: [], comportamental: {}, history: []}]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>Add</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do Aluno..." onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {(user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students).map(s => (
                <div key={s.id} className="card">
                    <div className="row">
                        <label className="avatar-container">
                            <img src={s.avatar || "https://via.placeholder.com/60"} className="avatar-img" />
                            <input type="file" hidden accept="image/*" onChange={e => miniUpload(s.id, e.target.files[0], 'avatar')} />
                        </label>
                        <div style={{flex:1}}>
                            <h3 style={{margin:0}}>{s.nome} ({getAge(s.nascimento)} anos)</h3>
                            <small><b>Faixa:</b> {s.faixa}</small>
                        </div>
                        {user === 'professor' && <button className="blue" onClick={() => handlePromo(s.id)}>Trocar Faixa</button>}
                    </div>

                    <div className="bar-bolinhas">
                        {Array.from({ length: 15 }).map((_, i) => (
                            <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => markClass(s.id, i+1)}>{i+1}</div>
                        ))}
                    </div>

                    <div className="degree-bar">
                        {Array.from({ length: 8 }).map((_, i) => (
                            <div key={i} className="degree" onClick={() => user==='professor' && setStudents(students.map(x => x.id === s.id ? {...x, grausGanhos: i+1} : x))} style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                        ))}
                    </div>

                    <div className="beh-row">
                        {Object.keys(BEH_DATA).map(k => (
                            <div key={k} className={`beh-btn ${s.comportamental[k] ? 'active' : ''}`} style={{background: BEH_DATA[k].c}} 
                                 onClick={() => {
                                     if(user==='professor') setStudents(students.map(x => x.id === s.id ? {...x, comportamental: {...x.comportamental, [k]: !x.comportamental[k]}, history: [{date: new Date().toLocaleDateString(), msg: `Grau ${k} alterado`}, ...s.history]} : x));
                                     alert(BEH_DATA[k].n + ": " + BEH_DATA[k].desc);
                                 }}>{k}</div>
                        ))}
                    </div>

                    <div className="history-box">
                        <strong>📜 Histórico:</strong>
                        {s.history?.slice(0, 3).map((h, i) => <div key={i}>• {h.date}: {h.msg}</div>)}
                    </div>

                    <div className="repo-box">
                        <strong>📂 Repositório</strong>
                        {user === 'professor' && <input type="file" onChange={e => {
                            const reader = new FileReader();
                            reader.onload = (ev) => setStudents(students.map(x => x.id === s.id ? {...x, docs: [...x.docs, {name: e.target.files[0].name, data: ev.target.result}]} : x));
                            reader.readAsDataURL(e.target.files[0]);
                        }} style={{fontSize:10}} />}
                        {s.docs?.map((d, i) => <div key={i} className="doc-item">{d.name} <a href={d.data} download={d.name}>Baixar</a></div>)}
                    </div>

                    <div className="chat-wrapper">
                        <div className="chat-messages">
                            {s.chat.map((m, i) => (
                                <div key={i} className={`msg ${m.sender === user ? 'sent' : 'received'}`}>
                                    <div className="msg-info">
                                        <span>{m.sender === 'professor' ? 'PROFESSOR' : 'FAMÍLIA'}</span>
                                        <span>{m.time}</span>
                                    </div>
                                    {m.text && <div>{m.text}</div>}
                                    {m.file && (m.file.isImg ? <img src={m.file.data} style={{width:'100%', borderRadius:5, marginTop:5}} /> : <a href={m.file.data} download={m.file.name}>📄 {m.file.name}</a>)}
                                </div>
                            ))}
                        </div>
                        <div className="chat-input-area">
                            <label style={{cursor:'pointer'}}>📎<input type="file" hidden onChange={e => miniUpload(s.id, e.target.files[0], 'chat')} /></label>
                            <textarea id={`msg-${s.id}`} placeholder="Digite e aperte Enter..." onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), sendMsg(s.id, e.target.value), e.target.value="")} />
                        </div>
                    </div>
                </div>
            ))}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
