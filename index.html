<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px
}

.container{
  max-width:1000px;
  margin:auto
}

.card{
  background:white;
  padding:16px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px
}

button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#3498db;
  color:white;
  cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc
}

.bar{
  display:flex;
  gap:3px
}

.box{
  width:14px;
  height:14px;
  border:1px solid #999;
  background:#eee
}

.done{
  background:#2ecc71
}

.degree{
  width:20px;
  height:20px;
  border:1px solid #555;
  border-radius:3px;
  background:#ddd
}

.beh{
  width:22px;
  height:22px;
  border-radius:22px;
  background:#eee
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ddd;
}

.editAvatar{
  position:absolute;
  bottom:0;
  right:0;
  font-size:10px;
  background:#3498db;
  color:white;
  border-radius:6px;
  padding:2px 4px;
  cursor:pointer;
}

.studentHeader{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
  position:relative;
}

.login{
  max-width:400px;
  margin:auto
}

.chatBox{
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:12px;
  background:#fff
}

.messages{
  max-height:220px;
  overflow-y:auto;
  margin-bottom:10px
}

.message{
  padding:6px 10px;
  border-radius:12px;
  margin-bottom:5px;
  display:inline-block;
  max-width:70%;
  word-wrap:break-word
}

.message.user{
  background:#dcf8c6;
  margin-left:auto;
  display:block
}

.message.prof{
  background:#fff;
  border:1px solid #ddd;
  margin-right:auto;
  display:block
}

.chatInput{
  display:flex;
  gap:5px;
  align-items:center
}

.chatInput input[type=text]{
  flex:1
}

</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){
const hoje=new Date()
const nasc=new Date(date)
let idade=hoje.getFullYear()-nasc.getFullYear()
const m=hoje.getMonth()-nasc.getMonth()
if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--
return idade
}

function getCategory(idade){
if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"
return "FORA CATEGORIA"
}

function estimateDate(aulas){
let date=new Date()
let count=0
while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}
return date.toLocaleDateString()
}

function ClassesBar({aulas}){
return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return(<div key={i} className={"box "+(done?"done":"")}></div>)
})}
</div>
)
}

function PresenceBar({graus}){
const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)
return(
<div className="bar">
{Array.from({length:4}).map((_,i)=>{
let color="#ddd"
if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"
return(<div key={i} className="degree" style={{background:color}}></div>)
})}
</div>
)
}

/* CHAT */

function Chat({user,alunoId}){

const [messages,setMessages]=React.useState(()=>{
const saved=localStorage.getItem("chat_"+alunoId)
return saved?JSON.parse(saved):[]
})

const [input,setInput]=React.useState("")
const [file,setFile]=React.useState(null)

React.useEffect(()=>{
localStorage.setItem("chat_"+alunoId,JSON.stringify(messages))
},[messages])

function getHora(){
const d=new Date()
return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
}

function sendMessage(){

if(input.trim()==="" && !file) return

const sender=user==="professor"?"prof":"pais"
const nome=user==="professor"?"Professor":"Pais"
const hora=getHora()

if(input.trim()!==""){
setMessages([...messages,{sender,nome,hora,type:"text",text:input}])
setInput("")
}

}

return(

<div className="chatBox">

<div className="messages">

{messages.map((m,i)=>{

const isUser=m.sender==="pais"

return(
<div key={i} className={`message ${isUser?"user":"prof"}`}>
<div style={{fontSize:11,fontWeight:"bold"}}>{m.nome}</div>
<div>{m.text}</div>
<div style={{fontSize:10,textAlign:"right",opacity:0.6}}>{m.hora}</div>
</div>
)

})}

</div>

<div className="chatInput">

<input
type="text"
placeholder="Mensagem..."
value={input}
onChange={e=>setInput(e.target.value)}
onKeyDown={e=>{if(e.key==="Enter") sendMessage()}}
/>

<button onClick={sendMessage}>Enviar</button>

</div>

</div>

)

}

/* RESTO DO SISTEMA PERMANECE IGUAL */

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){
if(senha==="admin") setUser("professor")
else alert("Senha incorreta")
}

function loginPais(){
const aluno=students.find(s=>s.nome===nome && s.nascimento===nascimento)
if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}
}

return(
<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setTipo("professor")}>Professor</button>
<button onClick={()=>setTipo("pais")}>Pais</button>

<br/><br/>

{tipo==="professor" &&
<div>
<input type="password" placeholder="Senha" value={senha} onChange={e=>setSenha(e.target.value)}/>
<br/><br/>
<button onClick={loginProfessor}>Entrar</button>
</div>
}

{tipo==="pais" &&
<div>
<input placeholder="Nome do aluno" value={nome} onChange={e=>setNome(e.target.value)}/>
<br/><br/>
<input type="date" value={nascimento} onChange={e=>setNascimento(e.target.value)}/>
<br/><br/>
<button onClick={loginPais}>Entrar</button>
</div>
}

</div>
)

}

/* APP */

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance_final")
return saved?JSON.parse(saved):[]
})

React.useEffect(()=>{
localStorage.setItem("academia_alliance_final",JSON.stringify(students))
},[students])

if(user==="") return <Login setUser={setUser} students={students} setFilho={setFilho}/>

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

{students.map(s=>(

<div key={s.id} className="card">

<b>{s.nome}</b>

<Chat user={user} alunoId={s.id}/>

</div>

))}

<div className="card">
<img src="graus_coloridos.jpeg" width="100%"/>
<br/><br/>
<img src="sistema_graduacao.jpeg" width="100%"/>
</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
