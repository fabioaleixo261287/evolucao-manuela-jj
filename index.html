<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema Jiu-Jitsu Infantil</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer
}

.green{background:#2ecc71;color:white}
.blue{background:#3498db;color:white}

input{
padding:8px;
margin-bottom:10px;
width:100%;
box-sizing:border-box
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()" class="blue">
Entrar
</button>

</div>

<div id="app"></div>

</div>

<script>

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_PROJETO.firebaseapp.com",
databaseURL: "https://SEU_PROJETO.firebaseio.com",
projectId: "SEU_PROJETO",
storageBucket: "SEU_PROJETO.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

}

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

function login(){

const email = document.getElementById("email").value
const senha = document.getElementById("senha").value

firebase.auth().signInWithEmailAndPassword(email,senha)

.catch(e=>{
alert(e.message)
})

}

firebase.auth().onAuthStateChanged(user=>{

if(!user) return

db.ref("users/"+user.uid).once("value")
.then(snapshot=>{

const tipo = snapshot.val().tipo

if(tipo==="professor"){
painelProfessor()
}else{
painelPais(snapshot.val().alunoId)
}

})

})

function painelProfessor(){

document.getElementById("app").innerHTML = `
<div class="card">

<h2>Painel Professor</h2>

<button class="green" onclick="novoAluno()">
Novo aluno
</button>

<div id="listaAlunos"></div>

</div>
`

carregarAlunos()

}

function carregarAlunos(){

db.ref("alunos").on("value",snapshot=>{

const alunos = snapshot.val()

let html=""

for(let id in alunos){

const a = alunos[id]

html+=`
<div class="card">

<b>${a.nome}</b><br>
Faixa: ${a.faixa}<br>
Aulas: ${a.aulas}

<br><br>

<button onclick="presenca('${id}')">
Presença
</button>

<button onclick="chat('${id}')">
Chat
</button>

</div>
`

}

document.getElementById("listaAlunos").innerHTML = html

})

}

function novoAluno(){

const nome = prompt("Nome do aluno")

if(!nome) return

const id = Date.now()

db.ref("alunos/"+id).set({

nome:nome,
faixa:"Branca",
aulas:0

})

}

function presenca(id){

db.ref("alunos/"+id+"/aulas")
.transaction(a=>{

if(a>=135){
alert("Limite atingido")
return a
}

return (a||0)+1

})

}

function chat(alunoId){

document.getElementById("app").innerHTML = `
<div class="card">

<h3>Chat</h3>

<div id="chatBox"></div>

<input id="msg">

<button onclick="enviar('${alunoId}')">
Enviar
</button>

</div>
`

db.ref("chat/"+alunoId).on("value",snapshot=>{

const msgs = snapshot.val()

let html=""

for(let id in msgs){

const m = msgs[id]

html+=`
<div>
<b>${m.user}</b>: ${m.text}
</div>
`

}

document.getElementById("chatBox").innerHTML = html

})

}

function enviar(alunoId){

const text = document.getElementById("msg").value

db.ref("chat/"+alunoId).push({

user:"professor",
text:text,
data:Date.now()

})

}

function painelPais(alunoId){

document.getElementById("app").innerHTML = `
<div class="card">

<h2>Área dos Pais</h2>

<div id="dadosAluno"></div>

<button onclick="chat('${alunoId}')">
Abrir Chat
</button>

</div>
`

db.ref("alunos/"+alunoId).on("value",snapshot=>{

const a = snapshot.val()

document.getElementById("dadosAluno").innerHTML = `
<b>${a.nome}</b><br>
Faixa: ${a.faixa}<br>
Aulas: ${a.aulas}
`

})

}

</script>

</body>
</html>
