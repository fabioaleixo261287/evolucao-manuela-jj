<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{font-family:Arial;background:#f4f6f8;margin:0;padding:20px}

.container{max-width:1000px;margin:auto}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{display:flex;gap:3px}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{background:#2ecc71}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee;
cursor:pointer
}

.ready{
background:#d4edda;
padding:8px;
border-radius:6px;
margin-top:10px;
font-weight:bold
}

/* FAIXA VISUAL */

.beltRow{
display:flex;
align-items:center;
gap:6px;
margin-top:10px
}

.belt{
width:140px;
height:16px;
border-top:2px solid #333;
border-bottom:2px solid #333
}

.beltTip{
width:25px;
height:20px;
background:black
}

.beltSide{
display:flex;
background:black;
padding:2px;
gap:2px
}

.degreeWhite{width:8px;height:14px;background:white}
.degreeRed{width:8px;height:14px;background:#e74c3c}

.degreeYellow{width:8px;height:14px;background:#f1c40f}
.degreeBlue{width:8px;height:14px;background:#3498db}
.degreeGreen{width:8px;height:14px;background:#2ecc71}

.degreeEmpty{width:8px;height:14px;background:transparent}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
];

const trainingDays=[1,3,5,6];

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){

date.setDate(date.getDate()+1)

if(trainingDays.includes(date.getDay()))
count++

}

return date.toLocaleDateString()

}

/* FAIXA */

function Belt({faixa,graus,comportamental}){

const beltColors={
"Branca":"#f5f5f5",
"Cinza":"#9ca3af",
"Amarela":"#facc15",
"Laranja":"#fb923c",
"Verde":"#16a34a"
}

return(

<div className="beltRow">

{/* comportamento */}

<div className="beltSide">

{comportamental.relacionamento
? <div className="degreeYellow"/>
: <div className="degreeEmpty"/>}

{comportamental.comportamento
? <div className="degreeBlue"/>
: <div className="degreeEmpty"/>}

{comportamental.notas
? <div className="degreeRed"/>
: <div className="degreeEmpty"/>}

{comportamental.habitos
? <div className="degreeGreen"/>
: <div className="degreeEmpty"/>}

</div>

{/* faixa */}

<div style={{display:"flex",alignItems:"center"}}>

<div
className="belt"
style={{background:beltColors[faixa] || "#ddd"}}
/>

<div className="beltTip"/>

</div>

{/* presença */}

<div className="beltSide">

{Array.from({length:4}).map((_,i)=>{

let color="transparent"

if(i<graus){

color = graus<=4 ? "white" : "red"

}

return(
<div
key={i}
style={{
width:8,
height:14,
background:color
}}
/>
)

})}

</div>

</div>

)

}

function ClassesBar({aulas}){
return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return <div key={i} className={"box "+(done?"done":"")}></div>
})}
</div>
)
}

function PresenceBar({graus}){
return(
<div className="bar">
{Array.from({length:8}).map((_,i)=>{
let color="#ddd"
if(i<graus) color=i<4?"#fff":"#e74c3c"
return <div key={i} className="degree" style={{background:color}}></div>
})}
</div>
)
}

function App(){

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_preview_v2")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca",
turma:"Baby"
})

React.useEffect(()=>{
localStorage.setItem("academia_preview_v2",JSON.stringify(students))
},[students])

function addStudent(){
if(!form.nome)return
setStudents([...students,{
id:Date.now(),
...form,
aulas:0,
historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}
}])
setForm({nome:"",idade:"",faixa:"Branca",turma:"Baby"})
}

function addAttendance(id){
setStudents(students.map(s=>{
if(s.id!==id) return s
const data=new Date().toLocaleDateString()
const novas=s.aulas+1
let historico=s.historicoGraus

if(novas%15===0){
historico=[...historico,{grau:Math.floor(novas/15),data}]
}

return{
...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico
}
}))
}

function markBehavior(id,key){
setStudents(students.map(s=>{
if(s.id!==id) return s
const data=new Date().toLocaleDateString()
return{
...s,
comportamental:{...s.comportamental,[key]:data},
historicoComportamental:[...s.historicoComportamental,{tipo:key,data}]
}
}))
}

function removeStudent(id){
if(!confirm("Excluir aluno?"))return
setStudents(students.filter(s=>s.id!==id))
}

const alunosProntos=students.filter(s=>{
const graus=Math.min(Math.floor(s.aulas/15),8)
const comportamentoCompleto=Object.values(s.comportamental).every(v=>v)
const extras=Math.max(s.aulas-120,0)
return graus===8 && comportamentoCompleto && extras>=8
})

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

<div className="card">
<b>Alunos prontos para exame</b>
{alunosProntos.map(a=>(
<div key={a.id}>{a.nome}</div>
))}
</div>

<div className="card">

<div className="row">

<input placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}/>

<input placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}/>

<select value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

{students.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),8)

const faltam=Math.max(128-s.aulas,0)
const previsao=estimateDate(faltam)

return(

<div key={s.id} className="card">

<b>{s.nome}</b> — {s.idade} anos

<div>Faixa: {s.faixa}</div>

<Belt
faixa={s.faixa}
graus={graus}
comportamental={s.comportamental}
/>

<div style={{marginTop:6}}>Aulas</div>
<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>
<PresenceBar graus={graus}/>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
