<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#e8f6ff,#ffffff);
margin:0;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border:2px solid #e6f2ff;
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ddd;
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.login{
max-width:400px;
margin:auto
}

.chatBox{
max-height:200px;
overflow:auto;
margin-bottom:10px;
background:#fafafa;
padding:10px;
border-radius:10px;
}

.msg{
padding:6px 10px;
border-radius:10px;
margin-bottom:6px;
display:inline-block;
color:white
}

.prof{background:#3498db}
.pais{background:#2ecc71}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){
const hoje=new Date()
const nasc=new Date(date)
let idade=hoje.getFullYear()-nasc.getFullYear()
const m=hoje.getMonth()-nasc.getMonth()
if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--
return idade
}

function getCategory(idade){
if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"
return "FORA CATEGORIA"
}

function estimateDate(aulas){
let date=new Date()
let count=0
while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}
return date.toLocaleDateString()
}

function ClassesBar({aulas}){
return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return <div key={i} className={"box "+(done?"done":"")}></div>
})}
</div>
)
}

function PresenceBar({graus}){
const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(
<div className="bar">

{Array.from({length:4}).map((_,i)=>{
let color="#ddd"
if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div key={i} className="degree" style={{background:color}}></div>
)
})}

</div>
)
}

function Chat({student,user,sendMessage}){

const [msg,setMsg]=React.useState("")

return(

<div>

<h3>💬 Conversa</h3>

<div className="chatBox">

{student.chat.map((c,i)=>(

<div key={i} style={{
textAlign:c.user==="professor"?"left":"right"
}}>

<div className={"msg "+(c.user==="professor"?"prof":"pais")}>

{c.user==="professor"?"👨‍🏫 ":"👨‍👩‍👧 "}
{c.text}

</div>

<div style={{fontSize:10}}>
{c.data}
</div>

</div>

))}

</div>

<div style={{display:"flex",gap:5}}>

<input
style={{flex:1}}
value={msg}
placeholder="Mensagem..."
onChange={e=>setMsg(e.target.value)}
/>

<button onClick={()=>{
sendMessage(student.id,msg)
setMsg("")
}}>
Enviar
</button>

</div>

</div>

)

}

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){
if(senha==="admin") setUser("professor")
else alert("Senha incorreta")
}

function loginPais(){

const aluno=students.find(
s=>s.nome===nome && s.nascimento===nascimento
)

if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}

}

return(

<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setTipo("professor")}>
Professor
</button>

<button onClick={()=>setTipo("pais")}>
Pais
</button>

<br/><br/>

{tipo==="professor" &&

<div>

<input
type="password"
placeholder="Senha"
value={senha}
onChange={e=>setSenha(e.target.value)}
/>

<br/><br/>

<button onClick={loginProfessor}>
Entrar
</button>

</div>

}

{tipo==="pais" &&

<div>

<input
placeholder="Nome do aluno"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

<br/><br/>

<input
type="date"
value={nascimento}
onChange={e=>setNascimento(e.target.value)}
/>

<br/><br/>

<button onClick={loginPais}>
Entrar
</button>

</div>

}

</div>

)

}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("academia_alliance",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const idade=getAge(form.nascimento)

setStudents([...students,{

id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade:idade,
categoria:getCategory(idade),
faixa:form.faixa,

avatar:"https://api.dicebear.com/7.x/adventurer/svg?seed="+form.nome,

aulas:0,

chat:[],

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

setForm({nome:"",nascimento:"",faixa:"Branca"})

}

function sendMessage(id,text){

if(!text) return

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleString()

return{
...s,
chat:[
...s.chat,
{user:user,text:text,data:data}
]
}

}))

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const novas=s.aulas+1
const data=new Date().toLocaleDateString()

let historico=s.historicoGraus

if(novas%15===0){
alert("🎉 Parabéns! Você ganhou um grau!")
historico=[...historico,{grau:Math.floor(novas/15),data}]
}

if(novas===135){
alert("🏆 Hora da troca de faixa!")
}

return{
...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico
}

}))

}

if(user==="")
return <Login setUser={setUser} students={students} setFilho={setFilho}/>

let lista=students
if(user==="pais"){
lista=students.filter(s=>s.nome===filho)
}

return(

<div className="container">

<h1>🥋 Acompanhamento Jiu Jitsu Alliance</h1>

{user==="professor" &&

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
value={form.nascimento}
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

}

{lista.map(s=>{

const graus=Math.floor(s.aulas/15)
const faltam=Math.max(135-s.aulas,0)
const previsao=estimateDate(faltam)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>

<b>{s.nome}</b><br/>

{s.idade} anos<br/>

Categoria: {s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>

<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>

<PresenceBar graus={graus}/>

{user==="professor" &&

<div style={{marginTop:10,display:"flex",gap:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

</div>

}

<div style={{marginTop:8,fontSize:13}}>
Faltam {faltam} aulas
</div>

<div style={{fontSize:13}}>
Previsão troca faixa: {previsao}
</div>

<Chat
student={s}
user={user}
sendMessage={sendMessage}
/>

</div>

)

})}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
