<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Sistema Eagle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px }
.container{ max-width:900px; margin:auto }
.card{ background:white; padding:18px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1) }
.row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }

button{ padding:8px 14px; border:none; border-radius:6px; background:#3498db; color:white; cursor:pointer; font-weight: bold; }
button:disabled{ background:#ccc; cursor:not-allowed }
button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

/* Bolinhas de Aula Numeradas Clicáveis */
.bar-bolinhas{ display:flex; gap:5px; flex-wrap:wrap; margin:10px 0 }
.bolinha-aula{ width:30px; height:30px; border-radius:50%; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; font-size:12px; background:#eee; color:#666; cursor: pointer; transition: 0.2s; }
.bolinha-aula.done{ background:#2ecc71; color:white; border-color:#27ae60 }

.degree{ width:22px; height:22px; border:1px solid #555; border-radius:3px; background:#ddd; margin-right:3px; }
.beh{ width:28px; height:28px; border-radius:50%; background:#eee; border:1px solid #ccc; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white }

.avatar-container { position: relative; width: 70px; height: 70px; margin-right: 15px; }
.avatar{ width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid #3498db; cursor: pointer; }
.edit-hint { position: absolute; bottom: 0; right: 0; background: #3498db; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid white; }

.hist-box { background: #f9f9f9; padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 10px; border-left: 4px solid #3498db; }

/* Chat WhatsApp Style */
.chatBox{ border-radius:10px; background:#e5ddd5; margin-top:15px; border: 1px solid #ddd; }
.messages{ max-height:200px; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.message{ padding:8px 12px; border-radius:8px; font-size:13px; max-width:80%; position:relative; box-shadow:0 1px 1px rgba(0,0,0,0.1); }
.message.sent{ background:#dcf8c6; align-self:flex-end; }
.message.received{ background:#fff; align-self:flex-start; }
.msg-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.del-msg { color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 14px; }
.chatInput{ display:flex; gap:8px; padding:10px; background:#f0f0f0; border-bottom-left-radius:10px; border-bottom-right-radius:10px; }
.chatInput input{ flex:1; border:none; padding:10px; border-radius:20px; outline: none; }

/* Repositório */
.repo-section { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
.doc-item { display: flex; justify-content: space-between; background: #fff; padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; border: 1px solid #eee; font-size: 13px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const BELT_ORDER = ["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"];
const BEHAVIOR_TYPES = [
    { key: 'relacionamento', color: '#f1c40f', label: 'A' },
    { key: 'comportamento', color: '#3498db', label: 'B' },
    { key: 'notas', color: '#e74c3c', label: 'C' },
    { key: 'habitos', color: '#2ecc71', label: 'D' }
];

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("alliance_pro_v3") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("alliance_pro_v3", JSON.stringify(students)) }, [students]);

    const addStudent = () => {
        if (!form.nome) return;
        setStudents([...students, {
            id: Date.now(), ...form, avatar: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
            aulas: 0, docs: [], chat: [], historicoAulas: [], historicoGraus: [], historicoComportamental: [],
            comportamental: { relacionamento: null, comportamento: null, notas: null, habitos: null }
        }]);
        setForm({ nome: "", nascimento: "", faixa: "Branca" });
    };

    // Toggle de Aula individual (Clicar e Desclicar)
    const toggleClass = (studentId, index) => {
        if (user !== "professor") return;
        setStudents(students.map(s => {
            if (s.id !== studentId) return s;
            const aulasBase = Math.floor(s.aulas / 15) * 15;
            const aulaAtualNoCiclo = s.aulas % 15 || (s.aulas > 0 ? 15 : 0);
            
            let novasAulas = s.aulas;
            if (index + 1 > aulaAtualNoCiclo) novasAulas = aulasBase + (index + 1);
            else novasAulas = aulasBase + index;

            return { ...s, aulas: Math.max(0, Math.min(135, novasAulas)) };
        }));
    };

    const handleBeltChange = (id) => {
        setStudents(students.map(s => {
            if (s.id !== id) return s;
            const idx = BELT_ORDER.indexOf(s.faixa);
            return { ...s, faixa: BELT_ORDER[idx + 1] || s.faixa, aulas: 0 };
        }));
    };

    const sendMsg = (id, text) => {
        if (!text.trim()) return;
        const msg = { 
            id: Date.now(), 
            sender: user, 
            text, 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
        };
        setStudents(students.map(s => s.id === id ? { ...s, chat: [...s.chat, msg] } : s));
    };

    const deleteMsg = (studentId, msgId) => {
        setStudents(students.map(s => s.id === studentId ? { ...s, chat: s.chat.filter(m => m.id !== msgId) } : s));
    };

    const addDoc = (id) => {
        const name = prompt("Nome do documento:");
        const url = prompt("Link do documento (URL):");
        if (name && url) {
            setStudents(students.map(s => s.id === id ? { ...s, docs: [...(s.docs||[]), { name, url }] } : s));
        }
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#1a2a6c'}}>Alliance Eagle Login</h2>
            <button className="green" onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase().includes(filho.toLowerCase()) && filho !== "") : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h1>Alliance Jiu Jitsu</h1>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome Aluno" value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({ ...form, nascimento: e.target.value })} />
                        <select value={form.faixa} onChange={e => setForm({ ...form, faixa: e.target.value })}>
                            {BELT_ORDER.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <button className="green" onClick={addStudent}>+ Cadastrar</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Digite nome do aluno..." style={{width:'100%'}} onChange={e => setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const aulasNoCiclo = s.aulas % 15 === 0 && s.aulas > 0 ? 15 : s.aulas % 15;
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <div className="avatar-container" onClick={() => {const u = prompt("URL da foto:"); if(u) setStudents(students.map(st=>st.id===s.id?{...st, avatar:u}:st))}}>
                                <img src={s.avatar} className="avatar" />
                                <div className="edit-hint">✎</div>
                            </div>
                            <div>
                                <h3 style={{margin:0}}>{s.nome}</h3>
                                <span>{s.faixa} | {s.aulas} aulas totais</span>
                            </div>
                        </div>

                        <div style={{marginTop:10}}><b>Controle de Aulas (Ciclo 15):</b></div>
                        <div className="bar-bolinhas">
                            {Array.from({ length: 15 }).map((_, i) => (
                                <div key={i} 
                                     className={`bolinha-aula ${i < aulasNoCiclo ? 'done' : ''}`}
                                     onClick={() => toggleClass(s.id, i)}>
                                    {i + 1}
                                </div>
                            ))}
                        </div>

                        <div style={{marginTop:10}}><b>Graus Conquistados:</b></div>
                        <div className="row" style={{marginTop:5}}>
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" style={{ background: i < Math.floor(s.aulas / 15) ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="row" style={{marginTop:15}}>
                            {BEHAVIOR_TYPES.map(bt => (
                                <div key={bt.key} className="beh" 
                                     style={{ background: s.comportamental[bt.key] ? bt.color : '#eee' }}
                                     onClick={() => user === "professor" && setStudents(students.map(st => st.id === s.id ? {...st, comportamental: {...st.comportamental, [bt.key]: st.comportamental[bt.key] ? null : true}} : st))}>
                                    {bt.label}
                                </div>
                            ))}
                            {user === "professor" && (
                                <>
                                    <button className="orange" onClick={() => handleBeltChange(s.id)} style={{marginLeft:'auto'}}>Trocar Faixa</button>
                                    <button className="red" onClick={() => confirm("Excluir?") && setStudents(students.filter(x=>x.id!==s.id))}>X</button>
                                </>
                            )}
                        </div>

                        <div className="repo-section">
                            <b>📂 Repositório de Documentos</b>
                            {user === "professor" && <button onClick={() => addDoc(s.id)} style={{fontSize:10, padding:'2px 8px', marginLeft:10}}>+ Adicionar</button>}
                            <div style={{marginTop:8}}>
                                {(s.docs || []).map((d, i) => (
                                    <div key={i} className="doc-item">
                                        <span>{d.name}</span>
                                        <a href={d.url} target="_blank" style={{color:'#3498db'}}>Baixar</a>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="chatBox">
                            <div className="messages">
                                {s.chat.map((m) => (
                                    <div key={m.id} className={`message ${m.sender === user ? 'sent' : 'received'}`}>
                                        <div className="msg-header">
                                            <small><b>{m.sender.toUpperCase()}</b></small>
                                            {m.sender === user && <span className="del-msg" onClick={() => deleteMsg(s.id, m.id)}>×</span>}
                                        </div>
                                        {m.text}
                                        <div style={{textAlign:'right', fontSize:9, opacity:0.6}}>{m.time}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="chatInput">
                                <label style={{cursor:'pointer'}}>📎<input type="file" style={{display:'none'}} onChange={e=>sendMsg(s.id, "Anexo: "+e.target.files[0].name)}/></label>
                                <input id={`in-${s.id}`} placeholder="Mensagem..." onKeyDown={e => {if(e.key==='Enter'){sendMsg(s.id, e.target.value); e.target.value=""}}} />
                                <button className="green" onClick={() => { const i = document.getElementById(`in-${s.id}`); sendMsg(s.id, i.value); i.value=""; }}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
