<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{

margin:0;
padding:20px
}

.container{

.card{

.row{

button{

button.green{background:#2ecc71}

input,select{

.beh{

}

.editAvatar{

.studentHeader{

gap:10px;

}

}

margin-bottom:10px

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function getAge(date){
const hoje=new Date()
const nasc=new Date(date)
let idade=hoje.getFullYear()-nasc.getFullYear()
const m=hoje.getMonth()-nasc.getMonth()
if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--
return idade
}

function getCategory(idade){
if(idade>=3 && idade<=4) return "BABY EAGLE"
if(idade>=5 && idade<=8) return "LITTLE EAGLE"
if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
if(idade>=13 && idade<=15) return "EAGLE YOUTH"
return "FORA CATEGORIA"
}

function estimateDate(aulas){
let date=new Date()
let count=0
while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}
return date.toLocaleDateString()
}

function ClassesBar({aulas}){
return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{
const done=i<(aulas%15)
return(<div key={i} className={"box "+(done?"done":"")}></div>)
})}
</div>
)
}

function PresenceBar({graus}){
const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)
return(
<div className="bar">
{Array.from({length:4}).map((_,i)=>{
let color="#ddd"
if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"
return(<div key={i} className="degree" style={{background:color}}></div>)
})}
</div>
)
}

/* CHAT */

function Chat({user,alunoId}){

const [messages,setMessages]=React.useState(()=>{
const saved=localStorage.getItem("chat_"+alunoId)
return saved?JSON.parse(saved):[]
})

const [input,setInput]=React.useState("")
const [file,setFile]=React.useState(null)

const endRef=React.useRef(null)

React.useEffect(()=>{
localStorage.setItem("chat_"+alunoId,JSON.stringify(messages))
endRef.current?.scrollIntoView({behavior:"smooth"})
},[messages])

function compressImage(file,callback){

const img=new Image()
const reader=new FileReader()

reader.onload=e=>{img.src=e.target.result}

img.onload=()=>{

const canvas=document.createElement("canvas")
const max=800

let w=img.width
let h=img.height

if(w>h && w>max){h*=max/w; w=max}
else if(h>max){w*=max/h; h=max}

canvas.width=w
canvas.height=h

const ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,w,h)

canvas.toBlob(blob=>{
const reader2=new FileReader()
reader2.onload=e=>callback(e.target.result)
reader2.readAsDataURL(blob)
},"image/jpeg",0.7)

}

reader.readAsDataURL(file)

}

function sendMessage(){

if(input.trim()==="" && !file) return

const sender=user==="professor"?"prof":"user"

if(file){

if(file.type.startsWith("image")){

compressImage(file,(img)=>{
setMessages(prev=>[...prev,{sender,type:"image",data:img}])
})

}else{

const reader=new FileReader()

reader.onload=e=>{
setMessages(prev=>[...prev,{sender,type:"file",data:e.target.result,name:file.name}])
}

reader.readAsDataURL(file)

}

setFile(null)

}

if(input.trim()!==""){
setMessages(prev=>[...prev,{sender,type:"text",text:input}])
setInput("")
}

}

return(

<div className="chatBox">

<div className="messages">

{messages.map((m,i)=>{

if(m.type==="text"){
return(
<div key={i} className={`message ${m.sender==="user"?"user":"prof"}`}>
{m.text}
</div>
)
}

if(m.type==="image"){
return(
<div key={i} className={`message ${m.sender==="user"?"user":"prof"}`}>
<img src={m.data} style={{maxWidth:"150px"}}/>
</div>
)
}

if(m.type==="file"){
return(
<div key={i} className={`message ${m.sender==="user"?"user":"prof"}`}>
📎 <a href={m.data} download={m.name}>{m.name}</a>
</div>
)
}

})}

<div ref={endRef}></div>

</div>

<div className="chatInput">

<label>
📎
<input type="file" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/>
</label>

<label>
📸
<input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/>
</label>

<input
type="text"
placeholder="Mensagem..."
value={input}
onChange={e=>setInput(e.target.value)}
onKeyDown={e=>{if(e.key==="Enter") sendMessage()}}
/>

<button onClick={sendMessage}>Enviar</button>

</div>

</div>

)

}

/* LOGIN */

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){
if(senha==="admin") setUser("professor")
else alert("Senha incorreta")
}

function loginPais(){
const aluno=students.find(s=>s.nome===nome && s.nascimento===nascimento)
if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}
}

return(
<div className="login card">

<h2>Login</h2>

<button className="green" onClick={()=>setTipo("professor")}>Professor</button>
<button onClick={()=>setTipo("pais")}>Pais</button>

<br/><br/>

{tipo==="professor" &&
<div>
<input type="password" placeholder="Senha" value={senha} onChange={e=>setSenha(e.target.value)}/>
<br/><br/>
<button onClick={loginProfessor}>Entrar</button>
</div>
}

{tipo==="pais" &&
<div>
<input placeholder="Nome do aluno" value={nome} onChange={e=>setNome(e.target.value)}/>
<br/><br/>
<input type="date" value={nascimento} onChange={e=>setNascimento(e.target.value)}/>
<br/><br/>
<button onClick={loginPais}>Entrar</button>
</div>
}

</div>
)

}

/* APP */

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_alliance_final")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({nome:"",nascimento:"",faixa:"Branca"})

React.useEffect(()=>{
localStorage.setItem("academia_alliance_final",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

const existe=students.find(
s=>s.nome===form.nome && s.nascimento===form.nascimento
)

if(existe){
alert("Aluno já cadastrado")
return
}

const idade=getAge(form.nascimento)

setStudents([...students,{
id:Date.now(),
nome:form.nome,
nascimento:form.nascimento,
idade:idade,
categoria:getCategory(idade),
faixa:form.faixa,
avatar:"avatar.png",
aulas:0,
historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],
comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null}
}])

setForm({nome:"",nascimento:"",faixa:"Branca"})
}

return(
<div className="container">
<h1>Acompanhamento Jiu Jitsu Alliance</h1>
</div>
)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
</body>
</html>
