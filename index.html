<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family:Arial; background:#f4f6f8; margin:0; padding:20px }
.container{ max-width:1000px; margin:auto }
.card{ background:white; padding:16px; border-radius:10px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1) }
.row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px }
button{ padding:6px 12px; border:none; border-radius:6px; background:#3498db; color:white; cursor:pointer }
button:disabled{ background:#ccc; cursor:not-allowed; }
button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}
input,select{ padding:6px; border-radius:6px; border:1px solid #ccc }

/* Barra de Aulas com Bolinhas Numeradas */
.bar-bolinhas{ display:flex; gap:4px; flex-wrap:wrap; margin: 8px 0; }
.bolinha{ width:28px; height:28px; border-radius:50%; border:1px solid #bbb; display:flex; align-items:center; justify-content:center; font-size:11px; color: #777; background:#eee; }
.bolinha.done{ background:#2ecc71; color:white; border-color:#27ae60; }

.bar{ display:flex; gap:3px }
.degree{ width:20px; height:20px; border:1px solid #555; border-radius:3px; background:#ddd }
.beh{ width:22px; height:22px; border-radius:22px; background:#eee; border: 1px solid #ccc; cursor: pointer; }
.avatar{ width:60px; height:60px; border-radius:50%; object-fit:cover; border:3px solid #ddd; }
.studentHeader{ display:flex; align-items:center; gap:10px; margin-bottom:6px; position:relative; }

/* Chat Estilo WhatsApp */
.chatBox{ border:1px solid #ddd; border-radius:10px; padding:10px; background:#e5ddd5; margin-top:15px; }
.messages{ max-height:200px; overflow-y:auto; margin-bottom:10px; display:flex; flex-direction:column; gap:5px; }
.message{ padding:8px 10px; border-radius:8px; font-size:13px; max-width:80%; }
.message.sent{ background:#dcf8c6; align-self:flex-end; }
.message.received{ background:#fff; align-self:flex-start; }
.chatInput{ display:flex; gap:5px; background:#f0f0f0; padding:5px; border-radius:20px; }
.chatInput input{ flex:1; border:none; padding:8px; background:transparent; outline:none; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const beltOrder=["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"]
const trainingDays=[1,3,5,6]

function getAge(date){
  const hoje=new Date(); const nasc=new Date(date);
  let idade=hoje.getFullYear()-nasc.getFullYear();
  const m=hoje.getMonth()-nasc.getMonth();
  if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())) idade--;
  return idade;
}

function getCategory(idade){
  if(idade>=3 && idade<=4) return "BABY EAGLE"
  if(idade>=5 && idade<=8) return "LITTLE EAGLE"
  if(idade>=9 && idade<=12) return "EAGLE WARRIOR"
  if(idade>=13 && idade<=15) return "EAGLE YOUTH"
  return "FORA CATEGORIA"
}

function estimateDate(aulas){
  let date=new Date(); let count=0;
  while(count<aulas){ date.setDate(date.getDate()+1); if(trainingDays.includes(date.getDay())) count++; }
  return date.toLocaleDateString();
}

// Componente de Bolinhas Numeradas
function NumberedClassesBar({aulas}){
  const progresso = (aulas % 15 === 0 && aulas > 0) ? 15 : aulas % 15;
  return(
    <div className="bar-bolinhas">
      {Array.from({length:15}).map((_,i)=>{
        const n = i + 1;
        return <div key={n} className={`bolinha ${n <= progresso ? "done" : ""}`}>{n}</div>
      })}
    </div>
  )
}

function PresenceBar({graus}){
  const brancos=Math.min(graus,4); const vermelhos=Math.max(graus-4,0);
  return(
    <div className="bar">
      {Array.from({length:8}).map((_,i)=>{
        let color="#ddd";
        if(i < vermelhos + 4 && i >= 4) color="#e74c3c";
        else if(i < brancos) color="#fff";
        return(<div key={i} className="degree" style={{background:color}}></div>)
      })}
    </div>
  )
}

function App(){
  const [user,setUser]=React.useState("");
  const [filho,setFilho]=React.useState("");
  const [students,setStudents]=React.useState(()=>JSON.parse(localStorage.getItem("academia_alliance_vFinal")||"[]"));
  const [form,setForm]=React.useState({nome:"",nascimento:"",faixa:"Branca"});

  React.useEffect(()=>{localStorage.setItem("academia_alliance_vFinal",JSON.stringify(students))},[students]);

  function addStudent(){
    if(!form.nome) return; const idade=getAge(form.nascimento);
    setStudents([...students,{ id:Date.now(), nome:form.nome, nascimento:form.nascimento, idade, categoria:getCategory(idade), faixa:form.faixa, avatar:"avatar.png", aulas:0, historicoAulas:[], historicoGraus:[], historicoComportamental:[], historicoFaixas:[], chat:[], comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null} }]);
    setForm({nome:"",nascimento:"",faixa:"Branca"});
  }

  function addAttendance(id){
    setStudents(students.map(s=>{
      if(s.id!==id || s.aulas >= 135) return s;
      const novas=s.aulas+1; const data=new Date().toLocaleDateString();
      let hG=s.historicoGraus || []; if(novas%15===0) hG=[...hG,{grau:novas/15,data}];
      return {...s, aulas:novas, historicoAulas:[...s.historicoAulas,{data}], historicoGraus:hG};
    }));
  }

  function trocarFaixa(id){
    setStudents(students.map(s=>{
      if(s.id!==id) return s; const idx=beltOrder.indexOf(s.faixa); const proxima=beltOrder[idx+1]||s.faixa;
      return {...s, faixa:proxima, aulas:0, historicoAulas:[], historicoGraus:[], historicoComportamental:[], comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null}, historicoFaixas:[...(s.historicoFaixas||[]),{faixa:proxima,data:new Date().toLocaleDateString()}]};
    }));
  }

  function markBehavior(id,key){
    setStudents(students.map(s=>{
      if(s.id!==id) return s; const data=new Date().toLocaleDateString();
      return {...s, comportamental:{...s.comportamental,[key]:data}, historicoComportamental:[...(s.historicoComportamental||[]),{tipo:key,data}]};
    }));
  }

  function sendMsg(id, text){
    if(!text.trim()) return;
    setStudents(students.map(s => s.id === id ? {...s, chat: [...(s.chat||[]), {sender: user, text, date: new Date().toLocaleString()}]} : s));
  }

  if(user==="") return (
    <div className="card" style={{maxWidth:400, margin:'100px auto', textAlign:'center'}}>
      <h2>Alliance Jiu Jitsu</h2>
      <button className="green" onClick={()=>setUser("professor")}>Professor</button> <button onClick={()=>setUser("pais")}>Pais</button>
      {user==="pais" && <input placeholder="Nome do Aluno" style={{marginTop:10, width:'80%'}} onChange={e=>setFilho(e.target.value)}/>}
    </div>
  );

  const lista = user==="pais" ? students.filter(s=>s.nome.toLowerCase().includes(filho.toLowerCase()) && filho !== "") : students;

  return(
    <div className="container">
      <div style={{display:'flex', justifyContent:'space-between'}}>
        <h1>Acompanhamento Alliance</h1>
        <button onClick={()=>setUser("")} style={{background:'#999', height:30, marginTop:20}}>Sair</button>
      </div>

      {user==="professor" && <div className="card"><div className="row">
        <input placeholder="Nome" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>
        <input type="date" value={form.nascimento} onChange={e=>setForm({...form,nascimento:e.target.value})}/>
        <select value={form.faixa} onChange={e=>setForm({...form,faixa:e.target.value})}>{beltOrder.map(b=><option key={b}>{b}</option>)}</select>
        <button className="green" onClick={addStudent}>Adicionar Aluno</button>
      </div></div>}

      {lista.map(s=>(
        <div key={s.id} className="card">
          <div className="studentHeader">
            <img src={s.avatar} className="avatar"/>
            <div><b>{s.nome}</b><br/>{s.idade} anos | {s.categoria}</div>
          </div>
          <div>Faixa: <b>{s.faixa}</b></div>
          
          <div style={{marginTop:10}}>Aulas para o próximo Grau:</div>
          <NumberedClassesBar aulas={s.aulas}/>

          {s.aulas >= 135 && <div style={{color:'red', fontWeight:'bold', margin:'5px 0'}}>⚠️ LIMITE DE AULAS ATINGIDO. TROQUE A FAIXA.</div>}

          <div style={{marginTop:10}}>Graus Conquistados:</div>
          <PresenceBar graus={Math.floor(s.aulas/15)}/>

          <div style={{display:"flex",gap:10,marginTop:15}}>
            {['relacionamento','comportamento','notas','habitos'].map(k=>(
              <div key={k} className="beh" style={{background:s.comportamental[k]?"#2ecc71":"#eee"}} onClick={()=>user==="professor"&&markBehavior(s.id,k)}></div>
            ))}
          </div>

          {user==="professor" && <div style={{marginTop:15, display:'flex', gap:10}}>
            <button className="green" onClick={()=>addAttendance(s.id)} disabled={s.aulas>=135}>Presença</button>
            <button className="orange" onClick={()=>confirm("Trocar faixa?")&&trocarFaixa(s.id)}>Trocar Faixa</button>
            <button className="red" onClick={()=>confirm("Excluir?")&&setStudents(students.filter(x=>x.id!==s.id))}>Excluir</button>
          </div>}

          <div style={{marginTop:15, fontSize:12}}>
            <b>Histórico de Graus:</b> {(s.historicoGraus||[]).map((h,i)=><div key={i}>{h.data} - Grau {h.grau}</div>)}
            <br/><b>Histórico Comportamental:</b> {(s.historicoComportamental||[]).map((h,i)=><div key={i}>{h.data} - {h.tipo}</div>)}
            <br/><b>Histórico de Faixas:</b> {(s.historicoFaixas||[]).map((h,i)=><div key={i}>{h.data} - {h.faixa}</div>)}
          </div>

          <div className="chatBox">
            <div className="messages">
              {(s.chat||[]).map((m,i)=>(
                <div key={i} className={`message ${m.sender===user?'sent':'received'}`}>
                  <small style={{fontSize:9, display:'block'}}>{m.sender.toUpperCase()}</small>
                  {m.text}
                </div>
              ))}
            </div>
            <div className="chatInput">
              <label style={{cursor:'pointer'}}>📎<input type="file" style={{display:'none'}} onChange={e=>sendMsg(s.id, "📎 Arquivo: "+e.target.files[0].name)}/></label>
              <input placeholder="Mensagem..." onKeyDown={e=>{if(e.key==='Enter'){sendMsg(s.id, e.target.value); e.target.value=""}}} />
            </div>
          </div>
        </div>
      ))}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
