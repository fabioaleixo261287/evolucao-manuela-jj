```html
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema Jiu-Jitsu Infantil</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px
}

.container{
max-width:900px;
margin:auto
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer
}

.green{background:#2ecc71;color:white}
.blue{background:#3498db;color:white}

.avatar{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd
}

.avatarBox{
position:relative;
width:70px
}

.editAvatar{
position:absolute;
bottom:-5px;
left:50%;
transform:translateX(-50%);
font-size:10px;
background:#3498db;
color:white;
border:none;
border-radius:6px
}

.chatBox{
max-height:200px;
overflow:auto;
background:#fafafa;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ddd
}

.msg{
padding:6px 10px;
border-radius:10px;
margin-bottom:5px;
color:white;
display:inline-block;
max-width:70%
}

.prof{background:#3498db}
.pais{background:#2ecc71}

.row{
display:flex;
gap:10px
}

.beh{
width:20px;
height:20px;
border-radius:50%;
border:1px solid #ccc
}

</style>

</head>

<body>

<div class="container">

<div id="login" class="card">

<h2>Login</h2>

<button onclick="loginProfessor()">Professor</button>
<button onclick="loginAluno()">Pais / Aluno</button>

<div id="loginArea"></div>

</div>

<div id="app"></div>

</div>

<script>

const MAX_FILE_SIZE = 5 * 1024 * 1024

let user=""

let students = JSON.parse(localStorage.getItem("students") || "[]")

function save(){
localStorage.setItem("students",JSON.stringify(students))
}

function loginProfessor(){

document.getElementById("loginArea").innerHTML = `
<input id="senha" placeholder="Senha">
<button onclick="entrarProfessor()">Entrar</button>
`

}

function entrarProfessor(){

const senha = document.getElementById("senha").value

if(senha !== "admin"){
alert("Senha incorreta")
return
}

user="professor"

document.getElementById("login").style.display="none"

render()

}

function loginAluno(){

document.getElementById("loginArea").innerHTML = `
<input id="nome" placeholder="Nome do aluno">
<input id="nasc" type="date">
<button onclick="entrarAluno()">Entrar</button>
`

}

function entrarAluno(){

const nome = document.getElementById("nome").value
const nasc = document.getElementById("nasc").value

const aluno = students.find(s=>s.nome===nome && s.nascimento===nasc)

if(!aluno){
alert("Aluno não encontrado")
return
}

user="pais"

renderAluno(aluno)

document.getElementById("login").style.display="none"

}

function novoAluno(){

const nome = prompt("Nome do aluno")
const nasc = prompt("Data nascimento YYYY-MM-DD")

students.push({
id:Date.now(),
nome,
nascimento:nasc,
faixa:"Branca",
aulas:0,
avatar:"emoji",
chat:[],
comportamental:{
relacionamento:false,
comportamento:false,
notas:false,
habitos:false
},
historicoAulas:[],
historicoFaixas:[]
})

save()
render()

}

function presenca(id){

const s = students.find(a=>a.id===id)

if(s.aulas >= 135){
alert("Limite de aulas atingido")
return
}

s.aulas++

s.historicoAulas.push({
data:new Date().toLocaleDateString()
})

save()
render()

}

function trocarFaixa(id){

const ordem=["Branca","Cinza","Amarela","Laranja","Verde"]

const s = students.find(a=>a.id===id)

let idx = ordem.indexOf(s.faixa)

if(idx < ordem.length-1){

s.faixa = ordem[idx+1]

s.historicoFaixas.push({
faixa:s.faixa,
data:new Date().toLocaleDateString()
})

s.aulas=0

}

save()
render()

}

function render(){

let html=""

html+=`
<div class="card">
<button class="green" onclick="novoAluno()">Novo aluno</button>
</div>
`

students.forEach(s=>{

html+=`
<div class="card">

<div class="row">

<div class="avatarBox">

${s.avatar==="emoji"
? `<div class="avatar">🙂</div>`
: `<img src="${s.avatar}" class="avatar">`
}

<input type="file" id="file${s.id}" style="display:none"
onchange="uploadAvatar(${s.id},this.files[0])">

<button class="editAvatar"
onclick="document.getElementById('file${s.id}').click()">
Editar
</button>

</div>

<div>

<b>${s.nome}</b><br>
Faixa: ${s.faixa}<br>
Aulas: ${s.aulas}/135

<br><br>

<button onclick="presenca(${s.id})">Presença</button>
<button onclick="trocarFaixa(${s.id})">Trocar faixa</button>

</div>

</div>

${renderComportamento(s)}

${renderChat(s)}

</div>
`

})

document.getElementById("app").innerHTML = html

}

function renderAluno(s){

let html=`
<div class="card">

<b>${s.nome}</b><br>
Faixa: ${s.faixa}<br>
Aulas: ${s.aulas}/135

</div>

${renderChat(s)}

`

document.getElementById("app").innerHTML = html

}

function renderComportamento(s){

return `
<b>Graus comportamentais</b>

<div class="row">

${Object.keys(s.comportamental).map(tipo=>`

<div>

<div style="font-size:12px">${tipo}</div>

<div class="beh"
style="background:${s.comportamental[tipo]?'#2ecc71':'#eee'}"
onclick="toggleComportamento(${s.id},'${tipo}')">
</div>

</div>

`).join("")}

</div>
`

}

function toggleComportamento(id,tipo){

if(user!=="professor") return

const s = students.find(a=>a.id===id)

s.comportamental[tipo] = !s.comportamental[tipo]

save()
render()

}

function renderChat(s){

return `
<h3>Chat</h3>

<div class="chatBox">

${s.chat.map((c,i)=>`

<div>

<div class="msg ${c.user==='professor'?'prof':'pais'}">

${c.text}

${c.file?`

<div>

${c.fileType.startsWith("image")

? `<img src="${c.file}" style="max-width:200px">`

: `<a href="${c.file}" target="_blank">📄 ${c.fileName}</a>`
}

<br>

<a href="${c.file}" download="${c.fileName}">
📥 Download
</a>

<button onclick="removerArquivo(${s.id},${i})">
🗑
</button>

</div>

`:''}

</div>

<div style="font-size:10px">${c.data}</div>

</div>

`).join("")}

</div>

<input id="msg${s.id}">
<input type="file" id="filemsg${s.id}">

<button onclick="enviarMsg(${s.id})">
Enviar
</button>
`

}

function enviarMsg(id){

const text = document.getElementById("msg"+id).value
const fileInput = document.getElementById("filemsg"+id)
const file = fileInput.files[0]

const s = students.find(a=>a.id===id)

function salvarMensagem(fileData,fileName,fileType){

s.chat.push({
user:user,
text:text,
file:fileData,
fileName:fileName,
fileType:fileType,
data:new Date().toLocaleString()
})

save()
render()

}

if(file){

if(file.size > MAX_FILE_SIZE){
alert("Arquivo maior que 5MB")
return
}

const reader = new FileReader()

reader.onload = e=>{
salvarMensagem(e.target.result,file.name,file.type)
}

reader.readAsDataURL(file)

}else{

salvarMensagem(null,null,null)

}

}

function removerArquivo(id,index){

const s = students.find(a=>a.id===id)

s.chat[index].file=null

save()
render()

}

function uploadAvatar(id,file){

const reader = new FileReader()

reader.onload = e=>{

const s = students.find(a=>a.id===id)

s.avatar = e.target.result

save()
render()

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
```
