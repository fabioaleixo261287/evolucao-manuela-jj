```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Jiu Jitsu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.layout{
display:flex;
gap:20px
}

.left{
flex:1
}

.right{
width:420px
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.login{
max-width:300px;
margin:auto;
margin-top:120px
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca",
"Cinza/Branca",
"Cinza",
"Cinza/Preta",
"Amarela/Branca",
"Amarela",
"Amarela/Preta",
"Laranja/Branca",
"Laranja",
"Laranja/Preta",
"Verde/Branca",
"Verde",
"Verde/Preta"
]

function Login({onLogin}){

const[user,setUser]=React.useState("")
const[pass,setPass]=React.useState("")

function entrar(){

if(user==="professor" && pass==="123"){
onLogin("professor")
return
}

if(pass==="123"){
onLogin("pais")
}

}

return(

<div className="login card">

<h2>Login</h2>

<div className="row">

<input
placeholder="Usuário"
value={user}
onChange={e=>setUser(e.target.value)}
/>

<input
type="password"
placeholder="Senha"
value={pass}
onChange={e=>setPass(e.target.value)}
/>

<button onClick={entrar}>Entrar</button>

</div>

</div>

)

}

function App(){

const[login,setLogin]=React.useState(null)

const[students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("jiu_jitsu_sistema")
return saved?JSON.parse(saved):[]
})

const[form,setForm]=React.useState({
nome:"",
idade:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("jiu_jitsu_sistema",JSON.stringify(students))
},[students])

if(!login){
return <Login onLogin={setLogin}/>
}

function addStudent(){

if(!form.nome) return

setStudents([...students,{

id:Date.now(),
...form,
avatar:"avatar.png",

aulas:0,
historicoAulas:[],
historicoGraus:[],
historicoFaixa:[]

}])

setForm({
nome:"",
idade:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const data=new Date().toLocaleDateString()
const novas=s.aulas+1

let historicoGraus=s.historicoGraus

if(novas%15===0){

historicoGraus=[
...historicoGraus,
{
grau:Math.floor(novas/15),
data:data
}
]

}

return{

...s,
aulas:novas,
historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historicoGraus

}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const index=beltOrder.indexOf(s.faixa)

const proxima =
index<beltOrder.length-1
?beltOrder[index+1]
:s.faixa

const data=new Date().toLocaleDateString()

return{

...s,

faixa:proxima,

aulas:0,

historicoFaixa:[
...s.historicoFaixa,
{
faixaAnterior:s.faixa,
novaFaixa:proxima,
data:data
}
],

historicoAulas:[],
historicoGraus:[]

}

}))

}

function removeStudent(id){

if(!confirm("Excluir aluno?")) return

setStudents(students.filter(s=>s.id!==id))

}

return(

<div className="layout">

<div className="left">

<h1>Sistema Alunos Jiu Jitsu</h1>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
placeholder="Idade"
value={form.idade}
onChange={e=>setForm({...form,idade:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=>
<option key={b}>{b}</option>
)}
</select>

<button
className="green"
onClick={addStudent}
>
Adicionar
</button>

</div>

</div>

{students.map(s=>(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>
<b>{s.nome}</b><br/>
{s.idade} anos
</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:8}}>
Aulas: {s.aulas}
</div>

<div className="bar">

{Array.from({length:15}).map((_,i)=>{

const done=i<(s.aulas%15)

return(
<div
key={i}
className={"box "+(done?"done":"")}
></div>
)

})}

</div>

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button
className="orange"
onClick={()=>trocarFaixa(s.id)}
>
Trocar Faixa
</button>

<button
className="red"
onClick={()=>removeStudent(s.id)}
>
Excluir
</button>

</div>

{s.historicoFaixa.length>0 &&

<div style={{marginTop:10,fontSize:13}}>

<b>Histórico de Faixas</b>

{s.historicoFaixa.map((h,i)=>(
<div key={i}>
{h.data} — {h.faixaAnterior} → {h.novaFaixa}
</div>
))}

</div>

}

</div>

))}

</div>

<div className="right">

<div className="card">

<h3>Graus Coloridos</h3>

<img
src="graus_coloridos.jpeg"
style={{width:"100%"}}
/>

</div>

<div className="card">

<h3>Sistema de Graduação</h3>

<img
src="sistema_graduacao.jpeg"
style={{width:"100%"}}
/>

</div>

</div>

</div>

)

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>)

</script>

</body>
</html>
```
