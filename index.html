<script type="text/babel">
    const beltOrder = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];
    const groups = ["Todos", "Baby Eagle", "Little Eagle", "Eagle Warrior", "Eagle Youth"];
    const classDays = [1, 3, 5, 6]; // Segunda, quarta, sexta e sábado.
    const AVATAR_BOY = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; 
    const AVATAR_GIRL = "https://cdn-icons-png.flaticon.com/512/3135/3135789.png"; 
    const LOCAL_STUDENTS_KEY = "all_eagle_v22_s";
    const LOCAL_REPO_KEY = "all_eagle_v22_r";
    const SUPABASE_STATE_ID = "alliance_mooca_kids_v22";

    // Preencha aqui se quiser deixar fixo no arquivo, ou defina window.SUPABASE_CONFIG antes deste script.
    const SUPABASE_URL = "https://oozzhujtyqsaxhkluxer.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_aKMcW5XwbBUj95uciZlO4w_YVOdz13J";

    const getSupabaseConfig = () => {
        const externalConfig = window.SUPABASE_CONFIG || {};
        return {
            url: externalConfig.url || SUPABASE_URL,
            anonKey: externalConfig.anonKey || SUPABASE_ANON_KEY
        };
    };

    const createSupabaseClient = () => {
        const { url, anonKey } = getSupabaseConfig();
        if (!url || !anonKey || !window.supabase?.createClient) return null;
        return window.supabase.createClient(url, anonKey);
    };

    const compressImage = (base64Str, maxWidth = 800, quality = 0.6) => {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = base64Str;
            img.onerror = () => resolve(base64Str);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
        });
    };

    function calculateAge(birthday) {
        if(!birthday) return 0;
        const b = new Date(birthday);
        const t = new Date();
        let age = t.getFullYear() - b.getFullYear();
        if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) age--;
        return age;
    }

    function getAutoCategory(nascimento) {
        const idade = calculateAge(nascimento);
        if (idade >= 4 && idade <= 6) return "Baby Eagle";
        if (idade >= 7 && idade <= 10) return "Little Eagle";
        if (idade >= 11 && idade <= 12) return "Eagle Warrior";
        return "Eagle Youth";
    }

    function getRules(nascimento, faixa) {
        const cat = getAutoCategory(nascimento);
        const f = faixa.toLowerCase();
        if (cat === "Baby Eagle") return 12;
        if (cat === "Little Eagle" || cat === "Eagle Warrior") {
             return (f.includes("branca") || f.includes("cinza")) ? 15 : 20;
        }
        return 15;
    }

    function getPrevisaoGraduacao(aulasAtuais, nascimento, faixa) {
        const rules = getRules(nascimento, faixa);
        const totalAulasNecessarias = rules * 9;
        const aulasFaltantes = totalAulasNecessarias - aulasAtuais;
        
        if (aulasFaltantes <= 0) return "Pronto para exame!";
        
        const dataPrevisa = new Date();
        let aulasContadas = 0;
        while (aulasContadas < aulasFaltantes) {
            dataPrevisa.setDate(dataPrevisa.getDate() + 1);
            if (classDays.includes(dataPrevisa.getDay())) aulasContadas++;
        }
        
        return dataPrevisa.toLocaleDateString('pt-BR');
    }

    function getGraduationProgress(aulasAtuais, nascimento, faixa, comp = {}) {
        const rules = getRules(nascimento, faixa);
        const total = rules * 9;
        const feitas = Math.min(aulasAtuais, total);
        const faltantes = Math.max(0, total - aulasAtuais);
        const aulasPercentual = total ? (feitas / total) * 100 : 0;
        const meritos = ["Rel", "Comp", "Notas", "Hab"];
        const meritosFeitos = meritos.filter(k => comp?.[k]).length;
        const percentual = Math.min(100, Math.round((aulasPercentual * 0.75) + ((meritosFeitos / meritos.length) * 25)));
        return {
            total,
            feitas,
            faltantes,
            percentual,
            previsao: getPrevisaoGraduacao(aulasAtuais, nascimento, faixa)
        };
    }

    function App() {
        const [mode, setMode] = React.useState(null); 
        const [subMode, setSubMode] = React.useState(null);
        const [auth, setAuth] = React.useState({ user: '', pass: '' });
        const supabaseClient = React.useMemo(() => createSupabaseClient(), []);
        
        const [students, setStudents] = React.useState(() => {
            try { return JSON.parse(localStorage.getItem(LOCAL_STUDENTS_KEY) || "[]"); } 
            catch(e) { return []; }
        });
        const [repo, setRepo] = React.useState(() => {
            try { return JSON.parse(localStorage.getItem(LOCAL_REPO_KEY) || "[]"); }
            catch(e) { return []; }
        });

        const [searchTerm, setSearchTerm] = React.useState("");
        const [filterGroup, setFilterGroup] = React.useState("Todos");
        const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca", sexo: "M" });
        const [chatInputs, setChatInputs] = React.useState({});
        const [openChats, setOpenChats] = React.useState({});
        const [modalOpen, setModalOpen] = React.useState(null);
        const [viewImage, setViewImage] = React.useState(null);
        const [editingStudent, setEditingStudent] = React.useState(null);
        const [storageWarning, setStorageWarning] = React.useState("");
        const [isHydrated, setIsHydrated] = React.useState(false);
        const [dbStatus, setDbStatus] = React.useState(supabaseClient ? "Conectando ao Supabase..." : "Supabase não configurado");

        React.useEffect(() => {
            const loadRemoteData = async () => {
                if (!supabaseClient) {
                    setIsHydrated(true);
                    return;
                }

                try {
                    const localStudents = JSON.parse(localStorage.getItem(LOCAL_STUDENTS_KEY) || "[]");
                    const localRepo = JSON.parse(localStorage.getItem(LOCAL_REPO_KEY) || "[]");
                    const { data, error } = await supabaseClient
                        .from("app_state")
                        .select("students, repo")
                        .eq("id", SUPABASE_STATE_ID)
                        .maybeSingle();

                    if (error) throw error;

                    if (data) {
                        const remoteStudents = Array.isArray(data.students) ? data.students : [];
                        const remoteRepo = Array.isArray(data.repo) ? data.repo : [];
                        const remoteIsEmpty = remoteStudents.length === 0 && remoteRepo.length === 0;
                        const localHasData = localStudents.length > 0 || localRepo.length > 0;

                        if (remoteIsEmpty && localHasData) {
                            await supabaseClient.from("app_state").upsert({
                                id: SUPABASE_STATE_ID,
                                students: localStudents,
                                repo: localRepo,
                                updated_at: new Date().toISOString()
                            });
                            setStudents(localStudents);
                            setRepo(localRepo);
                            setDbStatus("Base local enviada ao Supabase");
                        } else {
                            setStudents(remoteStudents);
                            setRepo(remoteRepo);
                            setDbStatus("Sincronizado com Supabase");
                        }
                    } else {
                        await supabaseClient.from("app_state").insert({
                            id: SUPABASE_STATE_ID,
                            students: localStudents,
                            repo: localRepo,
                            updated_at: new Date().toISOString()
                        });
                        setDbStatus("Dados locais enviados ao Supabase");
                    }
                } catch (err) {
                    console.error(err);
                    setDbStatus("Erro ao conectar Supabase. Usando dados locais.");
                } finally {
                    setIsHydrated(true);
                }
            };

            loadRemoteData();
        }, [supabaseClient]);

        React.useEffect(() => { 
            if (!isHydrated) return;
            try {
                localStorage.setItem(LOCAL_STUDENTS_KEY, JSON.stringify(students));
                localStorage.setItem(LOCAL_REPO_KEY, JSON.stringify(repo));
                setStorageWarning("");
            } catch(e) {
                setStorageWarning("O armazenamento do navegador está cheio. Gere um backup e remova arquivos grandes.");
            }

            if (!supabaseClient) return;
            const syncTimer = setTimeout(async () => {
                try {
                    const { error } = await supabaseClient.from("app_state").upsert({
                        id: SUPABASE_STATE_ID,
                        students,
                        repo,
                        updated_at: new Date().toISOString()
                    });
                    if (error) throw error;
                    setDbStatus("Sincronizado com Supabase");
                } catch (err) {
                    console.error(err);
                    setDbStatus("Erro ao salvar no Supabase");
                }
            }, 600);

            return () => clearTimeout(syncTimer);
        }, [students, repo, isHydrated, supabaseClient]);

        const handleLogin = () => {
            if (subMode === 'Professor') {
                if (auth.user === 'admin' && auth.pass === 'admin') setMode('Professor');
                else alert('Senha incorreta.');
            } else {
                const aluno = students.find(s => {
                    const nomeMatch = s.nome.toLowerCase().trim() === auth.user.toLowerCase().trim();
                    const senhaLimpa = auth.pass.replace(/\D/g,'');
                    let dn = s.nascimento.replace(/\D/g,'');
                    if (s.nascimento.includes('-')) {
                        const [y, m, d] = s.nascimento.split('-');
                        dn = d + m + y;
                    }
                    return nomeMatch && (dn === senhaLimpa);
                });
                if (aluno) { setMode('Pais'); setSearchTerm(aluno.nome); }
                else alert('Dados incorretos.');
            }
        };

        const handleFile = async (file, type, id = null) => {
            if(!file) return;
            const isImage = file.type.startsWith('image/');
            const reader = new FileReader();
            document.getElementById('compress-loader').style.display = 'block';
            reader.onload = async (e) => {
                try {
                    let finalData = e.target.result;
                    if (isImage) finalData = await compressImage(finalData);
                    
                    if (type === 'avatar') {
                        setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: finalData } : s));
                    } else if (type === 'chat') {
                        const msgAnexo = { 
                            id: Date.now(), sender: mode, author: mode === "Professor" ? "Professor" : "PAIS",
                            text: isImage ? "" : `📎 Arquivo: ${file.name}`, fileData: finalData, 
                            fileName: file.name, isImage: isImage,
                            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                            readBy: [mode] 
                        };
                        setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...(s.chat || []), msgAnexo] } : s));
                    } else if (type === 'repo') {
                        const newItem = { id: Date.now(), name: file.name, data: finalData, date: new Date().toLocaleDateString('pt-BR') };
                        setRepo(prev => [...prev, newItem]);
                    }
                } catch (err) {
                    alert("Não foi possível carregar o arquivo.");
                } finally {
                    document.getElementById('compress-loader').style.display = 'none';
                }
            };
            reader.onerror = () => {
                document.getElementById('compress-loader').style.display = 'none';
                alert("Não foi possível ler o arquivo.");
            };
            reader.readAsDataURL(file);
        };

        const togglePresenca = (sid, boxIndex) => {
            if(mode !== "Professor") return;
            setStudents(prev => prev.map(s => {
                if (s.id === sid) {
                    const rules = getRules(s.nascimento, s.faixa);
                    const currentRemainder = s.aulas % rules;
                    if (boxIndex < currentRemainder) {
                        const novaAula = s.aulas - 1;
                        return { ...s, aulas: Math.max(0, novaAula), historico: [...(s.historico || []), `❌ Remoção de Presença | Aula ${s.aulas} | ${new Date().toLocaleDateString('pt-BR')}`] };
                    } else {
                        if (s.aulas >= rules * 9) return s;
                        const novaAula = s.aulas + 1;
                        const log = [`Aula ${novaAula} | ${new Date().toLocaleDateString('pt-BR')}`];
                        if (novaAula % rules === 0) {
                            const n = novaAula / rules;
                            log.push(n <= 4 ? `🎓 GRAU DE PRESENÇA BRANCO (${n}º)` : `🔴 GRAU DE PRESENÇA VERMELHO (${n-4}º)`);
                        }
                        return { ...s, aulas: novaAula, historico: [...(s.historico || []), ...log] };
                    }
                }
                return s;
            }));
        };

        const toggleMerito = (sid, key, label) => {
            if(mode !== "Professor") return;
            setStudents(prev => prev.map(s => s.id === sid ? { ...s, comp: { ...s.comp, [key]: !s.comp?.[key] }, historico: [...(s.historico || []), `${!s.comp?.[key]?'✅':'❌'} ${label}`] } : s));
        };

        const graduarAluno = (sid) => {
            if(mode !== "Professor") return;
            setStudents(prev => prev.map(s => {
                if (s.id === sid) {
                    const cur = beltOrder.indexOf(s.faixa);
                    const prox = beltOrder[cur + 1] || s.faixa;
                    return { ...s, faixa: prox, aulas: 0, comp: {}, historico: [...(s.historico || []), `🎓 GRADUADO: ${prox}`] };
                }
                return s;
            }));
        };

        const downloadBackup = () => {
            const data = { students, repo, timestamp: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_eagle_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        const importBackup = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (Array.isArray(data.students)) {
                        setStudents(data.students);
                        setRepo(Array.isArray(data.repo) ? data.repo : []);
                        alert("Backup restaurado com sucesso!");
                        setModalOpen(null);
                    } else {
                        alert("Arquivo de backup inválido.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo.");
                }
            };
            reader.readAsText(file);
        };

        const sendMessage = (sid) => {
            const txt = chatInputs[sid] || "";
            if(!txt.trim()) return;
            const novaMsg = { 
                id: Date.now(), sender: mode, author: mode === "Professor" ? "Professor" : "PAIS",
                text: txt, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), readBy: [mode] 
            };
            setStudents(prev => prev.map(s => s.id === sid ? { ...s, chat: [...(s.chat || []), novaMsg] } : s));
            setChatInputs({ ...chatInputs, [sid]: "" });
        };

        const agendarExamePeloAlerta = (sid) => {
            if (mode !== "Pais") return;
            setChatInputs({ ...chatInputs, [sid]: "AGENDAR EXAME DE FAIXA" });
            setOpenChats({ ...openChats, [sid]: true });
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        };

        const filtered = students.filter(s => {
            const matchesName = s.nome.toLowerCase().includes(searchTerm.toLowerCase());
            const matchesGroup = filterGroup === "Todos" || getAutoCategory(s.nascimento) === filterGroup;
            return matchesName && matchesGroup;
        });
        const readyStudents = students.filter(s => {
            const rules = getRules(s.nascimento, s.faixa);
            return s.aulas >= rules * 9 && s.comp?.Rel && s.comp?.Comp && s.comp?.Notas && s.comp?.Hab;
        }).length;
        if (!mode) {
            if (!subMode) return (
                <div className="selection-screen">
                    <div className="auth-shell">
                        <div className="brand-card">
                            <img src="logo.jpg" className="auth-logo" />
                            <h1 className="auth-title">Alliance Mooca Kids</h1>
                            <p className="auth-subtitle">Sistema de evolução e graduação</p>
                        </div>
                        <div className="role-grid">
                            <button className="btn-select" onClick={() => setSubMode("Professor")}>
                                <i className="fas fa-graduation-cap"></i>
                                <span>Professor<small>Gestão da turma</small></span>
                            </button>
                            <button className="btn-select" onClick={() => setSubMode("Pais")}>
                                <i className="fas fa-home"></i>
                                <span>Área dos Pais<small>Acompanhar evolução</small></span>
                            </button>
                        </div>
                    </div>
                </div>
            );
            return (
                <div className="auth-container">
                    <div className="auth-shell">
                        <div className="login-box">
                            <img src="logo.jpg" className="auth-logo" />
                            <h3 className="login-heading">Acesso {subMode === "Pais" ? "dos Pais" : "do Professor"}</h3>
                            <input placeholder={subMode === 'Professor' ? "Usuário" : "Nome do Aluno"} value={auth.user} onChange={e => setAuth({...auth, user: e.target.value})} />
                            <input type="password" placeholder={subMode === 'Professor' ? "Senha" : "Nascimento (DDMMAAAA)"} value={auth.pass} onChange={e => setAuth({...auth, pass: e.target.value})} />
                            <button className="btn-full" style={{background: 'var(--alliance-red)', color:'white'}} onClick={handleLogin}>ENTRAR</button>
                            <p className="back-link" onClick={() => { setSubMode(null); setAuth({user:'', pass:''}); }}>Voltar à seleção</p>
                        </div>
                    </div>
                </div>
            );
        }

        return (
            <div className="container app-shell">
                <header className="header-main">
                    <div>
                        <h2>Alliance Mooca Kids</h2>
                        <span className="mode-pill">{mode === "Professor" ? "Painel do professor" : "Área dos pais"}</span>
                    </div>
                    {/* Botão de backup */}
                    {mode === "Professor" && (
                        <div className="btn-settings-hidden" onClick={() => setModalOpen('backup')}>
                            <i className="fas fa-cog"></i>
                        </div>
                    )}
                </header>

                {storageWarning && <div className="warning-banner">{storageWarning}</div>}
                <div className={`sync-banner ${supabaseClient ? (dbStatus.includes("Erro") ? "error" : "") : "offline"}`}>
                    <span><i className={`fas ${supabaseClient && !dbStatus.includes("Erro") ? "fa-database" : "fa-exclamation-triangle"}`}></i> {dbStatus}</span>
                    {!isHydrated && <span>Carregando...</span>}
                </div>

                {mode === "Professor" && (
                    <>
                        <div className="summary-grid">
                            <div className="summary-item"><strong>{students.length}</strong><span>alunos</span></div>
                            <div className="summary-item"><strong>{readyStudents}</strong><span>prontos</span></div>
                            <div className="summary-item"><strong>{repo.length}</strong><span>arquivos</span></div>
                        </div>
                        <div className="search-container">
                            <i className="fas fa-search search-icon"></i>
                            <input className="search-input" placeholder="Buscar por nome..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            <div className="filter-bar">
                                {groups.map(g => (
                                    <button key={g} className={`filter-btn ${filterGroup === g ? 'active' : ''}`} onClick={() => setFilterGroup(g)}>{g}</button>
                                ))}
                            </div>
                        </div>
                    </>
                )}

                {filtered.length === 0 && (
                    <div className="empty-state">
                        <i className="fas fa-user-graduate"></i>
                        <strong>{students.length === 0 ? "Nenhum aluno cadastrado" : "Nenhum aluno encontrado"}</strong>
                        <span>{mode === "Professor" ? "Use o botão ALUNO para cadastrar ou ajuste a busca." : "Confira o nome e a data de nascimento usados no acesso."}</span>
                    </div>
                )}

                {filtered.map(s => {
                    const rules = getRules(s.nascimento, s.faixa);
                    const tg = Math.floor(s.aulas / rules);
                    const pronto = (s.aulas >= rules * 9) && s.comp?.Rel && s.comp?.Comp && s.comp?.Notas && s.comp?.Hab;
                    const unread = s.chat?.filter(m => !(m.readBy || []).includes(mode)).length || 0;
                    const defaultAvatar = s.sexo === "F" ? AVATAR_GIRL : AVATAR_BOY;
                    const progresso = getGraduationProgress(s.aulas, s.nascimento, s.faixa, s.comp);

                    return (
                        <div key={s.id} className="card">
                            <div className="student-top">
                                <div className="avatar-container">
                                    <img src={s.avatar || defaultAvatar} className="avatar" />
                                    {mode === "Professor" && <label className="edit-badge"><i className="fas fa-camera"></i><input type="file" style={{display:'none'}} accept="image/*" onChange={e => handleFile(e.target.files[0], 'avatar', s.id)} /></label>}
                                </div>
                                <div style={{flex:1}}>
                                    <h3 style={{margin:0, fontSize:'19px', color: 'white'}}>
                                        {s.nome} 
                                        {mode === "Professor" && <i className="fas fa-edit btn-edit-info" onClick={() => { setEditingStudent({...s}); setModalOpen('edit'); }}></i>}
                                    </h3>
                                    <div className="cat-badge">{s.faixa}</div><br/>
                                    <small style={{color:'#666', fontWeight:'bold'}}>{calculateAge(s.nascimento)} ANOS • {getAutoCategory(s.nascimento)}</small><br/>
                                </div>
                                {mode === "Professor" && <i className="fas fa-trash-alt" style={{color:'#333', padding:'10px'}} onClick={() => confirm("Remover?") && setStudents(students.filter(x => x.id !== s.id))}></i>}
                            </div>

                            <div className="graduation-panel">
                                <div className="graduation-head">
                                    <div className="graduation-title"><i className="fas fa-route"></i> Caminho até a próxima faixa</div>
                                    <div className="graduation-date"><i className="fas fa-calendar-alt"></i> {progresso.previsao}</div>
                                </div>
                                <div className="progress-track">
                                    <div className="progress-fill" style={{width: `${progresso.percentual}%`}}></div>
                                </div>
                                <div className="graduation-meta">
                                    <span><strong>{progresso.faltantes}</strong>aulas faltam</span>
                                    <span><strong>{progresso.feitas}/{progresso.total}</strong>aulas feitas</span>
                                    <span><strong>{progresso.percentual}%</strong>concluído</span>
                                </div>
                            </div>

                            <span className="section-label">Aulas de Presença</span>
                            {mode === "Pais" && pronto ? (
                                <button className="alert-parents" onClick={() => agendarExamePeloAlerta(s.id)}>
                                    <i className="fas fa-star"></i> AGENDAR EXAME DE FAIXA (CLIQUE AQUI)
                                </button>
                            ) : (
                                <div className="bar">
                                    {Array.from({length:rules}).map((_, i) => (
                                        <div key={i} className={`box-class ${i < (s.aulas % rules) ? 'done' : ''} ${s.aulas >= rules * 9 ? 'locked' : ''}`} onClick={() => togglePresenca(s.id, i)}>{i+1}</div>
                                    ))}
                                </div>
                            )}

                            <span className="section-label">Graus de Presença</span>
                            <div className="degree-row">
                                {Array.from({length:4}).map((_, i) => {
                                    let c = "";
                                    if (tg > i + 4) c = "bg-red"; else if (tg > i) c = "bg-white";
                                    return <div key={i} className={`degree-box ${c}`}></div>;
                                })}
                            </div>

                            <span className="section-label">Graus Comportamentais</span>
                            <div className="degree-row" style={{ alignItems: 'flex-end', padding: '15px 12px' }}>
                                {[
                                    {k:'Rel', i:'fa-users', c:'bg-yellow', l:'Relac.'}, 
                                    {k:'Comp', i:'fa-brain', c:'bg-blue', l:'Comp.'}, 
                                    {k:'Notas', i:'fa-graduation-cap', c:'bg-red', l:'Notas'}, 
                                    {k:'Hab', i:'fa-apple-alt', c:'bg-green', l:'Hab.'}
                                ].map(m => (
                                    <div key={m.k} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px' }}>
                                        <span style={{ fontSize: '9px', fontWeight: '800', color: '#888', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{m.l}</span>
                                        <div 
                                            className={`degree-box ${s.comp?.[m.k] ? m.c : ''}`} 
                                            onClick={() => toggleMerito(s.id, m.k, m.l)}
                                            style={{ width: '100%', margin: 0, height: '42px' }}
                                        >
                                            <i className={`fas ${m.i}`} style={{ color: s.comp?.[m.k] ? '#000' : '#444', fontSize: '15px' }}></i>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {mode === "Professor" && pronto && (
                                <button className="btn-full btn-graduar" onClick={() => graduarAluno(s.id)}><i className="fas fa-medal"></i> GRADUAR PARA {beltOrder[beltOrder.indexOf(s.faixa)+1]}</button>
                            )}

                            <details className="hist-details">
                                <summary className="hist-summary"><span><i className="fas fa-history"></i> Histórico</span><i className="fas fa-chevron-down"></i></summary>
                                <div className="hist-content">{s.historico?.slice().reverse().map((h, i) => <div key={i} style={{padding:'6px 0', borderBottom:'1px solid #222'}}>{h}</div>)}</div>
                            </details>

                            <div className="chat-container" id={`chat-${s.id}`}>
                                <div className="chat-header" onClick={() => { setOpenChats({...openChats, [s.id]: !openChats[s.id]}); if(!openChats[s.id]) setStudents(prev => prev.map(x => x.id === s.id ? {...x, chat: (x.chat||[]).map(m => !(m.readBy || []).includes(mode) ? {...m, readBy: [...(m.readBy || []), mode]} : m)} : x)); }}>
                                    <span style={{fontSize:'12px'}}><i className="fab fa-whatsapp" style={{color: 'var(--whatsapp-green)'}}></i> CONVERSA {unread > 0 && <span style={{background: 'var(--alliance-red)', padding:'2px 6px', borderRadius:'10px', fontSize:'9px', marginLeft:'5px'}}>{unread}</span>}</span>
                                    <i className={`fas fa-chevron-${openChats[s.id] ? 'up' : 'down'}`} style={{fontSize:'10px'}}></i>
                                </div>
                                {openChats[s.id] && (
                                    <>
                                        <div className="chat-msgs">
                                            {s.chat?.map(m => (
                                                <div key={m.id} className={`msg-wrapper ${m.sender === mode ? 'self' : 'other'}`}>
                                                    <span className="msg-author">{m.author}</span>
                                                    <div className="msg-bubble">
                                                        {m.isImage && <img src={m.fileData} className="chat-img-preview" onClick={() => setViewImage(m)} />}
                                                        {!m.isImage && m.fileData && <a href={m.fileData} download={m.fileName} style={{color:'#3498db', textDecoration:'none'}}><i className="fas fa-file-download"></i> {m.fileName}</a>}
                                                        {m.text && <div>{m.text}</div>}
                                                        <div className="msg-meta">{m.time}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div style={{display:'flex', padding:'12px', background:'#1a1a1a', gap:'10px', alignItems:'center'}}>
                                            <label style={{cursor:'pointer'}}><i className="fas fa-camera" style={{color:'#555'}}></i><input type="file" style={{display:'none'}} accept="image/*" onChange={e => handleFile(e.target.files[0], 'chat', s.id)}/></label>
                                            <input style={{flex:1, border:'none', background:'#000', color:'white', padding:'12px 18px', borderRadius:'25px', fontSize:'14px', margin:0}} placeholder="Mensagem..." value={chatInputs[s.id] || ""} onChange={e => setChatInputs({...chatInputs, [s.id]: e.target.value})} onKeyDown={e => e.key === 'Enter' && sendMessage(s.id)}/>
                                            <i className="fas fa-paper-plane" style={{color: 'var(--alliance-green)', cursor:'pointer'}} onClick={() => sendMessage(s.id)}></i>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    );
                })}

                <div className="action-bar">
                    {mode === "Professor" ? (
                        <>
                            <div className="action-item" onClick={() => setModalOpen('add')}><i className="fas fa-user-plus"></i><span>ALUNO</span></div>
                            <div className="action-item" onClick={() => setModalOpen('repo')}><i className="fas fa-folder-open"></i><span>ARQUIVOS</span></div>
                            <div className="action-item" onClick={() => window.open('https://alliancemooca.com.br/', '_blank')}><i className="fas fa-globe"></i><span>SITE</span></div>
                            <div className="action-item" onClick={() => { setMode(null); setSubMode(null); setAuth({user:'', pass:''}); setSearchTerm(""); }}><i className="fas fa-sign-out-alt"></i><span>SAIR</span></div>
                        </>
                    ) : (
                        <>
                            <div className="action-item" onClick={() => window.open('https://alliancemooca.com.br/', '_blank')}><i className="fas fa-globe"></i><span>SITE</span></div>
                            <div className="action-item" onClick={() => setModalOpen('repo')}><i className="fas fa-folder-open"></i><span>ARQUIVOS</span></div>
                            <div className="action-item" onClick={() => { setMode(null); setSubMode(null); setAuth({user:'', pass:''}); setSearchTerm(""); }}><i className="fas fa-sign-out-alt"></i><span>SAIR</span></div>
                        </>
                    )}
                </div>

                {/* MODAL BACKUP */}
                {modalOpen === 'backup' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Gestão de Dados</h3>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={downloadBackup}>
                                <i className="fas fa-download"></i> GERAR BACKUP (.JSON)
                            </button>
                            <label className="btn-full" style={{background: 'var(--alliance-red)', color:'white', display:'block', textAlign:'center', cursor:'pointer', marginTop:'15px'}}>
                                <i className="fas fa-upload"></i> IMPORTAR BACKUP
                                <input type="file" style={{display:'none'}} accept=".json" onChange={importBackup} />
                            </label>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                        </div>
                    </div>
                )}

                {/* MODAL ADICIONAR ALUNO */}
                {modalOpen === 'add' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Novo Aluno</h3>
                            <input placeholder="Nome Completo" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                            <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                            <select value={form.sexo} onChange={e => setForm({...form, sexo: e.target.value})}>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                            </select>
                            <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                                {beltOrder.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={() => {
                                if(!form.nome || !form.nascimento) return alert("Preencha tudo!");
                                const nome = form.nome.trim();
                                const exists = students.some(s => s.nome.toLowerCase().trim() === nome.toLowerCase() && s.nascimento === form.nascimento);
                                if (exists) return alert("Este aluno já está cadastrado.");
                                setStudents([...students, { ...form, nome, id: Date.now(), aulas: 0, historico: [`Matrícula realizada em ${new Date().toLocaleDateString('pt-BR')}`] }]);
                                setModalOpen(null);
                                setForm({ nome: "", nascimento: "", faixa: "Branca", sexo: "M" });
                            }}>SALVAR</button>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>CANCELAR</button>
                        </div>
                    </div>
                )}

                {/* MODAL REPOSITÓRIO */}
                {modalOpen === 'repo' && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Arquivos e Materiais</h3>
                            {mode === "Professor" && (
                                <div style={{marginBottom:'20px'}}>
                                    <label className="btn-full" style={{background: 'var(--alliance-red)', color:'white', display:'block', textAlign:'center', cursor:'pointer'}}>
                                        <i className="fas fa-upload"></i> UPLOAD ARQUIVO
                                        <input type="file" style={{display:'none'}} onChange={e => handleFile(e.target.files[0], 'repo')} />
                                    </label>
                                </div>
                            )}
                            <div style={{marginTop:'15px'}}>
                                {repo.length === 0 && <p style={{textAlign:'center', color:'#555'}}>Nenhum arquivo disponível.</p>}
                                {repo.map(r => (
                                    <div key={r.id} className="repo-item">
                                        <div style={{flex:1, overflow:'hidden', marginRight:'10px'}}>
                                            <div style={{fontSize:'13px', fontWeight:'bold', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{r.name}</div>
                                            <div style={{fontSize:'10px', color:'#555'}}>{r.date}</div>
                                        </div>
                                        <div style={{display:'flex', gap:'15px'}}>
                                            <a href={r.data} download={r.name} style={{color:'#3498db'}}><i className="fas fa-download"></i></a>
                                            {mode === "Professor" && <i className="fas fa-trash" style={{color:'#e74c3c', cursor:'pointer'}} onClick={() => confirm("Excluir arquivo?") && setRepo(repo.filter(x => x.id !== r.id))}></i>}
                                        </div>
                                    </div>
                                ))}
                                <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* MODAL EDITAR ALUNO */}
                {modalOpen === 'edit' && editingStudent && (
                    <div className="modal-overlay">
                        <div className="modal-content">
                            <h3>Editar Aluno</h3>
                            <input placeholder="Nome" value={editingStudent.nome} onChange={e => setEditingStudent({...editingStudent, nome: e.target.value})} />
                            <input type="date" value={editingStudent.nascimento} onChange={e => setEditingStudent({...editingStudent, nascimento: e.target.value})} />
                            <select value={editingStudent.sexo || "M"} onChange={e => setEditingStudent({...editingStudent, sexo: e.target.value})}>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                            </select>
                            <select value={editingStudent.faixa} onChange={e => setEditingStudent({...editingStudent, faixa: e.target.value})}>
                                {beltOrder.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                            <button className="btn-full" style={{background: 'var(--alliance-green)', color:'white'}} onClick={() => {
                                if(!editingStudent.nome.trim() || !editingStudent.nascimento) return alert("Preencha tudo!");
                                const alunoAtualizado = { ...editingStudent, nome: editingStudent.nome.trim() };
                                setStudents(students.map(s => s.id === editingStudent.id ? alunoAtualizado : s));
                                setModalOpen(null);
                            }}>ATUALIZAR</button>
                            <button className="btn-full" onClick={() => setModalOpen(null)}>FECHAR</button>
                        </div>
                    </div>
                )}

                {viewImage && (
                    <div className="modal-overlay" onClick={() => setViewImage(null)}>
                        <img src={viewImage.fileData} style={{maxWidth:'100%', maxHeight:'90vh', borderRadius:'10px'}} />
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
