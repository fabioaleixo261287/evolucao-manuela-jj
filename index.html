<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhamento Jiu Jitsu Alliance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px
}

.container{
max-width:1200px;
margin:auto
}

.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px
}

.imagesPanel img{
width:100%;
margin-bottom:15px;
border-radius:8px
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{
display:flex;
gap:3px
}

.box{
width:14px;
height:14px;
border:1px solid #999;
background:#eee
}

.done{
background:#2ecc71
}

.degree{
width:20px;
height:20px;
border:1px solid #555;
border-radius:3px;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee;
cursor:pointer
}

.ready{
background:#d4edda;
padding:8px;
border-radius:6px;
margin-top:10px;
font-weight:bold
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #ddd;
}

.studentHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px
}

.login{
max-width:400px;
margin:auto;
margin-top:120px;
text-align:center
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

const trainingDays=[1,3,5,6]

function calculateAge(date){
const today=new Date()
const birth=new Date(date)
let age=today.getFullYear()-birth.getFullYear()
const m=today.getMonth()-birth.getMonth()
if(m<0||(m===0&&today.getDate()<birth.getDate())) age--
return age
}

function category(age){
if(age>=3&&age<=4) return "BABY EAGLE"
if(age>=5&&age<=8) return "LITTLE EAGLE"
if(age>=9&&age<=12) return "EAGLE WARRIOR"
if(age>=13&&age<=15) return "EAGLE YOUTH"
return "OUTRO"
}

function estimateDate(aulas){

let date=new Date()
let count=0

while(count<aulas){
date.setDate(date.getDate()+1)
if(trainingDays.includes(date.getDay())) count++
}

return date.toLocaleDateString()

}

function ClassesBar({aulas}){

return(
<div className="bar">
{Array.from({length:15}).map((_,i)=>{

const done=i<(aulas%15)

return(
<div key={i} className={"box "+(done?"done":"")}></div>
)

})}
</div>
)

}

function PresenceBar({graus}){

const brancos=Math.min(graus,4)
const vermelhos=Math.max(graus-4,0)

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let color="#ddd"

if(i<vermelhos) color="#e74c3c"
else if(i<brancos) color="#fff"

return(
<div key={i} className="degree" style={{background:color}}></div>
)

})}

</div>

)

}

function Login({setUser}){

return(

<div className="login card">

<h2>Login</h2>

<br/>

<button
className="green"
onClick={()=>setUser("professor")}
>
Professor
</button>

<br/><br/>

<button
className="orange"
onClick={()=>setUser("pais")}
>
Pais
</button>

</div>

)

}

function App(){

const [user,setUser]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("academia_preview_v2")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("academia_preview_v2",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome||!form.nascimento) return

const idade=calculateAge(form.nascimento)

setStudents([...students,{

id:Date.now(),

nome:form.nome,
idade,
nascimento:form.nascimento,
categoria:category(idade),

faixa:form.faixa,

avatar:"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",

aulas:0,

historicoAulas:[],
historicoGraus:[],
historicoComportamental:[],
historicoFaixas:[],

comportamental:{
relacionamento:null,
comportamento:null,
notas:null,
habitos:null
}

}])

setForm({
nome:"",
nascimento:"",
faixa:"Branca"
})

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

if(s.aulas>=135){
alert("Aluno atingiu 135 aulas. Realize a troca de faixa.")
return s
}

const data=new Date().toLocaleDateString()
const novas=s.aulas+1

let historico=s.historicoGraus

if(novas%15===0){
historico=[...historico,{grau:Math.floor(novas/15),data}]
}

return{

...s,

aulas:novas,

historicoAulas:[...s.historicoAulas,{data}],
historicoGraus:historico

}

}))

}

function trocarFaixa(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

const atual=beltOrder.indexOf(s.faixa)
const nova=beltOrder[Math.min(atual+1,beltOrder.length-1)]

return{

...s,

faixa:nova,
aulas:0,
historicoAulas:[],
historicoGraus:[],

historicoFaixas:[
...(s.historicoFaixas||[]),
{data:new Date().toLocaleDateString(),faixa:nova}
]

}

}))

}

if(user==="") return <Login setUser={setUser}/>

return(

<div className="container">

<h1>Acompanhamento Jiu Jitsu Alliance</h1>

<div className="layout">

<div>

<div className="card">

<div className="row">

<input
placeholder="Nome"
value={form.nome}
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
value={form.nascimento}
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
value={form.faixa}
onChange={e=>setForm({...form,faixa:e.target.value})}
>
{beltOrder.map(b=><option key={b}>{b}</option>)}
</select>

<button className="green" onClick={addStudent}>
Adicionar aluno
</button>

</div>

</div>

{students.map(s=>{

const graus=Math.min(Math.floor(s.aulas/15),15)

const faltam=Math.max(135-s.aulas,0)

const previsao=estimateDate(faltam)

return(

<div key={s.id} className="card">

<div className="studentHeader">

<img src={s.avatar} className="avatar"/>

<div>

<b>{s.nome}</b><br/>

{s.idade} anos<br/>

{s.categoria}

</div>

</div>

<div>Faixa: {s.faixa}</div>

<div style={{marginTop:6}}>Aulas</div>

<ClassesBar aulas={s.aulas}/>

<div style={{marginTop:6}}>Graus presença</div>

<PresenceBar graus={graus}/>

<div style={{marginTop:10}}>

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

<button className="orange" onClick={()=>trocarFaixa(s.id)}>
Troca de Faixa
</button>

</div>

<div style={{marginTop:8,fontSize:13}}>
Faltam {faltam} aulas para exame
</div>

<div style={{fontSize:13}}>
Previsão troca faixa: {previsao}
</div>

</div>

)

})}

</div>

<div className="imagesPanel">

<img src="sistema_graduacao.jpeg"/>

<img src="graus_coloridos.jpeg"/>

</div>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
