<!-- CHAT WHATSAPP STYLE ADICIONADO SEM ALTERAR O RESTO DO SISTEMA -->

<style>

.chatBox{
border-top:1px solid #ddd;
margin-top:12px;
padding-top:10px
}

.chatMessages{
max-height:200px;
overflow:auto;
display:flex;
flex-direction:column;
gap:6px;
margin-bottom:8px
}

.msg{
padding:6px 10px;
border-radius:10px;
max-width:70%;
font-size:13px;
word-break:break-word
}

.msg.professor{
background:#dff9fb;
align-self:flex-start
}

.msg.pais{
background:#c7ecee;
align-self:flex-end
}

.chatInput{
display:flex;
gap:6px
}

.clip{
cursor:pointer;
font-size:18px
}

</style>

<script type="text/babel">

/* ===== CHAT COMPONENT ===== */

function Chat({student,user,setStudents,students}){

const [msg,setMsg]=React.useState("")

function sendMessage(){

if(!msg) return

const data=new Date().toLocaleString()

setStudents(students.map(s=>{

if(s.id!==student.id) return s

return{
...s,
chat:[
...(s.chat||[]),
{
autor:user,
texto:msg,
data
}
]
}

}))

setMsg("")

}

function sendFile(file){

const reader=new FileReader()

reader.onload=e=>{

const data=new Date().toLocaleString()

setStudents(students.map(s=>{

if(s.id!==student.id) return s

return{
...s,
chat:[
...(s.chat||[]),
{
autor:user,
arquivo:e.target.result,
nome:file.name,
data
}
]
}

}))

}

reader.readAsDataURL(file)

}

return(

<div className="chatBox">

<b>Chat</b>

<div className="chatMessages">

{(student.chat||[]).map((m,i)=>(

<div
key={i}
className={"msg "+m.autor}
>

{m.texto && <div>{m.texto}</div>}

{m.arquivo &&

<div>

<a href={m.arquivo} download={m.nome}>
📎 {m.nome}
</a>

</div>

}

<div style={{fontSize:10,opacity:0.6}}>
{m.data}
</div>

</div>

))}

</div>

<div className="chatInput">

<label className="clip">
📎
<input
type="file"
style={{display:"none"}}
onChange={e=>{
const file=e.target.files[0]
if(file) sendFile(file)
}}
/>
</label>

<input
value={msg}
onChange={e=>setMsg(e.target.value)}
placeholder="Mensagem"
/>

<button onClick={sendMessage}>
Enviar
</button>

</div>

</div>

)

}

</script>
