<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:15px; }
.container { max-width:850px; margin:auto; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); position: relative; }
.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; align-items: center; }
button { padding:8px 14px; border:none; border-radius:8px; background:#075e54; color:white; cursor:pointer; font-weight: bold; }
button.red { background:#e74c3c; }
button.blue { background:#3498db; }
button.small-edit { background: none; color: #777; padding: 2px; font-size: 16px; margin-left: 5px; border-radius: 4px; border: 1px solid #ddd; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

/* Avatar */
.avatar-container { position: relative; width: 80px; height: 80px; cursor: pointer; flex-shrink: 0; }
.avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; background: #eee; }

/* Bolinhas e Graus */
.bar-bolinhas { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.bolinha-aula { width:36px; height:36px; border-radius:50%; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:13px; background:#fff; color:#777; cursor: pointer; font-weight: bold; }
.bolinha-aula.done { background:#25d366; color:white; border-color:#128c7e; }
.degree-bar { display: flex; gap: 4px; margin-bottom: 10px; }
.degree { width:26px; height:26px; border:1px solid #333; border-radius:4px; background:#ddd; }

/* Comportamentais */
.beh-row { display: flex; gap: 8px; margin: 10px 0; }
.beh-btn { flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; border: 1px solid #ccc; cursor: pointer; color: white; opacity: 0.4; }
.beh-btn.active { opacity: 1; }

/* Chat */
.chat-wrapper { background: #efe7dd; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px; overflow: hidden; }
.chat-messages { height:220px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; font-size:14px; max-width:80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
.msg.sent { background:#dcf8c6; align-self:flex-end; }
.msg.received { background:#fff; align-self:flex-start; }
.chat-input-area { display:flex; gap:8px; padding:12px; background:#f0f0f0; border-top: 1px solid #ddd; align-items: center; }
.chat-input-area textarea { flex:1; border:none; padding:10px; border-radius:8px; height: 40px; resize: none; }

.history-list { font-size: 11px; color: #666; max-height: 80px; overflow-y: auto; background: #fafafa; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
.repo-box { margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; border: 1px solid #ddd; }
.doc-card { display: flex; justify-content: space-between; background: white; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; border: 1px solid #eee; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BELTS = ["Branca", "Cinza/Branca", "Cinza", "Cinza/Preta", "Amarela/Branca", "Amarela", "Amarela/Preta", "Laranja/Branca", "Laranja", "Laranja/Preta", "Verde/Branca", "Verde", "Verde/Preta"];

const BEH_DATA = {
    REL: { n: "RELACIONAMENTO", c: "#f1c40f", desc: "- Respeitar a todos\n- Tratar como gostaria de ser tratado\n- Ser gentil ao pedir as coisas\n- Ser paciente\n- Receptivo com novos alunos\n- Não fazer bullying" },
    DIS: { n: "COMPORTAMENTO E DISCIPLINA", c: "#3498db", desc: "- Faz o que é pedido\n- Presta atenção na aula\n- Boa frequência\n- Não sai do tatame sem avisar\n- Ajudar os colegas" },
    ORG: { n: "ORGANIZAÇÃO E PONTUALIDADE", c: "#e74c3c", desc: "- Seguir orientações do professor\n- Boas notas escolares\n- Pontualidade\n- Cuidar do uniforme\n- Saber amarrar a faixa" },
    HAB: { n: "COMPROMETIMENTO", c: "#2ecc71", desc: "- Boa alimentação\n- Higiene pessoal\n- Atividade física\n- Pensamentos positivos\n- Conscientização ambiental" }
};

function getAge(nasc) {
    if(!nasc) return 0;
    const birthDate = new Date(nasc);
    const age = new Date().getFullYear() - birthDate.getFullYear();
    return age;
}

function getRules(nasc, faixa) {
    const idade = getAge(nasc);
    const isW = faixa.includes("Branca") || faixa.includes("Cinza");
    const isY = faixa.includes("Amarela") || faixa.includes("Laranja");
    if (idade <= 5) return { p: "Baby Eagle", m: 12 };
    if (idade <= 8) return { p: "Little Eagle", m: isW ? 15 : 20 };
    if (idade <= 12) return { p: "Eagle Warrior", m: isW ? 15 : 20 };
    if (idade <= 15) return { p: "Eagle Youth", m: isW ? 20 : (isY ? 22 : 25) };
    return { p: "Infantil", m: 15 };
}

function App() {
    const [user, setUser] = React.useState("");
    const [filho, setFilho] = React.useState("");
    const [editingId, setEditingId] = React.useState(null);
    const [students, setStudents] = React.useState(() => JSON.parse(localStorage.getItem("all_eagle_v8") || "[]"));
    const [form, setForm] = React.useState({ nome: "", nascimento: "", faixa: "Branca" });

    React.useEffect(() => { localStorage.setItem("all_eagle_v8", JSON.stringify(students)) }, [students]);

    const handleFileUpload = (id, e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = ev.target.result;
            if (type === 'avatar') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, avatar: data } : s));
            } else if (type === 'chat') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user, text: "", file: { name: file.name, data, type: file.type } }] } : s));
            } else if (type === 'repo') {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, docs: [...s.docs, { name: file.name, data, date: new Date().toLocaleDateString() }] } : s));
            }
        };
        reader.readAsDataURL(file);
    };

    const sendMessage = (id) => {
        const input = document.getElementById(`msg-${id}`);
        if (!input.value.trim()) return;
        setStudents(prev => prev.map(s => s.id === id ? { ...s, chat: [...s.chat, { sender: user, text: input.value }] } : s));
        input.value = "";
    };

    const toggleBeh = (id, k) => {
        if (user !== "professor") {
            alert(BEH_DATA[k].n + "\n\n" + BEH_DATA[k].desc);
            return;
        }
        setStudents(prev => prev.map(s => {
            if (s.id !== id) return s;
            const active = !s.comportamental[k];
            if (active) alert(BEH_DATA[k].n + "\n\n" + BEH_DATA[k].desc);
            return { ...s, comportamental: { ...s.comportamental, [k]: active } };
        }));
    };

    if (!user) return (
        <div className="card" style={{ maxWidth: 350, margin: '100px auto', textAlign: 'center' }}>
            <h2 style={{color: '#075e54'}}>Alliance Jiu Jitsu</h2>
            <button onClick={() => setUser("professor")} style={{width:'100%', marginBottom:10}}>Professor</button>
            <button onClick={() => setUser("pais")} style={{width:'100%', background: '#3498db'}}>Pais</button>
        </div>
    );

    const lista = user === "pais" ? students.filter(s => s.nome.toLowerCase() === filho.toLowerCase()) : students;

    return (
        <div className="container">
            <div className="row" style={{justifyContent:'space-between'}}>
                <h2 style={{color:'#075e54', margin:0}}>Eagle System</h2>
                <button onClick={() => {setUser(""); setFilho("")}} className="red">Sair</button>
            </div>

            {user === "professor" && (
                <div className="card">
                    <div className="row">
                        <input placeholder="Nome" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} />
                        <input type="date" value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} />
                        <select value={form.faixa} onChange={e => setForm({...form, faixa: e.target.value})}>
                            {BELTS.map(b => <option key={b}>{b}</option>)}
                        </select>
                        <button onClick={() => {if(form.nome) setStudents([...students, {id: Date.now(), ...form, avatar: "", aulasNoCiclo: 0, grausGanhos: 0, history: [], chat: [], docs: [], comportamental: {}}]); setForm({nome:"", nascimento:"", faixa:"Branca"})}}>+ Aluno</button>
                    </div>
                </div>
            )}

            {user === "pais" && !filho && (
                <div className="card"><input placeholder="Nome do aluno..." style={{width:'100%', padding:10}} onKeyDown={e => e.key==='Enter' && setFilho(e.target.value)} /></div>
            )}

            {lista.map(s => {
                const rules = getRules(s.nascimento, s.faixa);
                return (
                    <div key={s.id} className="card">
                        <div className="row">
                            <label className="avatar-container">
                                <img src={s.avatar || "https://via.placeholder.com/80"} className="avatar-img" />
                                <input type="file" hidden accept="image/*" onChange={e => handleFileUpload(s.id, e, 'avatar')} />
                            </label>
                            <div style={{flex:1}}>
                                <h3 style={{margin:0}}>{s.nome} ({getAge(s.nascimento)} anos)</h3>
                                <small>{rules.p} | Faixa {s.faixa}</small>
                            </div>
                            {user === "professor" && <button className="blue" onClick={() => {const f = prompt("Nova Faixa:", s.faixa); if(f) setStudents(students.map(x => x.id === s.id ? {...x, faixa: f, aulasNoCiclo: 0, grausGanhos: 0} : x))}}>Trocar Faixa</button>}
                        </div>

                        <div className="bar-bolinhas">
                            {Array.from({ length: rules.m }).map((_, i) => (
                                <div key={i} className={`bolinha-aula ${i < s.aulasNoCiclo ? 'done' : ''}`} onClick={() => {
                                    if(user !== "professor") return;
                                    let nova = s.aulasNoCiclo === i+1 ? i : i+1;
                                    setStudents(students.map(x => x.id === s.id ? {...x, aulasNoCiclo: nova} : x));
                                    if(nova === rules.m) alert("Ciclo Completo! Adicione o grau.");
                                }}>{i + 1}</div>
                            ))}
                        </div>

                        <div className="degree-bar">
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} className="degree" onClick={() => user === 'professor' && setStudents(students.map(x => x.id === s.id ? {...x, grausGanhos: i+1} : x))} style={{ background: i < s.grausGanhos ? (i < 4 ? '#fff' : '#e74c3c') : '#ddd' }}></div>
                            ))}
                        </div>

                        <div className="beh-row">
                            {Object.keys(BEH_DATA).map(k => (
                                <div key={k} className={`beh-btn ${s.comportamental[k] ? 'active' : ''}`} style={{background: BEH_DATA[k].c}} onClick={() => toggleBeh(s.id, k)}>{k}</div>
                            ))}
                        </div>

                        <div className="repo-box">
                            <strong>📂 Repositório</strong>
                            {user === 'professor' && <input type="file" onChange={e => handleFileUpload(s.id, e, 'repo')} style={{fontSize:10, marginLeft:10}} />}
                            {s.docs?.map((d, i) => <div key={i} className="doc-card">{d.name} <a href={d.data} download={d.name}>Baixar</a></div>)}
                        </div>

                        <div className="chat-wrapper">
                            <div className="chat-messages">
                                {s.chat.map((m, i) => (
                                    <div key={i} className={`msg ${m.sender === user ? 'sent' : 'received'}`}>
                                        <small>{m.sender}</small>
                                        {m.text && <div>{m.text}</div>}
                                        {m.file && (
                                            <div>
                                                {m.file.type.includes('image') ? <img src={m.file.data} style={{maxWidth:100, borderRadius:5}} /> : <span>📄 {m.file.name}</span>}
                                                <br/><a href={m.file.data} download={m.file.name} style={{fontSize:10}}>Download</a>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <div className="chat-input-area">
                                <label style={{cursor:'pointer'}}>📎<input type="file" hidden onChange={e => handleFileUpload(s.id, e, 'chat')} /></label>
                                <textarea id={`msg-${s.id}`} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), sendMessage(s.id))} />
                                <button onClick={() => sendMessage(s.id)}>➤</button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
