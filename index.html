<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Jiu Jitsu Alliance</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px
}

.container{
max-width:1000px;
margin:auto
}

.card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.row{
display:flex;
gap:8px;
flex-wrap:wrap
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer
}

button.green{background:#2ecc71}
button.red{background:#e74c3c}

input,select{
padding:6px;
border-radius:6px;
border:1px solid #ccc
}

.bar{display:flex;gap:3px}

.box{
width:14px;
height:14px;
border:1px solid #aaa;
background:#eee
}

.done{background:#2ecc71}

.degree{
width:20px;
height:20px;
border:1px solid #444;
background:#ddd
}

.beh{
width:22px;
height:22px;
border-radius:22px;
background:#eee
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover
}

.avatarBox{
position:relative;
width:60px
}

.editAvatar{
position:absolute;
bottom:-5px;
right:-5px;
font-size:10px;
background:#3498db;
color:white;
padding:2px 6px;
border-radius:6px;
cursor:pointer
}

.chatBox{
border:1px solid #ddd;
max-height:180px;
overflow:auto;
padding:6px;
margin-bottom:6px
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const beltOrder=[
"Branca","Cinza/Branca","Cinza","Cinza/Preta",
"Amarela/Branca","Amarela","Amarela/Preta",
"Laranja/Branca","Laranja","Laranja/Preta",
"Verde/Branca","Verde","Verde/Preta"
]

function ClassesBar({aulas}){

return(
<div className="bar">

{Array.from({length:15}).map((_,i)=>(

<div
key={i}
className={"box "+(i<(aulas%15)?"done":"")}
></div>

))}

</div>
)

}

function PresenceBar({graus}){

return(

<div className="bar">

{Array.from({length:4}).map((_,i)=>{

let cor="#ddd"

if(i<graus) cor="#fff"

return(
<div
key={i}
className="degree"
style={{background:cor}}
></div>
)

})}

</div>

)

}

function Chat({aluno,user,students,setStudents}){

const [msg,setMsg]=React.useState("")
const [file,setFile]=React.useState(null)
const [preview,setPreview]=React.useState(null)

async function compressImage(file){

return new Promise(resolve=>{

const img=new Image()
const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

img.onload=()=>{

let w=img.width
let h=img.height
const max=1200

if(w>max){
h=h*(max/w)
w=max
}

canvas.width=w
canvas.height=h

ctx.drawImage(img,0,0,w,h)

canvas.toBlob(blob=>{
resolve(blob)
},"image/jpeg",0.7)

}

img.src=URL.createObjectURL(file)

})

}

function selectFile(e){

const f=e.target.files[0]

if(!f) return

if(f.size>5000000){
alert("Arquivo máximo 5MB")
return
}

setFile(f)

const reader=new FileReader()

reader.onload=e=>setPreview(e.target.result)

reader.readAsDataURL(f)

}

async function send(){

if(!msg && !file) return

let arquivo=null
let tipo=null

if(file){

if(file.type.startsWith("image")){

const comp=await compressImage(file)

arquivo=await new Promise(res=>{
const reader=new FileReader()
reader.onload=e=>res(e.target.result)
reader.readAsDataURL(comp)
})

tipo="imagem"

}else{

arquivo=await new Promise(res=>{
const reader=new FileReader()
reader.onload=e=>res(e.target.result)
reader.readAsDataURL(file)
})

tipo="pdf"

}

}

const nova={
autor:user==="professor"?"Professor":"Pai",
texto:msg,
arquivo,
tipo,
data:new Date().toLocaleString()
}

setStudents(students.map(s=>{

if(s.id!==aluno.id) return s

return{
...s,
chat:[...(s.chat||[]),nova]
}

}))

setMsg("")
setFile(null)
setPreview(null)

}

return(

<div>

<h4>Chat</h4>

<div className="chatBox">

{(aluno.chat||[]).map((m,i)=>(

<div key={i} style={{marginBottom:6}}>

<b>{m.autor}</b>: {m.texto}

<br/>

{m.arquivo &&(

m.tipo==="imagem"?

<img src={m.arquivo} width="100"/>

:

<a href={m.arquivo} download="arquivo.pdf">
⬇ baixar PDF
</a>

)}

<div style={{fontSize:10,color:"#777"}}>
{m.data}
</div>

</div>

))}

</div>

<input
value={msg}
placeholder="Mensagem..."
onChange={e=>setMsg(e.target.value)}
/>

<input
type="file"
accept="image/*,application/pdf"
onChange={selectFile}
/>

<button onClick={send}>Enviar</button>

{preview &&(

<div>

<img src={preview} width="60"/>

<button onClick={()=>{
setFile(null)
setPreview(null)
}}>
remover
</button>

</div>

)}

</div>

)

}

function Login({setUser,students,setFilho}){

const [tipo,setTipo]=React.useState("")
const [nome,setNome]=React.useState("")
const [nascimento,setNascimento]=React.useState("")
const [senha,setSenha]=React.useState("")

function loginProfessor(){

if(senha==="admin") setUser("professor")
else alert("senha incorreta")

}

function loginPais(){

const aluno=students.find(
s=>s.nome===nome && s.nascimento===nascimento
)

if(aluno){
setFilho(nome)
setUser("pais")
}else{
alert("Aluno não encontrado")
}

}

return(

<div className="card">

<h2>Login</h2>

<button onClick={()=>setTipo("professor")}>
Professor
</button>

<button onClick={()=>setTipo("pais")}>
Pais
</button>

<br/><br/>

{tipo==="professor" &&(

<div>

<input
type="password"
placeholder="senha"
onChange={e=>setSenha(e.target.value)}
/>

<button onClick={loginProfessor}>
Entrar
</button>

</div>

)}

{tipo==="pais" &&(

<div>

<input
placeholder="Nome do aluno"
onChange={e=>setNome(e.target.value)}
/>

<input
type="date"
onChange={e=>setNascimento(e.target.value)}
/>

<button onClick={loginPais}>
Entrar
</button>

</div>

)}

</div>

)

}

function App(){

const [user,setUser]=React.useState("")
const [filho,setFilho]=React.useState("")

const [students,setStudents]=React.useState(()=>{
const saved=localStorage.getItem("bjj_app")
return saved?JSON.parse(saved):[]
})

const [form,setForm]=React.useState({
nome:"",
nascimento:"",
faixa:"Branca"
})

React.useEffect(()=>{
localStorage.setItem("bjj_app",JSON.stringify(students))
},[students])

function addStudent(){

if(!form.nome) return

setStudents([...students,{

id:Date.now(),

nome:form.nome,
nascimento:form.nascimento,
faixa:form.faixa,

avatar:"",

aulas:0,

chat:[],

historicoFaixas:[]

}])

}

function addAttendance(id){

setStudents(students.map(s=>{

if(s.id!==id) return s

return{
...s,
aulas:s.aulas+1
}

}))

}

function uploadAvatar(id,file){

const reader=new FileReader()

reader.onload=e=>{

setStudents(students.map(s=>{
if(s.id!==id) return s
return {...s,avatar:e.target.result}
}))

}

reader.readAsDataURL(file)

}

let lista=students

if(user==="pais"){
lista=students.filter(s=>s.nome===filho)
}

if(user==="")
return <Login setUser={setUser} students={students} setFilho={setFilho}/>

return(

<div className="container">

<h1>Controle Jiu Jitsu</h1>

{user==="professor" &&(

<div className="card">

<input
placeholder="Nome"
onChange={e=>setForm({...form,nome:e.target.value})}
/>

<input
type="date"
onChange={e=>setForm({...form,nascimento:e.target.value})}
/>

<select
onChange={e=>setForm({...form,faixa:e.target.value})}
>

{beltOrder.map(b=><option key={b}>{b}</option>)}

</select>

<button className="green" onClick={addStudent}>
Adicionar
</button>

</div>

)}

{lista.map(s=>(

<div key={s.id} className="card">

<div style={{display:"flex",gap:10}}>

<div className="avatarBox">

<img
src={s.avatar||"https://i.imgur.com/0y0y0y0.png"}
className="avatar"
/>

<label className="editAvatar">

✏

<input
type="file"
style={{display:"none"}}
onChange={e=>uploadAvatar(s.id,e.target.files[0])}
/>

</label>

</div>

<div>

<b>{s.nome}</b><br/>
Faixa: {s.faixa}

</div>

</div>

<div style={{marginTop:8}}>
Aulas
</div>

<ClassesBar aulas={s.aulas}/>

{user==="professor" &&(

<button onClick={()=>addAttendance(s.id)}>
Presença
</button>

)}

<Chat
aluno={s}
user={user}
students={students}
setStudents={setStudents}
/>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
