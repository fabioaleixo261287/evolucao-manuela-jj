<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alliance Jiu-Jitsu - Eagle System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{ font-family:'Segoe UI', sans-serif; background:#f0f2f5; margin:0; padding:20px }
.container{ max-width:850px; margin:auto }
.card{ background:white; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1) }
.row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; align-items: center; }

button{ padding:10px 16px; border:none; border-radius:8px; background:#3498db; color:white; cursor:pointer; font-weight:bold; }
button:disabled{ background:#ccc; cursor:not-allowed; }
button.red{background:#e74c3c}
button.green{background:#2ecc71}
button.orange{background:#f39c12}

input,select{ padding:10px; border-radius:8px; border:1px solid #ddd; outline:none; }

/* Bolinhas Numeradas */
.bar-bolinhas{ display:flex; gap:6px; flex-wrap:wrap; margin: 10px 0; }
.bolinha{ width:32px; height:32px; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color: #999; background:#fff; }
.bolinha.active{ background:#2ecc71; border-color:#27ae60; color:white; }

.degree-bar{ display:flex; gap:5px; margin-top:5px; }
.degree-box{ width:30px; height:30px; border:2px solid #444; border-radius:4px; background:#eee; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }

.avatar{ width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #3498db; }
.studentHeader{ display:flex; align-items:center; gap:20px; margin-bottom:20px; }

.history-box{ background: #f8f9fa; padding:15px; border-radius:10px; margin-top:15px; font-size:13px; border-left: 4px solid #3498db; }
.alert-trava{ background:#f8d7da; color:#721c24; padding:12px; border-radius:8px; margin:10px 0; font-weight:bold; border: 1px solid #f5c6cb; text-align: center; }

/* Chat */
.chat-container{ border-radius:12px; background:#efe7dd; margin-top:20px; border:1px solid #ddd; }
.chat-messages{ max-height:200px; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
.msg{ padding:8px 12px; border-radius:10px; font-size:14px; max-width:80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
.msg.sent{ background:#dcf8c6; align-self:flex-end; border-top-right-radius:0; }
.msg.received{ background:#fff; align-self:flex-start; border-top-left-radius:0; }
.chat-input{ display:flex; padding:10px; background:#f0f0f0; gap:8px; align-items:center; border-bottom-left-radius:12px; border-bottom-right-radius:12px; }
.chat-input input{ flex:1; border:none; border-radius:20px; padding:10px; outline: none; }

.login-screen{ max-width:400px; margin: 80px auto; text-align: center; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const BELT_ORDER=["Branca","Cinza/Branca","Cinza","Cinza/Preta","Amarela/Branca","Amarela","Amarela/Preta","Laranja/Branca","Laranja","Laranja/Preta","Verde/Branca","Verde","Verde/Preta"]

function getAge(date){
  const hoje=new Date(); const nasc=new Date(date);
  let idade=hoje.getFullYear()-nasc.getFullYear();
  if(hoje.getMonth()<nasc.getMonth() || (hoje.getMonth()===nasc.getMonth() && hoje.getDate()<nasc.getDate())) idade--;
  return idade;
}

function getCategory(idade){
  if(idade>=3 && idade<=4) return "BABY EAGLE"; if(idade>=5 && idade<=8) return "LITTLE EAGLE";
  if(idade>=9 && idade<=12) return "EAGLE WARRIOR"; if(idade>=13 && idade<=15) return "EAGLE YOUTH";
  return "ADULTO";
}

function NumberedClassBar({aulas}){
  // Calcula a posição de 1 a 15 dentro do ciclo atual de graus
  const resto = aulas % 15;
  const exibicao = (resto === 0 && aulas > 0) ? 15 : resto;
  
  return(
    <div className="bar-bolinhas">
      {Array.from({length:15}).map((_,i)=>{
        const num = i + 1;
        const isActive = num <= exibicao;
        return <div key={num} className={`bolinha ${isActive?'active':''}`}>{num}</div>
      })}
    </div>
  )
}

function App(){
  const [user,setUser]=React.useState("");
  const [filho,setFilho]=React.useState("");
  const [students,setStudents]=React.useState(()=>JSON.parse(localStorage.getItem("alliance_v5_data")||"[]"));
  const [form,setForm]=React.useState({nome:"",nascimento:"",faixa:"Branca"});

  React.useEffect(()=>{localStorage.setItem("alliance_v5_data",JSON.stringify(students))},[students]);

  function addStudent(){
    if(!form.nome) return;
    const idade=getAge(form.nascimento);
    setStudents([...students,{ 
        id:Date.now(), nome:form.nome, nascimento:form.nascimento, idade, 
        categoria:getCategory(idade), faixa:form.faixa, avatar:"https://via.placeholder.com/80", 
        aulas:0, historicoAulas:[], historicoGraus:[], 
        historicoComportamental:[], historicoFaixas:[], chat:[], 
        comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null} 
    }]);
    setForm({nome:"",nascimento:"",faixa:"Branca"});
  }

  function handlePresence(id){
    setStudents(students.map(s=>{
      if(s.id!==id || s.aulas >= 135) return s;
      
      const novasAulas = s.aulas + 1;
      const data = new Date().toLocaleDateString();
      let hG = s.historicoGraus || [];
      
      // Registra o grau no histórico a cada 15 aulas
      if(novasAulas % 15 === 0) hG = [...hG, {grau: novasAulas/15, data}];

      return {...s, aulas: novasAulas, historicoAulas:[...s.historicoAulas,{data}], historicoGraus: hG};
    }));
  }

  function handleBeltChange(id){
    setStudents(students.map(s=>{
      if(s.id!==id) return s;
      const idx = BELT_ORDER.indexOf(s.faixa);
      const proxima = BELT_ORDER[idx+1] || s.faixa;
      return {
          ...s, faixa: proxima, aulas: 0, 
          historicoFaixas: [...(s.historicoFaixas||[]), {faixa: proxima, data: new Date().toLocaleDateString()}],
          historicoGraus: [], historicoAulas: [],
          comportamental:{relacionamento:null,comportamento:null,notas:null,habitos:null}
      };
    }));
  }

  function handleBehavior(id,key){
    setStudents(students.map(s=>{
      if(s.id!==id) return s;
      return {...s, comportamental:{...s.comportamental,[key]:new Date().toLocaleDateString()}, historicoComportamental:[...(s.historicoComportamental||[]), {tipo:key, data:new Date().toLocaleDateString()}]};
    }));
  }

  function sendChat(id, text){
    if(!text.trim()) return;
    setStudents(students.map(s => s.id === id ? {...s, chat: [...(s.chat||[]), {sender: user, text, date: new Date().toLocaleString()}]} : s));
  }

  if(!user) return (
    <div className="login-screen card">
      <h2 style={{color:'#1a2a6c', marginBottom:20}}>Alliance Jiu-Jitsu</h2>
      <button className="green" style={{width:'100%', marginBottom:10}} onClick={()=>setUser("professor")}>Acesso Professor</button>
      <button style={{width:'100%'}} onClick={()=>setUser("pais")}>Acesso Pais</button>
    </div>
  );

  const lista = user === "pais" ? students.filter(s=>s.nome.toLowerCase().includes(filho.toLowerCase()) && filho !== "") : students;

  return(
    <div className="container">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <h1>Alliance Eagle</h1>
        <button onClick={()=>{setUser(""); setFilho("")}} className="red">Sair</button>
      </div>

      {user === "pais" && !filho && (
          <div className="card">
              <input placeholder="Digite o nome completo do aluno..." style={{width:'100%', boxSizing:'border-box'}} onChange={e=>setFilho(e.target.value)} />
          </div>
      )}

      {user === "professor" && (
        <div className="card">
          <h3>Cadastrar Aluno</h3>
          <div className="row">
            <input placeholder="Nome" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>
            <input type="date" value={form.nascimento} onChange={e=>setForm({...form,nascimento:e.target.value})}/>
            <select value={form.faixa} onChange={e=>setForm({...form,faixa:e.target.value})}>{BELT_ORDER.map(b=><option key={b}>{b}</option>)}</select>
            <button className="green" onClick={addStudent}>Salvar</button>
          </div>
        </div>
      )}

      {lista.map(s=>{
        const isTravaFaixa = s.aulas >= 135;

        return (
          <div key={s.id} className="card">
            <div className="studentHeader">
              <img src={s.avatar} className="avatar" />
              <div>
                <h2 style={{margin:0}}>{s.nome}</h2>
                <span style={{color:'#666'}}>{s.faixa} | {s.categoria} | <b>{s.aulas} aulas totais</b></span>
              </div>
            </div>

            <div>Progresso para o próximo Grau (1 a 15):</div>
            <NumberedClassBar aulas={s.aulas} />
            
            {isTravaFaixa && (
                <div className="alert-trava">🛑 LIMITE DE 135 AULAS ATINGIDO. O botão de presença está bloqueado até a troca de faixa.</div>
            )}

            <div style={{marginTop:20}}>
                <b>Graus conquistados nesta faixa:</b>
                <div className="degree-bar">
                    {Array.from({length:9}).map((_,i)=>(
                        <div key={i} className="degree-box" style={{background: i < Math.floor(s.aulas/15) ? (i<4?'#fff':'#e74c3c') : '#ddd', color: i<4?'#333':'#fff'}}>
                            {i+1}º
                        </div>
                    ))}
                </div>
            </div>

            <div style={{marginTop:20}}><b>Comportamental:</b></div>
            <div className="row">
                {[{k:'relacionamento',c:'#f1c40f',t:'R'},{k:'comportamento',c:'#3498db',t:'C'},{k:'notas',c:'#e74c3c',t:'N'},{k:'habitos',c:'#2ecc71',t:'H'}].map(item=>(
                    <div key={item.k} title={item.k} className="bolinha" style={{background:s.comportamental[item.k]?item.c:'#eee', cursor:user==='professor'?'pointer':'default', border:'1px solid #ccc', color:s.comportamental[item.k]?'#fff':'#999'}} onClick={()=>user==="professor"&&handleBehavior(s.id,item.k)}>{item.t}</div>
                ))}
            </div>

            {user === "professor" && (
                <div className="row" style={{marginTop:20}}>
                    <button className="green" onClick={()=>handlePresence(s.id)} disabled={isTravaFaixa}>+ Presença</button>
                    <button className="orange" onClick={()=>confirm("Trocar para a próxima faixa?") && handleBeltChange(s.id)}>⬆ Trocar Faixa</button>
                    <button className="red" onClick={()=>confirm("Remover aluno?") && setStudents(students.filter(x=>x.id!==s.id))}>Excluir</button>
                </div>
            )}

            <div className="history-box">
                <b>Histórico Recente:</b>
                <div style={{maxHeight:'80px', overflowY:'auto', marginTop:5}}>
                    {(s.historicoFaixas||[]).map((h,i)=><div key={i}>🥋 {h.data}: Promovido a {h.faixa}</div>)}
                    {(s.historicoGraus||[]).map((h,i)=><div key={i}>🎓 {h.data}: Recebeu o {h.grau}º grau</div>)}
                    {(s.historicoComportamental||[]).map((h,i)=><div key={i}>⭐ {h.data}: Destaque em {h.tipo}</div>)}
                </div>
            </div>

            <div className="chat-container">
                <div className="chat-messages">
                    {(s.chat||[]).map((m,i)=>(
                        <div key={i} className={`msg ${m.sender===user?'sent':'received'}`}>
                            <small style={{fontSize:9, display:'block', opacity:0.6}}>{m.sender === 'professor' ? 'PROFESSOR' : 'PAIS'}</small>
                            {m.text}
                        </div>
                    ))}
                </div>
                <div className="chat-input">
                    <label style={{cursor:'pointer', fontSize:20}}>📎<input type="file" style={{display:'none'}} onChange={e=>sendChat(s.id, `📎 Anexo: ${e.target.files[0].name}`)}/></label>
                    <input placeholder="Digite uma mensagem..." onKeyDown={e=>{if(e.key==='Enter'){sendChat(s.id, e.target.value); e.target.value=""}}} />
                    <button className="green" style={{borderRadius:'50%', width:35, height:35, padding:0}} onClick={(e)=>{const i=e.target.previousSibling; sendChat(s.id, i.value); i.value=""}}>➤</button>
                </div>
            </div>
          </div>
        )
      })}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
